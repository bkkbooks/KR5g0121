body:
  text: 幽棲品第十八爾時玉清天中雲宫右臺真宰上相名曰慈忍一號通玄位總三十四天上司主知三界興衰災否之事掌握諸天之樞總持九地之機回轉靈綱旋運玉衡瑩拂二景開明五辰灑潤甘露蒸發雲雨化諸未化編隸幽藏含氣之徒不失所宜役使群龍驅馳萬神調御正氣流布仁和使四序不虧八節固常二十四氣不失𢘆則正定黃道開闢天原遏隂成於巨冥鎮陽長於渌波消火精於炎方滅水靈於北阿植五芝於天田孕應帝於紫微十二真官變育有生六儀威神環輔形魂雲書自明天經朗虛萬兆則之智慧日生不言而化不為而成掩偏氣於六天置四司以主生植百穀以繼命顯神藥以𨗳生億百千劫深根不傾以道續絶故得如此爾時有大唐世界行道國王名曰昭德其姓玄氏合國臣子專心行道時有邊邦小國三萬六千國王遙覩威神回心想念各將臣宰陳大威儀香花幢蓋作妙音聲披誠露膽內外殫盡從𥘉發心行至道場念念相續無諸雜想聚集大國焚香陳願渴仰上方太空之中翹誠願念如有所待願為九玄七祖一切兆民并及王身而作是言願得無上大道覆護憐憫延續劫運慈造衆生解脫網羅赦諸愆咎使幽明兩途同得開悟信根成立堪任至法見身成道是諸國王陳此上願一日一夜六時啓請一日一夜六時作樂其音和雅微妙清暢能令聞者皆發道心捨惡從善誠不疑二香烟上騰薰於帝庭微言清暢聞於真宰爾時雲宫天尊以正月七日晨朝之時應有生以無形教含識以希聲垂神足於太虛之表彈法指於遙空之中真光掩日洞朗無幽微音清暢隨隸應之瑩拭凡眼開决俗耳揮空洞之音而讃慈忍曰善哉善哉慈忍護世得力無比常以道眼而視衆生常以道心而憫衆生常以道手而𢹂衆生常以道體而化衆生常以道足而𨗳衆生常以道父而子衆生常以道母而育衆生常以道朋而犮衆生時諸天子遙聞上方光音清徹歡喜攝念各作是言道不虛行果在今日是諸天子倍加精進都忘雜想唯道自理不慕其餘雖聞希音猶限三萬六千天地但願至道無違敢希玄鑒乞骨肉俱飛永為真仙九祖獲慶魂度南宫即是天下太平人民歡樂爾時雲宫天尊又暢微音而告諸王曰天子則天而無心民奉天子而無事天子與民俱太平即此無憂亦無慮善男子無上大道雖居三萬六千玄天之上俯觀凡境猶如指掌汝諸王等精修至道而不懈者未有不成上聖者也譬如良農善能播植既植其母必得其子汝守太平之道焉得不處常樂我施至法與諸上真主知諸大而得太平上真化下與我無異汝欲奉道志願生身而得度者此亦不難但問志之何如未有學而不成未有種而不生子審其原自果其流理固自然必定無惑爾時諸王雖欽和教而心未通真私心願念欲見天尊天尊巳知其意即命上真通玄擊太空神磬演出虛琴之辭而語諸王曰虛白為道本太虛為道體虛白無所染道本無所邪真人重至法塵俗慕喧譁願看行尸間接踵騖榮華眄此雲宫真向道皆驕奢耳目不視聽聰察無所遮寂靜守無為檢志勿紛葩圓通無異趣妄想是真家法體常虛無其量包太空唯當裂塵網摧除煩惱藂孤標流俗外冥然與道同道本無所見內視自觀心結固不能繼障纍日銷沉髙步雲崖端無中咀德音安坐不移處賢聖自相尋所在存惠利屏跡棲山林披褐挹流霞焚香陳子心功成同道體萬化無不升塵劫猶未旦冥冥無始終告汝登真機德滿道彌冲爾時諸王覩此神異歎未曽有各相謂言大道威神無所不在太虛之聲尚演微辭金口之言若為微妙計我回心未過三月巳得見聞無上至法終身修習定不廢捐我等徒衆巳得道恩不當退敗失去前功各捨王位從道出家生身受度豈不快樂耽玩榮名權握四海不免威刑亡失善利生老病死凋逝朽爛沉淪滓濁良可為哀時諸天王登即禪位付囑勳臣却後七月七日焚香禮虛大臣誓願願從大道求乞出家捨世煩惱棲隱山林請入玄臺之中作此願巳爾時三萬六千玄天及十方國土真闕光明進於常日仙霞慶霄流灑甘露九色之雲結成鳳文羅絡四天光映下界微風吟籟噓唱靈章天樂自鳴諷詠真經衆音和㑹不可名目皆是雲宫真帝流布道氣演出正音化生王身使真氣速感攺凡成聖爾時真帝但以威神應感諸王不以法身對凡演說如天則道不言而言但以四時化成萬物天為道子猶能若斯無上大道以氣化物真精流變不可見聞唯得度者而自見聞不受度者未能得見爾時諸王各各仰視上方採誦天經雲書靈章三十九篇以十月七日焚香禮願請入玄臺之中是時諸王巳能出入無形坐在立亡恍惚難測目有流光身生五氣既入玄臺各坐於瓊樹之下廕以瑶枝坐以金牀雲龍俠座仙童立侍天給香花以承正足背以蒼璧之垣面以金精之池五河之靈潤以瓊津九地之母植種金芝龍英吐氣芬芳周流是時諸王心眼明朗遙覩真帝近在目前胎結銷亡洞鑒無礙不但三萬六千天地十方世界猶如指掌是時諸王各坐瓊林之下九億大劫而不移處爾時雲宫真帝遙鍚諸王中真之號却後百億大劫又鍚上真之任後又萬億大劫鍚王後聖道君之任號太虛真王于今治在常玄天之中諸王之身為聞道故形貌反嬰猶若盛年十六童子亦能分身遍滿虛空攝形歸無絶凡視聽非是下仙四衆之人所能知也所謂幽通藏用微妙之至無以比譬或見象而無言或有言而無象行一事終㑹萬道之宗總衆妙門則變通無極衰俗紛擾虛談僞辨徒勞始卒無的依憑痛傷流俗糜爛沉溺學無明師又無真經安得周衛而免死厄好真之士可不研精詳審真僞驗其邪正求其機要不在狐疑專心祈度誠無迷惑上士學道即身成聖中士學道蟬化隱遷猶應示死而不滅亡下士學道積劫勞苦出入生死不可計劫道言此諸國王亦勞生死積劫勤苦治民事天功聞上帝信用大道棄捨世榮入山求道嘗味百藥吐故納新精研至經明了深義常行慈悲專利廣大專志守一逺世塵濁道使之然俱得受度而成後聖却後計得百萬億大劫上元真道遷於三萬六千天王後聖道君各治一天遞知化世上元真帝升入無形息諸動用雖復寂寥虛豁泯默無心應物不違神齊影響無情而運不覺有為是故名之息諸動用爾時大唐世界弘道九劫却後八年嵗在壬子正月七日有一大臣名曰廣德其姓王氏年已百歲聽察未掩氣力猶强以正輔國不枉人心蠢動含靈皆沐其德四時八節常䢖齊壇罄其生資盡心供養比國諸臣聞其中正遙仰德音密遣使命賫持信好遙奉大臣如是不絶足滿九年大臣廣德遙感其意晨夕焚香香烟潜薰鄰國諸臣遍體香氣每夕得夢夢見神人身長丈六對近目前如是諸臣心各自念而作是言將非是我供養德人大道感念見我威容遙誠信向彌加恭敬亦各焚香晨夕禮願願得其身親奉大臣精至齊潔足滿千日却後十月七日夜半之時忽見中庭有二童子手執神燭宣大臣教云欲相見評論道德諸神忽聞童子之言匍匐出外禮訊童子目注神燭不暇還别覺行八𡵯奄見大城臺閣宫闕得覩大臣廣德作禮問訊良久之間自思神異始覺已踰八千餘里比近之臣亦有三千五千里間如一瞬頃已至中國爾時總有五萬九千大臣俱發道心願捨名位入山修道執燭童子總有一十一萬八千童子俱是雲宫右臺中真侍者遐感好道之人炳神燭而照之令心正體堅目不邪視耳絶淫聽執持道要行趨道場內外調善果業成熟速得道真神燭之光功德如是爾時童子聚諸神燭為一惠炬縱廣正等六百餘里其光清凉洞徹照曜無窮時諸大臣覩此惠炬心眼洞明悉皆歎言未曽有也先禮童子次禮惠炬而作是言弟子凡膚肌腥骨臭夙無餘慶不樹善緣德薄功微不足聞道不期大道慈憐示以希有不勝恩造喜懼交集童子告言大道慈悲不須遜謝汝等諸人棄榮世祿山棲求道先當入此智炬之中然後秉節除魔髙棲巖岫咀嚼真經諷詠天書拂圓鏡之遊塵揮伏日之金精神室凝珠八威吐芒香烟上騰以陳子心功聞帝庭上升紫晨不久之間勤苦山林我道至神不虛見聞精至之士而能得之子欲山棲當奉明戒勿傷所疾謂餈嬰孩勿犯不淨動止須清一事有虧萬途盡傾子未見聞安得自明時諸臣等從惠炬出長跪請戒童子告言戒言慎也子雖有智猶未辨微聰利之人自恃其智輕犯所忌不懼威神身未成道猶處方圓俯仰失儀勞而無冀一至自在隨意無礙升入無形都忘衆相是時童子即為諸臣而說戒曰子欲山棲先擯塵俗勞纍之事道所不為者勿强為之真所不履者勿强履之但知行道存身不慕餘事欲棄人世而棲山林者先求同志之人不過三五上士山棲不過二三多則喧閙心意不專互相窺瞰輕觸威神不履汚穢男女混雜講及俗事坐卧慢處心逰邪肆察聽外事雖居山林心志不一穢垢通津邪風往來髓腦枯竭牙凋喪明怠不栖沐皮膚積垢真氣逺離無所希冀祼露三光善神不祐耽睡懶起供繕怠墮真君青簡無功可記有罪不誨九玄被考四司糾彈立退見敗思慮不專雜想紛擾真精不守邪鬼來任不辨邪正妄生異見真人造房不知恭敬衣服法具非類雜用塵濁流淹魂神沉滯此首便利不知胔向汙慢神泉地司舉愆罪盈黑簿生身受持或𥨸覽天經妄授不真侍經舉過釁及九玄或泄露幽密輕慢真文或大言大語大嗔大喜隂經畜泄內外失和或泄真誥自陳夢想或食肉飲酒味嗜薰辛藏神煩惱亡失正氣或朝禮燒香顧眄回視招魅來禍上帝不聞如此禁戒真道所疾隱學之士深宜慎之爾時童子告諸臣言善男子學道如道求邪如邪以類推之則可知也汝等雖賢未辨聖教諸學聖道者聖言正也以正事求之然後可以免脫死厄綿綿長存善男子修吾道者即能變練形神轉凡成聖不更受死升入無形衆纍不繼爾時諸臣從地而起長跪答曰臣等雖有向道之心未明道義不解科格幽靄至理或恐夙不樹功無德可恃年既杇邁䈥力衰微忽之禍方永隔生道情鬱悒煩惱纒懷復聞世人誹謗大道而作是言云學道之人不免生死輒以輕陳世說千忤真君願為决疑消除憂慮真童告言善男子汝所云者愚人狂言非至聖說何以故往昔之時有愚癡之黨兄弟三人𥨸聞至士避害棲庇山林斟酌玄流咀嚼甘露形神不灰色如童子億百千劫綿綿長存不知至法精微虛白玄妙而兄弟三人自師短見便學不死第一大兄名曰冥子穿鑿懸嵒冶䥫為鎖繫以一牀空中而坐無所服御飢渴而死其第二弟名曰大閽乘筏入海卒遇大風遂至沉溺其第三弟名曰蠢生自計避死深入石穴忽被毒龍之所吞噬在後凡庸相承不絶因以書記而為盛談不逹深義便謂至人學同於此傳說惑亂輕泄下凡丗之聾盲良可傷之歎汝等諸人欲學真道勿信邪說喪汝一生非唯一生無量生中不得見道樹果之人雖經𥘉因必定當知尅獲果報若住惡因之中而修功者億千萬劫輪轉惡因之中不能得果如人學邪生生相續邪因不絶無有因緣得入正道學正亦爾真人上士無處不正所謂正身正心正慧正命命若有盡不名正命慧若有邪不名正慧善男子汝今當知道不虛行傳得其人傳不得人是名泄慢禁戒嚴重不可不知爾時諸臣奉禁戒已又更啓請真童求受保神內經生魂育魄之道真童又言保神內經生魂育魄之道並是龍章鳳書雲篆天文光彩洞映起死回骸一名諸天寶文天無此文不能廣覆地無此文不能生成日月無此文不能照曜星宿無此文不能正𨇠次河海無此文源流枯竭天子無此文萬兆不化此經者是上皇所寶九萬大劫一時下世我雖奉無上真帝金口之勑授汝入山之科未奉别教授度寶經之信汝欲聞見且待須㬰於是童子焚香靜念遙禮上方長跪而住爾時諸臣亦以燒香叩頭伏地始旦中忽覺上方神香酷烈下薰衆人香花進日九色羅映鬱然滿目過日至夜二更之後九色流霞明於太虛香風吹霞結成天書字文一丈光芒煜奱星月不見又聞天樂遍於十方和雅𡪹亮無以為喻九日九夜其音始畢須㬰之頃忽聞流霞之中有人清唱保生內篇之首窈窕𡪹亮汪洋宛轉徐庠和雅韻動浮雲天雨香花氛氛霏霏其流霞之狀或枯或潤籠籠離離乍見金容尊儀列坐無數猶如雲龍初㑹九真大集威儀容與霞衣霓裳逐風回旋蜿蜿輕妙如雲龍之在虛類舞鳳之翔空左鐘右磬音節交和乍近乍逺乍髙乍低天清氣朗四海無波水陸飛走異類群狎悉皆仰視而聽法音其篇目曰七氣成真六儀運虛五靈續絶二曜扶衰旋綱躡空飛𡵯雲宫胚胎有始塵劫無終金城孕質玉洞凝神真氣內養以成聖人上入六虛下洞幽泉雲宫寶闕中有真魂出入福鄉周旋生門咀嚼靈芝灌潄金泉甘露川流懸澍丹田紫霞朝映三氣凝烟瓊室化仙安坐金蓮真儀掩日塵劫為年爾時諸臣聞雲宫上真清諷靈篇誦詠道經各各顧視衆人氣色如雲心中自明三際之事了了分明身轉自升隨意立果無有滯礙真童問諸臣曰汝聞上方真宰吟誦寶經威神潜感靈驗須㬰與道合同豈不快乎夫學道得真果不移身汝等諸人先弘誓願入山求道上元真帝慜汝殷勤知汝不退成就汝身令速得道汝等猶有本願法當棲山教諸後學爾時真帝遙鍚諸臣上真之號時諸上真遙禮上帝雖隔三萬六千玄天之中以通逹故如對目前道合無言不聞所陳爾時上真一時升空上登崑崙治山正中四時八節上升玉清謁於雲宫無上大道或時停留九萬大劫下逰四天度諸後學隨類見形同其音聲而為說法皆為饒益無量無邊不可思議諸後學之人不懷山水無清髙之志狎在塵濁煩惱縈纒假有微心不能大成又無堅固不遇明師不識真要信邪倒見不辨科禁真僞相參淨穢交雜未偕因地自謂得果其身未度說法度人大道不聞空勞邪聽師既愚暗弟子亦頑自誑誑他與俗竟進規求世利以活行尸常之禍鄉不憚凶險進退自伐纍劫失生冥司注愆生死徒謪永失人道甚可哀哉道言往昔下界雲臺之陽時有五人結朋學道南入丹霍之山下尋地道却出伏龍之山從小阿南竇出於山陽同居數載服水餐松不解科法不見真經積年勤苦心不懈倦不交塵俗不求世利常服草衣一日六時朝禮上天願乞濟度長生不死如是積四十六年上玄哀其單盡使日宫神童下試五人第一之試變為美女投其寓宿時天寒雪經停九日與之共牀於是五人採藥供給設火溫暖視如父母心生慈慜神童洞鑒其意即便暫退已後九日忽變為大兕觸殺一鹿其鹿亦是化作死其廬側於是五人往視悲淚故取埋之兕知其意即便退去又經七日五人入山尋採藥食奄遇寶窖金銀無量是時五人目不暫視又經七日於是神童化為貧病窮人投之乞食如是五人安養供食足經千日便爾還去後又九日爾時神童化作惡虎三十餘頭又化作蟒蛇十頭虎尾鈎連蛇身交結圍繞五人是時張口吐舌欲相吞噬於是五人情地不懼顔色怡恱氣平身安綽如無事爾時大道哀慜衆聖慈憐二曜停空一十四日盛冬氷汋玉樹敷花雷音清暢天灑甘露神香鬱烈和風發生無上大道空中授手遍於世界天文映明群瑞祥集麟舞鳳唱衆音和雅合讃五人一切世間聖凡異類土石草木皆能演出微妙法音所謂天經地緯織凡成聖皆可採聽爾時五人採服微音皆以心體柔軟德力無比百關強健六府調和耳目聰明神識凝玄不違四時不逆五行歸依常道逺離虛妄善用中和故能無病妖魔消伏真正日新神童歎言世人雖賢不能用德偏執異見謂無常道順俗灰滅夭喪真性不知即身去道不逺分意不永甘心滅度逰魂倚變隨境而舍昔有風氏兄弟二人大兄名運二弟名遇同一母生運年十六弟年十四母教令學逰往他方遭二種一師貧賤唯富貴道德積居常山年巳九百一師富貴多饒財寶善明世事兄弟二人各事一師大兄事師山𨼆學道小弟貪財奉事世師執手辭别隨師而去逐事流變六十七年後於䣑間忽然相遇大兄識弟弟不識兄兄雖年老顔容不衰少于往日分别之時其弟形容甚至憔悴耳目巳損瞻視不明兄弟相隨三日不悟弟謂其兄而作言曰子非魅乎忽作此言言是我兄必欲中我奄便揮劔以剌其兄如剌虛空竟無傷損其弟心懼五體戰栗發聲大呼聲震禽獸自仆地驚愓欲絶其兄慈慜弟故扶起案摩消息將養漸漸得蘇猶未敢信其兄向弟一一具說父母生處所經事業村邦鄉里弟雖小悟猶恐鬼魅而能得知良久之間而作是言汝今定當是我兄者不是我兄者以劔剌汝不覺所中以此驗之固不敢信其兄告言吾聞道乎遍體受生身無死地以是因緣刃所不中非是鬼魅汝今勿疑我昔與汝生一父母年各長大禀學不同粗妙相絶優劣懸隔若使汝不癡貪志求生道亦得如我無有異也猶狐疑心未淳信爾時兄弟二人相隨至家見其父母拜跪問訊父母見兒歡喜無量兒雖未言父母巳知其子學有優劣是時中表親舊聞其學還皆來勞問所學因緣爾時大兒以其初學因緣答其親族又序其弟所事師範一一具說因緣之事其弟心中以漸開悟始知是兄真實不謬為兄作禮長跪悔過深心尅責三月謝愆雖知謝愆心尚猶䂊不知請兄而受至道䢖後六月重辭父母而向他方尋求學業忽於他邦單貧之家而遇外道求假衣食請從服事以為師匠於是外道便即許之服勤六年於是外道卒乃授其邪法之道辭師還歸至鄉里經涉勤苦遂成勞患傷損䈥骨卒於道傍形骸不收為獸所噉遂失生道魂魄苦惱甚可哀痛後生邊陬化諸流俗今巳九百生中為人演說邪法之道求世利養資其身命而雖有功不足成就終不能得即身而為法身然此外道亦逰山林荷負瓶鉢入村乞食居無定方修習不正惑辭聾瞽招誘童蒙上天以其嗊嗃之愆制役下鬼惑亂其心使其愛死不重生道與諸魔邪以為群黨如是外道至於後劫淳澆之世法流二界大道不行當此之時衆生福盡天告災祥百穀減少人民飢饉水劫攺運一時漂沒爾時風運以無上道法授其父母精修千日老而復丁後隨其子入玉輪之阿飲以金精咀以玉芝身生紫氣目有流光骨體輕便而能飛行不久三人升入無形長存綿綿塵劫為瞬彌久彌新遇之與運升隆若斯同本一元中道流浪一時相失億劫長乖不識明師遂至如此告諸後學明鑒此經人生難得不可失生爾時真童逆告來生學真之人或志不在俗擯塵割纍願居山林幽身虛巖研味上道求見升度要在清潔不潔無冀廣尋至經眀視節度修道方法心性慈順便易感通淨持神室晝夜不睡瑩拂眀鏡徑九寸令無瑕翳懸對目前以鑒精魅辨其僞真開闢明堂遐招二景隨以晨夕互咀精霞密室坐卧任其便所不必一也採服輕妙呼吸中和不緩不急不粗不細猶如嬰兒飲其母乳綿綿微吸取類引絲使不斷絶不勤不勞如幽泉之潜澍內外靜息百關不躁忘所馳競冥昧泯默如無耳目不以視聽用其聽察也於是塵濁消沉道德眀顯生神內養和氣調暢存亡去留隨心攝運生道一固欲死不可得也尋真之士寶祕此經慎勿輕泄傳非其人九祖受考身不得道深加微密勿得唱露勤而行之尅定太平失之則亡得之則昌密之則真降泄之則禍來爾時神童為諸來生欲學道者志逺人世隔諸塵濁願棲福地入諸名山尋求真經採服靈芝千年萬歲不為凶害之所侵損地多善神土氣調良水藥宜人崑崙四方元過東南王屋山南玉洞上應諸天日月星辰亦如上界無有異也地道十通千徑萬路真仙攸往亦有宫室天經備足不減上界洞天之中多有神人時出登山眄諸後學地多黃精白术上中下芝甘泉玉液飲之不衰常有神香自薰鍾磬𢘆鳴天樂在虛神唱天經能棲此山真道易成次有五臺之山山下有洞傍通王屋山上山下亦有靈仙今古與人常常不絶次有常山山下有洞交通十方亦有神藥次有太白終南之次有五嶽方壷伏龍天台丹霍曽城羅浮洞天江源大面武陵福鄉地多五金朱砂雄黃丹水金精玉髓神芝茹服不衰兼得還年研誦天文悔罪謝𠎝香烟上騰以陳子心功髙行成勳徹皇天大道慜之迎以焱輪身升太虛受號聖人神童又言邊邦諸山地多毒厲寒熱不調地氣損人又多精魅後學之人未堪患難真氣未布穢濁未消既無良師又無真經苦欲有心去山遙逺若諸女人及衰弱者無師可怙未能逺去如此之人篤志不移亦可選覔平地重牆復壁不交人事依禁受行萬無一犯於曲室中燒香願念一日一夜六時行道陳心所願隨意而言要在悔過上為九祖下及一身所犯愆咎乞請天曹原赦四司五帝恩蕩愆尤微氣低聲每令殫盡𥘉取香火及正陳啓勿得顧盻及以雜想心念不真邪氣來應輕觸至聖陳啓不聞徒勞苦辛空無所獲驚動流俗嗊嗃自欺正道不行坐待灰滅臨絶之際謂道無靈嗚呼行尸不能正信沉淪生死心不猒惡不樂一生而得解脫五逆十惡掩其耳目蟲蛆三毒入其藏府或遇真經心終不信聞人得道便謂凡身不合成聖要更灰滅魂神得道此名邪見修習外舍淺近之法上學之士若見此人勿與同行及共居住應當逺離染汚良善窺窬誹謗或為調戲真道所疾深宜慎之勿與交集上學之士銷聲林壑絶跡幽山結宇依巖永離人世澡練形神研味至法採服良藥衣糧窮盡不假外求披草服氣支持性命如此之人非鄙衣食增惡飽暖志逺惡人不與交好恐其能壞善根故深避患入諸名山至論大道無所不在人間多難不得專心嵗月易流身命難保無常忽至求悔如何真童又言昔崑崙東南葱山之陽時有二人同志聞有生道而欲學之口常言語向他陳說積經六年此人村中先事邪神神詬其故𢘆伺其衰後於夜中厭殺二人遂失生道上天以其有心下勑四司攝其魂神受生人間不經地獄速得人道二人攺氏生於姬門一名弘道一名弘德于今七百生中未遇真師流浪人間忘失宿心永無所冀子欲有心學生道者當慎口言莫令流俗之所知聞惡人讒嫉神邪所害道言人初學道感通之始多有諸天上聖下臨其所教授學人上天威神隨從聖人下逰凡間當此之時下士鬼神受事給使又亦防衛學道之人及其家門神精辛苦不得自在常不欲得世人學道恐其承事不得自在爾時有武當山中學道之人名曰祝元與其同志一十三人積棲武當三百六十二載而採服松柏形容不衰後入陸渾時逰太室採石密芝术服之不得真經但遵藥餌耳目精明行及奔馬七千餘歲棲隱山林時入洞天謁諸後聖志心不暫替後遇王母賜其玄霜玉丹一時冲天于今治在泰清天中雲宫天尊慜其堅固即命左真侍童授其雲書二字與今服之位為上真世人愚癡學末經旬心巳懈退欲以行尸窺窬上道不亦難乎此一十三人者志雖不退在世之日及以隱山心不願念亦不尋求明師請受真要直以遠離人世不交塵濁授服良藥填𥙷其身不犯穢惡無别修守所以不能即身得成真道若使此人尋求明師請受真要道成益速不俟多年道言學道之人感得明師修守真要或其前世善功未足法應滅度或承先福慶真帝慜之學道不日而得成真往昔水劫之間崑崙之西有一戎人名弗多梨姓頗尸迦常以晨夕遙禮崑崙自弘誓願願得長生度世如此積得四十餘年奄遇女真王琴心從泰清天上下逰崑崙停留閬苑九萬大劫常慜此人而作是言下界西南地氣穢濁人唯殺害戎狄凶險不聞至教獨有此人欲聞大道爾時女真作如是言白諸真官真官答言狂戎之徒非肉不食非血不飲羊毛皮衣內外腥臭無上大道非其所聞若有心者待其滅度轉其魂神生於中國度其後身與得成道女真又言無上至道其猶大冶銷鑠天地混化衆生土木金石變成灰燼此人有心何不可度爾時女真勤勤固言男真道君便即許可女真歡喜便以四月八日夜半之時即命中真侍女於人睡中攝其精神上至閬宫教以生道授其五石鎮生玄腴神舟又授此人餐和服氣神水之法此人睡覺書記誦持無有遺失至心修守三千餘日而果中仙之道位知下司主領西國戎狄雜類有心行道令其教授治在龍山正中而居亦能飛行身生日光四時八節上升泰清朝謁女真此人成道女真之力也今巳得十萬劫于今在焉太上大道玉清經卷之八
