front:
  text: 太上大道玉清經卷之七星七
  hash: sha256:5542628fbea78b135d545762edb64902c64451ba3175f9ec3aa76e2bb3ef14d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_HFL_007-001a, image: hfl/1024/1024-004.png}
body:
  text: 道化四夷品第十七爾時玉清天中右瓊臺上真名曰寶光以為上元推其降運下於神州天王皓元之門以七月十五日日中之時乘紫雲之輿從二仙人俱時化為日光降玄氏之胞因睡之中從口而入處胎三年爾時夫人年始十八晝寢而覺有娠神香鬱烈根識朗悟華容豐偉膚體充盛獨處之時恆聞側近有金石之聲或聞髣佛清誦如唱真經和心之文身體輕強倍於常日却後三月三日日中之時夫人將三百綵女遊宴東城觀看花園息於芳林之臺忽聞香氣衝人須臾之間見二繡衣童子手執金符在夫人左右夫人問曰子何人耶童子答曰我是玉清天中直事神童為玉清天尊之所役使受事至此夫人問言來此何為童子答言上帝有命符召大王夫人答曰王不在此童子又言夫人懷中之王也夫人聞喜即垂腳牀前忽覺嬰兒出其左脅夫人乃擁羣侍女抱出嬰兒二仙使者長跪問訊而作是言睽間三年勞於下生嬰兒搖頭微笑良久目下重瞳遐映紫光孩笑三聲泯然而止斯須之間忽見芳春臺前月沼騰波五色龍王涌出池中口含香水以沭嬰兒父王聞之馳駕而赴羣臣朝慶傾國作樂大赦天下父王命羣臣後宫綵女大張音樂廣齎來帛香花幢蓋迎兒還宫車駕來城大會七日抱出嬰兒大臣議定册為太子錫官百司厚加寵祿爾時慶霄下流天獸來衛父王自立此兒名之重光字曰天挺育於凌雲之宫保毋五人傳手抱養侍女八百晨夕供侍或抱出寢幃兒見天日常以仰笑口出紫光上連天口甘露如繩直注兒口玉女散花以拂兒身神烏停空張翼蔽日香官揚煙以薰宫中爾時重光三嵗能言聲聞百步常樂獨坐不須人抱年至四歲獨言獨笑談及世表年至七歲不學而知遐思逺視身邊有光照耀一室坐立如山行如龍步側卧東首四肢半伸紺髮翠眉目開日角光含紫映方口圎鼻耳長五寸三門成就齒白齊密足三十六數脣色如丹方顙髙凖人中四起長十二分闊額平正玉枕如星髮不參差柔軟光澤項負三約四乳方肘闊𦚾微偃心處深厚臂圎煦直垂手過膝爪堅色紅常有光明掌中有華文三道通逹手心色紫指長六寸臍中深圎脧有伏骨雙靨駢脅腹生白子髆骨方直藏踝不見足跌微偃筋脈不露跖底平滿圎文日輪爪根深下指端微起膚容細軟充滿香潔青骨素髓五藏蓮花紫胃筋腸食不全粒顧盻回身坐立平正年至十九形長一丈聲響如鍾韻驚塵飛遙聞十方常有紫虛蓋其頭上而止之處無有霜雪和氣調平風不狂勃甘雨微津溫仁忠恕忍辱慈順仰觀雲天善明經緯一切伎藝不習而工幽通至極預知未然父王珍之大集羣臣議定禪祚三讓不受爾時五嶽響應虛鳴萬嵗嘉祥畢集幽明符會苦不得已然始受位治民事天弘道安世正化無為不勞人心貴德尚善不令而從恩流孤弱惠及昆蟲人神交歸異類羣睦每以秋冬天降甘露五色之雲以旋日月城闕不閉郊境無防四海通同萬邦歸一嘉禾瑞草合根離頴一樹十枝隨時四熟仙娥布野榮絹亘原絡織成文以充衣裳鹽池醴泉隨處而出靈芝夜光遍挺園苑神禽竒獸馴狎牆廡麟鳯羣萃晨夕和鳴爾時有黑水之北牂羝之狄斜通河源雪山之陽與雜畜之戎性狡難狎隂生姧計聞王善政不用戎威相率興兵來入王國始到雪山之東羊馬災厲羝戎疾病羣鬼露形殺滅戎狄十分遺七中路自悔跪拜叩伏王知其逆心固不加伐任其進退爾時大王遍勑國內而作是言邊戎無知匆懷逆心天巳罰之即時自翻刀不任進天下萬兆不須驚疑我若無道天必喪我三日之中邊疆報國云賊巳退是時羣戎復歸其兵昏氣天之十喪其八瘥癘由興災殃未殄邊陬恐怖羣聚相謂享人禱天災氣轉盛荒戎之中有一主者微辨世事向諸衆等而作是言大國之主德合於天修道守正志不邪偏萬福扶持百神守衛我等云何相率興兵而恃上善我國遭災祥必由於此我當急告鄰近諸王嚴裝所須速往辭謝是時邊戎一百二十五落戎狄之主將諸侍從八萬四千人俱乘白象齎香花瓔絡馳入大國屏氣玉闕負揭琛賂肘伏王前抽膞求哀劈凖流血拔髮如蓬自撲紛紛遍體青腫獸鳴鳥噪不可悉解強人重譯悔過謝愆而作是言我等邊隅不治正朔三才濁氣二像醜形雜類之種不識恩美雖日有生實非正氣忽起𠒋頑率心不義而興獸心塵穢大國羣聚未久巳遭天罰荒陬殤夭十分喪八毒氣未休故猶興盛讓者以為反逆上天縱毒享人禱祀轉加增甚敢從大天求乞哀愍言畢自撲披髮悲號大王告勑我承有道之君係統天下唯善是履不務其餘猶不自哀云何哀汝我於萬物受同一子未曽偏黨乃至幽冥亦復如是汝生逆心來向我者我身不知付之於天我無情而責汝天無心而伐汝汝身受罰如仰唾天不離其身如仰射天箭還自中自然之道理無差也汝等所齎香花瓔絡非我所珍我此國中唯修道德及以榖帛頸珠瓔絡邪俗嚴身非正所貴轉重纍物外滯塵滓何以故此名外飾故不足珍我此國中一切人民盡用忍辱退讓精進儉約以為嚴身之具以道德戒行為諸香花不須汝之所有爾時諸戎見大國之王不受其獻恐畏無福災害不消悲泣相顧而作是言大王不受我獻或恐熑薄我等大衆各以白象奉上大王以求哀愍大王勑言瓔絡寶珠尚非我貴况於白象腥臊臭處水草巨大又須看牧為我國纍龍鳳輕妙吾尚不須時諸隂戎煩𡨚懊惱自拔頭髮悲泣而言大王不受我獻我身無福定不免災不如自殺以逺此禍大王勑言夫求福者空心奉道身心既空道亦虛無以空虛故則無禍患既無禍患名為福德又求福者無希無望汝所獻者誠有希望故我不受希望之獻我此國中諸賢良等常以善心而自嚴身不以纓絡白象為求福也大王又言我此國中唯當奉行無上大道餘無所求諸戎當知諸求福者心不邪偏平等一行不順利不違害亦不變禍為福亦不恃福故能無禍何以故惡不勝善凶自成吉禍自變滅亦不見福汝欲求福所避禍者是汝顛倒不逹禍福心生背向何以故禍福同門根於虛無汝審此禍從何所報知禍所起自明福本諸求福者先知其禍譬如良醫欲療衆病先識病源然後與藥病藥相當無疾不愈汝諸戎等挾禍求福不除禍本望福降者譬如有人執杖和怨負水求火勤苦積紀終不能得汝禍所起起汝身中云何求福二滅汝身夫滅身者不名為福云何戎狄自欲滅身身為福本云何滅之諸滅身者名之滅福又身為道本諸滅身者名之滅道非滅禍也諸滅禍者不恃福以滅禍諸求福者不因禍而致福是時諸戎聞大王勑言不能辨了請譯人譯之斂祍畏懼不解報答唯知頂禮內懷厚愧跪立不安爾時隂戎之中有一主者名釋頭分請譯人宣傳自稱是浮提竺乾之王而作是言慙愧大天為我等衆説希有法但以邊戎淺識不究至道迷逺相傳沉滯邪津歷劫未悟不但今日唯願大天哀愍昏惑狂胡無知情所不了念逹一言以陳鄙志向聞大天示以此國唯奉大道無上至真可得聞乎大王勑言無上大道常以希聲而聾者不聞大道甚微而盲者不見汝等衆生雖有眼目不能正視雖有耳根不能正聞衆色紛紛引汝之明邪音凄咽窒汝之聰汝雖有耳目不異聾盲以是因緣不能聞道汝欲聞道除汝邪聞汝欲念道除汝邪念汝欲修道除汝邪修汝欲行道除汝邪行行於正行慈悲善順名為道行行此行者自當聞道既得聞道亦能見道既得見道亦能行道既能行道即能平等觀諸衆生與巳無異觸物生慈心不分别先建此誠然後聞道爾時諸戎重復請問大王無上大道至真妙行以為何宗全生妙用升入無形綿綿長存絶待無纍願垂開示令得解迷大王告曰無上至道以自長生為宗即此之身而為法身以慈悲平等為重以忍辱柔弱為用以方便惠物為利以無為虛白為寂以智度無礙為通以道眼觀照為逹以弘廣容物為虛以形能隨神為無以無作為自然以無形為長生爾時諸戎聞大王之言皆曰未曽有也神識雖鈍亦以朦朧未能盡解猶亦在疑爾時大王為邊戎釋除疑結心開意悟於是大王以八月八日為諸戎狄請寒林大師召集國內出家道士備陳威儀為諸邊夷七日七夜齋戒悔過又却還其所獻珍玩及以瓔絡諸我奉勑不敢不受受巳轉施寒林大師大師受巳即分瓔絡而作二分一分與衆中貧下給使之人一分與諸戎白象還令諸戎為象著此瓔絡爾時二萬四千大象著此纓絡一時跪拜寒林大師象又四散以鼻繞花奉上大師是給使下人佩此纓絡心生慙愧皆自歎言大師平等一心視物寶珠瓔絡惠施天下人民及諸白象頓首辭謝寒林大師語曰無上大道寶轉凡成聖尚以平等惠利衆生而不恃功瓔絡外飾邪俗嚴身塵滓瑕疵何足及言外荒雜類不解獻心將此施我我以為受回以與汝何用謝之但取勿疑至月十五日日中之時大師與諸道士九萬七千人同時受食畢漱口寶瓶餘水散灑南西北方立成雲雨風雷電擊大師又向三方噓氣口出金光逺映諸國是時邊戎弊疾者登即差愈皆於光中遙見大師如對目前風雨蕩穢雷音舉愆一切災𦍙應時殄滅又令八萬四千戎夷悉於光中得見其家至月二十日諸戎留後各遣使者馳入大國報奏平安具狀所見瑞相如前是時諸戎披髮謝過歡喜道前頓首伏地請問大師不審大師修習何法神變乃爾自在無礙只名大師復有餘號向聞大王勑言大國之中奉事大道不審大師之道與無上大道為一為異蒙昧不曉唯願大師廣為分别開示未聞爾時大師彈指謦咳而告羣戎曰善哉善哉念法邊鄙哀汝知問不可思議汝當諦聽吾為汝説我是王清天中雲宫東臺號曰太真自然虛生名無上道無所修習但以大慈大悲應世神變隨心而成無心故為不勞於身我與大王同時應運下治兆民國王因寄凡胎我權號大師託在寒林互為賔實濳相影響不一不異不處中間汝等諸夷出生欲界受質邊戎人心無慈荒涼弊惡性便戕害而不好生飲血茹毛形骸臊腥神凝濁氣體結偏精拔本塞源抑本崇未性重財貨不珍大道積劫如此非獨今時大道不行其來久矣雖知若此物有輪轉罪為善本惡是慈源汝等衆生向無逆心終不見我大道無𥝠冤親不二以德報怨不捨大悲是故國王請我法衆為汝悔過為汝消災慈心平等無有異念故令雲雨施散光音普被爾時大國太帝及以太妃王子羣臣先心不知寒林大師與大王重光同是降神大師初來之時國人大小咸謂大師是凡常之人後見大師隨心神變傾國歸依悔過自責隨其富貴貧賤辦諸供具雲萃國內列滿東城芳春之臺大設齋會合國士女填塞衢路車駕紛紛塵飛霧起爾時大王為施髙座罄國珍玩裝校道場開發大藏巨惠榖帛周窮濟乏出諸名香焚煙衝天結蓋凝雲張設妓樂驚天聒地五嶽震動四海波蕩春雲涼風調和氣序韶光曖景同於始春長林再花和鶯重發百鳥翔舞魚龍躍鱗天地吉氣以輔王國時會大衆喜慶無量行道旋繞歌頌盈溢法衆步虛梵讚歎詠爾時大師登座撫几嶷坐如山千善為心萬福成體大衆欣仰一覩真相皆發道心異口同音百心齊一合禮道君願聞希有爾時無上大道君為衆生故及命國主重光三捻焚香遙禮雲宫大悲天尊長跪立願第一願者道化流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤爽無依咸得受生五願天下太平百榖成熟六願臣忠子孝君仁父慈七願四海通同怨親和解八願濳胞處殼俱得生成九願積疾新痾登即痊愈十願孤露衆生豐衣足食爾時大王陳此十願起禮大師而作是言唯願大師為衆久處降迹同凡不棄塵穢大王作此語已感動天地虛空雨花天灑甘露萬變仙樂鳴玄駭空天地震動麟吟鳯歌龍魚鼓淵爾時道君面門洞曉真光遐朗無際靈音逺暢和適羣化沉尸受生稿林吐葩有情無情含英發花道雖不言諸法已備令此衆會生希有心自然而然吾亦不知其然所爾時諸戎仰視忘瞬自失其形兀而不動猶如枯本須臾之頃雲宫天尊降於應身與諸侍從九億上真下臨青雲之上凝結慶霄方入萬里其霄四方平整如地時諸上真列坐其端慶霄正中有紫霞之座五色雲龍交結負座座髙八萬四千九百九仞大悲天尊升此座坐漸下玄中去地七百八仞正臨東城耽耽若虛湛然不動唯見明霞之上紫光含雲彤彤混然衆目仰視不覺天真大師分身上騰入於雲中先所座上復入二真容貌相似良久之間二會寂然無有音響真儀不動猶如金山光明洞映不測邊際大會之中人及非人默然不動心無疲猒歡喜仰視樂真觀相傾心注念不覺有身九日九夜寂無飢渴身心不動爾時諸戎重覩浮雲之上大悲天尊威儀侍從大驚恐自拔頭髮悔過責已刀劈其凖遍體血見踊身自擈猶如山崩覩此希有求欲捨眼施頭燒身破骨以為供養聲徹大王王因出勑而告諸戎曰無上道法好生惡殺莫以邊鄙穢法汙我大邦燒身謝過過在身亡魂神受弊永失人道燒身求道道存身滅滅身求道道非滅法云何滅身而求道乎汝諸夷等入我大國永不陶化云何欲聞無上道乎汝欲聞道應全耳根不以耳聽而聞道也汝欲見道應全眼根不以敗壞之眼而見道也汝欲行道應須全生不以滅生而行道也汝欲行道先全汝身不以缺犯之身而行道也汝欲懷道應除十惡不以五逆之心然後行道汝今當知生不全者不足聞道身不全者不足學道汝諸戎夷雖非法器得覩天尊萬劫之後承此功德轉輪受形必生大國有道之邦能立誓願必不重生鄙野之方從今巳往當全汝形勿以披髮燒身破骨反天逆地心無慈順生死墮邪永不見道諸戎夷等一時拜跪答大王言我之風俗殘形滅生燒身粉骨浮煙上騰謂之升天或棄尸深水謂之水仙或棄尸林野以飴禽獸不貴生身受度勞於長存大王告曰汝戎狄等以長存為勞以髮膚為纍我此大國之法以生滅為纍故求長存無生之道升入無形不覺煩惱不以殘形滅生以逺勞纍亦不吹纍而纍自消亡汝諸戎等不捨邪心具足外道不除十惡樂處生死不遣三毒人形獸心不足見道勿以戎狄之法穢我大邦是時諸戎直以謝過不敢拔髮燒身破骨皆云不逹至道忽出偽言以干正直只言生而必死是故升求滅度不知無上大道長生無窮升入無形絶待無纍願垂哀愍賜以自新爾時大王又勑諸戎汝野性暗鈍不識道德自作凶逆招求罪罰來此悔過大道慈悲念汝無知寒林真師降汝景福大悲天尊愍汝癡頑無上大聖來會我國萬兆無言傾心注玄專志大道汝諸戎狄輕陳短見不能安靖驚觸法衆自閙閙他亡失惠利汝但默住雖不解法亦得魂識漸漸受潤是時諸戎奉大王勑胡跪默住不敢動搖七日七夜却後日晡之時忽見南西北方三大天魔各從地司飛空而至頓首真君頂禮大王回訶諸戎怒目切齒𠉧譮而言大王道國人無三毒久離十惡守正修仁尊道貴德國無亂臣家無逆子汝諸狂胡將此罪鬼行尸之魂塵穢王國悔過請福求聞道乎天科地律十惡無原反逆君父罪莫大焉合粉骨灰身抽筋裂血刳剔五藏剖膽披心拔出汝舌不足以謝惡言挑出汝目未足以申惡眼汝家國遭災子孫亡滅一人造逆誤殺萬民是諸戎夷身毛皆起恐怖悲悴肝膽塗裂王體攣縮流汗如雨氣吟口噤五神無主地司執簿以簡大王王即告諸魔言無上大道不間怨親於我無傷云何伐害縱能損我亦不加報大王問諸魔曰譬如嬰兒或執瓦木及以錐刀而傷父毋寧殺之不魔王不也王言我亦如是寧塤我身終無有心傷害物命况於狂戎智慮微淺不及嬰兒於我無損天以伐之荼毒狠狽愍之在心每為傷痛時諸天魔聞大王之言俱時彈指皆曰未曽有也相顧而言大國聖王寬心慈善大悲及爾德同造化雖暫為王巳具衆相身基萬善千福成心不久之間受號天尊我等大衆巳來至此此會不久必當度人大道難遇妙法難聞我白大王求乞停住大王知已即告之言大道弘廣如空無礙此會之中以道為法法無分别法無起滅法無見聞法非內外亦非中間法離生死此會之中淳一無二皆以一慈悲法汝諸魔等欲諸住者應如法住爾時諸魔聞大王之言凛然肅整邏與諸胡參一處立三日三夜却後晨朝日𥘉出時見建水之鄉仙人道士六萬八千人俱廕以飛蓋手執花幡過於龍宫各持明月神珠紫瓊靈芝飛空而至奉上天真後有八十一種島夷之王皆披五色鳳文之衣各將侍從八千人俱是時諸王各齎神藥珍香一時而至奉獻大王所謂虎沫七明龍胎舍利金暉炳煥光明耀空此舍利者皆是八瓊霜珠化成舍利王能服之身有金姿玉顔虎沫七明龍胎上藥王能服之身立飛行千變萬化隨心而成我昔學道師於長桑道君見賜神藥服之得仙後受道要下治九夷聞君降世助衆生喜又聞玉清天尊玄立影響左臺上真託棲寒林為緣俱會希音遐震八表皆聞虛光洞空十方徹照故來至此為敬起居爾時八十一仙説此語已升身入空去地百仞朝禮天尊空中而住爾時復有東地鬼將名曰電豕形長三丈鋸牙鑿齒銅頭鐵毛鈎舌火氣目似奔星黑面赤體牙如鸇足腳似馬蹄聲如擊雷吐氣成雲將眷屬六億餘鬼遙聞真人降世為王以道治國不撓舍生願為大國守護郊境匡贊大三俱乘黑雲浮空而至頓首王前而作是言臣為鬼方之王役使遊精諸有妖魅不賔之者臣能噉之生殺在已遙聞王國人民慈善輒率徒衆塵穢王國敢欲為王而作守護若有大聖仙士所在之處我當給使晨夕受事若有齋講之所當率徒衆而為外護若有外道惡人誹謗善道衰捐法衆我當滅之令其惡疾毛髮墮落與其重病若有衆生於道場中心不端直邪視念視我當考之令此惡人生身受疾死入地獄罪延七祖若有衆生慈善孝順念誦經戒供養大道以道為心我當親近常當守衛不令惡鬼得其衰便唯願大王聽我徒衆衛護道場大王告言善哉善哉我念衆生猶如一子於汝亦爾心無偏黨幽顯雖殊咸願與汝俱為善識爾時諸鬼歡喜受語禮謝大王圍繞東城芳春之臺敬禮真人伏首而住爾時復有火光惡殺六萬餘鬼形長三丈頭頂放光猶如散螢通身黑色眼赤如火手持鐵棒吐氣噓人立便倒地毛竪寒森悶絶迷亂鼻口逆血聞王有道以正治國不愪衆生願為大王威伏惡逆俱乘黑風從北方來長跪王前而作是言聞王有道惠潤廣大一切幽顯皆沐王恩故率徒衆願為受事利安王國守護善人若有法會之所我當外護摧伏惡魔正諸邪道若有衆生毀敗道場濳生毒害邪心惡眼來視法衆我當鐵棒打殺此人或拔出其舌或復令其眉髮秃落若有衆生入道場中穢身汚慢我當與其癩病種種災怪所在不安自然恐動大王又語諸殺鬼汝光影毒厲不可近人雖有威神勿行傷天當念衆生扶持善人願聞道法速得轉身成無上道諸殺鬼受勑歡喜而住爾時復有金剛之神八萬五千飛空而至身長丈六勇健希有除道神力餘不能過翕然而至莫知所來常為大道而作侍衛先禮上方大悲天尊次禮真人問訊大王宛如舊識而作是言真仙下世道化有生內外相持人神符會萬邦咸集邊士俱臻清濁混淆真偽無辨大聖寬宥不問昏明此會因緣固非輕小深宜戒約以絶不真唯願真王聽我説法正彼道場惠利善人變滅凶惡使人及非人咸尊正道大王默而然之爾時金剛即於大衆之中瞑目一踴上入青雲奮身而下地陷右裂飄氣揚沙塵飛晦日怒目成電嚙齒如雷叱吒千精驅馳敢違攘袂鼓肘抗聲大呼外道亡精鬼魅失氣爾時金剛顧盻而言我是護法善神金剛力士侍從大道受事天真影衛道場扶持善人糾彈罪失察獲姧邪一切衆生莫犯威神輕過流血重釁滅形內外整肅勿使不精爾時會中男女大小咸起恭敬禮拜金剛畢具復坐爾時金剛為護法故調伏幽明二衆之心而説呪曰雷火明空神光朗幽毒龍四據靈虎八周頭巾七星足蹈斗牛神力列宿金鈎耀精元首威兵騰步虛行中絶妖邪下滅遊精抽肝出膽翻腸拔脈左斬右銼前烹後馘截妖無原收束衆怨噉鬼使者摧拉生吞巫俗歌鼓飲血食肉形膻骨臭魍魎翻覆腥臊穢賤心形諂讟神杵碎首金刀刎腹藏凶匿害忽來降伏左秉金符右持罪目太一金鈴虛皇玉節知過不改懸首自截何妖不喪何精不滅六神不藏七星裂血上有真師下有金剛齊蒸降氣口吐靈芒飲以月池𩛇以玄霜五藏生華長存不殭爾時大鬼神王四目電光同為護法銷滅不祥守衛道場察姧糾過降伏惡人及諸外道無正信者而説呪曰神風拂塵傾拔邪根六天喪精五毒亡怨金頭鐵齒噉鬼止魂挑光烈戶雙景曜門奔星殺氣朗然無畏百脈川流七經調理神安體平長存不死爾時大鬼神王説此呪巳遙禮上方後拜真君告諸鬼曰汝為道侍衛守護善人説法之師與道無異不得邪忤真正之氣捉獲上聞萬劫無赦是時大鬼神王語會中諸來法衆而作是言我為天帝驅馳職當歸道扶持新學入道𥘉門一切男女攝除亂意不得邪視傾聽犯戒威儀察護生人同鬼受考不但殺鬼亦以降伏強梁殺伏邪心調理生人無正信者聞此神呪應起恭敬此神呪者是天帝威章自然之文諸天魔王五方鬼將真官地司助道興化守護家國安靖道場扶衛善人皆誦威章消伏不真馘滅凶試摧落邪鋒外道惡人喪精失氣雜毒魍魎遙聞敬畏諸有法會齋講之處道場俗舍我等徒衆常在觀之齋戒如法丹誠所為大道降臨福德立至身心暌背為利名聲誠不得巳而為齋者我不守衛大道不降魍魎遊精雜毒下鬼臨饗其齋輕道慢法三司糾彈道不虛行要在丹心非可假求資貨貿易奉道之子深可慎之爾時鬼將説此語已却一面立儼然不動爾時大王車駕西域迎載父毋百辟卿士皆執花蟠鼓衆伎樂大備威儀迎載父毋還芳春之臺焚香蝢首大悲天尊次禮真師問訊法衆歡喜委曲太帝年老夫人亦衰大王孝順瞻視顔色心恆喜懼爾時真師命其復坐而告太帝曰汝之父子名善知識汝是紫微之精下託凡胎應運為帝大王重光是王清上真化生汝門雖為世帝形不衰老皆是自然無上法身爾時真師又語大王言九夷仙人遺王神藥可以救老命汝父毋俱時東向丹水服之是時重光自開寶奩取藥持水饋於二親父毋受東向長跪而服大王取八十杯分作三分一分奉上真師真師不受亦與父母丹水服之服之七日面有金姿玉顔行步如翔足𦆵履地自抑其身委縱其形立便飛騰又從真師奉受靈書雲篆和神保生三萬六千字晨夕吟誦頂浮五氣目有浮光神彩清澄威容嚴麗聲響通徹紫氣連天顔貌反嬰素髮歸玄出有入無進退之間合衆歡喜為王作禮仰視上方慶霄忽變青光以照會東復良久間變成赤光以照會南復良久間變成白光以照會西復良久間變成黑光以照會北復良久間變成黃光以照會中五色光中各有一音合會流變寥亮清雅五光連雲猶如天虹皎潔洞徹須臾之間會中真師又放眉間四色光明以應上方所謂慈光悲光善光信光是時大會仰視真光身心忘倦又聞八色光明有自然音樂心音開悟如服甘露是時諸戎八萬餘人覩此光已目冥心悶猶如大醉六識閉塞低倒無知爾時國中有一大臣名曰守正見諸夷人低頓無知前白真師而作是言我等宿福生逢有道得覩真師見道威神心開意悟耳目聰明傾心注玄歡喜忘倦不審羣夷何故低倒六識閉塞神似昏醉身負何罪迷悶失志唯願真師示所未聞令衆開悟悉其緣業真師答言大哉結固業緣不善汝當諦聽吾為汝説善男子汝今當知諸戎狄等初建逆心招集凶險上天縱毒下鬼伐之所有驍壯一時殄滅國土空虛十遺其九又悉遭疫疵癘苦痛羊馬死盡羣戎飢餓寒凍殞逝不可計數此諸胡鬼悉詣天帝言訟其主𡨚魂執之惡業不忘是諸戎夷元來悔罪不圗聞道雖簉生會死氣不消身神被拘形空無魂以是因緣使之低倒迷昏睡熟為此邪爾時真師説此語已大衆一時顧視諸夷忽見地蒸黑氣平髙一丈蔽覆諸夷色如聚墨黯無分别忽聞黑氣之中有𡨚魂吟詬或大或小悲鳴悽咽是諸戎狄各於睡中見其眷屬相向悲苦冥目自撲遍體流血號咷哮吼呌喚嗚咽猶如狶鳴聽之驚人合衆傷痛彈指泣淚真師告曰善惡之業生死相隨譬猶形影無暫捨離道雖愍之當如其何此黑氣者名曰隂氣又名殺氣又名怨氣又名尸氣又名濁氣此是坤毋告氣天雨黑灰壅諸夷身毛髮拳縮形體垢膩爾時真人俯而彈指大地震動須臾之頃上方慶霄之中微灑甘雨以沐諸胡香風下流以熏諸胡六日六夜目始能開一十二日黑氣始消羣胡形體悉皆消瘦無復顔色鼻流沸血兩眼垂淚尸氣染身通體如墨心眼朦朧視聽不諦振掉恍忽譬如狂人眼中各見𡨚家雜畜諸鬼揮刃驅之時諸戎狄舉手捫虛四散迸走馳出城外先所乘象見之驚奔藏伏草澤莫知所在諸戎狄等見世怨對眉髮秃落七孔流血徹骨蟲癩忘失本心善惡業緣如聲響應容谷無情隨人所呼一切善惡亦復如是不回易爾時大王愍之狼狽自出道前叩頭玄師為諸戎夷攝取怨對説法度脫爾時玄師從座而起三捻焚香遙禮上方玉清天尊禮訖復座須臾之頃分形萬億攝取戎鬼來入會中為説三寶第一之義所謂慈悲忍辱為諸行先是諸功德第一中最一切幽明若離此者長墮惡道永不聞法又為諸鬼説離生死法不顛倒不縛著復觀真際空無所有妄想分别見有怨親真際既空怨親亦空是時真師大混玄澍沐浴羣鬼次為諸鬼説無上道法所謂一道一法一慈悲力一受一生永無變易法變易法永離生死既無生死則無怨對諸結縛著之法永墜生死無底大河業風所飄波浪不息離此法岸永沒泥滓汝諸鬼等欲離生死應捨大怨常行一慈設復有人衰損我者我為虛受不以惡心加報於彼如此之法名離大怨若離大怨則能逺離生死之怨大事巳辨名之無餘一切怖畏不能恐動深根固蒂不為業風之所傾拔譬如大士不吝財寶負債速還有財不收斷唋一切怨家債主求於道寶為法施主不吝塵穢無明之財是時羣鬼聞真師説微妙法悉捨本心歡喜踊躍皆發忍辱無上道心上元真帝應時心開洞發慈光下照羣鬼是時羣鬼覩此神力深信道法曉悟長生常住之道心無變易捨離怨對虛已和敬一切異類皆為知識為欲聞法求入道場真人許之大衆作禮安坐北面儼然不動是時諸戎身所患疾登即差愈亦悉同時各見真人為其説法身心開悟皆發道意俱得解脫真師告曰汝諸戎等罪業結固障纍未銷未得入會且於城外𦋺帳寥立專心願念各自悔過一日六時遙禮城中法會之所爾時閽人名曰慎靈覩此事巳前進作禮請問真師而作是言不審諸夷過去見在緣何罪業未得親近法會之場真師坐而熟告之言此諸戎狄前身先是此國中人住在玄谷之隂以其前身為大齋主因散席之次相共田獵放火燒山傷殺禽獸三百餘命以其承齋之功德不圎就生於邊地作戎狄主連今三生承此禽慶故得見我向不殺生應生中國富貴之門此戎今生餘報未盡更相率欲起叛心謀害大國道德天王羣鬼縱毒殺其家國十捐其九𡨚魂上訴身神被執以是因緣未得入道服於正法故令住此城外遙禮法會閽人聞説重問真師弟子職當守衛掌知車駕城門多事四方輻湊奉勑在此部分回列使車騎出入行伍次第諸聽法人教其進止為此煩劇不得入會禮拜聽法晨夕願念翹想丹盡唯願真師哀愍孤露為作依怙真師告曰汝但有心專誠篤志大道遙鑒不論內外及以近逺大道常以平等濟物邊逺戎魂尚沾玄化汝以有福親衛城門一切善人晨夕攸往汝善知識最廣餘人今又見我真善知識憶昔往劫我下為緣託棲丹霍七十小劫坐一林間為諸仙人説三十二天住夀之法汝於爾時受身鴛鴦三百生中依棲丹林晨夕見我或時復銜棗果獻供法衆乘此因緣生於中國重得見我閽人聞真人之言悲涕嗟歎頓首伏地爾時真君又告閽人曰汝起取水沐浴汝身沐浴竟巳真人又曰燒香敬禮上方慶霄之中大悲真帝然後伏地爾時真人以自在神力令此閽人心中匆然開悟見其前生所經業緣了了分明起禮真君號咷悲泣真君告曰汝為小罪今身之中未得成道為汝知聞鞭撻人畜冥司注記以汝毒心向不為此生身合度汝當努力兢兢戒慎官犯衆惡後身之中正得升度閽人悲泣重白真人不審此愆可首悔不真人告曰汝自終身悔過始應免罪閽人又問不審道尊往劫為諸仙説諸住夀其法祕要可得聞乎真人告曰我分一身即時在此會中為仙人道士及王父太帝王欲序説上天住夀之法汝欲聞者隨我往聽閽人答言奉勑典衛不敢遠遊真君語曰我已分汝之身為兩人也閽人後顧又見一身執事知當乃知真師上道威力隨心變化乃隨真師入會聽法復見座上有一真師金容相似大衆人民不能分别真應之事爾時閽人請問真師無上大道至真至妙分形散體為得幾身答曰無上大道分身為氣天上地下無所不在雖云真應實不曽異大衆歎言道無不在方知萬物皆有道性得一道者無不太平爾時道君告諸大衆曰此欲界之中同於一天四方言之名曰四天四天之中亦有真仙不願上升治在比天天號雖殊上下仙夀等無優劣俱不退轉或以應身亦有生滅神化隱遷希微常住湛然不動此四天下男女善人學成後聖住此世夀修短任意或入名山洞府及諸小天之中億百千劫後願上升先入太黃天中住夀一億萬劫次升太明天中住夀二億萬劫次升何童天中住夀三億萬劫次升平育天中住夀四億萬劫次升元明天中住夀五億萬劫次升七曜天中住夀六億萬劫次升趙衡天中住夀七億萬劫次升蒙翳天中住夀八億萬劫次升和陽天中住夀九億萬劫次升恭華天中住夀十億萬劫次升耀明天中住夀十一億萬劫次升竺落天中住夀十二億萬劫是諸真仙欲住天中者不願升上亦隨其意勝報無盡不論上下次升入虛明天中住夀十三億萬劫次升入端靜天中止住十四億萬劫次升入玄明天中止住十五萬億劫次升入極瑶天中止住十六萬億劫次升入元載天中止住十七萬億劫次升入皇崖天中止住十八萬億劫次升入顯定天中止住十九萬億劫次升入始皇天中止住二十萬億劫次升入浮容天中止住三十萬億劫次升入無思天中止住四十萬億劫次升入阮樂天中止住八千萬億劫次升入無極天中住止九千萬億劫次升入皓庭天中住止百千萬億劫次升入元洞天中住止千千萬億劫又次升入妙成天中住上萬萬億億劫次升禁上天中住止億億億劫次升入常融天中億兆世微塵之劫次升入玉𨺚天中兆兆大地微塵之劫次升入梵度天中自在止住平育天中上升太虛攸往大羅入於無形寥廓玄冥從皇曽天上至太虛天無成壞住止之數計於欲界劫運以示衆生巳上道境名之虛無道亦虛生自然之形光氣成體不可名言皇曽巳上天大聖亦然及至欲界四天之中名山洞府後聖真仙雖覩天地數有劫運形隨日新神力自大永不退轉常住不變一階仙位永斷生死綿綿長存不可思議不如邪俗教中經書注內邪俗之妖竊號位仙九萬大劫生天受樂轉還退墮此是精鬼魍魎與正真之道更相違背聞此説者即是邪説非真正也爾時太帝左侍名曰大章聰敏中正立性好道未逹真帝心猶在疑前進頓首上啓道君而作是言臣生年巳二十有五仕知內史直侍太極人世至尊四海子來百司供給天下宗仰果報難加年來百餘勞生萬慮雖處廟堂心遊遐外治民事天心勤寐寤行步不逮耳目失聰筯窮力衰髓腦枯竭氣力微弱動止苦辛每瞻顔色五情如切加以悲顧寢食無寧生朱百年萬種煩毒不審真仙之士塵劫長存形神不亡飢勞辛苦是時大章語未卒間真師神力急令太帝容儀復嬰膚體充潔猶如凝脂太帝夫人色美髮黑肌如冰雪齒白齊密氣力倍常立便上升慶霄之上朝謁天尊亦能五變所謂入木如木入火如火入金如金入水土如水土升玄步虛立便無纍爾時真君即入無形莫知所在良久而見坐空中去地千丈八色雲龍以捧神足七色慶霄覆蓋隨廕三景環照身洞慈光安庠而言語大章曰七明慮沫五色舍利申下二藥大王父母服之尚爾神力自在况於至道可得言乎行尸短見敢於道前特疑大聖示汝小道威力何如無上大道改凡成聖即此之身升入無形大則無外小入細微我道能之自外邪道要在灰滅不能即身而成法身由其外法神木微弱不能存濟以生為纍寒暑破體是非交胸疾患飢飽種種煩毒生老病死無明之形不任久處求早滅度不如上道轉凡成聖體如金剛塵劫如瞬形隨日新出入無間何憂纍乎生死象斷煩惱不繼誰能勞之升入無形誰能滅之復歸本除同於太空誰能見之神變自在存亡恍惚誰能知之不知其始焉知其終萬天在心塵界入毫本相如故汝意云何是時大章匍匐下殿散髮叩頭悔過自責大王重光見其父母忽爾升玄焚香仰天叩頭禮拜天尊頓首真君慙謝九夷八十一仙而作是言衆緣諧遂聖凡慶快願南蠻西戎北狄邊陬異落非法無聞戴角披毛獸心人面有情無識飲血茹毛蠢動含生幽明人鬼願生死開度同入道流説此語已上方慶霄大悲天尊與即座真君俱放慈光照明下土慈音普被異類咸聞各見天尊下在其前為説六度六通之道自在解脫無上法門是時大會聞天尊所説心開意悟知有為法不離生死出家修道皆得長存爾時大悲天尊通流法雨隨其緣業潤有淺深平等見形衆生覩相容貌各異一音説法衆生領受悟解不同信用相友而不相似而此會中略有三種大王父母運偶善緣不動而感成道須臾神鄉男女受用惠利能令其身以收其生長守清虛與道為偶生身受度形神不灰猶如金剛不可毀壞是諸戎夷聞説長生心則迷悶神精狂亂身毛皆竪或復五體緩縱不能自持昏憒睡熟呼吼無知大道愍之勤勤不舍爾時真師語諸夷言各起燒香自申願行時諸戎夷焚香訖巳業緣拘束不得餘言皆願修行因緣之法一時起請大道真師為説滅度因緣之道真師然之大衆歡喜一時作禮聞真師為説滅度之法諸戎狄等無復憒非乎孔之患真師又告諸戎曰善男子修道樹因譬如良農三陽之時善役調牛鈎引懸澍隄捍綿密踖乘通濘加以好糞次選良種治擇蕪穢溫溼宜之然後調樹藝耗莠稗壅護苖根晨夕看視無令六畜侵食踐踏如是苖子三月假生萋蔚蘩盛水陸通美無有蝥螣涼秋結實髙下通熟即命僮僕收藏貯積藏吏監守不令餘耗唯供食用儲備盈長家給豐足傍惠貧乏周濟飢匱施廣散大恩德弘普功聞上天一切幽明咸皆護善福德成就利涉合諧所求如意無願不成如是良農終卒獲利不可稱量善男子汝等大衆於道福田勤行修習心無懈倦如彼良農必獲果報而不差也善男子往昔劫中玄谷之北休酋國王夫人有娠雙誕二子六歲巳來形貌相似父王重之每在懷抱年至七歲逺祈師傳一種訓之其王自名此兒一曰紹光二曰紹明二子同學父王時時躬往約勑令不怠惰師以義方授其業藝爾時二子晨朝之時俱會受業受竟思義各還一院爾時紹光誦曰上口默坐思惟晨夕不寐爾時紹明立性踈懶又多昏睡耽酒嗜色神情奔躁雖讀其文都不思義若見父王巧能方便手不釋簡性又隂惡爾時師匠不敢專制於是紹明常懷刀刃凶險悖戾年至十七集羣臣議立大子令諸公卿對衆簡閲讎校優劣紹光伎藝無言不讎遍該世伎性又慈善次問明有問無對即枉師傳授業遍黨師對王言王子性戾不遵教命不授臣訓情性凶險大王不信試撿懷抱果懷刀刃師言臣不自衛焉敢訓之王即擯出紹明於城外立後懷怨心便生謀逆未及聚衆已被察獲心懼刑綱奔入邊郊鄰國不舍執而送之羞見父王祕氣而死羣臣議之以為逆子亂臣不收葬棄於荒外鳥獸蟲蟻嫌其凶逆不噉其肉脂膏滂沱流汙草澤一為不信自取滅亡天地不哀人神共疾魂爽徒謫萬劫不原縱得出生亦失人道爾時紹光拜為太子大會公卿普赦天下焚香登殿遙望如神色正顔和德含春日四海無事天下太平方外子來龜朋逺萃匡贊王國人神合符風雨以時百穀成熟爾時太子溫仁忠恕慈善孝敬年至三十父王禪𧙓即以國政付囑太子太子三辭不受又恐逆命非孝子也即以頓首父王受天正位以道治國不施雜令未滿一年頌聲溢路人神交歸衆瑞紛錯芝草盈庭麟鳯翔集天人下遊仙雲四張上元真宰以為門師授其道要身佩生籙威神扶衛年至九十老而更丁色如童稚耳目聰明生氣布養五藏華榮白髮如黑杇齒更生太醫仙王為合神藥復氣如形終身不衰年百七十一旦委國上騰太霄于今治在太清天中處於玉華瓊臺長存無窮猶故修學無上道法一生立信經必昌期道不負人其義斯在善男子汝諸衆等於道立信勤修功行身無缺死名之道基爾時諸戎聞説至法領受歡喜大衆頂禮一時開悟因緣之道心無緣外著各各嚴裝所乘之象辭别天真各還本國是時胡鬼乘此法力身度南宫受生東方極樂世界有道之國是時中國男子亦各還家尊修至法一國道士在會中者九萬七千人皆得六通無礙自在或隨其人周遊下界九夷諸仙升入無形莫知所在大王父母猶升慶霄玉清天尊錫太帝之身號為洞玄太玄又錫夫人為玄臺仙君給以女仙侍衛二十四人飛蓋焱輪以升洞天主諸新學女冠道士爾時真師為世救焚猶在寒林玉清天尊與諸真帝常在玄中湛然不動四時八節時放光音一切有生咸皆恃賴太上大道玉清經卷之七
