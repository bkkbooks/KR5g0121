  - {type: variant, offset: 8295, length: 201, content: 與諸上真一時入於冥寂大定天宫閒然唯有香官使者騰烟不絶足經一劫一刼之後天尊又出冥寂大定入於動惠須更之頃神霧四雰温氣八衝微風颺煙甘露柔塵爾時天尊出於動惠遂入生惠倐歘之間萬象空生雲霧上騰雷吟電轉神草含英鳳嘯瓊林蓋動霞生天尊告諸真人曰動生之法以應金闕後聖降世之期非乆欲至十方大聖同爲告瑞非獨我也爾時天尊說此語已是諸衆聖一時黙坐凝然不動金爐香花欝欝常然下降之時千變萬化當此之日希有神力盡應見世太上大道玉清經卷之六, CK-KZ: ''}
