  - {type: variant, offset: 4, length: 0, content: '', CK-KZ-jye: 君便卽許可女眞歡喜便以四月八日夜半之時卽命中眞侍女於人睡中攝其精神上至閬宫教以生道授其五石鎭生玄腴神丹又授此人飡和服氣神水之法此人睡覺書記誦持无有遺失至心修守三千餘日而果中仙之道位知下司主領西國戎狄雜類有心行道令其教授治在龍山正中而居亦能飛行身生日光四時八節上昇泰淸朝謁女眞此人成道女眞之力也今已得十萬刧於今在焉}
