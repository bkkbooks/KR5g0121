  - {type: variant, offset: 7321, length: 198, content: 議道言學道之士功德廣大大道慈悲故飛其宅及其家人所有畜業盡得長存免離死厄非是上天之上而無金闕玉房直以方便示見凡夫威神之力欲令一切凡夫遠離邪道超出朽爛老死之法超出惡世無常境界煩惱窟宅獲得常樂不變易法善男子善女人心信之後劫劫之中應有世賢學無上道合其舍宅一時昇虛善男女等應當念此希有之事廻心信向知一切凡夫皆可成道學失真要不能成道修習得真未有一人不成聖也無上大道驗之在即何用殷勤而教誡也太上大道玉清經卷之九, CK-KZ: ''}
