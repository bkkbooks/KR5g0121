front:
  text: 太上大道玉清經卷之五星五
  hash: sha256:803ffb2c6356ca177dcac3bdb43816a7245a9248efd0fd95d52d2ede020d7644
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_HFL_005-001a, image: hfl/1023/1023-062.png}
body:
  text: 八節品第十三爾時西靈上仙與其侍從千二百人俱以虚皇三年八月二十六日晨朝之時齊駕飛龍之輿上登雲路入玉清天中謁髙真上帝大悲天尊請受八節真經并觀至聖威儀上道所治中天福境微妙真化之事山進天門歩虚雲庭齊整威儀一時稽首長跪而止良乆之間仰瞻上方雲宫之中見大悲真帝神儀澄湛精彩遐邈凝凝溶溶處於天心坐於雲光之中猶如輕霄澹於玄天以浮雲之籠朝暉日上靈眸𥘉月臨眉紺髮凝煙丹脣吐霞首巾萬變之金精身佩億轉之瓊羅手飛承天足蹈招摇恍惚希微虚寥窅冥道適長存理契無生真通精應妙感神情不隱不彰不濁不清如有如無如晦如明俯同有識昇入無形閑居緜邈虚演真經窈窕神唱无聲而聲真儀不動運化無停手𢌞八氣足轉七經合㑹有生覆載无功隂德无稱焉能强名道光无限玄源不測心居何有形遊絶域泯然黯忽寥廓常冲混同先後不必居中無起無滅無始無終真宰挾侍神人有羣瓊鐘皷節金鑪颺氛甘露流津靈氣凝雲真光徹照香風洞薰皓元蒼黄肧胎不分難得名言斯皆自然爾時諸仙仰瞻真帝心無疲倦嗒䘮其刑都忘威徳始欲元言未通玄黙道數不窮誠希有剋須㬰之頃重復再拜心欲有陳懼不能宣敢冒威神惟思道恩爾時眞帝愍其戰慄乃命左侍上眞呼語仙人曰子等是三天上仙幸因宿慶身入道流巳登不退猶應進修无上祕要爲世救燔无𣊬息寧來此何縁黙而不言我等大聖雖至極至尊不忘大悲動息六虚心遊萬機有志必感誠無所違爾時仙人長跪而言小兆不揆竊好眞仙形弊骨葷至塵至穢特以天慈普被滋潤无疆零落反榮枯朽沾洽金符育骨玉字生尸沐玄源之浩津酌洞清之流澤竊聞道窮則反物極有歸塵穢之徒恒復思本數千萬劫念覩髙尊恐習氣未消不敢輕觸躊躇之間巳經億劫不期乘機遇運肘歩天庭遭遇天尊以申翹想乆欲諮啓未敢陳辭仰覩真威怳然自失五情无主口不能宣特以慈尊沉愛情深賜垂提飾借以威光令得有言敢騰力欵申此微心爾時左眞奉天尊教勑宣揚道化爲諸後學决斷衆疑而告仙人曰汝欲何𩓑恣女所陳仙人闔衆歡喜禮謝眞人而作是言雖道在人亦非以輕生重法億劫勤苦履峰蹈險經水過火不憚艱危遂感髙眞念此无知出靈文以見授眞氣布無涯之澤大道降隂生之符反巳逝之危魂榮巳淍之朽質上愧日新之道而下元日新之德數千萬劫環轉三天不期乘運上昇塵穢玉清之境逺披六霧洞出八天裂三界之羅登七覺之位雖有養道微功未能泯無形之地今日有幸得入太玄无生之生生道固矣所翹所望於此頓足直以有心欲聞八節真要修齋立功求福謝𠎝㧞悲苦𩓑生死開泰昇入道源爾時真人聞上仙之辭愕然而言子在三天之中何得聞八節真要此乃是太極生神寳章之首篇也天帝所祕上真所修傳之於口不見其文法授當來成真之人子從何縁而得聞之爾時仙人頓首而言小兆去聖遐遼真文𨼆絶特以言龍初㑹九真大集朝慶太一虚无天尊爾時大聖出法度真聞唱篇目不覩其文中心憶持未曽捨離輕陳渴仰干忤天心賜以大慈𩓑垂愷悌真人告曰子有真相得聞至法是子運㑹應合成真傳吾寳經當得其人違科輕泄退真无道爾時上仙拜諾真人奉遵教勑不敢泄慢是時真人即命金童燌天寳名香啓金䑓寳藏開笈發藴出八節寳經一篇著碧案之上正當天尊之前是時仙人一時作禮頓首良乆不敢陳辭天尊以知其意俯而愍之即命真人捧此寳經以授仙人受巳復禮天尊真人告曰此經是上道之寳文大悲天尊昔聚雲氣以成其文令諸真人仰而則之此文大道真氣化成雲篆氣布巳後靈章復虚子欲寫之刻玉爲簡紫全爲字寫之了日當還付我真人又曰汝等仙人且舍靈宫西臺摹寫真文此舍自有天厨供給學人亦有丹臺瑶林恣汝遊息是諸仙人歡喜受諾往舍西臺刻王鏤金摹寫靈文大悲天尊八節寳經曰立春之日温氣始生雲宫開東北之門三司進朝以定善惡春分之日和氣始成雲官開正東之門三司進朝以定善惡立夏之日暄氣始生雲宫開東南之門三司進朝以定善惡夏至之日炎氣始成雲宫開正南之門三司進朝以定善惡立秋之日清氣始生雲宫開西南之門三司進朝以定善惡秋分之日凉氣始成雲宫開正西之門百神俱朝議定罪福生死簿録功週進退纎塵顯露衆真大鏤百神受事功過毫分无不上逹立冬之息嚴氣始生雲宫開西北之門三司進朝以定善惡冬至之日凝氣始成雲宫開正北之門三司進朝以定善惡天尊告當來學真之士修吾八節之道立功修行身不履非志不邪遊常當齋戒以求昇度嚴其始絡供贍所須丹志勤勤𢘆始救燔拳拳不怠動息無忘常思師道如在目前孤身幽林永絶人事六時禮𩓑以求宻契緜緜微微不興不廢功滿行成與真俱㑹未至節一日行道禮𩓑隨心所陳氣合香煙六時上聞動止合儀黙坐精思三日三夜騰九祖之宿舋謝一身之極過上爲天子次及兆民奉道之門施力救功供給齋厨同爲啓陳當此之日誠无不逹道无不聞懷道之士勤而行之上士長齋不獨此時𢘆祈昇度心无暫休形絶外遊志不邪求營生得生當復何憂於是大悲天尊演琴心上經其文曰囬首仰圎羅合景挹靈芒拘魂制七魄思審定中方行住禮虚无寢息宴玄房飢飡黄璧花渴飲瓊根漿神旌命大魔合體錬真光復照觀太无𢘆在空中遊圎通民波際真化靡中期窅眇无終始行者當明知寂寥忘理教應運闡弘規降道不自昭要當先所施㑹歸無二處隨心自合離大悲天尊曰後世合真之人得吾此文調虚琴而行之𢘆立青蓋之下駕𩀱白虎俠二赤龍塵劫未始聖不知終一十八年剋見太平真道之原愼勿妄宣七祖受考身不得僊億劫絶望與道无縁爾時仙人刻玉文訖送經奉還真人并見新文以簡天尊天尊告曰上道寳經七百年中許傳三人世无其人韜之玉笈禁不妄宣是時仙人頓首禮謝小兆有幸得叨祕法特蒙慈尊弘愍之至内懷喜慶誠不自申又復頓首天尊告曰子得寳經真道畢矣勤而行之當應自知天尊又曰子且遊觀玉清道境待秋分之後復歸下界爾時仙人奉天尊教勑歡喜禮謝次禮真人真人告曰子奉恩遊觀此有常法我玉清天尊有真光之車以給仙真遊行十方乘此車者微塵世界一瞬巳周是時仙人旣受教巳齊駕真光之車如一瞬頃以至玉清天西南方太空之中不測邊際至二十八日秋分之節晨朝之時忽見諸天真仙億萬衆從雲宫西門而入陳列天儀施張供具遍滿玄中燒香散花作天妓樂歌頌讚歎朝謁天尊三日三夜三司校録生死罪福諸得度者名編青簡天降雲車浮空上昇骨肉俱飛永爲真仙罪過塵積注名黒簿减年奪筭沉尸九幽罪䰟受對萬劫無原爾時三司之官各奏其音昇降相背哀樂不同天官之司奏和雅調暢之音地官之司奏宫夷之音水官之司奏悲䰟長夜之音凋風折金石之聲嚴氣動風雨之鳴此乃天地自然之音常㑹吉凶之際衆音雖繁而我大道天尊未曽聞之夷心在玄泯然不覺三司塵穢不關耳目毎所感授黙與無言暗逹彼心量任其宜生成無功隂德不差適諸有生日用无知大道雖髙鑑之甚卑大道凝然機中則施不去不來不踳不馳不亡不存不合不離不虚不滿動用無訾吾辰敷華𩀱景曜芒循環紫戸寢宴金房六氣下流三元上騰不疾不遲不减不増自然而明去死納生不爲而爲不行而行真神不動化合萬并真神元心應化元情能卷能舒能晦能明不二不中不隨不迎不興不廢不死不生不形而形不名而名處晦而明處濁而清不獨不羣不混不并緜漠希微不順不違往无所適來无所歸居无所止動无所依空歩不移坐應萬機恍惚難尋冥寂无違輕我者衆則我者稀逐臭如塵詎反靈機朦朧愛覆動用習疑背道流亡誰當復歸險逕孤遊惸惸可哀汎川無反何時逆來三塗永吟九夜長哀苦魂離散衆怨兢栽告汝來生道如晨暉德同下流無日不新無時不歸下攝萬川上惣千機照而不煩瀋而能希無情可鑑無心可照八爻空轉虚廻七曜自然經緯生靈之要微中又微妙中又妙告汝來生行不乖常動不離无常能不傾無能深根常无不適无无不生不動而適不勞而生適无不遍生无不周遍而不廢周而不休其形如雲其氣如流流極還來雲低必浮來而能有浮而能虚告汝來生勿用其明明極則暗暗極還明常能守暗身恒太平辟却三灾銷滅五兵十惡不來六賊不行郊境无陣城邑不驚百實成熟花樹敷榮風雨調適萬物自生告汝來生去情離欲飡元服一抱道懷德招集善友驅遣隂賊以威自儀以戒自勒嗜味損巳貪媱自剋所𩓑無成所求不得殺盜資身横行威福勿恤下賤行害施割呵天罵地奔馳惻怛五神内戰怨憎外結陽氣蓄泄隂經夭閼狹邪作道不得其末子當慎之勿得輕泄勿將死尸佩吾生文莫將毒志懷吾寳經莫將邪聲吟吾正真莫將隂賊入吾道塲莫懷媱想强行吾道莫將敗壞之身以求全生之道莫將十惡之身破毀十善之道莫以五逆之劒自割破其五藏莫以惡眼而視善人莫以亂意入吾定門莫以六塞之身求吾六通莫以沉濁之身仰吾猋輈莫以臭爛之身洿吾道塲莫以滛毋害父之心亂吾法衆善男子入吾道塲𦆵起一念機雖未發罪目巳搆况身親任萬福捨離百禍叢聚生死重罪報對不休善男子行吾道者戒慎虚无不欺太空與道爲儔依吾戒者真道易求背吾戒者生死長憂可不慎之可不慎之爾時天尊重告仙人言夫朝禮之法不獨八節之日月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日當此之日修身謝過大道遥鑑如對目前諸學道人初中後心平等不異求福无厭修身不倦善男女等專志守一能得吾道虚襟任真能成吾道慈悲忍辱精進不懈能周吾道神人爲儔衆靈給使子若反是空䘮一生語諸來生熟思吾言爾時諸仙奉天尊嚴誡歡喜頓首所望便足不敢有言恐多凂黷黙然伏受天尊明勑爾時天尊又告仙人曰玉清道境自然无學故曰虚元自然元始天尊非學所成我以大悲授子真道子歸下界寳而行之從今巳後九萬大劫金闕後聖下臨四天處於神州當爾之時上界諸真及十方天尊上僊法應同時下遊當此之時自應見我此中事畢子可復歸下界諸後學成道治不在此暫得彼往求法決疑爾時仙人奉天尊勑各各燌香頓首辭别上界猋輈復歸下天爾時仙人前後請法經遊三萬六千天門謁三萬六千祕法位雖居下仙行同上真心眼明了洞曉三世无復遺餘以是因縁爲得天尊真言道要修行不曰而得洞逹後世男女好道之子不遇明師心多質疑又不堅固歲月巳往身又朽邁皮肉燋枯髓腦肉竭雖有耳目其實聾盲又多縳著躭恡窟宅衆縁相續不能割捨如繩繫鳥萬慮窮盡唯貪資養所求无足百病巳生无方療治漸就増劇須㬰之頃死時將至傾城贖命終无得法臨決之際悔不行善餘氣之言欲將何及善男女等我毎悲愍一切羣生雖知飲食稀别五味雖知資生稀能養道死於利害敗於聲色馳騁狼籍委頓困苦怨憎闘競自爲𡨚讎煙散灰滅命盡之後𡨚魂罪鬼紛紜爭訟報對不絶復注生人爲不善業遂至如此不從道誡不信罪福輕慢至聖毀謗善人殺害无辜偷竊劫盜欺凌老病侵損孤弱自恃威勢恣行刑罰如此之人氣未盡時巳受冥考功過輕重纎塵不遺語諸來生安詳寳經勤修戒行無令缺犯大道玄鑑幽明合符臨危獲安始驗威神爾時仙人復歸下天西靈寳宫與諸天大衆神光逺暎萬倍於前三天仙人來相問訊歎此稀有目未曽覩懸知優劣道德不同各各作禮𩓑聞道要爾時西靈上仙語諸仙人言道雖无心可以情求違逆似忤從善如流我遊諸天无方不周備蒙真帝哀我勤求授我至要戒我精修逆爲來生說戒威儀又紀九萬大劫之後金闕帝君下臨神州上天真宰同此而遊道法大度子當何憂爾時禹餘天中諸大仙人八十萬億聞西靈上仙下歸三天西靈宫中與諸大衆俱來問訊燔香散花鼓衆妓樂歩虚玄中圍繞上仙稽首作禮而問起居行道有勞逺適萬天神光暎朗億倍於前大道旣弘普爲衆縁伏𩓑仙尊慈愍哀憐流通道化宣示未聞上仙答言我奉上玄玉清天中大悲天尊賜我至戒科禁嚴明大道祕要不許妄宣子但有心即須精思九萬劫後金闕天尊下降神州當此之時諸天大聖同時而來道法大度廣濟天人億紀勸誡爲諸來生當此之時與子同遊爾時衆中有一下仙名曰融真成道以來始經六年未逹三世猶在學地心疑九萬大劫日月悠長復疑下仙之夀不至此時前進作禮未及陳辭上仙巳知其意即告之言善男子我知汝心狐疑劫數及以仙夀善男子汝今當知下界凡夫學成道者名曰後聖一入仙位永无退轉我生西靈寳宫近始如昨已九萬億大劫上聖觀之謂如瞬頃九萬大劫須㬰之間汝得道成仙始經六年猶如赤子但知求乳未有他慧欲於劫夀心生疑惑愍汝嬰童不逹至道朦朧淺智輕陳短見善男子无上大道玄源洞清深不可測太玄太虚不可度量自然至真无始无終後聖亦爾不知下界塵臭邪俗修習外法八萬劫夀後還退墮此名外道魔俗之法不出三界不得六通不逹三世不離生死微間小伎即號大仙譬如下世凡夫名曰金剛愚人聞之便謂此人堅固勇徤身无毀滅智者明了知非堅固假名金剛須㬰變滅邪俗亦爾竊此仙號飾彼行尸亦如下界庸夫竊號天人如彼塵穢邪俗自名大仙智者明知邪正相反夀夭相絶八萬大劫同於瞬頃譬如電菌一時之夀下界塵滓多自名仙聞无上道中仙之名長存不滅耳目不覩便謂正道同彼妖邪書記傳說惑亂行尸弱䘮聞之心生邪僻自欺冥福招求罪罰億劫漂流生死背道修習邪法呌呼求滅螻積蟻聚塵飛霧委種種苦行不能得道皆由失正元用邪僻猒惡身命猶如涕唾速求變滅不知此身而爲法身遑遑外索棄捨内法多習邪書毀謗大道棄本逐末如此之邪出於邊戎神州所無汝今云何於正道中而生邪念善男子人修内法而得道者不論前後大小階級但至仙位即能長存自在無礙不似下世邪俗之法以灰形爲得道以朽爛爲證果此名外道生死之中而不自在隱障邪僞息世譏嫌藏姦匿詐招集童蒙假託光恠誘𨗳一切勤求世信志窺財色行不正軌衣食不義貪養隂賊常思損物資益行尸藏護三毒蠧敗善根殺生求生無功補過或不遵師匠竊服良藥盜修小法微得利已便稱道極此名暗去夜來無明増長外道邪俗竊號仙名誠非虚白守一之道非爲自然虚無之道非爲慈尊忍辱之道非爲六度六通之道非爲元始無上大道非爲自在解脫之道非爲長生不死之道善男子汝若聞有雜法言離大道即是邪法不免生老病死飢寒困苦善男子汝於大道心莫狐疑汝師爲誰修習何法志度狹劣都無道氣云何化世證他福田濟㧞生死善男子汝雖得不退飛行自在無我大聖未可全同法當進修心勿止足道數足日身心大通三世之事猶如指掌九萬大劫未方一瞬而我大道以百億大地微塵劫數爲一瞬息何有疑惑爾時仙人融真頓首禮謝小兆不逹塵黷天庭昔來餘慶幸遇天真下觀六合哀以翹誠見授隂生靈符修之得命運覩今日實所未逹無上道法𩓑哀蒙昧賜以未聞上仙告曰我識汝心知汝所師見汝修學一時告汝不得不爾須㬰之頃下界三十七天諸仙人等無數億萬俱如十月二十日上㑹立冬朝慶西靈之真各燌名香騰試上天遥禮大帝虚皇天尊三司校録水府上聞三十七天各陳天儀張設供具遥獻上帝无極大道三日三夜旋空歩虚地祇作樂以樂仙真五魔長謡𩓑化歸玄列子調風雲將收煙天花廻空香霧散虚左右仙童吟誦靈書須㬰之頃八氣温舒明霞飛度雲庭洞曉天開玄路覩太虚之無涯見元和之廣布三一尊神萬氣道君澄漠似淵容與如雲權實不異乍合乍分於是一時居中俠侍合形歸無上升仙居下遊金城灌漱瓊津呼吸紫雲吐納雲芒形隨日新塵劫歸嬰不去不來不滅不生恍惚希微難可備名玄道無心㑹於能行一時髙位塵劫長寧傾天背道吾所未聞爾時大常虚皇天尊遥放真光洞於萬天温沃幽顯灌沐𢡖舒流潤乾焦淘汰垢穢開决聾盲補諸不足養生愈疾制御萬魔銷滅灾氣十方世界無不蒙益生死開泰人神喜慶當此之時巍巍難思一彈指頃福慧周普大道威神不可思議不可思量不可名言爾時大衆遥心注念皆願道業普得成就升入太空親侍天尊願玄門廣闢濟度無窮願五苦罷對三塗赦䰟願邊土有生悉皆行道願積痾痼疾咸悉痊除願有情無情皆不傷夭爾時大衆發此七願七覺道圎七氣天君歡喜讚善是時七色慶雲翻然下流彌覆衆㑹七色香光明太玄七變天樂和攝七神七真空生隨氣成形是時衆仙朝慶事畢光音寂響至二十四日晨朝之時遥禮上方拜辭真帝浮空而下是時西靈上仙當此之時即入凝神大定身心不動真光湛然自如懸月經九大劫凝而不瞬齋戒品第十四爾時棄賢世界皇氏之家積修十善无横罰害常持齋戒立靖供養三元八節燌香禮虚十直吉日朝慶悔過專志大道誠無謟求家贍資財又多僮㒒常於四衢給濟窮乏舍諸行旅施散廣大毎以冬天露積原野濟惠鳥獸憐哀貧病老幼孤弱供給所須令無闕少齋講設㑹心无厭倦長者有妻其姓豐氏忽然中時於家睡卧夢見明璣自天而下入其懷中又見日光照曜其身須㬰睡覺便覺有娠自此巳後心意怡恱顔色鮮盛行歩輕便氣力倍常足經十月以四月八日豋臺遊觀忽以中時見有紫雲去地百丈東南而行聞紫雲之中有人言曰上仙童子何不出來夫人仰聽聞有天樂在紫雲中須㬰之間香光滿臺薰人鼻根心意泰然便覺嬰兒從左腋而出心知非凡即命侍女下報長者俄頃之間龍王吐水灌灑嬰兒天雨寳花以爲敷席長者來見知其神異即於臺中養育此兒字曰仙童常有紫雲蓋於頭上口氣芳香紺髮紫容年至三歳紅爪貝齒目有𩀱瞳垂手過膝音響如鐘虎視龍歩舉動鳳翔所蹈无跡頂出紫光年至五歲日誦萬言凡是經書悉皆洞逹俯仰合度進止儀容其辯懸河其德猶龍幽通至極舉世無𩀱考養父毋常於膝下吟誦真經中究大義下明地理无𠆸不知年至七歲遊皆有方言𨼆事微聲翼逺方德彰世表名徹天王聘爲國師辭不應命專心孝養奉事父毋𢘆如敬天瞻仰顔色四時温凊無瞬差違毎得美食口不先甞隨時奉新必獻二親父毋漸老年過百嵗衰病相侵仙童晨夕侍疾勤苦三年上天愍其丹誠諸天善神下遊其家地藏出糓以充供食大醫眞王攺容同凡下爲療疾重得平復年夀一百三十歳而終於堂雖有慧心無正修守不能即身而成道真是時仙童號咷切怛悲慟哽咽絶而復蘇遍體傷毀涕淚流血哀動天地飛鳥墮落衆獸不乳苦霧屯擁凄露鬱凝地祇鳴鼓山嶽助哀國王聞之束帛贈祭四逺人民皆悉顦顇逺近馳赴衆鳥衘土爲其域墳仙童伏塜三年營植嘉樹連廕接野衆鳥翔集晨夕悲鳴三年巳後仙童還家以二親生資供贍功德所居宅舍施作道塲香油燈燭幡花供養常自灑掃修父毋生時十善之業齋講設㑹濟惠窮乏常於夢中見其父毋語仙童曰我生世之日雖修十善濟給窮厄无正所修身命不固輪轉受報出生富貴今在鬼道承昔善業不被拘繫雖無罪對猶負九祖餘舋停滯太隂未度南宫汝前後所營齋供雖伸薦㧞未寘感通汝當爲我如法建齋薦㧞九祖爾時仙童睡得覺巳尋思歎息追憶父毋轉更悲悴明旦燒香叩頭乞願謹録夢中之言上陳大道爾時玉清天尊遥感其意即令上真定光將諸侍從一十四人下降地中五臺之陽託作寒栖大師時出行世應赴齋戒救世危難爾時仙童遥聞大師寒栖五臺之中知是真仙大士匍匐往請還家供養爾時仙童到五臺之陽雲昬霧合草樹蒙籠猛獸踞道而不得前爾時仙童倚崖歎息而語猛獸曰我是棄賢世界皇氏之子家修十善信用大道乆絶伐害與汝無怨我爲二親棄世歸泉追思不巳欲建功德世無真師遥聞此山有寒栖仙士深逹至理曉明齋戒故我逺來欲請大師還舍供養願汝闢道令我得度爾時猛獸聞仙童之言褰牙㩀爪努目舐脣騰伏哮吼轉劇於前爾時仙童思惟良乆而自念言計我生身不覺有過始欲排進猛獸忽能噉我終不忘孝建福不就忍不突進不見大師又非孝也拭淚而言大道有靈𩓑見遥祐天神地祇𩓑哀念我猛獸開道得見大師成就功徳遂我孝心泣淚良乆忽聞雲霧之中有人言曰善男子來特爲此事復有餘縁仙童答曰豈敢餘縁遊渉名山地神愍仙童之心而復告仙童曰子父母在世惠及蜫蟲天上地下莫不稱歎子爲大事逺見真師我不敢障但以大師降此未乆我等山神瞻仰未足未有供養以此因縁故令猛獸遏斷道路汝是十善之子百福扶持我雖山神𩓑與善子俱得聞法仙童答言善知識者不必一𩔖幽顯交歸人神不隔内外相持善功乃就山神攝除惡獸神乃露形與仙童交言言訖𨗳途仙童隨之猛獸俠從上至半山見寒栖大師居在絶巖之下碧玉爲居黄金爲牀龍虎列侍神人在傍紫雲凝蓋盤螭承爐金真秉節玉童燌香爾時仙童拜伏而起頓首而言弟子受生不幸禍不滅身心無孝養天䘮二親上下無依唯憑道真俗纒多累生死因縁茶毒崩心痛不能言欲營齋請以拔罪根伏承大師慈悲赴縁敢欲奉屈爲證福田言畢叩頭希聞報言真人告曰子二親在生𢘆修十善濟惠窮乏救活蜫蟲名動上天功聞帝庭天尊命我下來我是雲宫中真受事天尊以是因縁下降此山子是神童生十善門示有孝養軌範世間暫託凡胞不乆應仙昔呼子時還是我身暫遊下世或御流雲爾時仙童聞真人之言朗然覺悟悲喜交集真人又曰子欲建福修齋不可輕陳且先還家盛㓗道塲仙童頓首叩頭啓曰不審真君上天齋法建立道塲威儀所須請示其目真人告曰天上請齋威儀不同下界之法不得及此仙童汝先約勑僮㒒效功之人灰濯垢膩熏沐五香男女各居穢氣不交香泥塗地盛灑牀座滌蕩敷具汲盥器皿皆度香水厨爨清浣不焚蛀薪澡豆華水處處置立黄壇之上更加新土蓋之令平毎使緜宻朱柱嚴整燈燭炫晃所作精妙毎令盡心應市之物不與爭價不用穢財以營齋戒所謂敗生不義之物身不慈善不入道塲不臨齋厨前後慎護一七日中齋日雖訖心行平等猶不非時而妄所食况於履穢飲酒食肉心遊邪肆志不平等身坐道塲情交塵濁如此建齋功不𥙷過徒費香煙上帝不聞愆過不解罪䰟不釋百福不扶災氣不滅真道不降邪精下應爾時山神五嶽羣靈侍立真人傍聞仙童欲請真人下臨舍宅證成福田皆𩓑隨從天尊出遊人間爾時五臺山神前進作禮上啓真人而作是言此世界之中唯有仙童十善之家與物无怨天下人神皆樂聞見悉𩓑輔成就其善功真人然之爾時仙童聞山神之言即問諸神而作是言無上大道郷里供養不審神靈齋須何食山神答曰大道降世五帝大魔及以地祇皆悉侍從隨逐受事乗道威神都無所須但𩓑與汝作善知識衛護道塲若有外道惡人邪心破亂惱懷善人誹謗嫉妬䛕佞讒謟我當滅之令舌卷縮呵唾其身令成癩病面有瘡疱眉髪墮落内外影響名爲護法我常助道興顯正化非今日也爾時仙童聞此語已歡喜而歸教令其家一依眞人金口之敕時諸六親聞仙童歸還邃來問訊是時仙童具向親表述此上事諸人聞之身雖坐馳深思逺想曉夕忘寐皆𩓑真道降臨其舍各從仙童求乞教令爾時仙靈出見其目是時諸人各各傳寫教勑其家傍示親族咸悉依戒各淨其家隨其富貧盡心供養遥思逺念如對目前爾時仙童裝校壇宇一一事畢復向山中迎請眞人諸人聞巳悉𩓑隨往是時有千二百人其名曰月愛長者弘心長者大權長者德王長者逹命長者心海長者如是長者而爲大衆之所首領各賫香花隨逐仙童北向五臺一十二日到於山門俱時燌香遥禮山神食頃之間仰望山上見師子虎狼俠侍道側盤螭交結三帀真君地祇作樂仙卿燌香仙童拜伏問訊道君上勞雲駕降此空山下界衆生無可供養又復再拜時六大長者仰覩真威悉皆自失五體戰動喜懼交集拜伏不暇流汗負水瞻仰金容不覺忘言誠惶誠恐倚立不寜爾時山神而作是言大士仙童今得重來六大老人並何色目爲宿習善根爲始知廻向恐心無貞操志不殊堅來此何縁况心未冥真體猶凡濁汚我名跡不宜尸臭以見真君我雖名山之靈身無濁穢受形巳定雖不任道常爲真君而作外護不欲濁惡以此忤真仙童答曰此六老人是我法親聞我請道心助懽喜雖非十善亦无重罪身雖俗士亦有好心聞有真道目不曽覩遥思逺念誠在可哀山神聞仙童之言復語老公曰子審如仙童之言安定身心不須震懾思惟正法依教修行時諸長者作禮而退太上大道玉清經卷之五
