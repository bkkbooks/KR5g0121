front:
  text: 重刋道藏輯要太上大道玉淸經
  hash: sha256:abcc69dd6ced02ba473fc7e174bcf3559526e067ae001e7f271603093301dd4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_CK-KZ_01p112b, image: JY018/CK-KZ_JY018_01p112b.png}
body:
  text: 昭靈品第十五爾時南昌宫中上仙名曰昭靈與其侍從萬五千人俱皆是言龍初會凡身受度修道成聖具慈悲力身得六通能遊無間夀命已定如鍊眞金無有變易昇自在地智慧廣大不可度量身心無礙猶如虛空以七月十五日上登太霄昇入玉淸天中朝謁天尊於雲宫之中頓首道前問訉起居而作是言兆以塵濁穢賤濫當開度昔䝉大道慈流非分援擢錫以夀命叨佩至法自此已後依戒修行果所希望理應晨夕侍衞天尊常當受事特爲下界凡夫形骸腪臭又爲天路遙長非凡所登誠違起居每以翹想青雲之上欽慈紫闕之下徒以人㣲道淺致乖心願鬱悒之情厯久於懷不任戀慕之誠仰披雲霧上冒威嚴得覩尊顔以申虔拜言畢頓首喜不自勝天尊慜之而告仙人曰生化之道理合自然我亦未曾故有所施亦無情而鼓物焉能生汝善男子如人愛滅道亦無心逆其情而生之汝心好生道亦無心違汝情而滅之若以萬物之情極昇沉之願者於際會之間自然而辦道處玄極之際故能順物如流生之與滅道不能違也生而不滅吾道無心而能滅之滅而不生道亦無心而能生之汝今得生由汝願力道無心而生之心有背向各尙其志雖有道力不能先之汝願學道之初元由汝心自因自果不我知也所謂自然之道冥自然之心耳是時諸仙人聞天尊之言不敢辭對天尊又曰天路遙長汝來何爲仙人答曰故申對謝欲觀上道微妙至法天尊吿曰上道混化塵沙不辨如胚胎之未分似混沌之無元棄賢去智不晦不明溟涬無際焉能有妙與汝觀之無上大道若變化一事若起滅一事若受一事若持一事若居一事若舉一事若顯一事與眾觀之與人疑之無有是處無上大道亦無微妙冥冥空寂自覺覺他無心觀察無心分別此之與彼况能有妙與汝觀之無色無相猶如虛空無有内外善男子汝欲觀者可往雲宫東北方去此方有大地微塵里數太虛之中有三上眞在彼空中修無上道今入凝神大定於今已經九億大刧次應入忘形大定八億大刧次應入六虛大定七億大刧次應入無礙大定六億大刧次應入太虛大定五億大刧次應入洞惠百萬大刧次應入生惠十萬大刧當來應下觀三十七天次遊凡境俱號後聖太平天尊將諸侍從億億萬眾説無爲法而度眾生此時成道數如塵沙汝欲觀者觀此天尊微妙之法爾時仙人聞天尊教示歡喜拜伏奉辭天尊時諸仙人齊駕慶雲浮空而去倐歘之間已到太虛遙見三眞在於空中窈靄溟漠依俙紫雲之内霏微於明霞之上丹霄結緯黃精爲牀三氣凝液二景衘芒太虛爲牖虛境爲窗肧胎未始混沌初元服氣藏眞寥寂無言冲虛絶象萬化未根空湛靈軀五化潛敷三宫育眞六府凝神三魂不浮七魄不遊神精不動眞氣不流恬淡瀅渟無所經求爾時仙人覩此微妙齊下慶雲膝步輕雲汎虛而往空陳所因匍匐飮氣不敢有言虛跪玄中不知刧數注心觀妙不覺有身倏歘之間不見三眞霞帳所明不測所之良久之間歘亡空帳唯存光炁朧朧而然又良久之間忽見三眞出虛入無或亡或存呼吸風雲乍合乍分良久之間冥然絶影合氣都亡復經良久靈風八震神氣四衝吹噓交扇顯晦不恆又良久之間不動而生不營而成三晨坦察萬化潛萌兆靈根於紫精散靈魄於雲房動空塵於無境流元和於皓蒼噓萬氣於叢生布眞精於萬萌垂神足於靈綱閉握固於初嬰出六虛而無辦爲眾有而窺窗不沉不浮處空而停不動不寂履化而經無形之形無生之生處幽而孚處昏而明反觀復照妙體無形常住不變焉能所更心冥不動假寓無驚不宰不割不教不令不智不愚不令不行夷然用道無情交競捐機釋垢虛心自鏡塞宂窒隟收視反聽影響雖繁端心無異冥乎太空形無死地爾時仙人覩此神化五情自失雖經刧數冥然不覺忽見眞人入於生惠始悟風雲改變萬物動生是時仙人但於空中頓首霄間行願雖承道力喜懼不敢自寧爾時三眞慜諸仙人知其來意乃震希聲而語仙人曰子來何爲艱辛雲路吾與子同稟一道外何所觀爾時仙人不敢陳辭但求哀慜賜垂開度是時太平道君告仙人曰子何不任神氣於忽恍之間委自然於有無之際隨會合離縱運推移歘恍浮虛體不常居存於無形銷聲滌慮曠若長虛冥神無處鑑虛映空服氣藏眞混紫精之靈根晦凝魄於雲房泯輕塵於太始息元和於昊穹任物自生從眞晦明輕少雲崖之端能不動而常行宅中虛而已立恆如嬰兒之未嬰不聽不窺隨之有情不釋不取不滿不空泯而無際是謂玄同爾時仙人虛聞眞君之言微聲一諾響未卒聞仰視眞人已昇虛極追從不及欲啓不聞形入太無氣泯浮雲思心欽戀願欲侍從丹誠僅半歘而告言我絶待無繫云何自滯子未都忘乘雲御氣是時仙人纔欲有言以見太眞御空而邁速逾奔星迅過電掣爾時仙人思惟良久忽見眞君金容在玄應周色象汎汎而然若遊氣之在虛不可視聽知其神化微妙之事爾時仙人與其侍從住於虛中但以思念太平天尊所作神變虛心上翫欲知眞要願從天尊遊於下界心心願念志不暫移天尊慜之乃於玄中而告仙人曰無上大道法皆自然神力變化雖能隨心而心未曾勞雖復隨身身亦不作所謂無爲而爲無作而作無作而作無所不作無爲而爲無所不爲若有爲而爲爲而不周有作而作作而不普不役於心不勞於身心不煩而能靈身不勞而能生生靈合并無種不成所謂不作而成不爲自生道常無爲無所不爲混元根本理盡於斯善男子我亦無心而爲此神變推運降合和生氣爲諸來生而作法門不得不爾汝今當知無上大道而爲諸塵經於心口慈悲之道法應如此亦如汝等昔在塵中而遇大道廣作津濟亭毒含弘濟度枯朽此亦大道而施慈母之恩也懷抱養育飲食覆護種種教招雖不爲勞亦經於心天道至大應之甚微亦無感而不動未聞求而有違大道如海眾流所歸大道如天羣物所依善男子我不遊之日近無多時數萬刧間瞬速已至尅此已前應上大羅之上朝謁元尊次往諸天遍啓羣眞汝等雖是上仙周遊之法未至極天汝且還南昌宫中十萬刧後我當下過南昌之中自應見汝爾時上仙受大平天尊教敕拜辭而去歸南昌宫中爾時天尊亦以浮生上昇大羅朝謁元尊默而無言俱以神交又昇大羅之上朝謁虛無天尊亦皆無言太上冥寂道境默然而止不謁不言又入太虛道境都無所見太平天尊亦皆無形又加三刧微以遊氣汎然而下如是三尊昇上一萬二千天中冥然無形次入中一萬二千天有形無言次入下一萬二千天始有言説天尊後至玉淸天中見雲宫之內大悲天尊言推運日至應勞道化太平天尊答言爲此因緣上朝眞帝粗得周遍爾時太平天尊三聖法身同坐一座又經十刧與大悲天尊靜默而坐爾時南昌上仙覩天尊眞光遠映不比尋常是時玉淸之天已下諸後學得道上中下仙億億萬眾各賫供具香花旛葢作眾伎樂浮空而來朝慶太平天尊并朝大悲眞帝燒香散花歌頌讚歎鼓眾伎樂圍繞雲宫七日七夜諸天雨花香烟凝虛瓊林敷花以承甘露金山湧出玉髓流津龍芝起霞隱草擎雲空洞虬吟仙霞翳天白虎嘯歌微風拂塵眾仙四周眞宰列筵爾時諸仙各下浮雲齊整威儀一時稽首長跪瞻仰正見天尊各坐三宫通披霞衣神識似嬰瞻仰未周已入無形三宫紫雲靄空而生良久之間忽見一尊獨坐一宫復良久間忽見二尊列坐俠侍或恍忽存亡或混三爲一或散一爲三出有入無體不常居爾時仙人頓首良久南昌上宫照靈仙人長跪空中而作是言昔在太虛得覩天尊數億刧中立侍太空忘退之心濫䝉垂慜示以期會非分提擕自辭以來傾誠如昨下界迍𠘶屢有壞成翹勤之心𢘆如渴飢忽覩眞光遠映與本不殊如是天尊周旋事畢輒率仙眾塵穢天庭又復再拜天尊告曰我知汝心不煩多辭各且復坐爾時仙人一時再拜應命而坐天尊告曰我本無言亦忘所心空傳響應冥汝虛襟汝知之不仙人答言伏䝉吿勑不敢不知天尊然之爾時大眾默坐百刧寂然不動時聞雲宫四方玄中有陰生梵唱四字之章恍忽難詳似淸風振於虛絃如玉樹出於瓊音和韻宛轉辭理微妙不可盡解時諸仙人不敢視聽心中記憶時得半章其文曰靈芝無根眾化之原中凝七魄主結三魂二十四眞出入無門杳冥之精恍忽無情隨刧存亡逐氣而生外凝混朴內養七經五神植花三台敷榮紫關素童反形歸嬰騰雲而昇騁霧現空中有玉眞號曰神公右俠無英右衞白元玄獸遏後丹禽擁前上浮翠葢下湧金蓮香雲凝空甘露無窮用之無盡尋源不終爾時諸仙聞上方空歌內經不可記憶百刧之後昭靈仙人仰視尊顔見五色香雲從天尊口中而出上騰太虛爾時昭靈仙人合眾俱起作禮請問不審天尊默坐百刧音響無聞今日何故口出香雲欲知天尊所爲因緣願爲分別開悟未聞天尊吿曰我口出香雲以應後聖金闕帝君我前下四天之中時已臨至是時眾聖各應一事當此之時天地又應天應之時三景告瑞五色明霞以爲重輪地應之時五岳呈祥地藏發泄金玉露形若此之應金闕帝君不久下世今未尅日當此之時我亦觀之爾時昭靈仙人又更諮問空歌內章所出因緣太平天尊告仙人曰子不知乎大悲天尊治在此宫虛中眞氣演出此音自然天經靈章寶文難可得遇後聖諸仙聞亦不解此音合和生神調理眞氣之道凡所不聞我知汝心非分記錄汝諸仙人未合受持空歌內經自然之音爾時昭靈仙人答天尊言兆以輕生經當誦念願垂赦宥聽許受持天尊告曰子得聞之是子宿命法應成眞愼勿妄宣閉口修之學不負人泄則禍生祕則福臻爾時大眾俱起作禮奉受內經倐時之間上方雲篆空明虛中字方一丈八角垂芒煥煥光明爾時諸仙重更刻書玉文各寶一通韜之錦囊於時雲篆停空不滅天尊告曰眞氣所覆彌久彌盛汝等修之亦復如是夀無刧數形隨日新上眞所寶不施下仙道數未足况於下凡天尊吿昭靈當知上道一事皆不妄泄也況於天經汝當寶之勿將內經下化凡夫之心未能及此爾時昭靈仙人作禮長跪上白天尊下界凡夫雖居葷穢亦有知道修學成眞忽有此人可能傳受不天尊答曰如此之人億數無一汝等云何得知合眞之人昭靈答言臣南昌宫中亦有眞仙之錄三元八節下司上聞陳其功過亦無遺失天尊告曰下界凡心亦難分別或詐修吾道匿穢藏奸心有外求志不能堅固察奸糺過考其精神若不爾者淸濁難分或意在聲利依倚玄門窺窬下風唯尙多聞汝欲教凡當明此人爾時昭靈仙人不明聖旨重更諮問不審若爲考其精神願爲開示私心樂聞天尊告曰凡人之身中各有神神鎭在心心欲所爲神已知之身欲造惡神不從之人身陰賊魂不受拘魄不受制三元八節能聞上帝以是因緣可得而知人有陰德三魂不離七魄不散善神扶助天兵衞護以是因緣自然合道善男子無上大道不言而知恐汝未達深須戒之勿得輕宣善男子汝數億萬刧遇我於太空之中又今値我得聞妙法不久之間自然洞曉一切諸法眞僞之心如對目前无不辨了此諸身心通道故能洞達無有障礙爾時諸仙聞天尊慈悲卽互相歡喜頓首長跪各命侍從奏樂娛善千音合響法鼓凌霄其時浮霞流轉香烟遶虛飛葢迴空長旛舞風龍吟遙天鳳唱虛庭天地震動二景垂輪神蟾出月以蹈虛靈烏鼓翼以翔空當此之時下界三十七天後學成仙見此祥瑞一時騰空上至玉淸如雲之交太平天尊語昭靈曰仙無大小皆能感動天地制御萬靈當知道力不可思議令諸下仙皆得聞知爾時三十七天仙人億億萬眾遍滿雲宫燒香散花各陳本願爾時天尊遍知其意卽爲諸來大眾而入慈心大定攝受眾心入於靈冊之中合自然九變之道化成九天中有九氣結成九府爾時三尊分居九府各坐九龍寶座當此之時號爲九府眞人太平道君引諸仙人一時而入九府之內爾時天尊爲諸仙人說九仙之道上應九天中應九宫玄應九氣下攝九泉能入無間所謂一生三三生九九九八十一主於始生之法輪轉無窮今諸後學之人能生能成常居始生自然成眞諸來仙人覩此微妙不敢致辭亦各知其從此得生不知今者天尊開示慇懃委曲內懷慙愧不知何謝是時天尊逆知其意卽告之言無上大道都無所須何俟多言我身坐道場神交萬帝我非不凡受於虛言若言得道者下鬼凡夫唯除喑啞人未曾無言不能得道我非謂大道應凡之時都絶無言我今眞身汝又非凡以是義故汝於此中爲不了達心請問義自外默聽無上大道法無辭謝是諸仙人受天尊教勅各各頓首心思道恩良久之間南昌宫中昭靈上仙稽首而言昔承天尊推運下世周遊十方時刻未到願得天尊下臨南昌少時影響不敢久留則是萬刧翹誠於此滿願合眾叩頭伏地良久而聽告言天尊告曰我已上辭大帝遍別諸尊歸至雲宫因緣已畢汝欲請我不違汝心仙人聞天尊告勅喜躍無量天尊又言汝等諸仙宜且前去雲宫之中由來寂靜不宜久住塵穢雲宫大悲天尊昔應世之時暫有言說今還雲宫復歸虛無爲我來此天尊大悲俯觀後學汝等諸仙應當知此爾時上仙昭靈又更請問天尊不審天尊何當得來天尊答曰我當不久二萬刧後尋卽發來爾時諸仙奉諾訖已一時再拜辭別天尊次別大悲眞帝頓首退後仰瞻高座不見天尊時諸仙人顧瞻三聖亦已入無唯見雲宫閴然虛靜香風微動爐烟尙氛飛葢停空幢旛立虛天樂不鳴音響無餘是時諸仙覩上道之威神忽出有而還無良久徘徊冥寞無依齊駕雲車相隨復歸爾時一切仙人皆已隨從昭靈上仙歸於南昌宫中修行天書陰生寶經一十八年皆成眞道二萬刧中虛心佇立爾時天尊在雲宫之中遙見諸仙得成眞道乃於雲宫之中出見諸眞大慈左手當此之時三十三天其門洞開是諸天人皆見天尊左手猶如白虹貫於太虛五指爪甲出五色光明照於南昌之宫爾時諸眞一時稽首再拜左手各於光中遙見天尊在於雲宫虛無之中有天書左契一字八色光明時諸眞踊躍歡喜知是天尊遙來印授道無二言見其左手在雲中宫經一萬刧然後乃收還於雲宫光亦如是萬刧之後隨手而歸二萬刧後時諸眞人蹈空立虛遙瞻上方以正月一日晨朝之時見有三色光氣從東方初日之中直下南昌宫中盤縈宛轉遍於虛空香風酷烈不並尋常九萬年中朝朝如此是諸眞人晨朝之時正首挹氣九十過經三十年中靈氣洞徹虛凝體中從其項後出上衝天靑赤白色永不復滅二萬刧後七月一日晨朝之時忽見太平天尊三聖法身坐在三氣之中爾時天尊各放眞光心間出光光初如螢須臾遍體内外洞徹映朗南昌上宫良久之間太平天尊道身如光無有分别合天烱烱譬如盛日但無炎烈瞻視煥目光芒射人不昏不異足經千刧是諸眞仙在此光中歡娛怡悅形容反嬰色如稚子足蹈虛空汎若輕雲眞光之力乃能如是雖經刧數心無於悒以道自娛都忘其餘千刧之後三聖法身忽見光中眞仙無數億萬仰視上方長跪而立不敢有言天尊盡知其意是諸仙人俱得大通皆具神交亦知天尊慜其大眾廣開法門慈悲成就皆得無礙神通道力亦能七變九化達觀諸法不知天尊千變萬化能大自在能轉他人凡夫之身不經久時而成法身天上地下萬道獨尊神力無等不可思議威魔品第十六爾時復有色慾二界六羣邪仙八萬四千人性好論議常於下界較其神力善習幻化心意矜高自號大師獨行三界心得五通夀八萬大刧聞天尊下降南昌上宫率其部落乘駕獅子經六小刧上至南昌思見天尊欲較神力校試道術天尊已知其意與諸大眾默然不動坐一龍座去地七仞爾時八萬四千邪仙一時到已仰視聖眾無心恭敬亦復不識太平天尊眞仙階級欲登高座無能上者爾時邪仙之中有一大仙名曰羅比羅是邪仙眾中第一道首變色而言我是三界大師獨明禍福聞有無上大道而此大眾何者爲尊爾時天尊指昭靈眞人已爲天尊是時羅比厲聲言曰子有道乎昭靈答言我身無道羅比曰子無道術以何玄法乘此高座吾欲坐議卽當昇上昭靈答曰我此高座名曰大道慈悲之座子將此身窮力上之亦不得昇忽强昇之亦終不得羅比問曰云何不得昇坐昭靈答曰子是下方色慾二界直腳魔邪假託仙號爾時邪仙齊舉其腳悉皆堅直不能得屈求欲坐地亦不能得是時羅比盡其神力亢聲說咒是其徒眾八萬四千空中自撲隨咒緩急爾時羅比又盡神力欲動天地是其徒眾一時倒地轉身翻覆求止不得是時羅比心猶不信更求與昭靈眞人較隱形之法爾時昭靈眞人大悲聽許羅比曰子先隱身爾時宫中聖眾一時俱隱是八萬四千邪仙連臂空行不能得見還復本處歎未曾有復須臾之間大眾儼然未曾一動昭靈道君卽令羅比合眾隱身是時羅比竭其威力變成黑氣昭靈眞人一過吹之八萬餘魔一時氣靡猶如死尸冥然無知良久之間道君又微氣噓之一時俱蘇各起悔過信向歸伏爾時道君又以慈力吟拂魔之章令八萬四千邪仙半生半死良久是時邪仙得蘇息已自覺其身有腐爛氣喘頓首道前而作是言不審天尊修學何法神力如是夀命幾何道君告曰我修無上大道慈悲忍辱之法身無死地神力自在道君以大悲力試而問之子修何法住夀幾何羅比答曰我修慾界四天神咒一名如意足能夀八萬大刧上夀之中不過於此命過之後隨業受生而我法中能勤苦行心得五通雖有神力不脫老死雖達空理無法長生爾時道君逆知其意而不答之又問羅比知汝法中根本以不答曰不知此事久遠難可詳究道君告曰汝此法者是汝天中崑崙山精自號四天之主或稱四天仙王或稱神王出此法教化色慾二界邊地眾生汝之所師原本如是非是無上大道自然之法汝下二界邊地眾生工一小伎卽號仙人因此邪仙更相放效不識大道無上至法羅比又問上道幾法仙有幾品經名何者聞有天尊目未曾覩而此大眾盡名天尊復有餘號盡是上眞亦有下仙爾時眞人告羅比曰上道法一論其支流三萬六千種法元於一道仙眞之品有一百二十級皆宗天尊雲篆成文自然天書故曰天經太平眞君虛無天尊常在玄中以汝凡眼五通小見不能得覩三尊眞容我近學道經數億刧位登眞人而此大眾皆是上仙羅比又問眞人神力尙以無比天尊威神應復若爲眞人答曰非汝所見非汝所聞數萬大刧之後應下化世以汝危命八萬刧夀不見此時汝莫問此非汝所及汝身腥臊尸臭無常欲至洿我天宫汝當急去不得久停爾時羅比無立足處復歸下界天路遙長憶初上時經六小刧此時年尙少壯猶故遲滯今轉朽邁漸無神力混神迷性進退無據相顧悲泣涕淚交連辭別眞人遽還慾界圍遶崑崙起居邪王具說遊行之於上界覩大道眞人示其神力語其根本邪王聞之五神振懾絶而復蘇良久醒悟語羅比曰止止勿言諸神聞之出於人間傳說我等道術不行是諸邪仙卻居山南約水而住四時八節或附著人歌吟哮吼自號仙王求索禱祠修習幻化遍行下世自出支流改制邪法擅立位號六百餘種金闕天尊應運之時邪仙殄滅無復遺餘爾時昭靈道君白諸眞人曰邪仙初來天尊大聖不自對此下界邪俗命我小道示其威神我乘大道大眾之力非我獨能威此外道邪仙塵穢之事實非所宜無上大道逗機之時或應如此不足異也爾時丹霍洞眞名曰通玄從坐而起長跪請問昭靈道君曰拂魔之章可記錄不願見傳授敢欲修行昭靈道君曰此中雖復天眞大會諸有傳受不敢自專先當上聞爾時二眞具以因緣上白太平天尊告曰欲威下道妖精先當左叩金鐘三十六下而誦威章三遍其文曰金鈴電火繫烈咆噴九元殺氣流蕩熖紛萬魔滅種千妖絶殞雷父蹈空霹靂迴風斬首馘醜推妖殄根逆我者滅順我者存七星裂血金神曜電精刀燿電玉斧含霜威兵前驅何鬼敢當爭氣者滅拒逆者殃上浮紫葢下坐金牀丹霄羅暎日月爲光門據靈蟾戸衞金芒五毒藏奸萬魔滅亡七眞内養千威外張魂歸紫闕魄入丹房天尊告曰此是太玄内威咒滅凶殺邪後學諸仙道未玄極恐多凶殺誦此神咒依儀鎭衞千邪喪精萬魔滅氣神平體安朗然無畏天尊告曰上道之法無心自成不必須咒誦此威章此是太玄虛靜道場之内威振靈冊於邪門左叩金鐘三十六下以召威兵右擊玉磬一十四通以集眞靈中建法鼓一十二鳴以聞上帝生神内列威兵外張雙曜入眸口吐靈芒頭建七星足蹈玄綱玉爐颺烟身坐金牀萬精滅氣千妖自亡天尊曰下土凡人單行此法不得眞要年二百四十𡻕鬼不能害是時丹霍洞眞伏受要言歡告禮謝奉而行之爾時丹霍洞眞與後來三十七天諸眞仙等億億萬眾一時頓首長跪上啓天尊兆以夙承餘慶運遇高尊賜以慈悲提携淪墜得易凡軀叨兹上首濫階玄極過泰有餘不揆愚微轉當忘退心願停此庇影南昌待慈尊下世之時願陪雲駕晨夕侍衞執葢叅爐惟願天尊大悲恩許辭畢再拜伏聽教言天尊告曰大道無親善善相因子承願力何俟多陳運期非久數萬刧間天堂遐曠任子遊居下世之時亦須汝等助宣正法流化下土我等三聖各化三界此時度人亦乃無數爾時諸眞聞天尊垂許侍從深慰所願歡喜慶快一時禮謝爾時天尊又告後來諸眞汝道猶淺未達至理且作一刧入凝神大定思念都盡次入忘形大定應感皆空次入六虛大定隨方起應次入太虛大定分身萬億次入動惠大定能爲萬化之根次入生惠大定能遍生萬物次入大慈大定能長成萬物次入大悲大定能藏養萬物汝能成此八事然後位登上眞俱號後聖應爲大道差次應運賜汝尊號欲隨我下世教化心不自定不能生化眞應有滯不能起感爾時天尊說此語已卽入不動凝神大定如本無異爾時諸眞亦隨天尊入凝神大定爾時天尊出此定已又入忘形大定是時眞人亦隨天尊入忘形大定天尊出此定已又入六虛大定是時眞人亦隨天尊入六虛大定出六虛大定已又入太虛大定是時眞人亦隨天尊入太虛大定是時天尊出此定已又入動惠是時眞人亦皆隨天尊而入動惠爾時天尊出動惠已又入生惠是時眞人亦隨天尊而入生惠天尊出生惠已又入大慈大定是時眞人皆隨天尊而入大慈大定天尊出大慈大定已而入大悲大定是時眞人亦皆隨天尊入大悲大定爾時天尊出定惠已卽入自在神力忽而升玄倒景步虛一瞬之間已周三萬六千天中復歸本處凝然不動懷藏三萬六千日月又於身中開闢三萬六千天門又於身中登現三萬六千天帝一一天帝身中各見三萬六千天門又見三萬六千天帝各有三萬六千侍從一一侍從各坐三萬六千龍座一一龍座各廕飛葢其葢高廣遍覆諸界須臾之間復令三萬六千天地一時震動天雨香花地湧寶山爾時天尊身中又出三萬六千龍輪乘三萬六千日月復歸諸天爾時三界地中所有枯骨變起成人復令衰老一時反嬰素鬢歸玄落齒更生五藏花敷耳目聰明須臾之間復令三萬六千天中一時風雷大動甘雨驟流萬象發生英華動敷天洒甘露玉髓通流眞無凝仙𣑽唱淸玄寥亮虛通響徹無邊又令應出星宫空列雲房上凝紫霞下結金剛十絶垂天寶葢高張牖開明月戸映靈芒白玉爲几金精爲牀眞宰俠侍仙童焚香爾時天尊與諸上眞俱爲雲房列坐龍座鳳唱虬吟庭舞仙禽神力萬變所作隨心時諸眞人歎未曾有爾時天尊告諸眞曰上道之法力神萬變未覺經心定惠虛通無心故爲心不經而自成惠不爲而自明强爲不明强作不成甚希甚微難可而名汝大通之日自應如此眾眞齊起一時禮謝諾受要言天尊又曰如此神變及以定惠乃是大道階級之事已應運化度世之法亦法如此爾時天尊知諸眞人身心無礙智力廣大堪任大事卽與眾眞升入大羅之上謁請虛無天尊授其上眞之任至億刧之後應加尊號而至大羅之上謁虛無天尊天尊告曰子道數已極宜錫上眞之任我各侍至眞之司玉函靑簡刻書已畢命諸眞人讀簡看名尊號已定眾眞再拜天尊告曰如此冥默眾眞奉辭歸於南昌雲房之中列坐大會眾眞朝慶七日七夜天雨香花振動三十七天大地之中應時踴出山岳而應上天天地合響一時稱善當此之時太平三尊
