front:
  text: 國男子亦各還家尊修至法一國道士在會中者九萬七千人皆得六通無礙自在或隨其人周遊下界九夷諸仙昇入無形莫知所在大王父母猶昇慶霄玉淸天尊錫太帝之身號爲洞玄太玄又錫夫人爲玄臺仙君給以女仙侍衞二十四人飛葢焱輪以昇洞天主諸新學女冠道士爾時眞師爲世救焚猶在寒林玉淸天尊與諸眞帝常在玄中湛然不動四時八節時放光音一切有生咸皆恃賴
