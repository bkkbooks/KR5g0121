body:
  text: 幽棲品第十八爾時玉淸天中雲宫右臺眞宰上相名曰慈忍一號通玄位總三十四天上司主知三界興衰災否之事掌握諸天之樞總持九地之機迴轉靈綱旋運玉衡瑩拂二景開明五辰灑潤甘露蒸發雲雨化諸未化編隷幽藏含氣之徒不失所宜役使羣龍驅馳萬神調御正氣流布仁和使四序不虧八節固常二十四氣不失𢘆則正定黃道開闢天原遏陰成於巨冥鎭陽長於淥波消火精於炎方滅水靈於北阿植五芝於天田孕應帝於紫微十二眞官變育有生六儀威神環輔形魂雲書自明天經朗虛萬兆則之智慧日生不言而化不爲而成掩偏氣於六天置四司以主生植百穀以繼命顯神藥以導生億百千刧深根不傾以道續絶故得如此爾時有大唐世界行道國王名曰昭德其姓玄氏合國臣子專心行道時有邊邦小國三萬六千國王遙覩威神迴心想念各將臣宰陳大威儀香花幢葢作妙音聲披誠露膽内外殫盡從初發心行至道場念念相續無諸雜想聚集大國焚香陳願渴仰上方太空之中翹誠願念如有所待願爲九玄七祖一切兆民并及王身而作是言願得無上大道覆護憐憫延續刧運慈造眾生解脫網羅赦諸愆咎使幽明兩途同得開悟信根成立堪任至法見身成道是諸國王陳此上願一日一夜六時啓請一日一夜六時作樂其音和雅微妙淸暢能令聞者皆發道心捨惡從善誠不疑貳香烟上騰薰於帝庭微言淸暢聞於眞宰爾時雲宫天尊以正月七日晨朝之時應有生以無形教含識以希聲垂神足於太虛之表彈法指於遙空之中眞光掩日洞朗無幽微音淸暢隨隷應之瑩拭凡眼開決俗耳揮空洞之音而讚慈忍曰善哉善哉慈忍護世得力無比常以道眼而視眾生常以道心而憫眾生常以道手而𢹂眾生常以道體而化眾生常以道足而導眾生常以道父而子眾生常以道母而育眾生常以道朋而友眾生時諸天子遙聞上方光音淸徹歡喜攝念各作是言道不虛行果在今日是諸天子倍加精進都忘雜想唯道自理不慕其餘雖聞希音猶限三萬六千天地但願至道無違敢希玄鑒乞骨肉俱飛永爲眞仙九祖獲慶魂度南宫卽是天下太平人民歡樂爾時雲宫天尊又暢㣲音而告諸王曰天子則天而無心民奉天子而無事天子與民俱太平卽此無憂亦無慮善男子無上大道雖居三萬六千玄天之上俯觀凡境猶如指掌汝諸王等精修至道而不懈者未有不成上聖者也譬如良農善能播植旣植其母必得其子汝守太平之道焉得不處常樂我施至法與諸上眞主知諸天而得太平上眞化下與我無異汝欲奉道志願生身而得度者此亦不難但問志之何如未有學而不成未有種而不生子審其原自果其流理固自然必定無惑爾時諸王雖欽和教而心未通眞私心願念欲見天尊天尊已知其意卽命上眞通玄擊太空神磬演出虛琴之辭而語諸王曰虛白爲道本太虛爲道體虛白無所染道本無所邪眞人重至法塵俗慕諠譁願看行尸間接踵騖榮華眄此雲宫眞向道皆驕奢耳目不視聽聰察無所遮寂靜守無爲檢志勿紛葩圓通無異趣妄想失眞宗法體常虛無其量包太空唯當裂塵網摧除煩惱藂孤標流俗外冥然與道同道本無所見内視自觀心結固不能縳障累日銷沉高步雲崖端無中咀德音安坐不移處賢聖自相尋所在存惠利屏跡棲山林披褐挹流霞焚香陳子心功成同道體萬化無不昇塵刧猶未旦冥冥無始終告汝登眞機德滿道彌冲爾時諸王覩此神異歎未曾有各相謂言大道威神無所不在太虛之聲尙演微辭金口之言若爲㣲妙計我迴心未過三月已得見聞無上至法終身修習定不廢損我等徒眾已得道恩不當退敗失去前功各捨王位從道出家生身受度豈不快樂躭翫榮名權握四海不免威刑亡失善利生老病死凋逝朽爛沉淪滓濁良可爲哀時諸天王登卽禪位付囑勳臣刧後七月七日焚香禮虛大臣誓願願從大道求乞出家捨世煩惱棲隱山林請入玄臺之中作此願已爾時三萬六千玄天及十方國土眞闕光明進於常日仙霞慶霄流洒甘露九色之雲結成鳳文羅絡四天光映下界微風吟籟噓唱靈章天樂自鳴諷咏眞經眾音和會不可名目皆是雲宫眞帝流布道氣演出正音化生王身使眞氣速感改凡成聖爾時眞帝但以威神應感諸王不以法身對凡演說如天則道不言而言但以四時化成萬物天爲道子猶能若斯無上大道以氣化物眞精流變不可見聞唯得度者而自見聞不受度者未能得見爾時諸王各各仰視上方採誦天經雲書靈章三十九篇以十月七日焚香禮願請入玄臺之中是時諸王已能出入無形坐在立亡恍惚難測目有流光身生五氣旣入玄臺各坐於瓊樹之下廕以瑤枝坐以金牀雲龍俠座仙童立侍天給香花以承正足背以蒼璧之垣面以金精之池五河之靈潤以瓊津九地之母植種金芝龍英吐氣芬芳周流是時諸王心眼明朗遙覩眞帝近在目前胎結銷亡洞鑒無礙不但三萬六千天地十方世界猶如指掌是時諸王各坐瓊林之下九億大刧而不移處爾時雲宫眞帝遙錫諸王中眞之號郤後百億大刧又錫上眞之任後又萬億大刧錫王後聖道君之任號太虛眞王於今治在常玄天之中諸王之身爲聞道故形貌反嬰猶若盛年十六童子亦能分身遍滿虛空攝形歸無絶凡視聽非是下仙四眾之人所能知也所謂幽通藏用微妙之至無以比譬或見象而無言或有言而無象行一事終會萬道之宗總眾妙門則變通無極衰俗紛擾虛談僞辨徒勞始卒無的依憑痛傷流俗糜爛沉溺學無明師又無眞經安得周衞而免死厄好眞之士可不研精詳審眞僞驗其邪正求其機要不在狐疑專心祈度誠無迷惑上士學道卽身成聖中士學道蟬化隱遷猶應示死而不滅亡下士學道積刧勞苦出入生死不可計刧道言此諸國王亦勞生死積刧勤苦治民事天功聞上帝信用大道棄捨世榮入山求道嘗味百藥吐故納新精研至經明了深義常行慈悲專利廣大專志守一遠世塵濁道使之然俱得受度而成後聖刧後計得百萬億大刧上元眞道遷於三萬六千天王後聖道君各治一天遞知化世上元眞帝昇入無形息諸動用雖復寂寥虛豁泯默無心應物不違神齊影響無情而運不覺有爲是故名之息諸動用爾時大唐世界弘道九刧郤後八年𡻕在壬子正月七日有一大臣名曰廣德其姓王氏年已百𡻕聽察未掩氣力猶强以正輔國不枉人心蠢動含靈皆沐其德四時八節常建齋壇罄其生資盡心供養比國諸臣聞其中正遙仰德音密遣使命賫持信好遙奉大臣如是不絶足滿九年大臣廣德遙感其意晨夕焚香香烟潛薰隣國諸臣遍體香氣每夕得夢夢見神人身長丈六對近目前如是諸臣心各自念而作是言將非是我供養德人大道感念見我威容遙誠信向彌加恭敬亦各焚香晨夕禮願願得其身親奉大臣精至齋潔足滿千日刧後十月七日夜半之時忽見中庭有二童子手執神燭宣大臣教云欲相見評論道德諸神忽聞童子之言匍匐出外禮訉童子目注神燭不暇還別覺行八步奄見大城臺閣宫闕得覩大臣廣德作禮問訊良久之間自思神異始覺已踰八千餘里比近之臣亦有三千五千里間如一瞬頃已至中國爾時總有五萬九千大臣俱發道心願捨名位入山修道執燭童子總有一十一萬八千童子俱是雲宫右臺中眞侍者遐感好道之人炳神燭而照之令心正體堅目不邪視耳絶淫聽執持道要行趨道場内外調善果業成熟速得道眞神燭之光功德如是爾時童子聚諸神燭爲一惠炬縱廣正等六百餘里其光淸涼洞徹照曜無窮時諸大臣覩此惠炬心眼洞明悉皆歎言未曾有也先禮童子㳄禮惠炬而作是言弟子凡膚肌腥骨臭夙無餘慶不樹善緣德薄功微不足聞道不期大道慈憐示以希有不勝恩造喜懼交集童子告言大道慈悲不須遜謝汝等諸人棄榮世祿山棲求道先當入此智炬之中然後秉節除魔高棲巖岫咀嚼眞經諷詠天書拂圓鏡之遊塵揮伏日之金精神室凝珠八威吐芒香烟上騰以陳子心功聞帝庭上昇紫晨不久之間勤苦山林我道至神不虛見聞精至之士而能得之子欲山棲當奉明戒勿傷所疾謂餈嬰孩勿犯不淨動止須淸一事有虧萬途盡傾子未見聞安得自明時諸臣等從惠炬出長跪請戒童子告言戒言愼也子雖有智猶未辨微聰利之人自恃其智輕犯所忌不懼威神身未成道猶處方圓俯仰失儀勞而無冀一至自在隨意無礙昇入無形都忘眾相是時童子卽爲諸臣而說戒曰子欲山棲先擯塵俗勞累之事道所不爲者勿强爲之眞所不履者勿强履之但知行道存身不慕餘事欲棄人世而棲山林者先求同志之人不過三五上士山棲不過二三多則喧閙心意不專互相窺瞰輕觸威神不履污穢男女混雜講及俗事坐臥慢處心遊邪肆察聽外事雖居山林心志不一穢垢通津邪風往來髓腦枯竭牙凋喪明怠不洒沐皮膚積垢眞氣遠離無所希冀裸露三光善神不祐躭睡懶起供繕怠惰眞君靑簡無功可記有罪不誨九玄被考四司糺彈立退見敗思慮不專雜想紛擾眞精不守邪鬼來任不辨邪正妄生異見眞人造房不知恭敬衣服法具非類雜用塵濁流淹魂神沉滯北首便溺不知背向洿慢神泉地司舉愆罪盈黑簿生身受持或竊覽天經妄授不眞侍經舉過釁及九玄或泄露幽密輕慢眞文或大言大語大嗔大喜陰經畜泄內外失和或泄眞誥自陳夢想或食肉飲酒味嗜薰辛藏神煩惱亡失正氣或朝禮燒香顧盼迴視招魅來禍上帝不聞如此禁戒眞道所疾隱學之士深宜愼之爾時童子告諸臣言善男子學道如道求邪如邪以類推之則可知也汝等雖賢未辨聖教諸學聖道者聖言正也以正事求之然後可以免脫死厄綿綿長存善男子修吾道者卽能變煉形神轉凡成聖不更受死昇入無形眾累不繼爾時諸臣從地而起長跪答曰臣等雖有向道之心未明道義不解科格幽靄至理或恐夙不樹功無德可恃年旣朽邁筋力衰微忽之禍方永隔生道下情鬱悒煩惱纒懷復聞世人誹謗大道而作是言云學道之人不免生死輙以輕陳世說干忤眞君願爲決疑消除憂慮眞童告言善男子汝所云者愚人狂言非至聖說何以故往昔之時有愚癡之黨兄弟三人竊聞至士避害棲庇山林斟酌玄流咀嚼甘露形神不灰色如童子億百千刧綿綿長存不知至法精微虛白玄妙而兄弟三人自師短見便學不死第一大兄名曰冥子穿鑿懸嵒冶䥫爲鏁繫以一牀空中而坐無所服御飢渴而死其第二弟名曰大閽乘筏入海卒遇大風遂至沉溺其第三弟名曰蠢生自計避死深入石穴忽被毒龍之所吞噬在後凡庸相承不絶因以書記而爲盛談不達深義便謂至人學同於此傳說惑亂輕泄下凡世之聾盲良可傷之歎汝等諸人欲學眞道勿信邪說喪汝一生非唯一生無量生中不得見道樹果之人雖經初因必定當知尅獲果報若住惡因之中而修功者億千萬刧輪轉惡因之中不能得果如人學邪生生相續邪因不絶無有因緣得入正道學正亦爾眞人上士無處不正所謂正身正心正慧正命命若有盡不名正命慧若有邪不名正慧善男子汝今當知道不虛行傳得其人傳不得人是名泄慢禁戒嚴重不可不知爾時諸臣奉禁戒已又更啓請眞童求受保神内經生魂育魄之道眞童又言保神内經生魂育魄之道並是龍章鳳書雲篆天文光彩洞映起死迴骸一名諸天寶文天無此文不能廣覆地無此文不能生成日月無此文不能照曜星宿無此文不能正𨇠次河海無此文源流枯竭天子無此文萬兆不化此經者是上皇所寶九萬大刧一時下世我雖奉無上眞帝金口之勅授汝入山之科未奉別教授度寶經之信汝欲聞見且待須臾於是童子焚香靜念遙禮上方長跪而住爾時諸臣亦以燒香叩頭伏地始旦中忽覺上方神香酷烈下薰眾人香花進日九色羅映鬱然滿目過日至夜二更之後九色流霞明於太虛香風吹霞結成天書字文一丈光芒煜變星月不見又聞天樂遍於十方和雅寥亮無以爲喻九日九夜其音始畢須臾之頃忽聞流霞之中有人淸唱保生内篇之首窈窕寥亮汪洋宛轉徐庠和雅韻動浮雲天雨香花雰雰霏霏其流霞之狀或枯或潤籠籠離離乍見金容尊儀列坐無數猶如雲龍初會九眞大集威儀容與霞衣霓裳逐風迴旋蜿蜿輕妙如雲龍之在虛類舞鳳之翔空左鐘右磬音節交和乍近乍遠乍高乍低天淸氣朗四海無波水陸飛走異類羣狎悉皆仰視而聽法音其篇目曰七氣成眞六儀運虛五靈續絶二曜扶衰旋綱躡空飛步雲宫胚胎有始塵刧無終金城孕質玉洞凝神眞氣内養以成聖人上入六虛下洞幽泉雲宫寶闕中有眞魂出入福鄕周旋生門咀嚼靈芝灌潄金泉甘露川流懸澍丹田紫霞朝映三氣凝烟瓊室化仙安坐金蓮眞儀掩日塵刧爲年爾時諸臣聞雲宫上眞淸諷靈篇誦詠道經各各顧視眾人氣色如雲心中自明三際之事了了分明身轉自升隨意立果無有滯礙眞童問諸臣曰汝聞上方眞宰吟誦寶經威神潛感靈驗須臾與道合同豈不快乎夫學道得眞果不移身汝等諸人先弘誓願入山求道上元眞帝慜汝殷勤知汝不退成就汝身令速得道汝等猶有本願法當棲山教諸後學爾時眞帝遙錫諸臣上眞之號時諸上眞遙禮上帝雖隔三萬六千玄天之中以通達故如對目前道合無言不聞所陳爾時上眞一時升空上登崑崙治山正中四時八節上昇玉淸謁於雲宫無上大道或時停留九萬大刧下遊四天度諸後學隨類見形同其音聲而爲說法皆爲饒益無量無邊不可思議諸後學之人不懷山水無淸高之志狎在塵濁煩惱縈纒假有微心不能大成又無堅固不遇明師不識眞要信邪倒見不辨科禁眞僞相叅淨穢交雜未偕因地自謂得果其身未度說法度人大道不聞空勞邪聽師旣愚暗弟子亦頑自誑誑他與俗竟進規求世利以活行尸常之禍鄕不憚凶險進退自伐累刧失生冥司注愆生死徙謫永失人道甚可哀哉道言往昔下界雲臺之陽時有五人結朋學道南入丹霍之山下尋地道郤出伏龍之山從小阿南竇出於山陽同居數載服朮飡松不解科法不見眞經積年勤苦心不懈倦不交塵俗不求世利常服草衣一日六時朝禮上天願乞濟度長生不死如是積四十六年上玄哀其單盡使日宫神童下試五人第一之試變爲美女投其寓宿時天寒雪經停九日與之共牀於是五人採藥供給設火温煖視如父母心生慈愍神童洞鑒其意卽便暫退已後九日忽變爲大兕觸殺一鹿其鹿亦是化作死其廬側於是五人往視悲涙故取埋之兕知其意卽便退去又經七日五人入山尋採藥食奄遇寶窖金銀無量是時五人目不暫視又經七日於是神童化爲貧病窮人投之乞食如是五人安養供食足經千日便爾還去後又九日爾時神童化作惡虎三十餘頭又化作蟒虵十頭虎尾鈎連虵身交結圍繞五人是時張口吐舌欲相吞噬於是五人情地不懼顔色怡悅氣平身安綽如無事爾時大道哀慜眾聖慈憐二曜停空一十四日盛冬冰泮玉樹敷花雷音淸暢天洒甘露神香鬱烈和風發生無上大道空中授手遍於世界天文暎明羣瑞祥集麟舞鳳唱眾音和雅合讚五人一切世間聖凡異類土石草木皆能演出微妙法音所謂天經地緯超凡成聖皆可採聽爾時五人採服微音皆以心體柔軟德力無比百關强健六府調和耳目聰明神識凝玄不違四時不逆五行歸依常道遠離虛妄善用中和故能无病妖魔消伏眞正日新神童歎言世人雖賢不能用德偏執異見謂無常道順俗灰滅夭喪眞性不知卽身去道不遠分意不求甘心滅度遊魂倚變隨境而舍昔有風氏兄弟二人大兄名運二弟名遇同一母生運年十六弟年十四母教令學遊往他方遭二種師一師貧賤唯富貴道德積居常山年已九百一師富貴多饒財寶善明世事兄弟二人各事一師大兄事師山隱學道小弟貪財奉事世師執手辭別隨師而去逐事流變六十七年後於鄽間忽然相遇大兄識弟弟不識兄兄雖年老容顔不衰少於往日分別之時其弟形容甚至顦顇耳目已損瞻視不明兄弟相隨三日不悟弟謂其兄而作言曰子非魅乎忽作此言言是我兄必欲中我奄便揮劍以剌其兄如剌虛空竟無傷損其弟心懼五體戰慄發聲大呼聲震禽獸自仆地驚惕欲絶其兄慈慜弟故扶起案摩消息將養漸漸得蘇猶未敢信其兄向弟一一具說父母生處所經事業村邦鄕里弟雖小悟猶恐鬼魅而能得知良久之間而作是言汝今定當是我兄者不是我兄者以劍剌汝不覺所中以此驗之固不敢信其兄告言吾聞道乎遍體受生身無死地以是因緣刃所不中非是鬼魅汝今勿疑我昔與汝生一父母年各長大稟學不同麄妙相絶優劣懸隔若使汝不癡貪志求生道亦得如我無有異也弟猶狐疑心未湻信爾時兄弟二人相隨至家見其父母拜跪問訊父母見兒歡喜無量兒雖未言父母已知其子學有優劣是時中表親舊聞其學還皆來勞問所學因緣爾時大兒以其初學因緣答其親族又序其弟所事師範一一具說因緣之事其弟心中以漸開悟始知是兄眞實不謬爲兄作禮長跪悔過深心尅責三月謝愆雖知謝愆心尙猶豫不知請兄而受至道逮後六月重辭父母而向他方㝷求學業忽於他邦單貧之家而遇外道求假衣食請從服事以爲師匠於是外道便卽許之服勤六年於是外道卒乃授其邪法之道辭師還歸至鄕里經涉勤苦遂成勞患傷損筋骨卒於道傍形骸不收爲獸所噉遂失生道魂魄苦惱甚可哀痛後生邊陬化諸流俗今已九百生中爲人演說邪法之道求世利養資其身命而雖有功不足成就終不能得卽身而爲法身然此外道亦遊山林荷負缾鉢入村乞食居無定方修習不正惑辭聾瞽招誘童䝉上天以其嗊嗃之愆制役下鬼惑亂其心使其愛死不重生道與諸魔邪以爲羣黨如是外道至於後刧湻澆之世法流三界大道不行當此之時眾生福盡天吿災祥百穀減少人民飢饉水刧攺運一時漂沒爾時風運以無上道法授其父母精修千日老而復丁後隨其子入玉輪之阿飮以金精咀以玉芝身生紫氣目有流光骨體輕便而能飛行不久三人升入無形長存綿綿塵刧爲瞬彌久彌新遇之與運昇隆若斯同本一元中道流浪一時相失億刧長乖不識明師遂至如此告諸後學明鑒此經人生難得不可失生爾時眞童逆告來生學眞之人或志不在俗擯塵割累願居山林幽身虛巖研味上道求見昇度要在淸潔不潔無冀廣尋至經明視節度修道方法心性慈順便易感通淨持神室晝夜不睡瑩拂明鏡徑九寸令無瑕翳懸對目前以鑒精魅辨其僞眞開闢明堂遐招二景隨以晨夕互咀精霞密室坐卧任其便所不必一也採服輕妙呼吸中和不緩不急不麄不細猶如嬰兒飲其母乳綿綿微吸取類引絲使不斷絶不勤不勞如幽泉之潛澍内外靜息百關不躁忘所馳競冥昧泯默如無耳目不以視聽用其聰察也於是塵濁消沉道德明顯生神内養和氣調暢存亡去留隨心攝運生道一固欲死不可得也尋眞之士寶祕此經愼勿輕泄傳非其人九祖受考身不得道深加微密勿得唱露勤而行之尅定太平失之則亡得之則昌密之則眞降泄之則禍來爾時神童謂諸來生欲學道者志遠人世隔諸塵濁願棲福地入諸名山尋求眞經採服靈芝千年萬𡻕不爲凶害之所侵損地多善神土氣調良水藥宜人崑崙四方元過東南王屋山南玉洞上應諸天日月星辰亦如上界無有異也地道十通千徑萬路眞仙攸往亦有宫室天經備足不減上界洞天之中多有神人時出登山眄諸後學地多黃精白朮上中下芝甘泉玉液飮之不衰常有神香自薰鐘磬𢘆鳴天樂在虛神唱天經能棲此山眞道易成次有五臺之山山下有洞傍通王屋山上山下亦有靈仙今古與人常常不絶次有常山山下有洞交通十方亦有神藥次有太白終南山次有五嶽方壺伏龍天台丹霍曾城羅浮洞天江源大面武陵福鄕地多五金朱砂雄黃丹水金精玉髓神芝茹服不衰兼得還年研誦天文悔罪謝愆香烟上騰以陳子心功高行成勳徹皇天大道慜之迎以焱輪身升太虛受號聖人神童又言邊邦諸山地多毒厲寒熱不調地氣損人又多精魅後學之人未堪患難眞氣未布穢濁未消旣無良師又無眞經苦欲有心去山遙遠若諸女人及衰弱者無師可怙未能遠去如此之人篤志不移亦可選覓平地重牆複壁不交人事依禁受行萬無一犯於曲室中燒香願念一日一夜六時行道陳心所願隨意而言要在悔過上爲九祖下及一身所犯愆咎祈請天曹原赦四司五帝恩蕩愆尤微氣低聲每令殫盡初取香火及正陳啓勿得顧盼以及雜想心念不眞邪氣來應輕觸至聖陳啓不聞徒勞苦辛空無所獲驚動流俗嗊嗃自欺正道不行坐待灰滅臨絶之際謂道無靈嗚呼行尸不能正信沉淪生死心不厭惡不樂一生而得解脫五逆十惡掩其耳目虫蛆三毒入其藏府或遇眞經心終不信聞人得道便謂凡身不合成聖要更灰滅魂神得道此名邪見修習外舍淺近之法上學之士若見此人勿與同行及共居住應當遠離染污良善窺窬誹謗或爲調戲眞道所疾深宜愼之勿與交集上學之士銷聲林壑絶跡幽山結宇依巖永離人世澡練形神研味至法採服良藥衣糧窮盡不假外求披草服氣支持性命如此之人非鄙衣食增惡飽暖志遠惡人不與交好恐其能壞善根故深避患入諸名山至論大道無所不在人間多難不得專心𡻕月易流身命難保無常忽至求悔如何眞童又言昔崑崙東南葱山之陽時有二人同志聞有生道而欲學之口常言語向他陳說積經六年此人村中先事邪神神知其故𢘆伺其衰後於夜中厭殺二人遂失生道上天以其有心下勅四司攝其魂神受生人間不經地獄速得人道二人改氏生於姬門一名弘道一名弘德於今七百生中未遇眞師流浪人間忘失宿心永無所冀子欲有心學生道者當愼口言莫令流俗之所知聞惡人讒嫉神邪所害道言人初學道感通之始多有諸天上聖下臨其所教授學人上天威神隨從聖人下遊凡間當此之時下士鬼神受事給使又亦防衞學道之人及其家門神精辛苦不得自在常不欲得世人學道恐其承事不得自在爾時有武當山中學道之人名曰祝元與其同志一十三人積棲武當三百六十二載而採服松栢形容不衰後入陸渾時遊太室採石蜜芝术服之不得眞經但遵藥餌耳目精明行及奔馬七千餘𡻕棲隱山林時入洞天謁諸後聖志心不暫替後遇王母賜其玄霜玉丹一時沖天於今治在泰淸天中雲宫天尊慜其堅固卽命左眞侍童授其雲書二字與今服之位爲上眞世人愚癡學未經旬心已懈退欲以行尸窺窬上道不亦難乎此一十三人者志雖不退在世之日及以隱山心不願念亦不尋求明師請授眞要直以遠離人世不交塵濁授服良藥塡補其身不犯穢惡無別修守所以不能卽身得成眞道若使此人尋求明師請授眞要道成益速不俟多年道言學道之人感得明師修守眞要或其前世善功未足法應滅度或承先福慶眞帝慜之學道不日而得成眞往昔水刧之間崑崙之西有一戎人名弗多梨姓頗尸迦常以晨夕遙禮崑崙自弘誓願願得長生度世如此積得四十餘年奄遇女眞王琴心從泰淸天上下遊崑崙停留閬苑九萬大刧常慜此人而作是言下界西南地氣穢濁人唯殺害戎狄凶險不聞至教獨有此人欲聞大道爾時女眞作如是言白諸眞官眞官答言狂戎之徒非肉不食非血不飲羊毛皮衣内外腥臭無上大道非其所聞若有心者待其滅度轉其魂神生於中國度其後身與得成道女眞又言
