front:
  text: 如是良久諸魔蘇息形神變易精爽淸和心識湻朴具大慈悲位登道分逆照未來九萬刧事此皆神符之力使之然也侍從天尊禮謝受生之恩踊躍歡喜於是天尊錫諸魔等五億萬眾入靈人之任令其進无上道法
  hash: sha256:df45913383ba7b77a0e4362ecebada4398f7cdbc0fc51678d432f247f37d6f00
