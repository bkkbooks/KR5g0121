front:
  text: 與諸上眞一時入於冥寂大定天宫閴然唯有香官使者騰烟不絶足經一刧一刧之後天尊又出冥寂大定入於動惠須臾之頃神霧四雰温氣八衝微風颺烟甘露柔塵爾時天尊出於動惠遂入生惠倐歘之間萬象空生雲霧上騰雷吟電轉神草含英鳳嘯瓊林蓋動霞生天尊告諸眞人曰動生之法以應金闕後聖降世之期非久欲至十方大聖同爲告瑞非獨我也爾時天尊說此語已是諸眾聖一時默坐凝然不動金爐香花鬱鬱常然下降之時千變萬化當此之日希有神力盡應見世
  hash: sha256:f15148f9c9d8bd8c6c6f5a172c08af95222fac6a96d862f8a6238f46c491d80a
