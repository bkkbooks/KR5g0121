seq: 10
front:
  text: 議道言學道之士功德廣大大道慈悲故飛其宅及其家人所有畜業盡得長存免離死厄非是上天之上而無金闕玉房直以方便示見凡夫威神之力欲令一切凡夫遠離邪道超出朽爛老死之法超出惡世無常境界煩惱窟宅獲得長樂不變易法善男子善女人心信之後刧刧之中應有世賢學無上道合其舍宅一時昇虛善男女等應當念此希有之事迴心信向知一切凡夫皆可成道學失眞要不能成道修習得眞未有一人不成聖也無上大道驗之卽在何用殷勤而教誡也
  hash: sha256:528e03b8b296a41bb41f80d7fc5dd86af867ce47f1768d8f6f9152b2088c1c3e
body:
  text: 爾時玄臺玉宫中和眞人爲諸後學以七月七日大會崑崙玉輪之阿停留三月以十月七日大會崑崙金壇之上辰星之精夕炳神燭耀靈陽景分暉停照又經三月以正月七日上玄首元靑天之氣流入萬象羣有化生之初中和流變之始中和眞人動用三元三會之初良辰吉日以朝上帝爾時中和眞人法眾眞位三萬六千上眞俱乘正一中和法輪眞精靈轄雲龍導途螣蛇俠儀三界大魔飛空從車四部靈仙以擁飛葢香官颺烟燔之反魂龍吟鳳歌和以天鈞神風微吹周流和雅香花幡葢飄飄上昇是諸法眾神足蹈虛不勞運動譬如浮雲霏霏輕妙須臾之頃上登玉淸大慈天尊法門之前爾時上界諸眞晨朝之時朝謁天尊又往玉淸右雲宫中朝慶大悲眞帝時遷於已十方上仙之眾集朝上帝大慈天尊時遷於中次有下仙天官上司簡度仙籙時遷於子次有水火下司注記生死之簿天尊爲諸眾生亦以三元之月月十五日三司進朝後學朝慶但用三元之月月初七日晨夕願念悔過求願大慈大悲二尊眞帝是天地之祖宗萬化之元根也一切後學聖人無不祖於慈悲之道朝禮思念先當行慈以是義故十方世界天上地下凡聖所云大慈大悲正言二帝慈悲之道下世眾生但用其末希識其根三司之官四時八節不朝二尊則失慈悲之道不能含養萬物是故天覆地載一切萬物而不有辭上則三尊慈悲之道二尊之號施於下界凡俗之夫所言慈親象於此也一切眾生得慈悲之道故能子育羣生雖不普得大道一心不如大道而能子育一切動植一切含氣若無慈悲則不自養安能養萬物是故上學之士先具慈悲則修學易成言必聞上凡夫有心可於密室修學上道道亦感之是以四部下仙道心不退吾見其志方便示導爲昇玉淸朝謁眞帝我諸眞眾當所神交𢘆與二尊以爲親侍雖隔三萬六千天地亦猶凡夫同一室住不以爲遠何以故十方塵界同一道體以是義故十方世界未有一物一法能離道體一切有生皆是二尊之道氣也故我爲諸下仙昇於上界朝慶二尊作禮問訊而請仙印教悟後學爾時中和眞人與諸侍從稽首雲門拜伏良久焚香心念未兆所言復良久間如是良久計於下界已經九萬大刧仰觀雲宫之中虛白淸曠寥亮皎潔唯有九色慶雲垂布圍遶光彩交暉無以爲喻虛中眞氣結成天經遍於道境文字分明諦觀易曉輕誦之者無由解悟是諸眞仙心念大慈天尊欲陳心願而作是言願爲後學之人斷諸疑結欲請天尊金口法印作是言已默住良久忽見大慈天尊雲龍座前百寶香爐烟氣自浮猶如神嶽蒸發大雲停勃蓊蔚遍流他境天花飛空雲龍舞虛甘露微潤風塵不動鸞和鳳吟音響相和合成靈章吟咏天經動經億刧而不休息聽者忘倦遺其雜想正心憶念皆得䝉益如是良久奄見天尊凝神出虛光氣法身遍滿空有眞氣遐布無所不在不獨上界而有天尊十方世界所在皆有森羅萬象無非法身爾時執葢直事四部靈仙八萬四千人不在眾數見大慈天尊道力奇特一時驚歎皆言未曾有也是時中和眞人與諸上仙先果六通默而無言並以神交沙界無所滯礙但以方便欲令下仙見聞上道昇入上界朝謁天尊爲諸後學而請法印不自爲師法應上聞大慈眞帝爾時中和眞人爲諸後學上啓天尊而作是言下界塵臭煩惱多途沐浴玄恩積經刧數常䝉法手擕引愚迷流浪之徒未能盡善五情内爭六賊外馳後學之夫多懷異見不行大道迷墮邪津順入苦流生老病死爲此因緣不忍聞見天尊答言善哉善哉善男子下世凡夫後學道淺何由能超生死苦流生老病死世間常事逆苦流者唯有道者能之諸俗法中雖有逆言而無逆體雖有逆理而無逆事理通事壅非道所尙有言無體又非所尙理事俱通言體雙達我道能之淺俗浮僞因緣穢賤下土所尙如此之事不足致問爾時眞人頓首受命於是八萬四千直使執葢小仙四部靈人未聞至道不辯深義誠在質疑爾時眾中有一小仙名曰寶相前進作禮上啓天尊而作是言臣等末學道淺不曉深義常聞下士凡庸書記傳說亦言我法能度生老病死出生死流身得六通智能無礙復見此人與凡不異生而老病終不免死不審此說虛實云何唯願天尊慈悲高鑒哀所不悟言畢叩頭伏聽哀旨爾時大慈天尊愍諸小仙以大慈故而語之言善男子汝等得道位階四部始入道流未免生死以汝等眾得承宿慶遇會天眞延續性命若不爾者久以灰沉子所言者世俗經書之所傳說亦言我法能度生老病死出生死流復見其身隨世生滅此是入理之人作如此說事體不通但明空義辯能無礙非能理身而得無礙方寸之心與凡有異生老病死不能異俗世間苦惱生死流轉入理之人身無道力不能逆之獨有大道而能超之無上道法能度生老病死逆諸苦流善男子用我法者理於生人能得長存轉凡成聖復歸於無䐇合光氣出有入無無所妨礙善男子善用我法理於衰老其形反嬰歸於長生此名度老用我道法度於癡人及病苦者令其不病所苦得差此名度諸病人令其不病用我道法度諸死魂及諸罪魂令得離苦欲受生者令其如意不願生者令其無生此名度死善男子世法苦流以貪欲爲本大道法中有除尸制魄修學此道卽無欲想又苦流者以恩愛煩惱衣食爲累而我大道有八寶天衣自然之服隨其大小及與長短大道法中有太和生氣陰生靈符神水玉液以充飢渴卻除老死煩惱疾病與世服用危固不同比名大道正法逆煩惱苦永斷生死諸浮俗法言能度生老病死逆世苦流譬如有人身嬰百病又復貧苦所求不得卽出僞言誑惑下凡自言我是天人大師善療眾病辨諸方藥及以鍼灸愚人聞之齎持競往依止愚師受其方法所疾不愈而久彌癡一切貧病與師相似賢人觀之心知其謬捨置而去於是賢人擇師承受旣遇明師實能愈疾門徒慈善憐諸貧病諸有病苦施爲療治下手之時如湯沃雪是諸愚師及其門人各同愚人承受明師之法作如是言能依我法苟得利養支持身命亦復何嫌二部之人明昧相反爾時愚師門徒子弟妒𡜍明師日夜譏謗爾時明師晨夕進道行大慈悲不與彼諍善男子世俗之法譬彼愚夫所習邪道明師之法喻我大道眞實之教能度老死逆諸煩惱順入道流天尊又言世俗之法不得六通智能無礙此亦僞言不可依信何以故世俗之法人能修之而得六通與道相似等無優劣者卽應能逆老死之流今旣老病終於絶滅卽名無智定無六通定無道力善男子以我法印印諸邪僞自當得知不修法印得知邪僞無有是處善男子世間有人直修空義無所爲作自證其身與道無異如此之人止得高心嗊嗃之罪千生萬生終不得道何以故此人高心不願見道永與道隔長墮生死順入苦流道言若復有人求無上惠不見有生自言我本無生今有此身譬於夢幻而願滅度以求不生善男子如此之人身染邪魅妄出狂言無所忌憚何以故欲求無生應修上道微妙之法以道法力逆於老死不順俗流然後昇入無形不生不滅非以滅生而能無生善男子無道之人不能留形以是驗之明無道力旣無道力不能不生後學之子持吾法印印諸僞道其法自靈不假得其所修之法而得知之善男子若復有人學無生智而作是言我學無生不能留得卽身而成妙道見身昇度但滅此身復歸於無自無有生若有眾生作如此說此名邪說非正說也何以故道非滅法滅身求道道存身滅修吾法印存生求道道存身存然後乃能虛身合道非爲滅生能合道也爾時天尊又告仙人曰道雖存而能虛身雖有而能無能虛能無乃名爲道善男子能存不能亡者非爲道也能亡不能存者亦非道也無上大道能存能亡得道之人亦復如是是諸外道能亡而不能存善男子汝今當知順向死易逆不死難善男子汝今當知順死之物名得道者一切死尸亦名得道若一切死尸不名得道明知外道滅形非得道也此諸外道名爲入死之道非爲昇入無形長存之道善男子昇入無形謂修吾道印轉凡成聖鍊質入微不可毁壞猶如虛空而不變易善男子若有眾生任身生滅不能生堅固四大離散形骸糞壤欲望魂神證無上道猶如愚人披空尋跡終不可得以吾法印印此愚人去道甚遠善男子若我法中師徒子弟以因緣之道而化眾生所謂建立淸堂香燈供養方便惠利諸不達者仁及蠢動不害物命設齋請福悔諸過咎不應割其珍玩穀帛損敗眾生以活已身不應忘義捨大慈悲如此之人非我弟子是邪徒黨不損眾生不捨大悲眞道弟子若我弟子以因緣之道化諸下根迷滯眾生著人我者躭嗜臭穢及以酒色蓄積無厭爲說無常身命危脆四大難保況諸外財方便教招不損財命如此之人眞我弟子若我法中門徒師弟教他施財及以玩好奴婢畜生屋宅田地私及已費不營功德此名道賊不斷癡貪不足化人教從後學下世凡夫若見此賊愼莫親近道言下世愚人竊吾道要而衒賣之以求財帛及親酒色如是過失亦名道賊非我弟子是謂外道邪神之黨同諸陰賊共作儔侣大道之士持吾法印若見此人應須遠避勿同鄕里及以交言道言是諸邪師門徒子弟爲貪利故勸化凡夫修因之道令其布施取其穀布入已私費自說其身名世大師能爲眾生長福生善能施我者獲福無量後世之人學眞之士修吾法印印此愚夫名爲邪賊諸布施者莫施此人忤其後生墮三惡道諸惠施者成此之善莫成彼惡以是因緣不當惠施學道之士執吾法印愼莫如彼邪俗之法道言往昔刧中有一邪師字曰求名身嬾衣食詐稱得道隱於寒林常自唱言我已證道善知法相視地而行入村教化積經三年林外人民競往惠施財食盈溢因以此財私給妻子及市魚肉屏處噉之詐言齋食前後八年天司殺之謫其魂魄八百年中墮溷坑地獄已後出生寒林之下受形羊胎一𡻕三生備償施主足五百生後受牛胎備償人力使復五百生今爲僕隸猶未解脫雖生長夀百𡻕不死筋力又羸驅䇿不逮常爲世人之所惡賤八年欺詐自稱得道窮刧受辜況人終身常行嗊嗃自稱人師惡求名利損害一切眾生財命億刧受罪猶未解脫望入無生安得有冀後世男女執吾寶印愼莫欺詐受人惠施爾時諸仙雖奉天尊金口法印心尙朦朧未能辯了合眾作禮重啓天尊向蒙慈尊金口法印云用我法者能度生老病死不審慈尊以何妙法濟度眾生而得不生不老不病不死以䝉垂愍願見生老病死之苦與世邪俗不能有異唯願慈尊重爲分別言畢叩頭悲哽流淚伏地不起希降玄恩爾時大慈天尊告靈人曰善男子此道至妙其法極神教諸成眞不授俗流諸下仙輩汝等見我去眞不遠愍子有心故我不秘汝當諦聽吾爲汝說須臾之頃大慈天尊卽命左右侍者三十九眞齊鼓太虛大慈宫中自然生根復虛理魂妙唱和合三十九章金鳳之歌以調三十九氣吟其篇目一時之頃其時琳碧抽條瓊枝吐葩調畢成實萬化歸根三十九眞變爲虛光金鳳易形以成妙氣光氣交映猶如春藂須臾之頃變成仙雲入於宫中凝歛梁棟冥然不動大慈宫中生根復虛理魂妙唱其詞曰慈宫洞眞暉昭晰掩朝陽六合開門戸太空明牖窗雲悵羅輕葢九氣變飛龍一舉神足遊飄然無有蹤道名大慈尊神力無等雙天經列眾象吟嘯和心胸爾時天尊眉毫神彩光踰初日洞暉道境幽冥開曉十方世界皆於光中朗然而見爾時寶相及諸來眾覩此眞光心眼明了盡見十方世界一切色像皎然無礙須臾之頃大慈天尊遍滿光中處處設法一切色像亦皆能言助說天經善聽之者成賢成聖用吾妙道超離苦流服吾妙氣立便無待死魂得之則能受生生人得之則能無病老人得之則能反嬰病人得之登卽痊除道人得之歸根復源俗人得之所願通達愚人得之永離盲道上天得之三景貞明大地得之永不崩淪萬物得之能終其生喑啞得之而卽能言跛癃得之立便飛行天尊告諸靈人曰吾此法印是諸後學存生全形無生之道一切眾生失吾此道悉皆殘形滅生順流入死旣無道力不能無生不能無死後世男女學眞之士持吾法印深思此道是諸後學之根本也若有眾生離吾大道微妙之法能得全形無生之道終無是處失吾生道如鳥失翼亦猶濟人亡其舩筏遙想彼岸無由得度一切萬物亡吾道氣終不得生一切眾生言離大道而能得道猶如草木遠離地水定不虛生一切眾生遠離吾道定不得道善男子事可類推昭然易見物不類用愚人不知可類用者人亦不知浮俗之夫雖知類用與不類用用亦不能至當用之得當卽能全生用不得當自用殘形得失相反生死相背昇沉邪正生死之際茫然莫辨眞性一遠則生二見能復歸者萬無一人以是因緣得道者少失道者多眞正者少邪行者多大慈天尊曰汝諸眾等但誦大慈宫中至眞妙唱採服靈驗卽能善出生死之流卽能救脫生老病死之苦天尊又言此微詞非是虛言要在服用言行俱行靈驗在卽誦言無數可不觸老死行而不言可以絶塵子能絶塵與道爲隣與道爲隣物不能怨物不能怨是名歸根無形可繼全生入無謂之無生善男子形不全者不能無生生不全者名爲入死夫入死者名無道力若無道力不能無生生而入死不如草木及以虫蟻朝生暮死人出一生自言學道唯學空行嗊嗃之法不免生死何以故空行之法上聖能之在學凡夫觸事有礙不理生具不攝形神生不能固形神流散空生空死不能得道後學聖人初在學地攝生理具晨夕不懈得道之後卽能空虛非謂在學而行空法善男子下世流俗邪僞之黨傍聞大道微妙法中存形存生能入無生邪俗之夫便謂殺身之後精靈罪鬼而能無生此等邪俗行空之法自謂其心能行無礙力能反覆天地迴易陰陽和合水火不見天地萬物生死妨礙作此見者名爲得道欺誑世俗要求聲利不敬父母或言無生妄想而有有死之時自言無死況有煩惱飢寒疾病如是諸見皆是妄想邪俗之夫作此見時名爲得道若我法中初學之人作如此見名無忌諱反逆大道道不玄祐身無道力暗生暗死一切事數皆不能免況能證道冥司之官猶注黑簿以其嗊嗃自誑誑他如此之夫悮無數人永失生道如此之夫空有大言不行大道亦猶疾人言善治病亦猶跛人賣能行藥乍而聽之一往如實智者觀察卽知其謬爾時寶相合眾再拜叩頭而作是言向䝉慈尊言道妙氣服者無待願請其方以輔形命終身奉行不敢輕泄天尊告曰無上至法授與能行子旣有心吾道不秘汝當諦聽至神之道無能先之寶相合眾伏地諦心領受天尊告曰道氣之妙其法至神天地萬象元氣所生未有一物不由元氣而得自在昇沉飛走乘氣而遊得氣則存失氣則亡存者不可得死亡者不可得生氣有淸濁事有否泰服淸氣者活人御濁氣者殺人淸氣上浮濁氣下沉淸氣爲天濁氣爲地眞精妙氣謂淸氣也凝黷穢滯謂濁氣也死道昏濁如濁水也生道澄徹如淸水也人猶魚也氣猶水也水濁則魚瘦氣昏則人疾善男子下世眾生志多勃逆煩惱奔躁求諸可欲情性喜怒狼悷憤烈皆死氣也仁慈孝順安庠徐審和悅中雅皆生氣也忘身冥道不覺眾累萬化不過目千響不經耳所動如無所止如虛𢘆存淸氣流入雙闕散適經緯遍體雲行天闕微呼出一半氣心念半氣循環雙闕令不馳散朝餐紫華夕味黃蘗如此之法是服日晨氣用我晨氣保見太平取飽爲度無正限也於是經緯流通百關調柔色美髮黑氣力倍常存身全生莫先此道此道是後聖之戸牖學眞之樞機是一切萬有之生根也流布凝結成天成地成日成月成星成辰風氣雲雨霜雪山川土石草木水火賢愚凡聖人及非人皆是一氣變動乘諸得生如吾道者爲賢人用吾道者爲聖人不用此道者名爲行尸形骸流散魂神罪鬼沉沒九泉矣爾時天尊說此法已金口應時流出三萬六千眞光妙氣眾籟齊吟天樂流遍有情無情悉皆自鼓是諸下仙得眞道氣同謝受生歡喜悅豫不可思議奉行妙道皆得全身入無生道成道已後固修不廢道言諸學道之子得道力者凡夫不知但觀其形雖不肥腯色正力强身體輕妙皮容潤澤聽察不掩行步輕便晨夕不睡身無疵癘形貌鮮潔聲響淸潤如此之人名得道力進修不退定得免脫生老病死善男子持吾法印印此上士立驗在卽不待得之然後始知大慈天尊重告仙人曰汝欲知僞道之夫道觀其形世若有人自言得道深明道義或言我今日夜修道身心不迨或得三十四十年間邪正可辯得失易知善男子汝知邪道之夫第一血食第二躭婬第三惡疾氣腫瘡疣疥癩疸瘻習邪失性水腹癥瘕顔色焦乾耳鼻枯燥處處疼痛氣喘液竭無有津潤貪睡履污不忘生死形容垢𧸐體氣臭處所向便利好講惡事馳競奔躁積聚無厭肉大骨小瞻視淺近性無仁慈心不孝順此等色人定不得道此名有漏之身亦名敗壞之身假有道氣不能自度况能度他猶不自活何能活人善男子僞道之夫作法之時男女交雜關閉門戸施惠財食還與外道不忍普惠此名有漏作法有漏惠施非是正法非是法施無上大道仁及大地布散元氣長養萬物顯仁藏用不恃其功不見所施不見所受況覓其報外道之法不斷癡貪此名有漏定不得道若我弟子作此惠施同彼妖邪我弟子後學之士持吾法印若見此人勿與同行非法居住應須擯挫以法教語如不從者自天罪之不得奪命及以鎚打犯刑殺罪天科不赦天尊曰後學之子修吾大道初在學地未證果前慈悲忍辱恩流蠢動孝及一切單衣菲食蔬素芳潔燒香禮願晨夕慇懃精密其行𢘆愼凶惡不馳不競宴處虛寂吟詠寶經微聲平氣身心調柔忌諸雜想專心念道如有所待餐服妙氣吐故納新茹諸靈芝神符聖水幽身避世不交人事如此修學未踰一年神靈給使眾毒不害舊疾銷除顔貌反嬰氣力丁壯自求多福身心無厭我印此人克成眞道大慈天尊又告寶相曰下世愚夫不修大道無上至法而作是言應滅此身冀得淸虛會眞宗者喻如下世崑崙山陽往昔之時有一戎夫名曰憂波斯那立性凶頑多畜妻子其第三妻貌甚鄙累生十子戎夫自計心陋此妻妻又懷娠於是戎夫但念其子不暇待産酖殺其母母旣命終刳腹出子子猶未成始凝胚混隨母爛壞不可捉持戎夫自惡後方悔恨而作是言我妻身體不能如騾懷姙之時刳腹取子傍觀之者而告之言長者當知騾懷姙時候其日滿知母欲産刳腹出子乃全子命如長者妻異於騾身況復懷孕始經三月假使月滿亦不殺母刳腹取子何如養母而育其子子得長成母自老死何用殺之而欲此兒紹隆家業猶翳樹根望果成實終不可得善男子邪俗行尸亦復如是不修至理求欲滅身而望罪魂得會眞宗如彼戎夫殺妻取子亦何執滯哀哉流俗浮僞若此安可與其聞大道乎執吾法印不應如彼善男子修因之道尙須誓願願得見在未來見道聞法況求卽身而覓解脫善男子汝學大道存形存生無生之道喻如舟車堅固輕利縫緻綿密陸行堪載濟能勝溺保達所在永不勞慮豈不樂哉善男子世有愚人聞他得度傍而學之身無智力性又疎懶不能鑿車任他破壞所乘舟車運危濟溺未至中道傾覆敗亡摧折淪沒不可思議善男子等汝今當知敗車破船不能自勝何能度人邪俗之法亦復如是不能自濟何能濟他下界凡夫憑向外道邪俗之法拔濟存亡亦猶愚夫運敗舟車摧沒之禍立便可待善男子世若有人乘破船筏得濟渡者外道之法應得無生若以破船不得濟者外道之法不能無生善男子後世男女欲學道者採用天經吟詠寶文此文在天爲經在地爲緯南北爲經東西爲緯在中爲神在物爲氣在人爲靈故曰天經地緯織成凡聖一切萬物有形無形無非大道眞氣織成也諸仙人曰敢問慈尊織成之方天尊答曰天無言而有信故可䡄之成仁三景不言而明故可則之成身地不言而有義故可範之養物道無言而有靈故能生天地天地萬象亦經緯也織凡成聖仙人曰敢問天地萬象非道之體云何織凡成聖答曰道生元氣元氣生太極太極生天地天地生萬物是故天地萬象皆道之子孫也何爲不能織凡成聖大道經緯羅列天地所布日月星辰風雲雨露金玉土石草木雜類皆可採用以輔學人甚疾成聖旣得聖道能制御天地及以萬物爾時有一下仙名曰證明聞天尊所說迷惑不悟重敢致問而作是言不審慈尊金口法印所云學道之士採用日月星辰風雲雨露金玉土石草木雜類以輔學人甚疾成聖旣得成聖還能制御天地及以萬物弟子䝉昧不明妙理祇言用天之道德劣於天惟願慈尊賜垂分別天尊答曰學道之士用天之道及以萬象甚疾成聖者無上大道眞精妙氣隱在天地及以萬物善用天道及以萬物大道感之譬如孝子供養父母心無拒逆四時温淸瞻視顔色設復遠行心中憂念存憶父母如對目前寤寐之間精神不離自天祐之鬼神護之孝至二親尙能感天孝至於天理應感道爾時證明并諸後學聞天尊所說心開意解信知天地萬物皆於學人深有利益明知天地萬物無非是道歎凡夫之徒不能用之如我未悟亦復如是合眾禮謝天尊受生之恩爾時大慈天尊又語仙人曰天地之德德具於道其中萬物德不盡備但取一用和合利益功德道同知用天地及以萬物以輔身者無煩三淸秘文三洞眞法三洞秘文道高法妙難可叨佩及以見聞學道之士求眞不懈功滿行成我道自來度於子也是諸仙人深明道義洞曉存形無生之道進仙三階登不死地盡能昇入無形始驗無生非滅生也燈明至道中和眞人爲諸仙人請法印已一時辭別天尊七日七夜徘徊雲間天尊又曰得道之子遐觀洞聽身心自在微妙快樂解脫無礙我今與子雖隔三萬六千天地猶如指掌近在目前有何可別不如下界塵俗行尸對面胡越汝歸下界勸化眾生令遠邪道漸頓之法量物所宜是時仙人稽首再拜奉行法印昇入無形大慈天尊分形諸仙流布道化爾時諸仙歸下界已止住空中去地萬仞坐於慶雲之上是時天柱四方大地震動龍神歡喜天地朗然烟收霧卷三景倍明香風遐暢甘露滂流地湧乳泉川澤平濟祥麟瑞鳳紛紜雜集神芝嘉卉連廕接野是諸天王咸謂國慶皆稱萬𡻕大赦天下出庫穀帛矜恤老病普天作樂頒賜爵祿天子諸王羣公卿士不可勝記登壇朝禮大謝恩造巨施珍寶立靜供養普天奉道妖邪絶蹤萬國太平普天齊濟人民豐樂謡歌諷頌九萬年中天無雜色獨有紫雲潤不別流唯洒甘露下界小仙覩道慈力知是大慈天尊威神之力是時仙人各陳心願遙禮太空之中爾時大慈天尊與諸上眞及諸上仙各各授手遍滿下界爲說妙法授諸下仙上道一階各令下仙進修至法入於全形無生之道大度眾生入眞妙法登不退果不可計數胡夷蠻獠及諸鬼神地獄罪魂等眾悉沾玄化皆得利益從此已後人漸澆競多事凶害大道不行妖魅萌生雖不受度道猶授手施大慈法後世男女旣無正心試行吾道道亦與之不責於人亦有因與漸進亦有中道而退吾見其退亦不執之道雖無心常慈養物大道如水止渴除穢道猶良藥勤而服用定能愈疾有病不服稀能自愈後世男女勤修吾道定免死厄全身保生能入無形與道爲儔背吾道者不除死籍不免死厄形如灰土魂識漂浪隨業受報生無道力死望道生終不可得從今已後陰氣漸盛人不畏死修學外法不得大道如此之夫多被妖邪執其魂魄身遭疾病無方療治命滅之後隨邪群黨定不得道雖有小善無由報應由其失正不順行道邪鬼侵之如此之人雖言萬物皆空我身亦空物境旣空何有能侵我身亦空有何所受妄想言受畢竟空寂都未曾有愚人偏見作此觀時邪精魅物競來侵害無所畏忌亦有生身遭魅隨逐邪神一絶而去此名全身人邪不須待死取其魂魄若有女人生身懷邪顔色萎黃處處疼痛常吐涎沫或復洪腫水土惡氣百節酸痛風疰入心恍惚迷忘救氣不暇安覓道乎痛傷流俗自取滅亡身各有道不知用之與道爲隣不肯析之徒近玄流無心洒垢神醫在側不知愈疾甘心受苦攖抱楚痛如此之夫去道不遠邪惑其心障覆其目順流而去不能逆來大慈天尊爲一切眾生演說法印流通供養精至之士寶而行之邪俗之夫誹謗四起善男子汝今當知信敬我道亦不益我誹謗我道亦不損我善男子邪俗之夫如獵犬食無有定主譬如東家修善長齋持戒不殺西家十惡專事屠販漁獵殺害家豐薰臭所食之餘棄之域内東家犬子承臭而往食其殘餘遂至忘返於是西家先復無犬大小見之歡喜餘食倍與薰臭爾時犬主性器弘大亦不呼歸𡻕月經久犬遂長大不識前主主忽出遊暫過西隣犬便驚吠前主慈悲亦不致怪卻後數日十惡之家忽被天殃合家滅命先人收養臭爛之餘亦以窮盡犬旣飢餓終日號鳴舊主聞之合家議言犬子少小愛往彼家所食臭爛穢性以成卒不能改設呼暫還終歸不活須臾之頃犬便餓死主又歎言犬子向在我家常得聞法縱不悟解亦潤其神冀犬後身得生人道無故往彼十惡之家飮血吞膏食噉臭爛今忽餓死無一善緣此犬必定不生人道善男子我喻惡人邪俗嫉妬忘失根本誹謗大道與道無異爲逐臭爛故不識前主學道之事含垢懷辱忍受誹謗彌加精進求無上道復應卻照邪俗之夫不離生老病死之苦不能超出纒累泥滓淪沒邪道癡貪三毒以成其身十惡五逆是其徒黨財色窟宅是其居處惡口惡舌是其歌頌誹謗姤𡜍是其心行邪俗之夫不見眞經不聞眞說無以止惡禍患如此後學之士應離此人不須訓對與其諍論自求昇度晨夕不懈邪俗之夫法有興廢身有老死未死之前巳被災害是其邪法不驗之徵學正道者身無疵癘是其元吉全生之徵應自慶幸深避患害執吾法印勿受邪言善男子刧初之時有建木鄕人入於山南衒賣眞珠時有山東商人姓頗羅墮名曰滿願出庫百金買得一珠圓明曜掌大徑一寸囊肘自隨不令他見數旬之間忽有山南一人名曰雷詰僞賣魚目滿願西隣夀量之家亦出百金買得魚目亦以懷藏不令他見卻後六年二家惡疾祈得明師來療此病和合藥分須好眞珠爾時二人各出眞珠以閱明師師遙見之懸知後人買得魚目師卽語言此非眞珠夀量狐疑恐師行誑請師水之浸經一宿合器腥臭眞珠入水彌益光明九日出之引長六寸滿願服之所苦立愈後又市珠請師教浸水服之丁壯於今已夀九萬餘𡻕上皇玉簡題不死名一切善神遞爲給使此人又復得吾眞氣之道亦能御氣而遊無復死厄西隣合家因此惡疾以至滅絶唯有一奴名曰勤子少小有心常仰天歎願得大道救其所苦我命上仙大通教其餐松并服松子於今不衰入於太白時遊天山上登崑崙吾以授其晨氣之方必定免死而得眞道善男子眞僞之道生死相背不可倫疋執吾法印能辯邪正修學之士望濟一身傍度幽顯不可造次以規聲利忘其大成至眞法中斡用之士道迴天地德拒四時不爲晝夜攺易乾坤崩淪道能成之天地毁缺道能補之生氣不足道能足之萬物不養道能育之天下不化道能化之一切凶惡道能變之一切爲善道能福之愚暗之者道與其光孤遊恐畏道來友之飢寒病惱道爲除之履涉危難道來安之白刄臨項道能救之善男子汝欲學生莫於無上大道至眞法中生不正行諸所施爲盡皆中正大道玄祐不畏邪道無正根力無的依憑譬如迷人進退失路不知要道始年昏惑所習不定或言忘心不見有身心旣無生乃可得忘卽心有累云何忘之始欲此身復歸四大身雖暫忘四大猶在假使體空不能無觀一物一觀已成二事前境未忘後觀續生一切因緣以四大而起身由四大和合而生絶滅之時還歸四大外道之夫猶如草木因四大生因四大滅不能不生不能不滅欲其卽生亦不能得欲其不生亦不能得外道亦爾於生死中不能自在爲物所負隨境生滅善男子得道之士能忘身心不見所能不見所忘境智體空觀無所起我所受形從道得生今忘此形復歸於道不爲四大之所攝持不爲四時之所生滅不爲累患之所繫縛所謂無上大道能存能亡亡能無形存能長生寂寥幽奥恍惚希微不可以智知不可以心識應物有周動用無極善男子無上大道慈悲之力不可思議後世男女持吾法印深心思念當正憶持爾時天尊說此經已五百外道柯葉惟等悉捨邪法肉袒求哀從道出家欲求濟度悔過自責遍體血流拔除鬢髮如鳥鎩翮踊身自撲猶如山崩爾時天尊卽命中和眞人開度外道授其往生因緣之道敬觀無常戒莫戕害斷其癡貪不令蓄積中和眞人曰汝諸外道從今日後愼莫自高詐稱汝是天人大師損他財命天司黑簿注汝罪名九祖受考身爲逆鬼汝今生存單衣菲食以支身命忍辱精進求早化滅後生中國見道聞法卽身穢滯不堪全形入無生道是時五百外道歡喜禮謝中和眞人辭別天尊各還其居建立精舍晨夕行道觀身無常求早滅度四天之下人及非人咸悉歸依正眞之道是時天尊與諸聖眾眞應之身遍於法界於是靈仙之眾八萬四千執持法印作禮奉行
