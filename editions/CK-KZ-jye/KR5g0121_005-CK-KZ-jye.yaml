body:
  text: 爾時西靈上仙與其侍從千二百人俱以虛皇三年八月二十六日晨朝之時齊駕飛龍之輿上登雲路入玉淸天中謁高眞上帝大悲天尊請受八節眞經并觀至聖威儀上道所治中天福境微妙眞化之事忙進天門步虛雲庭齊整威儀一時稽首長跪而止良久之間仰瞻上方雲宫之中見大悲眞帝神儀澄湛精彩遐邈凝凝溶溶處於天心坐於雲光之中猶如輕霄澹於玄天如浮雲之籠朝暉日上靈眸初月臨眉紺髮凝煙丹唇吐霞首巾萬變之金精身佩億轉之瓊羅手飛承天足蹈招摇恍惚希微虛寥窅冥道適長存理契無生眞通精應妙感神情不隱不彰不濁不淸如有如無如晦如明俯同有識昇入無形閑居緜邈虛演眞經窈窕神唱无聲而聲眞儀不動運化無停手廻八氣足轉七經合會有生覆載无功陰德无稱焉能强名道光无限玄源不測心居何有形游絕域泯然黯忽寥廓常冲混同先後不必居中無起無滅無始無終眞宰挾侍神人有羣瓊鐘鼓節金鑪颺氛甘露流津靈氣凝雲眞光徹照香風洞薰皓元蒼黃胚胎不分難得名言斯皆自然爾時諸仙仰瞻眞帝心無疲倦嗒喪其形都忘威德始欲无言未通玄默道數不窮誠希有尅須臾之頃重復再拜心欲有陳懼不能宣敢冒威神惟思道恩爾時眞帝愍其戰慄乃命左侍上眞呼語仙人曰子等是三天上仙幸因宿慶身入道流巳登不退猶應進修旡上祕要爲世救燔旡瞬息寕來此何緣默而不言我等大聖雖至極至尊不忘大悲動息六虛心游萬機有志必感誠無所違爾時仙人長跪而言小兆不揆竊好眞仙形弊骨葷至塵至穢特以天慈普被滋潤无疆零落反榮枯朽沾洽金符育骨玉字生尸沐玄源之浩津酌洞淸之流澤竊聞道窮則反物極有歸塵穢之徒恒復思本數千萬刧念覩高尊恐氣習未消不敢輕觸躊躇之間已經億刧不期乗機遇運肘步天庭遭遇天尊以申翹想久欲諮啟未敢陳辭仰覩眞威怳然自失五情无主口不能宣特以慈尊沉愛情深賜垂提飾借以威光令得有言敢騰力欵申此微心爾時左眞奉天尊教敕宣揚道化爲諸後學決斷眾疑而告仙人曰汝欲何願恣女所陳仙人闔眾歡喜禮謝眞人而作是言雖道在人亦非以輕生重法億刧勤苦履峰蹈險經水過火不憚艱危遂感高眞念此无知出靈文以見授眞氣布無涯之澤大道降陰生之符反已逝之危魂榮已凋之朽質上愧日新之道而下无日新之德數千萬刧環轉三天不期乗運上昇塵穢玉淸之境遠披六霧洞出八天裂三界之羅登七覺之位雖有養道微功未能泯無形之地今日有幸得入太玄旡生之生生道固矣所翹所望於此頓足直以有心欲聞八節眞要修齋立功求福謝𠎝拔悲苦願生死開泰昇入道源爾時眞人聞上仙之辭愕然而言子在三天之中何得聞八節眞要此乃是太極生神寶章之首篇也天帝所祕上眞所修傳之於口不見其文法授當來成眞之人子從何緣而得聞之爾時仙人頓首而言小兆去聖遐遼眞文隱絕特以言龍初會九眞大集朝慶太一虛无天尊爾時大聖出法度眞聞唱篇目不覩其文中心憶持未曾捨離輕陳渴仰干忤天心賜以大慈願垂愷悌眞人告曰子有眞相得聞至法是子運會應合成眞傳吾寶經當得其人違科輕泄退眞无道爾時上仙拜諾眞人奉遵教敕不敢泄慢是時眞人卽命金童燌天寶名香啟金臺寶藏開笈發藴出八節寶經一篇著碧案之上正當天尊之前是時仙人一時作禮頓首良久不敢陳辭天尊以知其意俯而愍之卽命眞人捧此寶經以授仙人受已復禮天尊眞人告曰此經是上道之寶文大悲天尊昔聚雲氣以成其文令諸眞人仰而則之此文大道眞氣化成雲篆氣布以後靈章復虛子欲寫之刻玉爲簡紫金爲字寫之了日當還付我眞人又曰汝等仙人且舍靈宫西臺摹寫眞文此舍自有天厨供給學人亦有丹臺瑶林姿汝游息是諸仙人歡喜受諾往舍西臺刻玉鏤金摹寫靈文大悲天尊八節寶經曰立春之日温氣始生雲宫開東北之門三司進朝以定善惡春分之日和氣始成雲宫開正東之門三司進朝以定善惡立夏之日暄氣始生雲宫開東南之門三司進朝以定善惡夏至之日炎氣始成雲宫開正南之門三司進朝以定善惡立秋之日淸氣始生雲宫開西南之門三司進朝以定善惡秋分之日涼氣始成雲宫開正西之門百神俱朝議定罪福生死簿錄功過進退纎塵顯露眾眞大鏤百神受事功過毫分无不上達立冬之息嚴氣始生雲宫開西北之門三司進朝以定善惡冬至之日凝氣始成雲宫開正北之門三司進朝以定善惡天尊告當來學眞之士修吾八節之道立功修行身不履非志不邪游常當齋戒以求昇度嚴其始終供贍所須丹志勤勤恒始救燔拳拳不怠動息無忘常思師道如在目前孤身幽林永絕人事六時禮願以求密契緜緜微微不興不廢功滿行成與眞俱會未至節一日行道禮願隨心所陳氣合香煙六時上聞動止合儀默坐精思三日三夜騰九祖之宿舋謝一身之極過上爲天子次及兆民奉道之門施力救功供給齋厨同爲啟陳當此之日誠无不達道无不聞懷道之士勤而行之上士長齋不獨此時恒祈昇度心无暫休形絕外游志不邪求營生得生當復何憂於是大悲天尊演琴心上經其文曰回首仰圓羅合景挹靈芒拘魂制七魄思審定中方行住禮虛无寢息宴玄房飢飡黃璧花渴飮瓊根漿神旌命大魔合體鍊眞光復照觀太无恒在空中游圓通民波際眞化靡中期窅眇无終始行者當明知寂寥忘理教應運闡弘規降道不自昭要當先所施會歸無二處隨心自合離大悲天尊曰後世合眞之人得吾此文調虛琴而行之恒立青蓋之下駕雙白虎挾二赤龍塵刧未始聖不知終一十八年尅見太平眞道之原愼勿妄宣七祖受考身不得仙億刧絕望與道无緣爾時仙人刻玉文訖送經奉還眞人并見新文以簡天尊天尊告曰上道寶經七百年中許傳三人世无其人韜之玉笈禁不妄宣是時仙人頓首禮謝小兆有幸得叨祕法特䝉慈尊弘愍之至内懷喜慶誠不自申又復頓首天尊告曰子得寶經眞道畢矣勤而行之當應自知天尊又曰子且游觀玉淸道境待秋分之後復歸下界爾時仙人奉天尊教敕歡喜禮謝次禮眞人眞人告曰子奉恩游觀此有常法我玉淸天尊有眞光之車以給仙眞游行十方乗此車者微塵世界一瞬已周是時仙人旣受教巳齊駕眞光之車如一瞬頃以至玉淸天西南方太空之中不測邊際至二十八日秋分之節晨朝之時忽見諸天眞仙億萬眾從雲宮西門而入陳列天儀施張供具遍滿玄中燒香㪚花作天妓樂歌頌讚歎朝謁天尊三日三夜三司校錄生死罪福諸得度者名編青簡天降雲車浮空上昇骨肉俱飛永爲眞仙罪過塵積注名黑簿减年奪算沉尸九幽罪魂受對萬刧無原爾時三司之官各奏其音昇降相背哀樂不同天官之司奏和雅調暢之音地官之司奏宫夷之音水官之司奏悲魂長夜之音凋風折金石之聲嚴氣動風雨之鳴此乃天地自然之音常會吉凶之際眾音雖繁而我大道天尊未曾聞之夷心在玄冺然不覺三司塵穢不關耳目每所感授默與無言暗達彼心量任其宜生成無功陰德不差適諸有生日用无知大道雖高鑑之甚卑大道凝然機中則施不去不來不踳不馳不亡不存不合不離不虛不滿動用無訾五晨敷華雙景曜芒循環紫戸寢宴金房六氣下流三元上騰不疾不遲不減不增自然而明去死納生不爲而爲不行而行眞神不動化合萬并眞神元心應化元情能卷能舒能晦能明不二不中不隨不迎不興不廢不死不生不形而形不名而名處晦而明處濁而淸不獨不羣不混不并緜漠希微不順不違往无所適來无所歸居无所止動无所依空步不移坐應萬機恍惚難尋冥寂无違輕我者眾則我者稀逐臭如塵詎反靈機朦朧愛覆動用習疑背道流亡誰當復歸險逕孤游惸惸可哀汎川無反何時逆來三塗永呤九夜長哀苦魂離㪚眾怨兢栽告汝來生道如晨暉德同下流無日不新無時不歸下攝萬川上總千機照而不煩瀋而能希無情可鑑無心可照八爻空轉虛廻七曜自然經緯生靈之要微中又微妙中又妙告汝來生行不乖常動不離无常能不傾無能深根常无不適无无不生不動而適不勞而生適无不遍生无不周遍而不廢周而不休其形如雲其氣如流流極還來雲低必浮來而能有浮而能虛告汝來生勿用其明明極則暗暗極還明常能守暗身恒太平辟却三灾銷滅五兵十惡不來六賊不行郊境无陣城邑不驚百實成熟花樹敷榮風雨調適萬物自生告汝來生去情離欲飡元服一抱道懷德招集善友驅遣陰賊以威自儀以戒自勒嗜味損已貪婬自尅所願無成所求不得殺盜資身橫行威福勿恤下賤行害施割呵天駡地奔馳惻怛五神内戰怨憎外結陽氣蓄洩陰經夭閼狹邪作道不得其末子當愼之勿得輕泄勿將死尸佩吾生文莫將毒志懷吾寶經莫將邪聲吟吾正眞莫將陰賊入吾道場莫懷婬想强行吾道莫將敗壞之身以求全生之道莫將十惡之身破毁十善之道莫以五逆之劍自割破其五藏莫以惡眼而視善人莫以亂意入吾定門莫以六塞之身求吾六通莫以沉濁之身仰吾猋輈莫以臭爛之身洿吾道場莫以婬母害父之心亂吾法眾善男子入吾道場纔起一念機雖未發罪目已搆況身親任萬福捨離百禍叢聚生死重罪報對不休善男子行吾道者戒愼虛无不欺太空與道爲儔依吾戒者眞道易求背吾戒者生死長憂可不愼之可不愼之爾時天尊重告仙人言夫朝禮之法不獨八節之日月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日當此之日修身謝過大道遙鑑如對目前諸學道人初中後心平等不異求福无厭修身不倦善男女等專志守一能得吾道虛襟任眞能成吾道慈悲忍辱精進不懈能周吾道神人爲儔眾靈給使子若反是空喪一生語諸來生熟思吾言爾時諸仙奉天尊嚴誡歡喜頓首所望便足不敢有言恐多浼黷默然伏受天尊明敕爾時天尊又告仙人曰玉淸道境自然无學故曰虛无自然元始天尊非學所成我以大悲授子眞道子歸下界寶而行之從今已後九萬大刧金闕後聖下臨四天處於神州當爾之時上界諸眞及十方天尊上仙法應同時下游當此之時自應見我此中事畢子可復歸下界諸後學成道治不在此暫得彼往求法決疑爾時仙人奉天尊敕各各燌香頓首辭别上界猋輈復歸下天爾時仙人前後請法經游三萬六千天門謁三萬六千祕法位雖居下仙行同上眞心眼明了洞曉三世无復遺餘以是因緣爲得天尊眞言道要修行不日而得洞達後世男女好道之子不遇明師心多質疑又不堅固歲月已往身又朽邁皮肉燋枯髓腦肉竭雖有耳目其實聾盲又多縛著躭恡窟宅眾緣相續不能割捨如繩繫鳥萬慮窮盡唯貪資養所求无足百病已生无方療治漸就增劇須臾之頃死時將至傾城贖命終无得法臨決之際悔不行善餘氣之言欲將何及善男女等我每悲愍一切羣生雖知飮食稀别五味雖知資生稀能養道死於利害敗於聲色馳騁狼藉委頓困苦怨憎鬬競自爲𡨚讐煙散灰滅命盡之後𡨚魂罪鬼紛紜爭訟報對不絕復注生人爲不善業遂至如此不從道誡不信罪福輕慢至聖毁謗善人殺害无辜偷竊刧盜欺凌老病侵損孤弱自恃威勢恣行刑罰如此之人氣未盡時已受冥考功過輕重纎塵不遺語諸來生安詳寶經勤修戒行無令缺犯大道玄鑑幽明合符臨危獲安始騐威神爾時仙人復歸下天西靈寶宮與諸天大眾神光遠暎萬倍於前三天仙人來相問訉歎此稀有目未曾覩懸知優劣道德不同各各作禮願聞道要爾時西靈上仙語諸仙人言道雖旡心可以情求達逆似忤從善如流我游諸天无方不周備䝉眞帝哀我勤求授我至要戒我精修逆爲來生說戒威儀又紀九萬大刧之後金闕帝君下臨神州上天眞宰同此而游道法大度子當何憂爾時禹餘天中諸大仙人八十萬億聞西靈上仙下歸三天西靈宮中與諸大眾俱來問訉燔香散花鼓眾妓樂步虛玄中圍繞上仙稽首作禮而問起居行道有勞遠適萬天神光暎朗億倍於前大道旣弘普爲眾緣伏願仙尊慈愍哀憐流通道化宣示未聞上仙答言我奉上玄玉淸天中大悲天尊賜我至戒科禁嚴明大道祕要不許妄宣子但有心卽須精思九萬刧後金闕天尊下降神州當此之時諸天大聖同時而來道法大度廣濟天人億紀勸誡爲諸來生當此之時與子同游爾時眾中有一下仙名曰融眞成道以來始經六年未達三世猶在學地心疑九萬大刧日月悠長復疑下仙之夀不至此時前進作禮未及陳辭上仙巳知其意卽告之言善男子我知汝心狐疑刧數及以仙夀善男子汝今當知下界凡夫學成道者名曰後聖一入仙位永无退轉我生西靈寶宮近始如昨已九萬億大刧上聖觀之謂如瞬頃九萬大刧須臾之間汝得道成仙始經六年猶如赤子但知求乳未有他慧欲於刧夀心生疑惑愍汝嬰童不達至道朦朧淺智輕陳短見善男子无上大道玄源洞淸深不可測太玄太虛不可度量自然至眞无始无終後聖亦爾不知下界塵臭邪俗修習外法八萬刧夀後還退墮此名外道魔俗之法不出三界不得六通不達三世不離生死微間小伎卽號大仙譬如下世凡夫名曰金剛愚人聞之便謂此人堅固勇健身无毁滅智者明了知非堅固假名金剛須臾變滅邪俗亦爾竊此仙號飾彼行尸亦如下界庸夫竊號天人如彼塵穢邪俗自名大仙智者明知邪正相反夀夭相絕八萬大刧同於瞬頃譬如電菌一時之夀下界塵滓多自名仙聞无上道中仙之名長存不滅耳目不覩便正道道同彼妖邪書記傳說惑亂行尸弱喪聞之心生邪僻自欺冥福招求罪罰億刧漂流生死背道修習邪法呌呼求滅螻積蟻聚塵飛霧委種種苦行不能得道皆由失正元用邪僻猒惡身命猶如涕唾速求變滅不知此身而爲法身遑遑外索棄捨内法多習邪書毁謗大道棄本逐末如此之邪出於邊戎神州所無汝今云何於正道中而生邪念善男子人修内法而得道者不論前後大小階級但至仙位卽能長存自在無礙不似下世邪俗之法以灰形爲得道以朽爛爲證果此名外道生死之中而不自在隱障邪僞息世譏嫌藏姦匿詐招集童䝉假託光恠誘導一切勤求世信志窺財色行不正軌衣食不義貪養陰賊常思損物資益行尸蔵護三毒蠧敗善根殺生求生無功補過或不遵師匠竊服良藥盜修小法微得利巳便稱道極此名暗去夜來無明增長外道邪俗竊號仙名誠非虛白守一之道非爲自然虛無之道非爲慈尊忍辱之道非爲六度六通之道非爲元始無上大道非爲自在解脫之道非爲長生不死之道善男子汝若聞有雜法言離大道卽是邪法不免生老病死飢寒困苦善男子汝於大道心莫狐疑汝師爲誰修習何法志度狹劣都無道氣云何化世證他福田濟拔生死善男子汝雖得不退飛行自在無我大聖未可全同法當進修心勿止足道數足日身心大通三世之事猶如指掌九萬大刧未方一瞬而我大道以百億大地微塵刧數爲一瞬息何有疑惑爾時仙人融眞頓首禮謝小兆不達塵黷天庭昔來餘慶幸遇天眞下觀六合哀以翹誠見授陰生靈符修之得命運覩今日實所未達無上道法願哀䝉昧賜以未聞上仙告曰我識汝心知汝所師見汝修學一時告汝不得不爾須臾之頃下界三十七天諸仙人等無數億萬俱如十月二十日上會立冬朝慶西靈之眞各燌名香騰詣上天遥禮大帝虛皇天尊三司校錄水府上聞三十七天各陳天儀張設供具遥獻上帝无極大道三日三夜旋空步虛地祗作樂以樂仙眞五魔長謠願化歸玄列子調風雲將收煙天花廻空香霧散虛左右仙童吟誦靈書須臾之頃八氣温舒明霞飛度雲庭洞曉天開玄路覩太虛之無涯見元和之廣布三一尊神萬氣道君澄漠似淵容與如雲權實不異乍合乍分於是一時居中俠侍合形歸無上升仙居下游金城灌潄瓊津呼吸紫雲吐納雲芒形隨日新塵刧歸嬰不去不來不滅不生恍惚希微難可備名玄道無心會於能行一時高位塵刧長寕傾天背道吾所未聞爾時大常虛皇天尊遥放眞光洞於萬天温沃幽顯灌沐慘舒流潤乾焦淘汰垢穢開決聾盲補諸不足養生愈疾制御萬魔銷滅灾氣十方世界無不䝉益生死開泰人神喜慶當此之時巍巍難思一彈指頃福慧周普大道威神不可思議不可思量不可名言爾時大眾遥心注念皆願道業普得成就升入太空親侍天尊願玄門廣闢濟度無窮願五苦罷對三塗赦魂願邊土有生悉皆行道願積痾痼疾咸悉痊除願有情無情皆不傷夭爾時大眾發此七願七覺道圓七氣天君歡喜讚善是時七色慶雲翻然下流彌覆眾會七色香光明太玄七變天樂和攝七神七眞空生隨氣成形是時眾仙朝慶事畢光音寂響至二十四日晨朝之時遥禮上方拜辭眞帝浮空而下是時西靈上仙當此之時卽入凝神大定身心不動眞光湛然自如懸月經九大刧凝而不瞬爾時棄賢世界皇氏之家積修十善旡橫罰害常持齋戒立靖供養三元八節燌香禮虛十直吉日朝慶悔過專志大道誠無謟求家贍資財又多僮僕常於四衢給濟窮乏舍諸行旅施散廣大每以冬天露積原野濟惠鳥獸憐哀貧病老幼孤弱供給所須令無闕少齋講設會心无厭倦長者有妻其姓豐氏忽然中時於家睡卧夢見明璣自天而下入其懷中又見日光照曜其身須臾睡覺便覺有娠自此已後心意怡悅顔色鮮盛行步輕便氣力倍常足經十月以四月八日登臺游觀忽以中時見有紫雲去地百丈東南而行聞紫雲之中有人言曰上仙童子何不出來夫人仰聽聞有天樂在紫雲中須臾之間香光滿臺薰人鼻根心意泰然便覺嬰兒從左腋而出心知非凡卽命侍女下報長者俄頃之間龍王吐水灌灑嬰兒天雨寶花以爲敷席長者來見知其神異卽於臺中養育此兒字曰仙童常有紫雲蓋於頭上口氣芳香紺髮紫容年至三𡻕紅爪貝齒目有雙瞳垂手過膝音響如鐘虎視龍步舉動鳳翔所蹈无跡頂出紫光年至五歲日誦萬言凡是經書悉皆洞達俯仰合度進止儀容其辯懸河其德猶龍幽通至極舉世无雙孝養父母常於膝下吟誦眞經中究大義下明地理无伎不知年至七𡻕游皆有方言隱事微聲翼遠方德彰世表名徹天王聘爲國師辭不應命專心孝養奉事父母恒如敬天瞻仰顔色四時温凊無瞬差違每得美食口不先嘗隨時奉新必獻二親父母漸老年過百𡻕衰病相侵仙童晨夕侍疾勤苦三年上天愍其丹誠諸天善神下游其家地藏出穀以充供養天醫眞王攺容同凡下爲療疾重得平復年夀一百三十𡻕而終於堂雖有慧心無正修守不能卽身而成道眞是時仙童號咷切怚悲慟哽咽絕而復蘇遍體傷毁涕淚流血哀動天地飛鳥墮落眾獸不乳苦霧屯擁淒露鬱凝地祗鳴鼓山嶽助哀國王聞之朿帛贈祭四遠人民皆悉顦顇遠近馳赴眾鳥銜土爲其域墳仙童伏塜三年營植嘉樹連癊接野眾鳥翔集晨夕悲鳴三年以後仙童還家以二親生資供贍功德所居宅舍施作道場香油燈燭幡花供養常自洒掃修父母生時十善之業齋請設會濟惠窮乏常於夢中見其父母與仙童曰我生世之日雖修十善濟給窮厄旡正所修身命不固輪轉受報出生富貴今在鬼道承昔善業不被拘繫雖無罪對猶負九祖餘舋停滯太陰未度南宮汝前後所營齋供雖伸薦拔未寘感通汝當爲我如法建齋薦拔九祖爾時仙童睡得覺已尋思歎息追憶父母轉更悲悴明旦燒香叩頭乞願謹錄夢中之言上陳大道爾時玉淸天尊遥感其意卽令上眞定光將諸侍從一十四人下降地中五臺之陽託作寒栖大師時出行世應赴齋戒救世危難爾時仙童遥聞大師寒栖五臺之中知是眞仙大士匍匐往請還家供養爾時仙童到五臺之陽雲昏霧合草樹䝉籠猛獸踞道而不得前爾時仙童倚崖歎息而語猛獸曰我是棄賢世界皇氏之子家修十善信用大道久絕伐害與汝無怨我爲二親棄世歸泉追思不巳欲建功德世無眞師遙聞此山有寒栖仙士深達至理曉明齋戒故我遠來欲請大師還舍供養願汝闢道令我得度爾時猛獸聞仙童之言褰牙據爪努目䑛脣騰伏哮吼轉劇於前爾時仙童思惟良久而自念言計我生身不覺有過始欲排進猛獸忽能噉我終不忘孝建福不就忍不突進不見大師又非孝也拭淚而言大道有靈願見遙祐天神地祗願哀念我猛獸開道得見大師成就功德遂我孝心泣淚良久忽聞雲霧之中有人言曰善男子來特爲此事復有餘緣仙童答曰豈敢餘緣游涉名山地神愍仙童之心而復告仙童曰子父母在世惠及蜫蟲天上地下莫不稱歎子爲大事遠見眞師我不敢障但以大師降此未久我等山神瞻仰未足未有供養以此因緣故令猛獸遏斷道路汝是十善之子百福扶持我雖山神願與善子俱得聞法仙童答言善知識者不必一類幽顯交歸人神不隔内外相持善功乃就山神攝除惡獸神乃露形與仙童交言言訖導途仙童隨之猛獸俠從上至半山見寒栖大師居在絕巖之下碧玉爲居黃金爲牀龍虎列侍神人在傍紫雲凝蓋盤螭承爐金眞秉節玉童燌香爾時仙童拜伏而起頓首而言弟子受生不幸禍不滅身心無孝養天喪二親上下無依唯憑道眞俗纒多累生死因緣荼毒崩心痛不能言欲營齋請以拔罪根伏承大師慈悲赴緣敢欲奉屈爲證福田言畢叩頭希聞報言眞人告曰子二親在生恒修十善濟惠窮乏救活蜫蟲名動上天功聞帝庭天尊命我下來我是雲宮中眞受事天尊以是因緣下降此山子是神童生十善門示有孝養軌範世間暫託凡胞不久應仙昔呼子時還是我身暫游下世或御流雲爾時仙童聞眞人之言朗然覺悟悲喜交集眞人又曰子欲建福修齋不可輕陳且先還家盛潔道場仙童頓首叩頭啟曰不審眞君上天齋法建立道場威儀所須請示其目眞人告曰天上請齋威儀不同下界之法不得及此仙童汝先約勅僮僕効功之人灰濯垢膩熏沐五香男女各居穢氣不交香泥塗地盛洒牀座滌蕩敷具汲盥器皿皆度香水厨爨淸浣不焚蛙薪澡豆華水處處置立黃壇之上更加新土蓋之令平每使緜密朱柱嚴整燈燭炫晃所作精妙毎令盡心應市之物不與爭價不用穢財以營齋戒所謂敗生不義之物身不慈善不入道場不臨齋厨前後愼護一七日中齋日雖訖心行平等猶不非時而妄所食況於履穢飮酒食肉心游邪肆志不平等身坐道場情交塵濁如此建齋功不補過徒費香煙上帝不聞愆過不解罪魂不釋百福不扶災氣不滅眞道不降邪精下應爾時山神五嶽羣靈侍立眞人傍聞仙童欲請眞人下臨舍宅證成福田皆願隨從天尊出游人間爾時五臺山神前進作禮上啟眞人而作是言此世界之中唯有仙童十善之家與物旡怨天下人神皆樂聞見悉願輔成就其善功眞人然之爾時仙童聞山神之言卽問諸神而作是言無上大道鄕里供養不審神靈齋須何食山神答曰大道降世五帝大魔及以地祗皆悉侍從隨逐受事乗道威神都無所須但願與汝作善知識衞護道場若有外道惡人邪心破亂惱懷善人誹謗嫉妬諛佞讒謟我當滅之令舌卷縮呵唾其身令成癩病面有瘡疱眉髮墮落内外影響名爲護法我常助道興顯正化非今日也爾時仙童聞此語已歡喜而歸教令其家一依眞人金口之敕時諸六親聞仙童歸還遽來問訉是時仙童具向親表述此上事諸人聞之身雖坐馳深思遠想曉夕忘寐皆願眞道降臨其舍各從仙童求乞教令爾時仙靈出見其目是時諸人各各傳寫教勅其家傍示親族咸悉依戒各淨其家隨其富貧盡心供養遙思遠念如對目前爾時仙童裝校壇宇一一事畢復向山中迎請眞人諸人聞已悉願隨往是時有千二百人其名曰月愛長者弘心長者大權長者德王長者達命長者心海長者如是長者而爲大眾之所首領各賫香花隨逐仙童北向五臺一十二日到於山門俱時燌香遥禮山神食頃之間仰望山上見獅子虎狼俠侍道側盤螭交結三帀眞君地祗作樂仙卿燌香仙童拜伏問訉道君上勞雲駕降此空山下界眾生無可供養又復再拜時六大長者仰覩眞威悉皆自失五體戰動喜懼交集拜伏不暇流汗負水瞻仰金容不覺忘言誠惶誠恐倚立不寧爾時山神而作是言大士仙童今得重來六大老人並何色目爲宿習善根爲始知廻向恐心無貞操志不殊堅來此何緣況心未冥眞體猶凡濁污我名跡不宜尸臭以見眞君我雖名山之靈身無濁穢受形已定雖不任道常爲眞君而作外護不欲濁惡以此忤眞仙童答曰此六老人是我法親聞我請道心助懽喜雖非十善亦无重罪身雖俗士亦有好心聞有眞道目不曾覩遥思遠念誠在可哀山神聞仙童之言復語老公曰子審如仙童之言安定身心不須震懾思惟正法依教修行時諸長者作禮而退
