body:
  text: 下應須内持戒行愼密所受不得敞露天文輕犯科禁心無慈孝恣性威刑貪婪財贍尅削兆民令天下萬民心中𡨚酷如此之人徒有匡贊之名而無亷貞之德如此之人被三種考罰第一身中監神廻惑其心令萬向傾敗第二治國之神令其犯法受戮第三地官考之殃流七世子當愼之是諸仙人得受戒已歡喜踴躍深自慶幸各起作禮信受奉行慈悲方便品第六爾時天尊與諸大聖在於上方空虛之中以方便故欲度眾生以大慈力昇入無形太虛大定是諸仙人雖有通力不能見莫知所在便謂天尊以歸上界是諸仙人悲惋懊惱不能自持各見其身無復威德猶如死屍又見所乘之象變成臭肉於是大眾心中迷悶無復所知進退無據不知何計各各自定諦觀因緣心識䝉矓不能自曉如人夢中見諸事相無有定實於是諸御仙人謂諸人言我等福德輕尠道力微弱未能究竟微妙至理始入初心道數未足縱有通力不能明了但捨我等先所知見唯當歸命虛無之中或當感念今令我等眾重見天尊是諸仙人聞聽所說心中小悟各各專心存念歸命太虛叩頭禮願七日七夜心不休息須臾之頃心中醒悟如睡得覺仰視空中忽見天尊與諸聖眾儼然不動與本無異是諸仙人叩頭禮拜悔過自責禮謝天尊而作是言我等大眾積刧以來修習小見小聞分别妄想迷悶邪見深淪結固罪垢深重自見已身猶如死屍無有光明所乘之象變成臭肉髻中寶珠化成瓦礫无常變異迷悶恍惚如從夢中見諸色像不能分别我等大眾不知何計心自念言唯當捨我先所知見歸命大道憑向虛無悔過自責七日七夜心中忽然平復如夢得覺歡喜無量唯願天尊特見哀愍令我等眾心中開悟於是仙人言語未了之間天尊又入光明大定通身光明猶如皎日無有障礙令諸聖眾各乘羽蓋坐飛龍之座在天尊左眉一毫之端又令諸仙人及十方國土山陵河海城邑人民俱在天尊右眉一毫之中而不迫窄各見天尊而在其前而說妙法是諸仙人作此見時了了分明心無障礙又見靈山之中舊住之所近在目前已經六刧不能得知天尊神力自在無礙爾時天尊以一音聲普告眾生隨其類音悟解天尊告諸仙人言汝等諸人覩此道力心中何如仙人答曰我等大眾但知聞法慶幸心無所覺天尊又言大道慈力非眞非假非起非滅非空非有非彼非此無去無來所謂中道自在之力大慈悲力無障礙力令諸仙人心中安隱不覺不知但以聞法餘無所知是諸仙人聞天尊所說心始開悟合眾彈指歎未曾有天尊又告仙人曰汝等今當知大道威力不可較量無有比說於諸餘法譬如螢火並於日月亦如掬水比於大海法喜當知汝等師古先生入道初門三乘之法但有名字無有定實多說譬喻說化下根非是超絕生死綿綿長存見身受慶骨肉俱飛永爲眞人之法身如眞金無有變易亦如金剛不可毁敗善男子譬喻之法訓化邊地愚癡眾生中上之人不應修習千生萬生流轉苦難不能超出生死愛河譬如良地而種稊稗終不變成粳粱五穀譬喻之法亦復如是不能令人得成眞道善男子我知汝心局於小法迷邪失正故攝汝身令汝開悟善男子汝在雪山雖數百𡻕不修大道終不免死必墜地獄雖自號爲仙人實無仙質汝承宿慶今得見我重得開度是汝因緣法當受生善男子汝來此中雖得六刧我以道力促此六刧以爲六日又我觀六猶一瞬頃善男子大道威力不可思議窮刧說之亦不能盡於是法喜與諸仙人疑意不了重白天尊向䝉天尊垂慈悲力開悟未聞未曾有法心中慶幸莫知所謝我等䝉昧局於見聞便以爲極不能廣知無上大道深妙祕賾威神廣大自在無礙不可思議我等塵累未祛習氣深重幸逢高會遭遇良時釋彼穢邪仰陪霄駕唯願哀憐納受已死之命便得再蘇塵穢之身沐浴玄化於是合眾叩頭流血伏地良久不起天尊以大慈力故而告之言汝以六刧之中聞我說法今猶未悟是汝垢重何以故邊地眾生唯食肉飮血生食羊馬遇古先生淘汰滓穢餘習未盡使之然耳爾時天尊又以大悲方便之力忽令千二百五十白象合爲一象又令千二百五十仙人合成一仙坐此象上又令十方國土合成一土大如微塵此中人民及諸大眾合成一人在此塵中微毫之内須臾之頃毫間二人見一眞人形長千尺容貌奇特將諸大聖八萬四千人俱引毫中二人出於毫端又從左眉毫端而入天尊先所大眾三萬六千人又從右毫端二處外各無罣礙而不迫窄九日九夜心無疲厭謂如食頃不覺不知與本無異是時二人爲聞法故身心悅豫天尊又言善男子汝等昔日與道結緣功微業淺所得通力非是眞實山出美玉南方有石亦名爲玉二名相亂凡夫之人不能分别不知何者是眞玉也汝號仙者如彼石玉非是眞玉有智之人了了分别善男子如汝髻珠實是魚目非眞珠也汝亦如是非眞仙也善男子汝從今日以後沐浴道化除汝塵累始名眞正始入法流於是二人聞天尊所說歎未曾有而作是言今日有幸得遇高尊授我眞道令我開悟悅除煩惱如虵脫皮爾時天尊以大慈力而告之言汝諸來眾今何所在於是二人不知何答各目顧盼唯見向者眞人大聖各坐龍座唯有一象又見十方國土近在目前心中小悟知是天尊自在之力天尊以知其意卽告之言我以道力愍念汝等罪苦眾生方便引導示汝神變令心開悟須臾之頃平復如本此諸大眾心中亦覺知去來之相道言如此自在神力皆是不可思議非是五通三乘七覺八門三界之所辯了事離心想見聞知覺非有非无非起非滅非因非果不可言說不可思議離諸語言絕諸視聽唯一道力究竟一切諸法皆悉通達畢竟無復遺餘善男子汝等當知我雖作此變化初中後心未曾覺爲變化之相但以大慈一子之念普度眾生善男子我雖度眾生初中後心亦無度眾生之想善男子大道之力大道之神大道之化大道之機大道之微大道之虛大道之無名不可思議解脫不可思議知見不可思議方便不可思議造化不可思議生成不可思議動用不可思議善男子汝等應生希有之心慶幸之心難遭之心成就慙愧不可思議爾時仙人歡喜讚歎而作是言我等大眾䝉天慈流霈再造之澤喜慶之心無以爲喻如披重雲得覩日月猶如盲人得見色象如籠中鳥而得騫翥如小水魚得游江海亦如枯骨而得成人過泰之慶巍巍難喻爾時天尊愍之勤勤授千二百五十人眞童之任今知天下新學道人功過之錄注記生死是諸聖眾爲因緣故三萬七千二百五十人俱放身光明照曜十方無量世界香花幢蓋萬種天樂大地震動爾時天尊與諸聖眾各坐九色雲龍之座浮空而去於是長㝠世界之中國王王子羣臣兆民遥見天尊聖眾昇東南方而去須臾之頃流霞四㝠莫知所在國中男女方始警悟相顧悲泣悔過自責其世界中有一國王名曰眞會聰明辯慧而告大眾作如是言汝且莫悲聽我所言我昔曾聞有虛无之眞造化天地生成萬物神力自在幽寥㝠寂行不言之化我此世界祥瑞如此必是虛旡之眞福我此土使之然耳我今大眾當報道恩選覔園中最高勝地豎立宫殿香花供養國內人民聞王所說異口同音皆悉稱善各各解其身中無價寶珠以塡此地取諸香木而作宫殿高廣嚴飾百寶裝校施諸床座花香燈燭種種供養傾世所有爾時天尊遥知其意卽放左手掌心十彩眞光照曜此宫晨夕恒明猶如白日常有香雲周流世界彼土人民時因夢中得見天尊爲其說法身心明了夢覺之時書記文言一國人民校定勘會文皆符同無有異色故寫此文爲自然道經是時人民轉加精進國中太平人民豐樂夀無中天於是國人感此非常效騐幽明符會悉皆精進雖無師匠自修其心皆入仙位漸契微妙不可思議爾時天尊三大願之力成就眾生處化度心無偏黨與諸大眾下游地戸極泉之境入一小天之中空虛而住其天周圍六千七百五十四里天高一百九十九里其中化主名無量夀有三大臣第一臣名德王第二臣名捨邪第三臣名雲音皆以正法化世不枉人民此中男女身長七寸皆悉辯了聰明智慧慈順父母奉事化主此天之中昔古往刧言龍初會虛無天尊命造化眞人巨靈仙人下此天中布散無邊量立靜壇刻玉簡文以鎭此天從此以後國人修習道法承此功德時有託生中國攺姓易氏號曰神童聰明利智或以一身二身不過三身應遇天尊而得濟度長生不死爾時法喜與千二百五十眞童疑意不了從座而起前進作禮上白天尊而作是言不審天尊言龍初會之時今經幾刧虛无天尊命大造眞人布散元氣化成萬物微妙之理以何法爲宗頓得如此自在無礙唯願天尊憐愍不達誨以未聞未曾有法於是天尊愍其慇懃卽告之言善男子此會之時甚自久遠經百億大地微塵之數不可計刧唯道與道乃能知之五通神人以此爲久我今所見未過俯仰瞬速之間汝欲知者其義如此元氣之道非汝所聞爾時法喜與諸大眾重復叩頭上白天尊言弟子出生穢土習業不淳䝉昧愚迷希逢良匠守偏方小見局湫隘心靈分謝重昏何期披霧日無私照鏡朗幽㝠道不私恩念流一子言龍初之會以奉決疑元氣之宗願垂開示冀得咀嚼甘露沾洽雕朽降以靈符反生枯骨弟子合眾慶幸過泰有餘不期驂御霞猋聳身玄闕沐浴恩化心忘止足知進成愆願垂赦宥出此語時合眾悲泣地爲震動日無精光上方空中有如龍吟一切人民蜎飛蠢動皆悉悲鳴草木顦顇金石失潤香雲徘徊凝結虛空神風滂渤和氣不暢於是眞童感動天地異類悲鳴一國男女助爲啟請傍欲聞法爾時天尊愍其感動放千光明從口中出照曜諸天處處洞徹天雨香花萬種音聲空中自作日月重輪和風拂塵仙花薦地霄蓋羅天神鐘寥朗眞儀四陳龍麟騰躍獅子微吟瓊鑪焚香眞童散煙天地吿瑞異類同心十方國土朗然而見諸天大聖乘空而來下界神人涌地而出俱集此天及諸天神地祇山海諸王眾獸之王皆來會所而聽說法爾時天尊謦欬彈指而告之言善男子汝所問元氣之道以何爲宗汝今諦聽吾爲汝說善男子汝今當知元氣之道祖於虛無天尊空生自然綿綿長存化生元氣元氣生太極太極生天地天地生萬物善男子元氣之道其妙如此故大道無名元氣無形以無名故動用無極流變萬化有情無情禀道而生人寶元氣故能長存元氣爲神與氣合并能入無形與道合眞善男子萬類不同元氣一種譬如大海流澍無極任人取用隨其灌漑有智之人深鑿溝渠以導其流則澆灌無極愚癡之人執持漏器詣於河海隨注隨漏獲潤甚少或有盲人都不見海無所受潤善男子汝今當知水性不動潤有深淺元氣之道亦復如是不可思議爾時一切大眾聞天尊所說心開意解皆悟無形微妙之理是時天地山川天神地祇蛸翹蠢動悉皆同聲合響猶如雷震而作讚曰大道無生滅元氣不終休失之永朽爛得者長遨游俯看六合內漂沉生死流仰盼霞中人蕭然無有憂是時空中作此讚已須臾之頃天上有五色流霞結於空中去地百丈自成雲篆八會天書字方一丈八角垂芒光彩煥爛洞朗虛空大眾人民仰視天書恭敬禮拜悉皆同聲而作是言此是天尊自然眞氣應感眞童元氣變化而成此文我等唯聞天書目不曾覩今日幸會不期得見不審天尊我等塵穢得寫天書讀誦與不天尊答言此是大道威神之力應變所成汝等欲得傳寫眞文龍章鳳篆供養禮拜專心誦念之者應先受戒鍊行離諸塵穢然後書寫受持讀誦一如戒言於是大眾聞天尊開示歡喜踊躍信受奉行作禮而去言龍中刧方便度人品第七爾時玉淸天中金闕天尊與諸大聖微塵之眾具大慈悲皆以六通應變自在神力無礙綿綿長存無始無終神契機微精感密妙常以一道化成億兆隨類動用而得長生是時天尊以大慈力常以法雷而警眾生令其覺悟常以大雲等覆眾生令不孤露常以法雨潤洽眾生令無渴乏常以慈風揺動眾生令立信根常以慧日而照眾生令不昏㝠常以舟航廣作津濟攝生理具運載旡窮長養覆護爲作導師慇懃教授譬如父母一念諸子善以珍寶隨其取用心無恡惜眾生不知反更怨咎失道敗德興作仁義隨業流亡而不知返迷沒邪逕不行正道各執異端五内攻刧隨逐惡黨六賊外爭愛塵覆蔽惱結增長爲一我故造三種業漸漸滋多以至十惡百福遠離死入九幽備受眾苦從恩愛生不能了達甚可憐愍不忍放捨是故慇懃種種誨示提携引接令不邪僻爾時天尊與諸大聖哀念眾生猶如慈母顧愍其子雖游十方必赴其念尅應歸還飮食覆護乃至長成猶不捨離况於童椎晨夕孚乳隨其時節感其願念而無差失是時言龍中刧之後六百萬𡻕四天之下人民福盡天地崩壞災氣蔽天日月不明星辰失度風雨不調天地震動河海水减金石焦枯泉源乾竭處處坼裂山崩鬼哭藥草不生樹木凋落百穀不實黑風發屋吹起砂石相擊出火徧燒山澤有十萬惡鬼各將徒黨無數億萬馳走天下口中出火噓瞎人眼飛鳥墮落六畜自死又有四大蟒虵身長六百萬里圓繞崑崙張口四向其虵鱗中出百億小虵四散迸走毒氣猛烈噬中人身登卽爛壞如斯苦惱經六百年眾生困苦爾時天尊與諸大聖眾數如微塵以玄化元年𡻕在辛卯七月十五日日中之時於玉淸天中雲宮之内俱放神光照曜下界四天之境其光流變無數億萬一一光中各有道境無邊廣大日月星宿山川城邑樓臺宮闕非常華麗一一城臺各有泉池周帀圍繞其池之中涌出金蓮寶花微風吹花出妙香氣徧滿虛空其花高大出於玉淸一一花中各有龍座浮在花間一一座上各有天尊大聖演說妙法泉池四邊周帀寶樹蘇牙琳碧瓊枝玉條偃仰蓋廕徧覆世界七寶華葉夜光珠寶常有微風吹動寶樹其枝葉間出妙音聲中演出空洞自然梵唱生神寶章反魂之篇以和三氣生化萬物其空虛之上有凝光九色結成寶蓋彌滿世界其宮臺之下有七氣浮空以承宮殿其宫四邊玄虛之中皆自然音樂寥亮淸徹非常和雅臺中各有眞人吟詠凝胚混化之章生長萬物消滅灾害爾時天尊大微塵之眾以十月十五日日中時俱從玉淸天中雲宫之内浮空而下四天之中星辰之上中斗寶車以捧神足東斗扶左西斗扶右北斗爲傘南斗爲杌日侍其左月侍其右華蓋垂蔭香雲四冥神風調虛甘露流津天地復位山嶽涌成源河涇流苦海變淸四氣和調三景齊明枯骸成仙垂化得生百穀豐熟天下太平邪魔喪精眞道流行羣兇變善人神守貞蕩蕩大化難得而名爾時四天之下國王王子羣臣妃后及諸宰官萬兆男女人及非人各各仰視上方空玄之中遥見天尊眞儀煒爍神彩澄朗光明暉煥尊顔彪炳寶蓋彌天長幡飄颻虬鑪揚煙神香反魂萬籟齊唱仙樂同音咸乞眾生深識業緣是時諸人覩此竒特内懷慙愧而欲禮謝心疑道遠恐不上達私心願念請高尊大聖寶駕下臨穢土各住其居迴心上方叩頭禮願流血灑地九日九夜燒香散花願念不絕人皆疲困精神恍惚如夢中事雖極不怠天尊感其意故卽於上方分身百億俱坐雲龍之座各見其前隨其類音而爲說法皆令覺悟四天之下如一不異時有四天人王須臾之頃又復各各皆聞天尊在其心中而說妙法身心欣悅快樂安隱雖自忻幸未能了達各各作禮請問天尊心中法音因緣本起而作是言我等諸人過泰之慶得見天尊降臨下土賜我妙法荷負慈尊恩造之澤深自慙愧不知所謝又聞心中而出法音身意泰然欣樂安隱不審此事是何因緣爾時天尊答人王曰善哉善哉善男子汝等當知無上大道威神之力不可思議無所不在何獨心中而有法音乃至支節毛孔之内及以天上地下一塵一介皆有道氣善男子汝等人王應深慙愧心中法意恒自觀察除汝邪見除汝異念除汝躁求除汝貪愛以道沐浴滌盥塵累常行大悲恭敬供養无上大道持戒布施忍辱精進煩惱垢盡道性妙光顯見人中是時四天之下一切諸王及其人民同時各見天尊慇懃教誨良久攝念身心不動須臾之頃各見大悲天尊與諸聖眾同時建心幢蓋無數億萬從其心中支節毛孔皮膚之間安詳而出幢蓋高廣彌滿世界爾時大悲天尊以此幢蓋引諸眾生往四天之中崑崙山上止虛空中去地萬仭入一微毫之内與諸大眾儼然而坐九日九夜神光朗徹照曜虛空大震雷音而說妙法其音遠聞遍於十方靡不周徧普告眾生而作頌曰大道常慈悲愍念諸眾生至法普開化能行與未行我本無心相推運立形名今當恣汝問應念卽教令權實無二慧玄寂一眞精元氣廣流布無情及有情爾時大悲慈尊說此語巳與諸大眾默然而坐爾時東方始靑天中諸天子等無意天子而爲導首與其眷屬九億大地微塵之眾爲聽法故齎靑天之寶供養之具燒香㪚花作諸天妓樂乘天宮殿建持靑節靑幢靑幡靑蓋靑霞之坐坐高極頂蓋覆無邊浮空而至乘道威神入微毫内圍繞讚歎禮拜問訉陳列天儀供養之具却坐東面儼然不動爾時次有南方丹天之中諸天子等熖光天子而爲導首與其眷屬八億大地微塵之眾爲聽法故賫丹天之寶供養之具燒香散花作天妓樂乘天宮殿建持丹節丹幡丹蓋丹霞之座浮空而至以道神力入微毫内圍繞天尊歌頌讚歎作禮問訉陳列威儀供養之具却止南方儼然而坐爾時復有西方皓天之中諸天子等素眞天子而爲導首與其眷屬六億大地微塵之眾爲聽法故賫皓天之寶供養之具燒香散花作天妓樂乘天宫殿建持素節素幢素幡素蓋素霞之座浮空而至乗道慈力入微毫内圍繞天尊歌頌讚歎作禮問訉陳列威儀供養之具却止西方儼然而坐爾時復有北方玄天之中諸天子等冥慧天子而爲導首與其眷屬五億大地微塵之眾爲聽法故賫玄天之寶供養之具燒香散花作天妓樂乗天宫殿建持玄節玄幢玄幡玄蓋玄霞之座浮空而至乗道慈力入微毫内圍繞天尊歌頌讚歎作禮問訉陳列威儀供養之具却坐北方儼然不動爾時復有八海大神龍王水帝爲聽法故乘大波濤洶涌滔天以道神力浮空而至居毫四方猶如大雲次有五帝地祗與其眷屬五萬億大地微塵世界其中各有山陵河海國土人民一一世界具足諸有乘道威神爲聽法故俱來會所在微毫外與八海神王重立虛空湛然而止爾時中天大聖元皇道君虛无天尊爲影響法故與十方大聖无數億萬來會空中黃雲之上去此微毫五百餘仭二會之所陳列以畢於是中央道君卽呼神風激籟演出空洞微辭步虛靈章以會眾眞三萬七千種契九十九日吟咏始畢爾時玉淸大悲天尊於微毫之中卽命太微中仙九億萬眾揮反魂拂魔之章六萬四千八百四十二契陰生之曲調理羣放八十八日眾音乃畢爾時天尊成就二事委曲畢已與諸聖眾默然而坐是時八海大神與五帝地祇忽懷疑貳生不信心天尊知其疑惑卽以慈力令此地水互翻互覆七反上下復令此大地震動坼裂碎成微塵倐忽之間還合聚如一芥子又令八海波濤四散忽然乾竭其水帝魚龍皆悉露形須臾之頃令此八海成一滴水大如鍼鋒吹着空中倐欻之間復令平復時地祇與八海大神覩此威力變化自在悉皆自失雖乘道力未能辯了諸法性相何以故地水體陰神心不聰是故不達久久之間神心小悟卽於毫外北方禮悔自責五體投地猶如山崩通身血見悲泣良久於是地祗自天尊前而作是言臣以冥生窈靄職當持地濫知九土未嘗遲怠乗道正氣生育萬物助善興化不敢有勞爲諸塵故不能達道惟願天尊大慈憐愍言畢悲泣不能自持次及八海大神龍王眷屬水族之類其數无量驪珠龍王性最聰敏爲諸水神唱導之首凌波而出上白天尊而作是言臣以多幸職掌水府濟度舟航下潤一切助道興化蕩垢滌塵雖有微勞功德心無持賴日夜沉溺漂沒波濤麄身巨大無由輕舉與諸濁氣相繼然以見聞狹劣未造玄微翹仰至尊積有年𡻕今乗道神力爲欲聞法而來會此微毫之外而不得入心自狐疑不能決定惟願天尊大慈悲力賜見接引令得入微言畢自責濆薄溢潰波浪滔天悲嗟沸湧黯然而出哭聲哀歎悲切流慟苦毒須臾之頃一切河海悉皆血沸五帝地祇震動大地同其悲苦金石流淚草木擁霧源泉逆流大地出聲殷殷如雷地中生心意戰慄目不能瞬飛鳥墮落走獸自撲五帝地祗兩眼流血徧灑大地地及河海一時變赤猶如丹霞足經八月而色始變爾時復有諸大神王天神地神電神雷神風神爲聽法故飄動風雷霹靂剛堅驚作深蟄傾拔諸根吹去埃塵來會四方空中而止爾時復有地中雜類諸王大山之王香樹之王神藥草王魚王龜王鳥王馬王牛王獅子之王風獸之王猛獸之王天麟天禽天馬天鹿如是諸王皆隨大地來至會所耳雖聞法口不能宣見諸神精悲號苦惱皆悉哀鳴眼中流血各各伏地而不能起爾時天尊愍諸神精沉滯穢濁不聞正道悲苦如此卽以雷音而告之言善哉善哉汝等今當知此會之所本起因緣之事以言龍中刧之後六百萬歲天地福盡災害興作我不忍見與諸大聖臨四天下保鎭刧數變更萬物應運度人故來會此我以自在神力令汝等來汝今當知此會大眾皆是十方天地无量道境來入毫中尙不迫窄而汝等眾唯乗五萬億大地微塵世界八大海水何足爲多疑此毫中不能納受是汝神精濁惡邪見志度狹劣未能深信旡上大道威神之力汝欲來入此毫中者應除雜想煩惱恩愛貪嗔癡等顚倒邪見種種疑惑塵勞覆障斷諸結習乃能入微妙之會若必存見聞分别善惡怨親憎愛繼有縛着永不得入微妙會中爾時天尊以方便力爲降伏神精而告之言汝等眾精罪業深厚濁惡垢滯未得入此微妙會中汝應思共遠塵離垢當來見我天尊說此語已卽從毫東雲門之中出見左手團此大地和以海水如一芥子擲向上方空虛之中經八萬大刧湛然不動爾時天尊在此毫中爲諸大眾說微妙法經八萬刧說訖已乃於上方虛空之中接取芥子安着毫端還令大地大海平復如本地祗水帝人王兆庶一切眾生都不覺知爾時天尊知此諸神心中未悟卽見大身滿虛空中從毫左邊安詳而出以一鍼鋒乗此大地及以大海引入毫中安着北方玄虛之中譬如大空有一微塵都無妨礙是時八海龍神與諸地祗入毫中圍繞天尊窮刧不帀又以飛行亦不能帀方始覺悟歎未曾有其大地之中國王臣民異類之屬從地入者不覺不知无去來相此毫之中有無邊道境天天相次一一道境備諸所有天地日月山川河海國土人民無數億萬總有三萬六千人天種性時有中根之人一萬二千種中有一長者名曰慧命與諸大眾覩此神力心意不了互相擕獎來至會所恭敬作禮上白天尊不審天尊初從天中下降之時宫闕城臺高妙樓閣及蓮花之中天尊大聖并初聞道之人其身心之中各有天尊演說妙法及慈悲天尊從其心中安詳而出寶樹周帀自然天樂及此微毫之中國土城邑幡幢寶蓋座座高妙種種變化奇特如此不審是事爲有常邪爲無常邪天尊答曰善哉善哉善男子汝當諦聽吾爲汝說我從天中下降凡夫應變七種微妙之事汝今當知無上大道常以七覺聖道而下化世以應自然微妙七氣以成七變之法以世有限故大道應之以名數所言名數皆應自然微妙之法善男子汝所問此妙致爲有常邪爲無常邪善男子汝等當知大道之法無生無滅云何問常之與非常善男子大道神力无種不爲無所不在無所不適無所不應眞化無窮凝神深根俯悼羣品應化官殿小小因緣不足疑問欲有卽有欲無卽無欲常卽常欲斷卽斷以道神力無所滯礙又問蓮花中天尊是我眞氣流布廣大還是我身非爲他聖又問初聞道之人身心之中出妙法音此是人王第一聞道深信湻熟不受諸有卽此之身而爲法身百骸九竅俱受道氣此人之身與道不異會中諸人亦復如是是故大道慈悲見其身中善男子汝又疑此微妙會中種種奇特汝今當知而我大道以此毫中爲一道境以一道境爲无量道境道境亦常何以故凡夫之人謂之無常常道大聖故名之爲常何以故凡夫者夀命不定以不定故卽謂大道爲非常道常道大聖長存綿綿明了常道善男子汝今當知若爲凡夫說常道者心卽狐疑顚倒邪見增長不善是故大道隨緣逗機何以故下界凡夫多有不同心性各異上品聞道專心修行身得眞仙永不退轉爲冥說常中品聞道未能湻信心有上下或爲說常或說無常下品聞道誹謗橫起爲說無常示見亦爾微妙眾中天眞大聖名之爲常所說之法或常無常何以故天眞大聖爲此會中諸魔鬼神及雜類眾生所說之法名爲無常善男子微毫亦爾凡夫之人不見常道不達妙理不能得至微妙眞際雖乗道力暫入精進恐後退墜名之無常天尊大聖心無結縳出虛入無常不滯礙名之爲常善男子妙道威力不可思議以不可思議故能令十方天地一切所有盡入毫中无有迫窄善男子無上道力若可思議者則天地萬物不能得入微妙會也善男子汝等當知我諸聖眾能入會者皆是常住不可思議解脫知見何以故入此會者亦非身入亦非心入亦非身作亦非心作亦非理入直以大道慈悲忍辱之力而能得入微毫之會爾時慧命長者與其眷屬一萬二千種人微塵之眾聞天尊所說心開意解重復禮謝天尊而作頌曰稽首冥慧虛无尊稽首歸命重玄主裁成天地無得稱悉爲眾生作恃怙慈濟五道轉輪魂哀救三塗地獄苦歸命金闕天中尊歸命六度慈悲父歸命玉淸无上眞以離生死長綿綿出有入虛无所待能令枯朽變成仙千劫萬劫難一遇爲眾廣說業因緣廻骸起死永長存使我形神无變遷爾時慧命長者說此頌已舉體投地禮謝天尊而作是言不審天尊成道以來於今幾刧修何功德巍巍如此修何業緣而得不死以何功德濟地獄苦天尊答言我成道以來如十方天地微塵之數不可計刧譬如虛空不可度量善男子我修大慈大悲願度眾生常以忍辱柔弱不失中和故能不死常以六度而濟地獄善男子我雖成道猶故不離慈悲忍辱而况凡夫於是慧命長者與其眷屬一萬二千種人俱聞天尊所說慶快歡喜重復叩頭稽首天尊而作是言我等宿福深厚生逢道化面覩慈尊耳聞法音心先暗昧領受祕要多所忘失雖以愚䝉而心好道德恐身朽邁不得久留常慮一旦奄同螻蟻身謝長冥无由見道一失命根萬刧流轉幸逢高聖願得濟度乞受長生久視之道唯願慈尊賜垂生活說此語已五體投地自叩悲泣徧體流血天尊默然而不許可於是一萬二千種人微塵之眾悶絕擗地爾時天尊愍之勤勤自起引接良久乃蘇天尊告曰子等諸人往刧以曾供養虛无眞仙道德眾尊慶流今身名著左契又復我等法眾刧刧下化以是因緣與我相遇子當勤心屏除雜累退齋思失三月後來我當授子眞道長生之要諸人聞說歡喜踴躍禮謝天尊各還其家洗除塵累内外淸潔三月訖已各賫香花供養之具來詣會所是時會中微塵世界所有國王王子臣民男女不可計數聞慧命長者欲請道要皆各同聲上白天尊而作頌曰冥契本无偏隨機應業緣願得長生道散著我心田六度淸源水流澍無涯邊是時大眾說此頌已一時伏地同請受度爾時五帝大魔見此諸人伏地請法各奏弦歌皷樂良久乃止於是青帝大魔而作頌曰修道須積功入試由天魔莫令身缺犯勞我空中歌倐欻收汝形誰能奈我何先當遣所欲盥潄名山阿勿作塵中人遑遑逐世波赤帝魔王頌曰炎宫映丹霄朗朗光氣浮邪風鼓濁塵氛氛長不休我界難可度臨去及淹留功過自分明非魔强欲求白帝魔王頌曰銀宫出太虛圓羅燭夜暉萬遍演靈章游魂逐氣歸背道入冥墟苦霧長霏霏恩愛喪精神沉骸絕望飛我界不肯度令魔空裏哀黑帝魔王頌曰玄滋秀瓊根玉液練眞儀落景迴扶桑形神長不衰何事叛道德朽爛常懷悲六天誰欲保臨安反更危黃帝魔王頌曰雲宫窈窕出丹霄浮空飛蓋上初朝密契靈源騰六氣虛中眞宰自相招鬱鬱天衢雰紫霧詵詵玄路上霞猋孰知我界沉淪苦何事躊躇不肯超世自依依入長夜非關魔眾强相邀是時五帝大魔唱此歌已各放身香以薰眾人又奏邪音五百餘種以惑眾心又建邪幢以亂眾目或作美女種種相邀或作異相非世所識或出身光照曜百里或出惡聲聞者毛豎或頭上出火或足履虛空或入地中或變形老少善作幻惑氣息衝人或以身觸人或化作人形或作人親識故舊種種謟媚或入人身中令人得定眼能洞觀心知二世生死業緣威儀殊特善說法要惑亂人心於是此會大眾以道神力專志不散魔不能敗須臾之頃五帝大魔與其眷屬攝其威神却北面立侍從天尊爲聽法故儼然不動爾時東方始青天中諸天子等爲聞法故歡喜踊躍以通神力助贊成後學之人令其堅固而作歌讚暢其心令得眞道而作歌曰扶桑啟初暉鬱鬱吐青牙神氣浮圓羅靈禽曜紫霞自得長生道㝠寂至眞家次復南方丹天之中諸天子等而作歌曰炎氣浮丹天眞光秀神符飛霞渙八瓊靈液化霜珠九光暉寶器流彩曜玄都塵刧如瞬頃形魂終不枯昇身入太微九祖出長塗次復西方皓天之中諸天子等而作歌曰玄眞駐頽景落照反初暉靈液洒金津欻被流霞衣蕩蕩歸上帝雰雰登紫微控駕神光游合體長仙飛次復北方玄天之中諸天子等而作歌曰旋綱蹈神足魂魄輔眞精右扶白元尊左衞常无英玄液吐靈津芒霞逐月生令汝調年子不衰亦不傾爾時諸天子等爲聞法故饒益眾生方便助道開發大化度脫有生證成道果演說歌讚自然之音以授後學成眞道者尋誦思惟密求眞契而不妄泄必得成道而不疑惑說此讚已各還本座爾時上方中央大聖元皇道君虛无天尊與諸聖眾爲影響法故證成大信護念受生之人令其眞正攝除亂意身入道流永離生死故來上方空中而住與微妙會中玉淸天尊同神合契應化下土正定天元刧刧示見非獨今日爾時虛无天尊爲度人故與十方大聖微塵之眾一一聖眾各乗天宫殿從上方空中而下微妙會中在大悲天尊左邊同一座坐其座高廣上極有頂彌滿十方以慈悲力令此微毫本相不動毫中大眾亦不迫窄如本无異爾時二尊身相光明有踰初日是諸聖眾亦復如是爲欲度眾生故見大慈悲方便之力令諸聖眾足下出光千變萬化漸漸通身貌體洞徹猶如水晶攝諸天地日月星辰山川河海國土人民一切眾有盡昇大悲天尊左足之趺一毫之端須臾之頃又升虛无天尊右足之趺一毫之端須臾之頃又升空中去地九億萬里正對虛无天尊金吻之邊是時天尊以微噓香氣是諸天地碎成微塵徧滿虛空又令合聚平復如故須臾之頃又令諸天大地人民昇虛空中正對大悲天尊之前天尊以道神力吹此天地令日月星辰山川河海城邑人民鳥獸合成一體大如芥子圓明皎徹堅入金剛須臾之頃還令升入虛旡天尊左手之中掌文之內變成光氣光氣之中有四種氣色所謂淸濁白黑於天尊掌文之中漸漸分别長大淸氣爲天濁氣爲地白氣成日黑氣成月日爲陽精月成陰精化成男女萬物因此化生爾時眾中諸天子等覩此神變歎未曾有於是東方始靑天中旡意天子爲眾生故從座而起前進作禮上白天尊而作是言不審天尊以何因緣作此神變復以何緣壞成天地復以何緣令物入无復以何緣令物出虛弟子識淺不達至理願從天尊得悟妙致惟垂哀愍誨所未聞爾時虛旡天尊以頌答曰本爲人福盡來降四天下眞體本常寂爲物應虛假變化憐有生哀歎不能罷刧至天地壞成之由我身不忍見此苦下世見威神令物反歸根方當信業緣塵濁自空旡任道成眞仙眾累旣消盡淸澄不受餘永斷生死道蕭然出太虛爾時天尊說此頌已告諸天子言善男子汝等當知度人之法不得輕易以道慈力先當爲其示見種種神變降伏其心觀其機根而爲作法我常哀愍引之左手雖示吹噓不令驚恐我雖示此種種神變天地萬物本性湛然常在不動我亦未曾强爲神變直以一道一法一慈悲力爲眾生隨其根性見種種法而此法性實非種種善男子汝今當知度眾生法亦有多種天尊大聖神力自在方便濟度令其不覺所謂大道方便藏用世間凡人助善與化宣揚道法要須文字語言譬諭若不爾者无從得信善男子我今度此會中一切男女皆令受生着之左契此眾得道我以潛運生氣使其不死攝諸魔試以除其亂爾時慧命長者與一會大眾聞天尊所說心開意悟皆得六通旡上道果是時五帝大魔覩天尊道力身心變善與其眷屬前進作禮上白天尊我等諸鬼受報不幸生隨邪道不得自在或爲天地所使游四天下行諸毒害或爲糺過所侵注記罪簿試初學人保舉眞正役之勞不敢言極直以身體腥臊形骸醜陋私心好道日夜尅責悔過慙愧欲懇天尊求乞生化得入道流遠離魔形卽死无恨惟願天尊開導之恩廣濟旡限人神不隔咸䝉度脫說此語已踊上空中高六千丈放身投地徧體流血如是諸魔一時氣絕天尊愍之良久卽命侍香金童焚返魂之香以薰諸魔又命太和上仙布散生氣又命六甲直使與魔陰生之符又命主生道君呼魂召魄又命易形道君改魔之身
