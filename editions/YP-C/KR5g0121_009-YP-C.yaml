body:
  text: 無上至道其猶大冶銷鑠天地混化眾生土木金石變成灰燼此人有心何不可度爾時女眞勤勤固言男眞道君便卽許可女眞歡喜便以四月八日夜半之時卽命中眞侍女於人睡中攝其精神上至閬宫教以生道授其五石鎭生玄腴神丹又授此人飡和服氣神水之法此人睡覺書記誦持无有遺失至心修守三千餘日而果中仙之道位知下司主領西國戎狄雜類有心行道令其教授治在龍山正中而居亦能飛行身生日光四時八節上昇泰淸朝謁女眞此人成道女眞之力也今已得十萬刧於今在焉明威眞人威邪品第十九玉淸天中雲宫北方明霞紫房上眞道君受號明威眞人以慈忍之道赴感含識大悲成就濟度危難常在凝神九億大刧爲一瞬頃俯乘應變下流三界幽明兩途上中下心受眞正氣各乘一信而行其身率無不服任其大歸不乖其常自愚至智不出洪冶雖任其性無能迴越獨有大道而超之明威眞人哀世不出故悲覆之教以乘服之道漸趣無爲是時十方世界後學聖人及以凡夫畜生之類并諸鬼神一切祇向除得正者傍則大道隨分乘服以趣一道所謂學聖之士乘道妙氣學世事者乘世軌範乘服滅法形骸朽爛遊魂流浪而不能止各駕其氣而適一方固其所知占道專德於是眾生所乘旣異遇感不同乘道妙氣必果正眞乘服邪道自至朽爛無上大道哀其夭傷故流生道妙氣而養諸有於是上皇太眞普施道化出法對治善決眾病覆載含識演正一之道而化上士盟威之法相裂邪根聚天雲瑞氣成陰生之文以超枯骨置天官上司以主眾生太醫眞王變生起死痊除痼疾續絶補闕流通經緯益血足腦開決聾盲使聰察映朗齒長形幼彌久彌嬰明威大眞神力無礙權實之道等無優劣眞應之身遍於塵界道德威神始終不異起感之形隨類應變音聲萬殊嗜好亦爾下世不達自離其源一身之中忽相睽背妄想生患神邪兆焉不明大冶洪範之始中古以下湻澆狼狽勃然興僞颯焉以廢眾於邪道求其至當奔馳擾競不免塗炭甘心愜分良可哀哉爾時明威大眞以萬物未始洞曉其終逆制威儀顯示當來上述眞正不言邪道令修習之人心有繩准的當指實辨知邪正邪正之道立便試驗試驗之道所謂正行正命而行正法正法醫邪正身不傾正行不動正命不夭不夭之命謂命無窮盡不傾之身謂塵刧反嬰不動之行謂動之行謂行無上道修習大聖眞實之法變鍊形神出有入無永斷生死眾累不繼卽此之身而成法身不受生老病死之苦謂之永斷生死習邪道者其狀易露何以知之知邪之修法習不定生習之老而死不能易令人反嬰骨朽皮皺牙凋髮白喪聰失明須臾爛壞背道敗德輪轉邪俗不能絶待不能遣累蠶食行世惑亂下愚身命不正强言神變灰滅之後形離識散自謂精靈證無上果此名邪說不可依憑若見此人亦不放捨應以方便爲說生道而濟度之無上大道哀諸邪僻故出明威指歸溺喪好眞之士弘誓修習自密其身不動流俗當正爾儀當潔爾行掩爾之明蔽爾之聰服諸輕妙內外芳鮮不間貴賤不辨妍醜視酒色財同於腐臭臭想不懷況更輕犯一接身心眞氣遠離況常親近狎之求道邪鬼乘間禍害來侵翹足傾敗功盡須臾明威大眞逆紀後刧偏邪之道邪起陰氣濁惡之世便卽易興湻樸旣喪澆浮競作下界四天自號神王如此之魔名爲天神濁惡之世遍於下土四天之下山林石精附著生人皆相放傚自號仙王并及六天邪氣之魅共爲羣黨支流散釋隨世立名背道之人供食祈福蛀人精氣食人血脈減人年命人不自知入人身中亦能令人惡生愛死如是諸鬼入汝身中子息繁育精氣强梁交通生人虫魅鬼女亦能令人辨諸空義妬嫉生道若有男女修學生道是諸惡鬼競來侵害欲人死亡取其魂神共作儔侣以是義故憎惡生道後學之人身得成道邪鬽惡黨服事驅使不得自在以是因緣學道之人須應明知外道邪疾預曉明威之法揮割邪祟保護形神世若有人奉事邪道心堅不捨於是善人方便教招不從不得親近勿受其言何以故初學之人道力尙微未任降伏諸異道是故應當敬而遠之大歸之會自有大道下世教化示其威神降伏强梁大歸之際功過邪正分明自判無能迴攺後學之人好樂眞道先擇明師幽求博遠能進修者專精上道傍通世典貫鍊羣籍俯仰經緯一藝無疑上辨天經明道深義請受必決分别邪正雖處凡地可謂聖師第二之師不便世事又亦不明大道深義但遵一法堪度世者齋潔精至執意不囘凝神守戒誓不爲惡如此之師與道合同精氣不散易得感通形固神凝中和内養非久之間刻時昇度骨肉俱飛永果眞道雖曰第二不失明師第三之師無的修守但以慈悲忍辱常修不殺領戸化民救治疾病了達明威誠不欺誑不視貧富妍醜貴賤施散財食行平等意視他之親猶如已親視他之身猶如已身見他危難方便濟度令得安穩見人遭苦願與同疾慇懃愍念不相棄捨及至大悲埋尸殯骨减割衣食分乞窮乏終身行孝不作非法不於怨憎而起加執竟信幽冥不慢虛室與道冥符邪氣自遠不欲求道而道自來道言後世凡夫欲學者達此諸事而得道者無有是處後世男女欲求道者先當立功立功亦有多種第一之功弘道化物以輔天子孝養父母第二之功弘道除害傾邪滅僞第三之功仁及一切蝖飛蠕動及諸草木第四之功寒棲苦行事師求法服食專志内外芳潔第五之功立壇建齋率化有緣請師祈福悔諸愆咎供養寒棲學眞道士衣資藥食牀敷香燭及諸具度供功德者令無闕少第六之功贖放生命不限貴賤及以大小窮源水族爲引流澍若無決處取送深水令得蘇息飛走之類胎𪅏溼化巢宂崩毁子未能行恐其不養方便爲其修緝補綴無令驚恐使其不育如此之人號世法師濟度窮厄與道同德大道友之得免生老病死之苦綿綿長存永絶勞累眾患不繼如此之人謂求道之要得道之機道言諸善男女立功之法復有一種所謂善解明威分別邪正揮裂虫鬼馘截奸邪願與眾生同得無病行住安穩忍辱之地雖無正修各得守分立功之人平等愍念一切眾生若見偏邪不正之疾慇懃不捨決之令愈一坐道場利益無量苦惱眾生師先教令邪病之人灌沐塵濁教其願行正信大道勿起邪念敬向道場視師如父披服鮮盛内外芳潔焚諸名香禮師如法師卽爲其陳心所苦上請大道眞威生神億億萬眾消邪滅僞師爲眾生備受諸法内以治身外堪救物服道内法所謂三淸寶文雲書靈章龍圖鳳篆九氣垂芒精心修行威制天地如是寶經總有三萬六千大藏一一藏内復有三萬六千部經一一部經各有三萬六千柔玉之簡如是眞經得一便足不必備受三淸寶文但當專修三淸一法足得成道生身度脫信之在目立驗須臾救俗之法不事内經天寶文也但受明威生神之籙九天眞符九天兵符九天社令九天神鳳九府神劍揮邪拂魔九府神符驅鬼役精玄手眞訣登綱躡紀飛步七辰束縛强梁威震邪僻翻風止雨收卷昏霧迴晨駐景呼吸神氣變禍爲福此諸法者是九天眞氣自然之道大聖慈悲出之救俗九府生神主養含識下應兆民凡百男女有心敬信無上大道威神而衛護之此威神者是正眞之氣化成威神遍滿虛空信道之人請福滅禍影響之頃威神立至此威神者雖復氣繼上天神周色象故曰大道授乎遍滿世界大道眞氣化成風雲大道妙氣凝成甘露大道慈氣化成膏雨或爲甘泉或爲良井或爲山嶽或爲源流或爲深淵或爲茂林或爲藥草或爲禾稼或爲香樹或爲花果爲世資用饒益廣大下世愚人便爲天地三光風雷雲雨霜露萬象空生自別不由大道若有愚人作如是心當知是人爲邪所惑欲求正道終不能得不愧根本忘恩背義心不慈愼勃戾自任反天逆地縱得暫生不得其死傷殘塗炭困苦狼狽人神不哀鬼鬽同疾輪轉邪道沉溺生死譬如朽敗不可令堅猶如巨石墜千丈坑難可逆上邪俗之人永不欽尙正直之道況求道要心希昇度哀哉流俗永與道隔失眞之初行乖絲忽漸漸廣遠瞻望不及都忘先始隔道之初雖處洪冶器象區域乖於正眞譬如惡人瞬息邪視心尙不端陰血冥沸嗔氣以成損身害命患源斯作疾用醫方倍功療治猶不能愈况於終身淪沒邪僻不見明威正眞之道焉得生乎道言往昔火刧之初戎山之精化作人身體備眾相行世教化聚徒八萬教之事火及觀水法一十二年吸人精氣人皆失正邪觀已成爾時諸人同心受死各入衰草乂手跪坐脫衣解纓雇人爇火衰草盛然一時燔傷八萬餘人毛焦皮裂疱汁崩潰手腳攣縮拳屈盤地苦通悔恨不能出聲爾時山精彈指讚歎而作是言有生之類終歸磨滅煩惱之身百毒營室應速遠離求早度脫當滅此身以求法身嫌火毒烈當赴深淵爾時山精說此語已八萬餘人匐匐赴水風浪所漂溼族吞噉河靈執其魂魄水府役其精爽徙謫困苦七千餘年於今未休一旦被邪生死不離爾時戎山之精誘殺凡俗目知有罪上懼大威深藏石中春遇雷神霹而出之驅使從龍日夕辛苦不得自在如此强精欲揮之法可使雷公馘而裂之不煩天官上司威神之力不勞大道眞妙之氣不用大道生神之威邪自銷亡爾時復有遼左島夷國中鐵鐘之精化作人身行世教化其法遍流八十一國令人受死生便哭之歌而送終年老之人謂之鬼朴棄之草澤令其速死是諸戎夷行此風化首末已得三千餘年被棄老人餓死空澤困頓狼籍明威眞人愍之塗炭因使五億金剛童子銷滅鐵精及諸木魅制以孝道養老之法以救凡俗爾時鐵精復形是諸金剛埋之入地鎭以七寶神符於今在焉後學眞師欲揮此精宜請金剛童子億億萬眾殄滅精鬽卽自銷亡爾時復有西南金方鐵圍之山精化爲人出世教化其法遍滿荒戎之中百國之内流變五百餘種其名外道奉事眾象天地日月星辰風水金木鑪火城堡道路種種苦行變易衣服及改形貌立像供養木葉書經殘損形貌披服戎衣受持禁祝入城乞求皆各自言此爲勝果齋祭血味祝號天王或稱梵師專事烹宰奉獻天神望求多福邀世財利各各自言能施我者得福無量如是外道附著人身悲啼叫呼自拔頭髮踴身自撲受死求滅或默坐闇室諦觀光相言覩大聖或見一切罪福之相凡夫聞之競來布施捨諸珍寶妻子奴馬城邑田宅或捨身命頭目髓腦心無所恡是諸外道教其愛死輒見死者歌頌讚歎棄尸荒野名曰生天合眾禮拜歡喜歎言大士高人厭世求度身充禽獸魂識生天煩惱不繼豈不樂哉是諸外道苦行之法然大火聚而作是言若有善男子善女人能入火聚燔燒其身是名第一大士得離煩惱證無上果獲得長樂無垢之地得登長樂不動之地是諸外道讚言大士勇徤德力無比能爲世間作大利益愚人見之競燒其身當爾之時外道遊精飛空歌讚作眾妓樂令其甘愜一百戎域數十年中過半傷殘被此外道作法誘道後學之士欲滅異道當修正一之法具大威神而降伏之以大道妙氣生神眞威而擯落之外道凡形自然歸化外道精靈亦自消滅後學之生欲滅此邪善用火鈴之道邪卽須亡此諸外道雖求勝果終不能得滅命之道非得眞也此名行尸邪僞之道大道法中亦有此人人心流動身行不正邪神任之亦名外道如此之人不辨眞僞淸濁不分自來邪鬽心旣偏僻大道不行媚精入心惡聞生道後學之士深宜辨之當以道氣淸諸穢濁請天司威兵五部神將各五萬五色兵吏五億萬眾廣施道場摧裂凶試而自消亡是時北方五十五國戎狄之中萬𡻕老狐化作國王治在崑崙山東媚好諸女生得狐子孫息興盛遍滿諸國鬽殺人民食噉畜産作諸光怪亦有强精合爲羣黨其鬽人之狀化作美人男女之形與人交通亦能化作生人宗族或時髠人頭髮令人失心狂走妄語亦能令人惡生好殺陋其身命心腹剌痛乍消乍脹聰明辨慧晝伏夜遊愛好彩色欲常獨處其變狀也有似木精之狀興於春秋生落之時木精易除但使雷神霹而滅之卽自消亡後學之士深辨狐鬽欲揮之法當用西戎賓金鑄作神劍密藏身上疾用火鈴奔星之道上請大道生神威兵億億萬騎摧折强精擊揮狐魅聞聲震伏萬里逃蹤幻化之道自然擯喪女娠狐胎堅未潰者上請威兵醫治玉女齎五方之藥針刀火艾入其身中隨病對治速令崩落於是道氣流行元始風布邪胎消潰生道潛備上聖醫之不窮倐忽上人醫之經旬始效如是病人髓潛空虛血脈不注教使安心持奉經誡取令平復解禁自在重病之人令其奉道師授明威辟邪之法晨夕存念供繕香燈受持師法如對御前爾時明威眞人以大慈力故出此正法下流凡界是諸强精遙聞敬畏復形潛蹤而不敢動當爾之時不用揮割是諸邪精率心輔正承侍大道慈悲不忍加滅故出明威之法流傳後學防諸精鬽或能犯過干忤正眞後學之人當依正法馘而裂之絶滅𩲓魅消殄精祟令正信之人心有指歸一切眾生賴此安穩此經所在則爲有道德人修之助道興化治護眾生不問貴賤不恃其貴望他酬報上聖遙鑒善道友之冥司記注其功自全無上大道降下生神而來衞之如此之師所在之處一切人神之所恭敬不得輕觸譏謗罵詈及以捶打竊其財食天地神祇立見考罰如此之師心體堅直與道合同一切人民皆應作禮重心恭敬猶如敬天何以故如此之師雖暫居世德並天眞威能制天天猶敬之以是義故一切人民應起恭敬欽尙其德能制天地濟度廣大功侔造化道力無踰一切男女應於此師弘大道心願得一切人民同師修習果無上道明威眞人說此法時魔宫振動𩲓魅喪精和風慶雲周流下界法雷法雨潤動四天藥草諸樹應時花敷邪道歸正五鬽銷蹤爾時明威眞人聲光遠聞十方渴仰四天之下一切男女燒香叩頭仰天弘願願得大道降臨下世爲凡見形以申翹慕是時大秦國王伊耆若提覩於眞光一心注念七日忘食而作是言若有大道遙感我者我當屏棄國累從道出家時有日南外道名弗多梨徒眾六千髠頂裸形擎一鑪火來入王國門人白於王王出頂禮謂是眞師迎進城中晨夕供養廢治國務王從弗多梨出家求道令王晨夕頂禮此鑪一國男女亦皆事火火精興盛漸入王心王及國内盡皆受死各立誓願燔燒此身以求上道王及臣子期取四月八日聚樵燔身明威眞人愍王無知卽命北海龍王玄武大將乘大海水往於南方去地六尺遍覆大秦足滿一月外道與王無復生計一國無火人噉生羊火精之魅自然消滅王心自疑卽白外道而作是言汝師我聞西北有師徒奉事水神將非是此來相試耶爾時外道合眾震佈不能自持卽答王言大王當知諸異道法五百餘種修之果極超至梵天一種求道亦有何定我今與王迴心事水爾時國内男女大小悉皆傾心向水恭敬入經一月二更之初忽聞水中有人言曰大道雖無形應之如影響虛空本無際覩境猶心想水火傷爾生魂神滯幽壤雲宫自在嬰飄然乘氣上哀哉習邪道進退迷塵網悲生老死至朽爛誰𢹂奬何不學長生一瞬周天壤形神忽已昇精氣長寥朗爾時王及外道聽得正音便卽精研正音經一七日心忽開悟行尸之身變爲芳骸聽察眞正洞覩上方雖有神水不能障蔽研詠至音寂坐虛室心無邪想專志大道足經千日心香上陳求師解釋爾時明威眞人以慈愍之心見其法身光氣之體爲王注解王及弗多梨并諸臣子九億從眾一時成道見身昇虛不受生死爾時大秦國王成道之後重請眞君爲後來生銷滅五方災害之法眞人告曰大道之法唯貴長生助國扶命救度兆民背道失生自勞舒慘不能扶助衞護有生以是義故無上大道故出生道蕩除死氣精心行之德動天地兼修假習無所能爲五種之災皆可消滅學道之人盡誠助國齋醮禳災志求徵應師爲向所方面齎好雄黃七斤密器盛之沉以深淵勿令人見金書眞文鐫以玉簡鎭國五方神山之中幽巖深洞齋戒請福而爲天子及諸兆庶若有吉應則神香氛列風不動條四極廓淸則大福來應國祚延永天下太平當此之時亦令國王登壇告天卑宫菲食恩流國內惠恤老病仁及蠢動不傷含識如此之君長處天位學道之士應如此經告語天子亦可豐贍資助長齋名山潛行至道而爲天子及以兆民此名陰德貴无顯露依附高貴而行至法恐動俗間能無罪失而得平行也學道之人當與國主而同其德俱爲天下一切兆民德不同者强行吾道天不助之勞而無功道言學道之士當具十德第一之德分別眞僞不浪修習第二之德精研至法窮諸妙門第三之德專志守戒心不放蕩第四之德通詠聖教心不疑惑第五之德慈孝忍辱不與物爭第六之德供繕法事心不怠惰第七之德柔弱用道微密其行第八之德勇能進道履險不顧第九之德威震外魔解脫纒累第十之德救身死厄長存無窮道言學道之士不免死厄不離邪法非得正也雖曰丈夫實無道力不能常住爲物所遷不名道士是名外道與俗無別虛無辨慧强明空義無道心體四大流散不能全生魂識漂浪遇合而倚動億千刧不能得道悲世行尸哀其失生老死爛壞神勞往返一爲失正二爲罪深三爲不勤四爲邪僻五爲强梁六爲重濁七爲馳競八爲不愼九爲怯弱十爲自傲有此十事能敗眞道如是十事元於失正流變十惡而無窮已修習正法流變萬化妙隱玄中亦无窮已學道之士立功建德勤修生道遠離死厄行成之日眞道見形𢹂其同遊無上大道好生惡殺好生之人能得吾道好殺之人自喪吾道人自背向非道違之大道無心應於能行不能行道道亦應之應有陰陽生死二道榮枯成敗出入洪冶昇沉有殊哀樂相背𢘆懷引接無奈不從哀哉流俗滅亡不反使其營生如營死者天錫雲車浮空而遊使其好道如愛財色眞人爲儔眾靈爲使使其行柔如行剛者塵刧嬰孩未曾有傷學眞之士吟咏此經寶愛自戒終身無患必獲昇度道言學道之士未昇之前猶在人世應當哀愍一切眾生爲其消災生活民命其德甚大第一之功師於有災之方建立道場百千之所盛治方域香木盪穢施立牀座安置經像令眾歸依燒香然燈六時禮願意在丹款不假浮辭微聲下氣不與眾聞師爲啓陳大道言彼災殃元兆所起次請五方威神其名曰東方靑龍將軍九人從官八十一萬眾南方朱雀將軍三人從官六十四萬眾西方白虎將軍七人從官三十六萬眾北方玄武將軍五人從官二十五萬眾中央戊已黃麟將軍一十二人從官九萬眾羅列天儀下來壇内運動神力滅鬼生人隨其病源神方對治師爲願念哀愍病人猶母愛子欲其無病約勅壇内每事整肅忌噉葷辛魚肉之類男女穢氣衣服垢膩講論非法舉動傲慢心不珍重天道不助邪神不滅所疾不差翻招殃咎其道場内三五日間一過香湯灌灑場内人不灑沐不得入道場每置一壇場數旬始解任其來者師無責坐困病之人不能行道任他世上不必須要病身自行道或可立瞻對但取效驗不拘常則道言凡醫邪之法復有三種第一色人志在出家未明科法用意偏僻媚鬼入心應須醫之不醫不愈如此之人所用心信香水而已貧士之香直心而行第二色人專心在道未佩生籙長齋苦行功德未立忽被凶試來入道場事須香燈米木草果三過供養第三色人身雖假道志在邪求身染疾患欲求救療來入道場者責其心信謹依醮法又責束帛隨其富貴以酬道恩與師營辨法具及師衣師屋敷具等用又將買藥及食供施貧病不自活者贖放生命及買香油治舍都不得俗用犯者罰病十日十日之後善神遠離所學不成病人不專心想散亂及犯穢污不自舉愆不從師教所醫不差登卽受考世醫不救學道之士建功立德未辨隱修在世醫救戒愼戰慄如在名山用心無異爲人所請不得辭勞推託有事或前喚後出或詐言不在斯託疾病嫌疑貧賤無價可貪責望財信以贍私費不救懸急罰病百日善神遠離爲邪所考世醫不救道言學道之士道有淺深德有優劣若遇明師伏膺膝下或遇眞人下遊或九祖流慶或先身業道功德未成暫歷太陰報生王國乘此運會盡受寶經王氣周身威神衞體不更生滅尅獲道眞未昇之前或遊凡地門徒繁廣未盡澄淳忽染不眞應須淸蕩如此威神都無所用但爲吟拂魔之靈篇詠上皇之大厯心騰絳氣目聘奔星揮以神金良劒照以圓穹寶鏡或以高坐虛堂精誠守正内視陳啓無勞口辭三洞生神隱居經緯於是六邪外殄五毒内消賓主之心不覺勞處任所營爲無復障礙如此之師威力弘大一切神邪皆爲侍衞或有門徒男女業障未消司非糺彈或應受考師以慈悲爲其首謝上爲九祖下及一身專心悔過無不解了道言莫大之愆不過婬殺父母及其師長此罪極大無能悔免永沉苦趣無有出期永不見道永不聞法況能得道學道之士及諸俗人應生正信慈悲孝順勿生邪念背道忘義進退受罰不可思議若有世人及諸經紀言殺父母師長罪可悔者猶固合道此是鬼鬽所說妬𡜍神邪之所教化顚狂之人作如此言大道不聞天地不赦惡鬼所罰湯炭燒煮永失人道一切故殺蠢動含靈天猶不赦況故逆心殺害師父而可首悔學道之士宣吾寶經開凡耳眼遍使知聞功德無比不可稱量道言龍漢初會火刧之中寥邱之國在海之中西去霍邱七萬餘里中有道士名曰乹忠其姓聞氏年始十二出家求道修不殺戒治病放生孝順父母敬事師資身未服佩長生之文但以建功立德心不懈退首末已得二十七年功感諸天其道場之内常有眞人下降改形同凡又有地水諸神爲其給使供繕法事授其神藥療諸痼疾不覺有勞下手之驗如湯沃雪斬伐邪精都不用力大建功德憐哀貧病雲宫天尊感其殷勤知不退敗正月七日故命明威眞人授其長生之道合景昇虛受號眞人治在三十四天已得八億大刧形貌反嬰亦能授手過滿世界大道以其德廣卻後十年勅五龍王昇其住宅九十七人男女貴賤移居泰淸天上俱得不死功德巨大道潤合家凡夫之人一身不度七祖父母何所恃賴而得免罪受生人間不可思
