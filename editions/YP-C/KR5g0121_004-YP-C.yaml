body:
  text: 上元品第九爾時上元大慶正月十四日晨朝之時二景交暉月華收彩星精歛曜圓羅啟旦芒霞疊照大空虛朗香花互啟元氣發生和液入堅地雰輕霧天散浮煙海淸不波玄源演津飛蓋彌羅丹旌吐雲靈幡飄飄華猋雰雰空樂長鼓虛籟永吟五精導途雙景翼軒爾時上元太眞皇極天尊與諸侍從日宫之中雲霞寶座齊下神足安詳而起登於猋輪凝精寶車香雲纏蓋慶霄四冥騰皇整轡金光理御正中之時下觀十天盼着六合後會陽寥之宫爾時天尊與諸大聖俱放慈光從心中出明照幽顯無遺纎塵光非千色無有邊際天上地下朗然無滯法輪常轉羣生俱會噓太和以發萌呼柔弱以散剛甲裂盤施含靈踳馳琳碧敷華瓊根秀枝至十五日日中之時三天仙人無數億眾不可記字心越五通身無死地能調六軍降十大怨在於郊間忍辱之地權立一城高廣無比有四大門樓峙聳峻出於雲心悉用七寶以爲關鍵渠濠深邃洞入淵際其城之端有三萬六千寮孔網以珠絡地以蒼珉墀道周帀平夷廣遠城中宫殿亦悉高妙陰輝燭夜朗然無翳珍玩糓帛盈積府庫是諸仙人大設天儀雷震法鼓秉大丹節舉大丹旌仗大金鉞撝大神劍精器利銳譬如麟角服大法鎧柔如雲袍善却毒箭五兵不傷是諸仙人手執鈎鑲鋒芒纎利前驅後殿威如鳳爪晨朝之時俱駕六龍齊引寶車出於郊間陳列威儀鳴鼓吹角未及作令怨敵以伏解甲釋衣雄氣頓靡銷金裂鼓摧旌毁節被髮解帶披心露膽膝行肘步下風而趨匍匐求盟心血自見仙人各擁命魔靈幡導諸投化登太玄之路入洞淸之源陟長明之阿昇金鳳之壇焚逆風名香誥以左契醼以玄津時諸大怨覩此神妙忍辱之力誠知無比心靈頓改願爲仙人作善知識爾時仙人至於食時與諸侍從翻入大城於其城中各捨威儀齎百寶名珍神鄕奇物昇入上淸供養天尊所謂日月寶珠星精寶珠陽燧寶珠陰諸寶珠曜電寶珠驪龍寶珠忍辱寶珠大悲寶珠大慈寶珠六度寶珠絕塵寶珠和光寶珠無瑕寶珠離欲寶珠含眞寶珠英華寶珠堅固寶珠精進寶珠持戒寶珠心海寶珠智慧寶珠方便寶珠雲雷寶珠和風寶珠發生寶珠甘露寶珠如意寶珠是諸寶珠光彩各異圓明一等復有三種無價善寶所謂大慈善寶儉約善寶退讓善寶如此善寶若有眾生懷此寶者所求如意無願不尅若有眾生爲諸病苦懷此寶者病自消除若有眾生心多反逆懷此寶者自然慈順若有人王天下不化災殃屢表鄰國鬬爭五兵交戰百穀不熟水旱不調羣臣陰謀懷此寶者天下自化災殃不生鄰國交好金芒喪精百穀四熟水旱調平羣臣盡節陰賊不生是諸仙人復齎四種香飯所謂豐山香飯龍山香飯浮山香飯太和香飯香氣豐布食之無盡是諸仙人復齎七種寶漿日精寶漿月華寶漿星精寶漿甘露寶漿金液寶漿靈光寶漿玉匱寶漿各以諸天寶器盛諸供具復齎無價寶衣所謂自然瓊羅寶衣自然雲錦寶衣自然流霞寶衣復齎無價名香所謂反魂名香反風名香逆風名香七色名香復齎諸天雜果所謂萬歲靈桃空洞靈瓜霜梨玉棗赤子金葩種種珍奇來至會所供養天尊大獻珍寶列滿玄中香氣氛氲周流十方百寶光彩暎朗無際時諸仙人圍遶天尊百千萬帀齊鼓天樂太和之曲億變萬轉音聲和美淸廟寥亮神禽鼓翼而騰舞靈獸叩節以齊和龍吟鳳歌眾音合會淸風吹絳樹之響名香轉徘徊之蓋日月停輪眾星曉明芳煙拂廻甘露如傾是諸仙人良久之間輟眾音之繁會弭未遇之高節收曡飛蓋傍息騰皇併却猋輪虛立雲庭一時稽首問訉天尊而作是言不審天尊眾善法身道化慇懃以勞聖慮萬兆無福實貫神心而塵穢䝉籠根業沉濁仰佩玄祐曉夕開懷慺慺之誠恒對心目空形任道無以報恩復念生成未能忘本塵眾相率建此微心而三天罄窮敢獻塵露藉以上元大慶慈尊高會天恩無限不間塵臭願爲納受所獻丹心言畢稽首伏聽哀旨爾時天尊凝思遠視神彩沖邈金顔發輝眞光四照萬天在眸神力周備塵界非遥令諸仙人心疑豁消是時天尊卽命右侍金童焚香百和反風名香又命左眞上相千二百人齊鼓雲和之璈又命左直主春上元眞宰千二百人齊擊神金天寶之鐘又命東極太仙九千人以扣萬石紫瓊之磬又命西極太仙六千人齊擊神山天寶方金又命和風吹出空洞萬變之音眾樂齊奏良久之間九色雲龍蜿蜲騰舞八霞廻空香風轉苑騫鸞翔鳳靈禽仙獸長吟虛庭不緩不急如飛雲之旋天似廻波之引流眾音之中演出空洞微辭而告仙人曰上元正氣皆自然主生皇極爲眾緣紫房吹動氤氲氣太和流衍㪚剛堅大道生成法如此故我移居治此天風雷消解諸盤結六氣能驚長夜眠此亦神功自通妙非關吾强使之然眾寶以陳玄理界卽是虛心上福田爾時諸仙人聞空中微辭之音自然妙響淸通虛豁道德流布理無不存歡喜適内神光發外一切有生皆發英華昇沉飛走踴躍騰舞寶樹香草應時花敷諸雜根枝萌牙啟甲是諸仙人登六通果九祖承慶免離憂苦上元之功其德如此三日三夜天事乃畢爾時天尊爲受供已轉設天眞靡不周遍以無相施故如道神力果報無窮香飯寶漿湛然不減日月寶珠彌加明盛時諸名香其氣不絕是諸仙人大眾之中有一上仙名曰昌期而作步虛曰整控啟皇極乗運入中天披空獻心寳妙覺朗身田日宫㪚和氣寥庭騰願煙大道難思議隆福慧無邊空身遊道境㝠心入太無披玄尋寶際幽契自相符故能明假外噓累絕羣愚誰知不死道遐因空洞書玄風鼓太無天樂演微音龍章昭鳳彩王字發虛琴飛猋上雲路㪚髮寫瓊簪稽首禮皇極焚香陳我襟爾時仙人說步虛已重復稽首請問天尊而作是言上元高會以䝉仰覩沐浴恩化空心荷佩福被幽顯存亡獲濟忘退罪愆願垂赦宥欲從天尊求乞一願願爲四天之下一切眾生度脫苦惱免諸厄難欲請天尊下降丹臺神州之中大度天下人及非人於是皇極天尊而告仙人言汝等當知三元高會良辰吉日原乎正氣正氣化生一氣一氣化生平氣如此三氣上應三元天寶宫所謂日宫月宫星宫宫有一尊我處日宫號曰皇極天尊主於上元正月十五日春陽之時發生萬物月宫之眞號曰正一天尊主於中元七月十五日以成萬物星宫之眞號曰眾妙天尊主於下元十月十五日藏養萬物子但專心於神州之中及四天之下教化眾生令遠邪道宣揚三尊眞帝名字晨夕願念至此之日三尊互下降臨洞府分形萬億濟諸天人爾時眾仙謹承明敕以正月十七日日暝之時辭别天尊歸於下界過北斗之中夜候眞人朝謁靈童停留七日而下神州會於首山之上議定流化三日三夜之後東到扶桑之陽南到炎洲火池之陽西之崦嵫流金之西北越陰谷積雪之北次到員壟靑邱崆峒具茨以次告報新得道者一如上元皇極天尊金口辭也云中元大會七月十四日正一天尊下降神洲各令仙人下同具備謡歌唱令眞帝名字聞四天下各令此日辦諸天供具盡世所有施安牀座幡花香燭心心繼念是時四天之下同於此日殊心合契中元品第十七月十四日晨朝之時天下仙人及諸國王一切人民仰視上方渴如所待爾時正一天尊與諸大聖六千萬上眞之眾各乗月宫而下其中諸人皆見如雲之垂降臨下土爲人保證無上福田爾時天尊將二侍者下於丹臺諸餘眞眾各赴所感丹臺羣仙侍從天尊至十五日日中之時靑邱仙人八十一萬眾俱乗靑龍之輿齎諸供具來至會所員壟仙人六十四萬眾俱乗朱雀之輿齎諸供具來至會所崆峒仙人三十六萬眾俱乗白虎之輿齎諸供具來至會所具茨仙人二十五萬眾俱乗玄武之輿齎諸供具來至會所崆峒天仙二十五億萬眾俱乗黃龍之輿齎諸供具來至會所須臾之頃東九夷南八蠻西六戎北五狄邊遠之方諸仙人等各齎供獻承道威神浮空而至各各陳列供養之具奉獻天尊陳列事畢圍繞天尊步虛歌讚焚香散花作天伎樂眾音合響神風徘徊香光纒虛列位以次俯仰節度左齊右整北面長跪微言寂氣問訉起居而作是言萬兆紛紜多惡少善不期感動降下高尊而此塵穢之徒竊好眞道濫當開度功不補過無能自勉又恐九祖承負釁咎墮在幽扃或生出殊方受形異類幸藉微緣遭遇大聖不動而感高會良辰小兆微生敢求多福唯願天尊誨示未聞開發金口演出靈章中元寶經開度後世爾時天尊高抗深視良久而言月宫兆魄圓羅孕輝隰壤消煩金風扇威火木藏養炎涼氣交皇華垂津收束氛妖吉辰開宥萬帝來朝六塵外靜三毒内消二世獲安介福所招無所之先朴散爲元形名之後妖邪所怨萬物亡本進退乖根良辰不度無思道恩悠悠萬兆痛不能言爾時天尊說此語已俯而彈指數聲天地震動河海騰波神氣不暢悲風不和是時眾仙各起禮謝而作是言不審天尊以何因緣俯而彈指天地震動日月不明神氣不暢悲風不和小兆道淺不達至理心中疑懼不能自甯唯願天尊大慈憐愍哀所不悟唯垂分别誨以未聞天尊告言我無名之先眞道大行言教未施天下德化我見世後人民多智各習異端尙多聞見仁義互興財食親輔棄貧賤弱父子相嫌君臣不忠六親怨爭鄰國相讐四海交兵以是因緣不善增長輪轉相報無解脫時不如今日眾生尙善初來聖眾降四天下一切眾生欲求智慧以離愚道漸漸工僞百競馳起雖地獄空虛不久盈滿以是因緣故我彈指眾仙聞說不覺悲悴爾時崆峒仙人從座而起稽首作禮請問天尊不審羣化之心可廻攺不欲請天尊自在神力防遏萬原之端擁未萌於機上使合生復根億兆藏初唯守一道泯絕羣生心無起滅形同太虛天尊告曰善哉善哉善男子汝所言者是大道之第二十之子也何以故大道元乎虛朴虛朴散爲元氣元氣自然成形有生從生立名因名有言因言生正教正教生卽智慧生智慧生卽巧僞工巧僞工卽愚智辯愚智辯卽是非起是非起卽憎愛生憎愛生卽攻戰作攻戰作卽君臣立君臣立卽萌賞罰賞罰萌卽利害見利害見卽陰賊生陰賊生卽罪目結罪目結則冥司立冥司立則有水火之罰輪轉无窮自然如此非道爲之汝所言者居乎萬機之下故曰我道雖明背之則暗我道中正反之則邪我道柔弱捨之則剛我道長生輕之則亡大道無親唯與善人我觀羣化非可卒正自有萬分之一生感和氣歸原復根大道爲此下流正教以表羣目欲其影從而汝後學卽斯人也爾時崆峒仙人請問天尊不審水火之罰其義云何小兆不達願垂分别天尊告言水火之罰凡有四種陰陽二過冥司謫之經水過火所謂冰炭之罰也眾垢齊積焦沉禍至天屯地否水火交會乾極則八海騰煙山嶽灰燼天門祕揵金玉銷爍三景藏精風雷扇炎火翳流熖天地成冶地否之時陰成告瑞移陸溟海中天湧波眾眞遷治西北水母形如素旐眾鳥南飛羣聚天際飄風激濤崩騰山嶽金石相觸磨滅泥滓善男子汝今當知此二大災以應天下及以萬民何以故天下無道萬民不化此災者喻如眾生五内反逆蓄泄不調自然成患况於天下失道敗德眾塵齊累天地愍之不能已苦應施罰前示其教次告其氣後垂其象愚癡之人不信正教不明氣象凶惡不攺天不得已示其大威譬如臣子君父寵念承恩驕恣變心失忠不孝君父私懷反逆謀狀以露仁君慈父猶不卽滅先當施令如是臣子心猶不悔後付司殺君猶哀之但不得已天帝亦爾時諸仙人聞天尊所說皆悉歎言未曾有也禮謝天尊煩勞金口愍諸小兆宣示未聞荷負恩造流霈之澤禮謝畢巳天尊告勅令復本座至十七日晨朝之時正一天尊初來眞眾應緣畢已從四天下歸入丹臺問訉天尊起居道化得無勞極天尊告言眞化無勞道化無極子赴萬兆得無疲猒眾眞答言承道威神豈有疲猒天尊又問生死二緣得解脫不眾眞答言地獄罪魂以天尊下降丹臺之時登卽解脫四天之下一切兆民雖解無脫爾時丹臺諸仙聞上眞之言心中不達爾時昌期仙人卽從座起稽首天尊云何地獄罪魂未見天尊而得解脫云何四天之下一切兆民雖解無脫願爲分别天尊告言善男子汝今諦聽吾爲汝說所謂大道藏用雖濟度萬物而不爲尸暗德運載以是因緣能令罪魂而得解脫雖解無脫者所謂天下人民雖解煩惱性空而不免脫何以故凡夫之人雖解法性不習眞常但明至理身在合道是故道與理乖譬如有人身坐狹室心遊十方無所障礙或說至理聰辯無滯離合隨心此名心得入理不名身得入道以是義故理雖合道不能令身而得入理喻如夢遊身不隨心是故眾生心得入理身不入道心入理者名之爲解身不入道名爲無解無極大道身心無礙能令微塵世界一時赴感故曰大道自在解脫能令十方世界如觀掌中前際亦復如是是時天尊說此語已卽放左手五指十種光明遍照虛空令十方世界俱見光中時此大會眞人仙人靈人悉皆洞覩微塵世界又於光中見其二際身所經業了了分明是諸仙人洞觀希微道窮眞常皆得六通自在之力九祖獲慶受生道境天尊中元之緣畢已七日晨朝之時天尊大眾俱昇雲路玄風鼓樂紫霞虛邁空谷謡歌天吟萬籟爾時眾仙而作步虛曰吉光騰紫氣霄輅逸丹天翻颺香風轉蓋動起浮煙道中還復道玄中已復玄眞光不識際大象竟無形法輪常自轉希音不可聽空閑侍三寶虛中聞洞經七變游魂反萬氣駐頽齡香風飄羽蓋游氣轉猋車泠泠上雲路窈窈入長虛顧愍埃虛子應運演靈書妙果諧今日㝠契自然符爾時仙人上送天尊歌頌讚歎入至雲庭過四十天門是時天尊止諸仙人言天路遥長無勞遠送是諸仙人俯仰躊躇良久之間天尊愍之重告仙曰子後學成道雖得六通數千萬刧猶是人身與我大眾自然之體光氣微妙未可全同天尊卽命運氣上眞調暢玄風噓出無上萬變靈章雲和淸雅太玄之辭三十九篇其時日精上浮月液下流眞氣順生金風反和瓊林發蘂玉樹花敷法輪三轉流霞七波天外長謡虛裏空歌令諸仙人明道優劣又告仙人曰上道之希其法甚微神力至妙不可名言略示希有以與汝分别仙人歡喜禮謝天尊唯願大聖時見影響言畢辭別復歸下界下元品第十一爾時眾妙天尊以十月十四日晨朝之時與諸大聖五千萬億眞仙之眾俱從丹天之中星宫之内應運下世威儀度物先當引日入左目月入右目左斗昇左耳右斗昇右耳南斗葢通天之端北斗在瓊簪之下中斗在神足之間碧霞縈左鬢素霞縈右鬢丹霞暎三理之中玄雲浮玉枕之上靑龍吟左白虎嘯右金鳳前唱玄武擊節五星吐氣以廻繞陰輝停虛以懸照慶霄纏幕仙雲起蓋諷誦靈篇虛吟萬籟地湧寶樹隱草萌荑芝蘭脈發積雪冰消寒谷和氣溟泉吐温神煙逆吹召魄呼魂雲雷揮音洪靈耀精謡歌靈章空洞虛鳴聾瞽聰察攣躄復行河海靜波昏霧廓淸眞光浮輝寥朗長天五辰合度三景齊明異類親睦百穀豐盈怨敵解圍天下太平正道雄張妖魔滅形爾時天尊俱乗星宫齊整雲庭告羣生之吉祥應眾仙之靈瑞鼓橐浮虛俯臨太無下元吉慶景福羣儲進道修德理契神符紫藏交絡六府花敷神力變於下土眞氣流於太空御運垂期玄中優游於是萬變不盡須臾令冬林以發榮使枯木以花敷復含生以反眞攝萬類以藏初收道幽寥寂簡高居如此神力登應金口爾時丹臺仙人夙承上元皇極天尊金口之勅覩此祥瑞知是天尊下降神州卽出丹臺遥見玄中光明赫奕星官高妙幡蓋彌天羅列眞儀遍滿虛空是諸仙人叩頭上請天尊降於丹臺須臾之頃天尊卽命左眞一人通命仙人曰我應運教化主知下元度諸新學證成眞仙諸有善功名著靑籙晨夕求願香煙熏於帝庭淸唱聞於太乙者我當示其進修之道命羣魔以侍衞下界凡夫廻心眞正下元齋戒爲其九祖我當拔濟存亡三代未聞令聞未見令見未解脫者令其解脫諸有病苦我當療治怖畏之者令其安隱我今法當降下地中宣道布化中元之時正一天尊以下丹臺爲汝說法汝功德圓備以具六通得無閡智但以身非自然後學成道所以爾者未得入登大羅之上諸學成道但至自在長存不死名著左契塵刧如瞬形隨日新汝等諸仙卽當其人奈何兆民形命蜉蝣朝生暮死與道相絕汝當知之爾時仙人隨從天尊暫治地中下元施化濟度羣生爾時天尊與諸眞仙微塵之眾俱御浮霞明星寶宫以汎其上下至地中列諸星宫去地七仞凝九色慶雲以爲大城七變光氣以爲樓臺萬變金精以爲四門金剛寶光以爲關楗太虛眞氣以爲寮孔忍辱寶光以爲却敵智慧寶光以爲城塹玄源洞淸以爲泉池四信寶光以爲階道六度寶光以成寶樹戒珠寶光以爲花實朱雀寶光以爲幢葢靑龍寶光以爲神麾白虎寶光以爲瑞節玄武寶光以爲鐘磬玄風寶光以爲仙樂法雷寶光以警眾生法輪寶光以宣道化空洞寶光演出靈文萬氣寶光以召生魂神符寶光以召死魂陰生寶光以起枯骨九轉寶光以除痼疾太和寶光以爲天厨甘露寶光以爲良井日月寶光以爲燈燭香雲寶光以爲飛蓋天花寶光以爲𥤆地爾時天尊以一慈力流出諸光上極無上下窮無下十方世界皆悉洞徹遥見天尊如在目前此會大眾亦覩十方猶如指掌生死二魂皆悉乗光一時雲萃羣妖奉節自喪其精亦皆乗光匍匐而至爾時諸地水神排破堅冰撥開積雪湧出半身飮和至化爾時地中草木游根伏芽悉皆湧出其纔見霜雪盤施甲裂騰雲吐紅須臾之頃神嶽冰消溟津凍坼地乳瓊漿天垂甘澤天尊凝視良久喜諸羣微心知向道乃開發金顔而啟法口怡然微笑萬變眞光流出金吻十方世界皆於光中洞觀眞相欣喜踴躍不覺自失人及非人悉皆傾想注念眞光入其心目三日三夜停然不動亦無勞極又於眞光之中各各見其魂魄圍繞天尊須臾之頃變成嬰孩入其身中各坐府内湛然不動自覺其身改爲童子色美髮黑氣力如雲時諸死魂飮和生氣悉成人形反眞復胎靈魔變節道德成心地水之神半身沐光以極其靈胎卵潛胞隨母獲安皆含正氣開剖之日順性成就飛走輕利無諸夭傷積疾新疴登卽痊除羣蟲不螫毒草樹滅天尊告諸有生言此非自然皆因道化一瞬之頃神力周備萬物以具受眞正氣至十五日日中之時下土凡夫各獻丹誠并賚供具以慶下元盡世所有供養天尊天尊告諸仙人言凡夫不同或獻丹誠或獻珍寶及以穀帛一香一味一塵一色大道慈悲應爲納受爲說正法示正威儀長其信根令其歡喜以是因緣遠離邪僻免脫生死長入道流可不善哉可不善哉是時諸仙人及非人天地之間有形無形悉皆同聲一時稱善當此之時香光徘徊流霞四象三景交道互西互東眞謠長虛梵歌太空寶蓋浮煙長幡引風龍王負鑪以散反魂仙童擊磬居城四門天樂和善響徹無邊能令眾生虛裏披玄寂坐飛龍默誦靈篇植根先刧樹果後來見在无際都忘二邊冺諸煩滓無心默淵自㝠光氣柔弱剛堅天尊說此法已卽入大悲大定須臾之頃寒谷吐風吹諸幢蓋鏗鏗鈴鈴虛響空鳴變爲悲聲玄雲不流眞光湛然神煙籠象七曜收輝日道南移月路陰歸九壤復堅眾流沍溟水精浮景游氣潜形溼族淵居甲𠘶盤榮蠢伏藏氣蟻蚑吞聲爾時天尊至十五日禺中之時微動左手抗齊神心彈指三聲爾時羣仙及諸凡夫皆見天尊出大悲大定歡喜稽首而作是言慙愧慈尊道化有勞濟度无窮幽顯解脫歡喜无量聖凡慶快不審天尊眾生未度之前何故金容啟笑化度之後翻入大悲日月不明七曜收輝霜氣吐凝嚴風扇威皇道南移月路陰歸羣物顦顇五内含哀彈指之聲令眾慘悲願爲分别釋結除疑天尊告言善男子汝當知我初微笑喜眾廻向易得度脫得度之後勿忘大悲若忘大悲雖度非度以是因緣故我爲諸眾生入大悲大定彈指當心示其内外和合三轉法輪而爲羣生無上大道法應如此諸人聞說眾疑頓決重復稽首天尊謝煩金口中時已至欲請天尊聖眾慈悲爲受眾生微塵供養成就之心願垂愷悌爾時天尊不違其意大眾列坐會中而受供養爾時天尊以方便力故臨受食時卽命中眞左侍飛往上界大羅之中取太虛寶光之器二口各圓十方安着坐上玄虛之中一器先盛大羅天中自然天厨日華月液以一空器擬盛下界眾生所獻珍物爾時四天之下一切人民及諸異類持物施者或手或口或心所獻之物一時俱到天尊座前各各心疑寶器狹小天尊知其疑惑卽告之曰汝等但施勿嫌器小諸人心疑不敢仰答天尊又曰汝心狐疑不能決定我知汝心嫌此器小是時天尊卽命中眞捧下寶器小傾其口而向諸人卽告之言汝欲施供具之者先令人王次及羣臣兆民異類各持本心入我器中諸人受命俯觀寶器忽見無際不測淺深四天之下一切人民一時持獻而入器中或車或輿或步或騎升沉飛走都無妨礙未入之人見器猶小入中始知器無邊際歎未曾有而作是言我等小智欲以度量天尊太虛寶器不受塵露是我各煩惱覆障不能得知大道法器向若不䝉天尊故命中眞欹器示我我心狐疑施亦無福爾時諸人入寶器已周遍按行莫知其極見有無量世界並在其中仰視上方天天相次日月星辰倍明下界寶器之中盡是天眞大聖空間虛白甘露大海百寶山嶽天禽天獸隱草瓊樹香雲香風法雷法雨是時大眾復觀所施蓋不足言次周行忽至天尊說法之所從器中出亦不覺知其時圓光停照時不攺中天尊媿其盡心獻諸供具欲以方便示其稀有天厨上味卽告大會之中國王王子羣臣兆民仙人非人等而作是言我愧汝等爲道遠來獻我供養我以爲汝受納之訖諸人慙其供具微少默而無答天尊以知其意重告之言下元大慶萬福俱會齋時以至恐汝飢虛我此一器之中先盛上界太虛天厨欲施汝等无上法食汝當列坐受我法食是人諸人以次而坐復思前施及入太虛寶器之時各更狐疑互相謂言向者施供及入寶器是爲夢中爲是覺時寶器極小若是覺時不應得入若是夢時應无施心又復寶器纔經一寸一切天地並在其中我等恍惚未能辯了爾時眾中有一人王名曰辦心告諸人言我等大眾未得眞道常如夢行法器大小入與不入施與不施一種同夢汝等勿言但當思念中時以至天尊哀愍施我等眾无上法食須臾之頃天尊卽命七童使者駕六龍大車載天寶器以次施食任諸大眾仙人兆人等而取多少食之旣飽隨意懷藏器中天厨都不減少諸人食之五藏花敷腸胃盈滿耳目聰察關節調理眾病永滅六識開張思惟道恩得六通慧反照前後九萬大刧所經業緣皆如指掌方悟前心定如夢幻爾時辦心與諸大眾禮拜天尊而作是言不審天厨亦有盡不天尊告言虛空若盡天厨乃盡是故大道有旡盡藏而給眾生辦心又問食此天厨果報云何天尊告言食天厨者夀命無盡形同太虛爾時天尊卽命中眞傾此寶器散於天厨着空虛中所拂草木皆成花實日華月液變成甘露汎空中者化成眞光和氣萬刧之後若有道德天子及諸學人飮我甘露飡我和氣凡百人民食我果實隨其根性皆獲利益爾時會中覩此殊妙不可思議合眾上啟天尊而作是言无上大道至法微妙神力無比而此大眾已䝉天尊慈悲之澤不揆塵穢欲從天尊暫陪霄駕遊於上界以申禮願所希便足不審天尊大慈之心願見聽許天尊告言汝等大眾法食之後心中何如時會大眾各各答言法食之後萬倍於前天尊又問昔夢之心存亡如何答言法食之後夢想頓忘天尊告言汝等諸人欲見上界各各復思令汝自見是時大眾復思良久天尊告言思何所見答言都无所見又問思何所聞答言思无所聞又問汝心何所起眼无所見汝心何所滅耳无所聞答言心旡所起眼无所見心无所滅耳无所聞天尊告言無見之見謂之正見無聞之聞謂之正聞无上大道法旡起滅無聞無見無去無來無身無心無光無相形洞太虛天尊說此語已攝諸大會入太虛寶器擲着上方是二寶器同時而上到於太空大羅之中如彈指頃是時諸人各各皆見元氣之尊虛寥獨坐在於玄虛中出空洞自然靈章亦无光相窈冥寥寂是時諸人各申禮謝叩頭良久問訉天尊而作是言不審天尊大聖虛寥獨絕與世永隔都泯聲譽使下界凡夫翹誠渴仰欲求多福無處依歸唯願天尊宣揚道化救脱來生又復叩頭良久伏地不起天尊不答須臾之頃空虛滅无唯見天中汎然游氣如有如无纔聞淸天之上微有空洞靈音俯聽則有仰視則无綿綿冥冥諦聽或聞其辭希微不可得解天尊又於會中舉大慈手入於有頂接取諸人還着會中須臾之間又環遶擲之周旋十方微塵世界一彈指頃以周七帀還到會中諸人各各自知乘道神力得見十方虛空道境又從器中而出了了分明心中無惑始知上界空無所有爾時天尊與諸來眾到十六日夜三更之初攝取太虛天寶及諸光氣一切威儀俱入星宮是時天下仙人神人靈人人王兆眾皆知天尊眞化事畢欲還上界恐畏以後無處決疑新入道人及諸來生欲建三元齋請不明科法不如今日上聖化度自在解脫合眾苦請天尊教示後學建福修功必有成就爾時天尊告諸人曰三元大慶自是道法自然之良辰眾眞朝拜太極之吉日也下仙凡人修身拔亡之要機也此時詮簡功過校定吉凶上帝下觀司非糺彈地司上奏水府錄簡有功成眞過謫罪魂㝠司考罰苦不能言汝欲齋請當依正法三日三夜燒香禮悔精思念道吟誦經戒常存十念一念道恩二念經恩三念師恩四念天恩五念父母恩六念善神恩七念施主恩八念善友恩九念過去恩十念見在恩天尊告言若有善男女等修此十念生十善道一善之中十神扶衞故名百神之身人無十念名爲百惡所謂百種善神翻賊其身上士十念身得眞仙中士十念身得延夀下士十念身得長年天尊告言三元齋請隨時豐儉要在聖盛潔内外合同當此之日諸天大聖皆悉下觀善神監齋在人左右三日三夜功過上聞子當精進殷勤勿怠道在玄中遥鑒子心三元寶經流通品第十二爾時四天之下諸國天子前進作禮辦心天子而作是言不審天尊演說此經當何名之云何奉持云何流布云何供養云何付嘱願爲分别開示未聞天尊告言善男子此經名太上大道三元寶經如經奉持廣宣流布四天之下使不斷絕此經所在之處别笈盛貯燒香供養付嘱有道國王王子大臣學眞道士齋戒之處爲人解脫開悟未聞時會大眾聞天尊所說燒香散花讚歎圍繞奉行教敕是時天尊至五更之初浮空而去是諸仙人徘徊雲路戀慕霄駕而作步虛曰飄飄上雲路黯黯入長霄星官日去遠光陰刧數遥仰聽金顏隱傾想佇神猋願得暎霞軫焚香稽首朝玄風轉飛蓋紫氣汎仙車浮空不待駕合景忽昇无徘徊哀下界顧盼愍羣諸三元眞化畢翛然入太虛萬氣浮空上千光合太微霄間望華蓋虛裏盼霞衣眞儀入雲路圓曜逐風飛願得三元會金容乗運歸爾時下界仙人及諸大眾作步虛已翹仰雲路傾盼神光目送霞猋拜辭眞帝須臾之頃天垂紫雲地起輕霧煙霞交合唯聞天樂漸漸高遠時會大眾各還本土依金口宣揚道化流布寶經齋請設會四天之下皆䝉玄祐福德無盡
