front:
  text: 殺凡愚歡喜讚善此大陰賊方便損傷教化讚死髠截凡夫此罪極大无上大道慈悲好生常疾於此時諸外道諾奉教旨辭别仙童退還慾界
  hash: sha256:4293d235fc47064e0c4e63a810e35a718c10f0c4c3646f2fa9a9f2c9903620e3
