front:
  text: 重刋道藏輯要太上大道玉淸經
  hash: sha256:abcc69dd6ced02ba473fc7e174bcf3559526e067ae001e7f271603093301dd4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_YP-C_03diji-06-0001a, image: JY018/03diji-06-0001a.png}
body:
  text: 本起品第一道言昔元始天尊與諸賢聖億億萬眾處處周旋最後下觀棄賢世界是時四天下一切人民福德欲盡不久之間大劫攺運人民凋逝天下失正大道不行唯好攻伐刑殺無度處處興兵更相謀害鄰國絕義不相交好以强淩弱割奪孤寡刧盜四起天告災祥日月薄蝕星宿殞墜七曜逆度無雲雷雨或復雨血是諸恠異等水旱不調百穀焦枯大地震動處處坼裂山嶽崩倒金玉銷化惡獸噉人凶神露形而行毒癘地生毛髮六畜出語皆如人聲天下兆民心中不安君臣相猜父子相刑不修善道唯惡是與五百年中轉就加甚求生不得亦有不堪苦惱投淵赴火自縊而死饑餓困苦人民相食大地乾燥泉流不通是時天尊與諸聖眾愍念眾生夀命不幾無所恃賴驚怖馳走悲號忉怛苦痛切已如被火毒於是天尊大慈力故與諸聖眾俱坐玄虛之中去地百丈是時天地大動七日七夜而不休息虛空告瑞日月重輪光彩暉煥星辰明朗風雨施散雲霞流布氣序調適香煙纒虛梵唱齊和金鐘淸朗玉磬鏗鈴雷音遐暢周徧遠聞萬變天樂空中自鳴龍座敷陳羽蓋高張靈節影霄長旛垂天仙花薦地雲帳羅空獅子仰號神螭俯鳴金鳳齊唱虬龍吐音琳琅撫節萬籟沉吟天尊與諸聖眾俱放身光照曜十方無幽不燭其光千種須臾萬變一一光中皆有眞人一一眞人各有侍從淸音朗徹而說妙法四天之下一切諸國王臣民人及非人各各皆見天尊大聖坐在空中與大造眞君巨靈仙人議定刧數濟度萬物重校蒼元大錄延續期運金簡尅書五帝眞文雲彩霞章以鎭五方又勅五帝河精四海龍王通流泉源天灑甘露潤洽大地又命風伯雨師調和陰陽令寒暑得宜又勅五帝地祇合和百穀生長藥草又勅五帝使者殺伏妖𦍙又命天龍雷神驚肅姦逆駭動除邪又命收風列仙以調和氣淳熈人行令君臣和睦父慈子孝凶弑變善幽顯交歸毒癘潜藏邪魔匿形芳卉藥草處處萋茂五穀結實冬夏成熟流泉甘水通同盈溢又命五斗仙君周正璇璣分疏日道布置星辰又命四天善神輔佐天子又差仙官次知國政使天下德化萬民安樂鄰國交通怨結解散人弘大義皆行正道各守其分於是太上大道君哀愍萬流蠢蠢危脆故扇玄風以導羣生飡服和氣沐浴道化使反朽歸榮臨敗得成此時大慶更延九百萬𡻕上元九府刻玉左契以授天子使葉葉相承則天正化不傾下邪推運應化而爲帝者皆是金闕之中差次仙官下來理民得三百萬𡻕轉差星官之中仙官下知天位如是國主皆是諸天眞聖應運降下故得延續期運保守天祚有生之𩔖無不恃賴爾時天尊與諸大聖無數億眾各乘天寶瓊臺而下諸國國中天子諸王羣臣一切人民男女大小隨處供養香花伎樂歌頌讚歎而爲聽法爾時復有南方八蠻道君與諸聖眾六十四億萬俱乘絳雲之軿從南昌宮中而下與北方玄天之中五狄眞君二十五萬億仙官各乘玄雲寶軿而下空中校定水火期運劫數爾時復有西方六戎道君與三十六萬億仙眞各乘三素流霞寶軿從皓元天中而下爾時復有東方九夷道君與八十一億萬眾各乘碧霞飛輪之軿從始青天中而下與六戎道君校定兵病之災記注善惡功過之錄然後起居中央虛皇太玄老君并受左右玉契請說造化妙理幽祕至法正定天元廻易運會調和四氣生成萬有之事爾時棄賢世界有一國王名曰德正聰明正直利根辯惠皆是應運降神福德之身爲眾生故而爲導首徧告國内臣民男女而作是言今得太平天下無事火災消滅兵病不起百穀熟成皆由道恩非自然也何以報道罔極之恩唯當傾心盡意恭敬供養造立宮觀香花燈燭晨夕禮誦齋戒悔過以求福祐今正値天尊校定吉凶期運之際我今自爲又應爲汝稽首歸命無上正眞特乞哀救授我至法今我國内兆民男女夀命延長各得終考又欲奉請無上正眞降臨我所申我微心供養之志汝等民人同我願不於是國中有六十萬長者神心長者五通長者文明長者玄會長者等而爲上首從四遠來起居國王聞王教勅未敢全信復有八十大臣寶明大臣而爲上首於是餘臣及諸長者心懷疑貳顧相謂言自我出生世界以來祖父相承聞有眞道而目不曾覩太虛寥廓豈有徵騐今者太平自由上天何關道力爾時大臣寶明聰辯正直言常有徵天下所信知人狐疑心不純信卽於王前高聲唱言我聞太極天尊造立天地覆載萬物開明日月分布星辰運化眞氣長養有生雖處上界而應化下土今之太平刧祚延長皆道之力而含生蠢蠢唯知日用心無慙愧反更忘本而言今者太平自由上天不關道力汝等云何自欺我聞大道生天生地天地尊道故得安靜萬物貴德故能盡生汝不信道是汝深咎亦猶世間愚癡之人心不慈悲反逆父母離棄兄弟兀然猶居謂我自成不由父母汝等愚癡亦復如是於是寶明出此言時德動天地虛空雨花香雲四瞑又聞上方空中有人言曰道德不自彰眞人不恃功窈㝠中有信慈惠故能同空中之聲纔絕須臾西北邊上忽然風雷電激雲霧翳天唯天王與寶明身邊光明各方一丈諸人遥視見此祥瑞心生悔過叩頭乞命歸投大王信向㝠契須臾之頃風雷消滅雲霧廓淸闔國臣民稽首王前不審大王向所言教欲請天尊降臨王所請王教勅所須何者唯願大王哀愍眾生開悟未聞王言道在人心唯當供養恭敬造立宮觀供給所須晨夕禮願悔過請福諸人聞說心中歡喜禮謝受生之恩王又告言汝等諸人且各各還家退齋思失沐浴身心并傍告未聞如我教勅諸人聞已一時辭王各還其家王卽勅大臣寶明徧告城邑内外人民嚴整宮殿掃灑城郭處處燒香供養恭敬盡世所有陳列牀座於是退齋日訖國内人民四方雲萃王與内外羣臣眷屬香水灑地安施牀帳成辦以具合國大小遥禮十方七日七夜行道禮願願得無上正眞降臨下土微生蠢蠢誠可哀愍於是三月十五日日中之時上方西北邊忽有九色流霞光彩煥爛香風淸暢梵唱和雅天樂流亮天灑甘露大地震動雨百寶天花以驚於地雲車羽蓋浮空而至眾眞大聖各乘天寶之臺臺中皆有陰輝夜明又有五色神光照朗虛空光逾日月臨於王城七日七夜是時天尊以慈力故成就大悲救護眾生愍念眾生開決聾瞽療治眾病爲作導師爲作津濟保鎭刧運更生萬物於是國王大臣及諸人民重復作禮苦請天尊開發大化慈造羣生明其耳目令得正道堪受祕要於是天尊命巨靈仙人而告王曰子以爲一國之主天下所推位登世極凡間之貴不先於此但以正法治化不枉人民亦足功感上天何煩祕要祕要之道難可卒聞王及大臣先是福德之身以方便力欲爲眾生開張耳目天尊告曰祕要之階不過慈善慈善之法不違科戒我以大慈悲力成就國土諸人聞說皆盡欣喜心願奉戒天尊告曰戒有多種人亦多品上品之人身先無犯身旣無犯亦無所持中品之人心有上下覩境卽變以戒自制不令放逸如此之人或受十戒五戒以自防護下品之人惡心萬般難可禁制下品之中復有二種下品上者身欲奉戒或受一百九十九戒或受觀身三百大戒或受千二百威儀之戒以自防保令無越逸下品下者身同禽獸雖有人形而無人心縱受其戒終無所益今且授第二中戒十種科禁入道初門諸人聞說歡喜過太悉皆伏地而求戒言天尊告曰第一戒者不得違戾父母師長反逆不孝第二戒者不得殺生屠害割截物命第三戒者不得反逆君主謀害家國此戒最重何以故是諸國王皆是應化推運惣統天下一切人民之所機要一旦無主不得其死以其義故汝等當知第四戒者不得淫亂骨肉姑姨姊妹及他婦女第五戒者不得毀謗道法輕泄經文第六戒者不得汙慢靜壇單衣祼露第七戒者不得欺凌孤貧奪人財物第八戒者不得祼露三光欺淩老病第九戒者不得躭酒任性兩舌惡駡第十戒者不得狼戾自任𡨚枉威刑如是十戒當終身奉持天尊言不孝父母師長者死入地獄萬刧不出縱生人中小小孤露受人淩刺常居卑賤好殺害者五百生中受人割切苦痛萬般反逆君主者死入地獄萬刧受苦出生邊地無主之域常被攻刧晨夕恐怖婬戒最重若有男子女人於父母姑姨伯叔兄弟姊妹六親骨肉一念之頃而生色想者八萬大刧受地獄報鐵釘刺身種種燒煮從地獄出受六畜形又八萬刧從六畜又作溷中蟲又八萬刧善男子汝今當知一念之頃於骨肉之親而生色想受報尙爾况復身於骨肉之親而爲惡行罪不可說如此之人不合共行住坐卧同里居住我名此人爲十惡之人此人身雖强健魂魄以被惡鬼攝持善神不祐此人之身不合在道應速驅逐令其急出不合教令作其師匠作師匠者與其同類出沒相似九祖被考又名此人爲敗壞人善男女等汝今當知媱殺刧盜欺凌孤弱輕忽貧病誹謗善道破德行人泄慢眞文此罪極重不煩一一記示之耳汝等但精心守戒道自降子於是國王大臣善男子等歡喜奉行不敢違犯道君又命巨靈眞君授王雲篆天書上中下章總一千條祕法皆以柔玉爲簡紫金爲字以授與王而誦持之云此寶經是上天寶文勤心誦念使人身得飛行永不復滅六通之道在意所爲道君因告王曰汝等當知四天之下慶同今日無有異世大道威神處處隨類方便引接不可思議千日之後任王傳授國内正信賢者之法共匡天下使玄門廣闢道化流通一國男女精心守戒如護明珠王及諸臣以正治國專心誦念徧勅一國令立宮觀唯道自務餘無所求國内人民作禮而去王修誦眞文千日之後乃棄位禪祚與其第一太子名曰善修專知國政而習父風九十餘年而復傳位與弟弟名善善以政治國還習父風其王子弟六千餘人葉葉相承經三萬六千𡻕天下太平父王與善修修守至妙四十餘年而得六通以其夕知國政沉滯常倫道君先以其中仙之位令知國政而未階太極今日之後太上道君以其勳名巨大授其秘要錫王子等太眞之任令侍從天眞教化諸國隨類現形濟拔厄難說法度人於是太眞與諸聖眾互相顯發遞爲師資以開光元年七月十五日北越玄谷登閬風之臺禮無上眞君請入大羅天中謁元氣之祖高玄之宗眞君曰子雖得六通道數未足何以故子非自然由學成眞而元氣之宗眞氣混化自然之身元氣之祖萬道獨尊委氣大聖虛無之眞難可得見億化如一綿邈遐曠恬澹虛寂寥廓沖邃都絕言像十方異道三萬六千種無不祖於虛無之眞也又我成道以來不可計劫唯以二過相見耳又天帝推校應運令下化度眾生侍從天尊往四天下教化諸國布散道氣何以故爲延此刧火氣之災法行道教以鎭陽九之禍使火精消滅至後刧天地崩壞人民福盡法當不救運數之極自然如此水刧之初吾道大行三十七萬年中人民淳朴以後漸漸大道不行陰氣轉盛人民僥倖造營空冡多起廟舍徧於世界男女邪心修習滅法不依儀格呌呼求死或入火坑或投深淵自割自截羣聚行道歌讚悲泣或入空冢默然而坐或抱死尸或恭敬枯骨或以糞穢爲壇或以香泥塗地或以不敬父母種種苦行或噉食穢惡無種不爲終不能得正眞之道人心偏側父子無義於邪教中徒黨興盛大水劫前有小水刧十年始歇從此之後四千年內於邪教中應有兵革更相謀害或稱國王或得十日百日還復自滅父子無禮以强淩弱同姓骨肉自相婬亂雖有人身而無人心凶險馳競不相信用若此時至邪道漸興陰氣極盛非久之間漂流沉溺人化爲魚蛟龍噉人當此之際法應搜選種民置之福鄕子當勤苦晨夕勿懈是謂大道弘之在人我命在我由人攝持心正則道應從邪則禍來好殺還自伐應當行大慈緣對品第二爾時太眞與泰淸天中新得道者三萬六千人侍從天尊教化極天之境周遊下界蠻夷鳥獸雜類之國隨其所好而爲作法種種示現教誨利益方便神變降伏其心決到西方黑水之右有一世界方八千里其中眾生種種雜類悉皆穴處更相食噉地生荆𣗥毒草諸樹水泉黑臭不中灑潄其國西畔有一大河其河正方五千餘里河水滓濁唯多毒龍在此河中風波峻急不可舟濟其河東岸而有平地三千里高此河際懸五百丈其世界中所有人民一半無眼相牽而行飢則相食渴便飮血有目之人皆遭惡疾眉髮墮落身體瘡膿濁血流出復多蟒虵吞噬人民無君臣父子之義多相戰鬬無眼之人聞其刀仗之聲自然驚走或墮河中爲此毒龍之所噬齧不墮河者復爲羣賊之所食噉呌喚驚駭苦痛懊惱又有溝坑穢惡流溢臭處蓬勃其坑之中多有蟲蛆頭面似人形長一丈又能呌喚無有手足蜿轉腹行復有玃鳥啄而食之狼藉熏臭復有惡鬼其毛如針吐氣噓人皆如火燒於是平地北畔有六大地獄獄門大小俱方一丈深入其中漸漸闊大莫知窮極其地獄中唯聞風雷火車之聲呌喚苦痛刀踞槌棒之鳴又聞唱求救求活之聲煙熖炮烈火氣衝天正西第一地獄之中又聞風水之鳴其氣嚴冷不可當近又聞暗中咻咻之聲六大地獄所出風氣皆應焦臭腥薰不可思議其獄之門北一里半地又有沸湯湧泉泉方六里其湯之中黃水脂膏爛皮骨肉隨沸騰湧又聞泉中有啾啾之聲湯氣衝人其湯北岸又有刀山劍樹新故骨肉零落山下刀劍之端多掛死屍屠割筋肉骨脈相離覩此苦痛不能自視復有生剥皮地獄殺羊之人死後墮此獄中受此苦惱五百年中出生羊中又五百年備償羊身輪轉相償無有窮竟此沸湯之東復有風刀地獄方闊一里毀敗善道及違科犯戒泄慢眞文傳非其人販賣道法以贍已利如此之人死入此獄一刧受苦烈風吹之往反刀刃一日之中千生萬死從地獄出還生人中身縈邪病根性暗鈍常居下流永不聞法地獄罪魂得出之時多生邊地無道之境多被攻刧晝夜恐怖身體矬陋氣息腥臊永不聞法愍此罪人心無時已於是道君與太眞及諸聖眾救脫罪魂及此世界之中聾盲之人令生死開度卽於此世界之上空玄之中去地百丈遥禮元氣高玄無上天尊以道神力入六虛大定分身百億一一身中又放千種光明一一光中皆有眞仙坐飛龍之座演說妙法瓊音雷震左鳴金鐘右擊玉罄張九色流霞徧覆此界一一霞中各有聖眾圍繞說法大地震動天灑甘露香泉流溢萬籟駭虛三景齊照地生百穀水變淸涼人心淳朴無相惱害惡龍攝毒癘鬼匿形地獄停悲劍樹摧鋒罪魂受生積疴痊除聾瞽聰明殘跛攣躄皆得復形巍巍大化無得而名於是眾中新得道者未階玄極覩此神變莫知所由眾中有一五通童子名曰善積與金髻童子華智童子葆光童子八萬四千俱從座而起長跪义手上白天尊自我成道以來經八萬大刧周旋八方無所不至未曾得覩大道威神自在之力如今日也自我慶會今日遭遇大化唯願正眞哀愍未聞開悟下根釋諸疑結於是天尊默然不答是時童子三請不已天尊於是凝思沖邈神彩澄朗彈指謦欬良久而言善哉善哉子之所問深乎微矣大道寥寂理絕見聞玄默希夷杳㝠深信子雖經刧數道德尙存所居之境近迫泰淸固絕重玄何由混化散在三萬六千種内而不知元乎大羅高玄之宗局於見聞明此妙致遊行無閡且得長存必也忘其元氣之主夭傾之禍亦未由得免也於是善積聞天尊所說心開意解與諸童子深自念言我宿福深厚遭遇慶會欣喜未聞今得開悟唯當誓願而昇大羅謁先氣之宗高玄道君諮受秘法進修之道是時善積童子與諸眷屬八萬四千人俱前進作禮太上道君向䝉開示所未聞欲將大眾上登大羅謁高玄之尊唯願道君慈悲聴許道君答曰子欲去者當捨見聞雖將大眾心間無侣專志願寂雲泥一貫收視反聽道自玄合於是善積與諸眷屬奉行教命先禮上方辭别道君上昇太虛大羅天中謁元氣之主高玄之宗爾時此界人民皆得蘇息欣喜踴躍悉皆舉手向天彈指而作是言我等宿罪生出惡土忘失正念唯惡是與世世相承無能悟者罪垢積習生入地獄循環苦趣不能自知堅固宿業一旦消除不賴道恩誰如之何而欲報道罔知所由唯願天尊降臨下土授我所請允我微心於是道君先知其意化作凡人游其世界言語交通教其道法或就乞食止宿其所教立屋舍變生爲熟或作導師爲其說法方便引接或作醫巫爲其愈疾或作農夫教其種植或作孝子教其慈義隨類現形同其嗜好爲立君臣漸漸改革長幼有序男女有辨種種教誨一十五年和氣流行人漸識法起立觀舍書經造像供修齋會香油燈燭喜捨珍財專心奉道孝養仁義君臣禮節異類得生幽㝠開泰物各守分不相殺害於是道君託作大師寒棲山林或有徒眾齋戒說法或時單已默坐思念或復講誦爲人說法或時吉凶言有徵驗神變恍惚老少不恒合境歸化施設供養傾世所有燒香散花各陳心願願得天尊降臨塵穢開悟眾生叩頭仰天流血灑地悲淚嗚咽七日七夜心無休息爾時道君以大慈力故與諸聖眾乘九色流精眞光之氣仙童導從散花燒香神風激籟天獸和鳴麟舞鳳唱浮空而來去地五丈而止虛中爾時先所化人名曰空生爲諸眾生唱導之首不審天尊導化有勞慈造萬物得無疲極迃延雲駕曲臨下土我等積刧沉滯罪垢縳累一旦披霧沐浴玄津過太之餘罔知所謝眞源遐邈上界虛寥而塵穢之身忽遭大化朝菌之命長覩太陽枯朽載榮生成今日欲申微願輕觸高尊唯願大慈賜以蟲蟻忘退之志誠有質疑心所未悟願從大慈得聞宿命此土因緣眾生本起特視玄鑒之恩賜爲分别是時合界大小一時上請叩頭流血涕淚交連道君以大慈悲故凝思良久卽命左侍仙童四十九人齊鼓玄雲之璈同聲合響奏天鈞大雅合神之曲又命右侍仙童三十六人吹九和之簫以合鳳唱揮玉京八會空洞之音又命侍香玉童燌百和返魂之香又命長牙左吏以扣金鐘又命右直事吏以擊玉磬久久之間眾音合會慶霄纒虛流霞四張神風八達天樂停音於是天尊口吐香光大震雷音而告空生曰汝今應知大道慈力生成萬物故奏眾音流變萬化合和生氣以祛煩惱汝與大眾生此土者從煩惱中來造諸惡業輪轉受報墮此邊地不聞善道忘失本心此世界者一名報對世界一名生死地獄此地獄者隨處皆有眾生居中不能得知日夜焦爛坐待消滅又此河者名爲生死業報漂浪死津此六大地獄者隨人六根造諸罪過死入此中又此沸湯者名曰沸湯地獄世間有人用湯殺物命死墮此獄億刧不出此刀山劍樹者世間愚人好斫刺畜生死受此苦又生剝皮者世間愚人刧奪人財生割魚肉死後受苦生下其肉又此毒龍蟒蛇者世有惡人破毁功德侵尅善人死受此報又此溷坑中蟲者是世間愚人於父母伯叔姑姨姊妹同姓骨肉而生殺想又於伯叔姑姨姊妹六親骨肉父母師長而生婬想死入地獄萬刧不原今又受雜類之身而生此蟲常在溷中恒噉臭穢空生當知世間逆人奸淫骨肉或懷殺想生死之罪萬刧說之亦不能盡如此之人定不得道生神不降生氣不布空生汝今當知如此惡人身心以定不須教化應須遠離莫受其供莫坐其牀莫入其門入者犯戒神邪所嫉三萬六千威儀此戒最重故我慇懃重爲汝說今廣流布讀誦此經世有聾盲之人不能讀誦之者但常燒香禮拜供養經卷功德無量若貧乏之人無可書寫經卷應往有經之家行道禮拜空生當知如太眞之科諸善男女等好善放生施惠窮乏醫治疾病孝養父母山林寒栖誦唸眞經此五種功德無有差别生身受度必得眞道空生應當開示未聞念悟心解爾時大眾聞天尊所說身心開悟一時慶幸奉受要言作禮而去世界品第三爾時天尊與諸眷屬眾眞大聖浮空而越炎洲之陽入光鍊之池以黑帝眞文一篇鎭遏火精一時而返以次東遊過扶桑之陽東南方經九億萬里有賢善之國其國正方八萬餘里四據滄海一名極樂世界其國有王名曰花秀有八百大臣又有三萬八千眷屬六十四大城復有六千四百小城其王皆以正法治世不枉人民其國豐樂多饒珍寶節氣温和風雨調適穀帛殷貯無諸病苦其國西北復有一城城方二千五百四十里城高七千仞有四大門門高六千仞俱闊一里樓峙高妙非常華麗城中復有七千寶臺臺中各有夜光明月之輝照曜晨夕城中皆是仙人道士形如金玉衣食天㕑而此國王王臣及諸眷屬皆是應運降神下知國政其城一日之中三過香風吹去微塵天雨甘露以潤土地地多泉池皆潜通玉津石髓流黃飮此水者形如金玉又復一日之中三過鳳鳴萬籟虛吟香雲凝空流徧演暢梵唱和雅微音淸朗非爲自然積福所應爾時天尊與諸聖眾九百萬億止此城内俱坐百寶飛龍之座座高萬仭出於城上雲錦瓊羅以爲敷具張九色流霞之帳一一帳中皆懸明月神璣其帳四角玄虛之中皆有龍燭光暉靈鳳舞空風琴朗霄香氣氛氲天香飄颻爾時天眞高尊而命左仙侍童扣金神之鐘又命右仙侍童擊靈光之磬又命侍香玉童梵九龍虬鑪百和之香眞儀以列天鈞又陳於是天尊放身香光遍照世界其光萬變非可目名彈指之聲猶如雷音一國男女聞皆警悟互相謂言今日何緣有此祥瑞香光洞徹風雷調暢昇沉飛走跳踉踴躍此當非凡急宜速往看是何緣於是國王王子大臣妃后眷屬又相顧言我此國土福德成就常有大聖降臨此地非是餘緣必定善瑞汝等諸人各各嚴裝所須之具我尅明日與汝等眾俱詣寶城一國男女同時而至遥見城中光色輝煥其光之中皆有眞仙歌誦靈章王及國人叩頭禮謝今日有幸得覩天尊降此寶城喜慶交集不可思議各各燒香以陳願念王及人民立城南門叩頭伏地良久不起自思何緣承何福慶遇會今日不敢仰視尊顔唯願高眞大慈之心特見哀愍開悟未聞解釋疑網天尊良久謦欬彈指眾音停奏而告王曰子此世界是福之鄉上界高尊時時周旋但以刧數遐遠非子所悟昔天地未光混沌未分有天尊上聖下游此城於今以得九億大刧我昔時與造化道君勘校刧運同時在此今者重來觀此世界亦是因緣法當更來又此城中諸仙晚學業以淳熟大聖雖來無所言說國中男女亦階初地以道因緣而來生此非久之間天眞慶會道法大度惠及於汝子當專心恭敬寶城持戒布施心不退轉道自降子於是眾中有一童子名曰眞行從座而起前進作禮上白天尊而作是言自我承福天庭仰陪霞輦陶染玄化百刧於玆周旋十方靡所不至希覩此城莊嚴華麗人民豐樂仙伍森羅瓊林玉枝虛吟萬籟淳風反朴眞氣和生福德巍巍難可度量唯願慈光照朗䝉昧令此大眾豁然開悟天尊告曰子見此城適子懷抱覩此世界歎未曾有此界雖名極樂猶有習氣此中人民仙人道士皆是諸方業道之人功未充足而來生此未至重玄㝠寂之境此中時有聖降爲其師而不久住眞行當知亦如香積童子自言道極來詣我所從我執蓋首末半劫請我爲說微妙道法方始悟解我又示其大羅高玄之名於是童子遂往起居諮問妙致於今未返眞行當知汝今所見亦復如是幽秘之理未可輕說子道數自極當應得見於是眞行與賢善國王臣民疑意不了重白天尊不審極樂城中仙人道士國王臣民前世以來修何功業而生此中天尊答言修習之法亦有多途非爲一種子當諦聽吾爲汝說而化國中有四種人天第一品人孝養父母奉事師長濟度窮厄施爲道法持戒誦經晨夕不懈行道禮願悔過請福求見昇度功滿行成上感諸天名著左契金簡刻書以記生錄身得自在飛行上淸隱影萬變道齊眞人長生不死白日登仙位應上眞侍衞道君暫過此中或經一刧半刧而還天中如此之人名爲上品第二品人在世之日聰明高潔助國理化出言利益施惠廣大興顯正法扶助善道身得尸解如虵蛻皮來生此中如是等人亦名現身昇度第二品中復有一種或遇上帝垂恩開度生死枯骨死尸變鍊成人感激眞氣自然而仙或有前身與道結緣慶流今身來生此中第三品人在生之時持戒守善不作非法起造宫觀供給香燈齋講設會書經造像晨夕誦念亦得尸解來生此中第四品人或承其祖先福德餘慶身死之後改姓易氏來生此中眞行童子與諸大眾疑意不了重白天尊不審第四品人承其祖先福德餘慶之力來生此中者不審此慶修何功德而慶隆後允唯願天尊重爲分别令心啟悟天尊答曰吾言福慶之因者或其祖父前世施財施食放生活命衣食窮寒扶助孤弱給賑老病供養山棲功不成就中道而退身不得慶慶及子孫或生豪貴之門聰明利智或求道未足法當滅度來生此中如是之人德隆九世眞行當知善惡相似過積者亦殃及九世亦猶世間愚人或承先慶身生豪貴自恃强梁不信宿業恣意凶險殺害物命刧奪人財威刑無度毁敗善道誹謗行人䜛嫉勝已欺淩孤弱鞭撻下賤漁獵殺害燒煮蠢動斫剌眾生不孝父母反逆君臣躭酒嗜色婬亂骨肉犯他婦女駡辱尊老祼露三光不敬有道惡居其上輕慢靜壇泄漏經寶破齋犯戒常爲亂首伺人衰便更相䧟害殺生求生背叛道德如此之人亦殃流九世九品子孫所向傾敗受人驅役常被枷鎖橫罹惡縱死入地獄生受六畜被人燒炙種種苦集輪轉惡趣生無定形沉溺生死漂浪苦難眞行當知我觀下界眾生苦樂之事亦無多别何以故汝言極樂世界城臺樓閣非爲自然皆役神功所爲不如上界應化宮殿不由神功皆自然也亦如香積童子自謂果極不覩太虛大羅道境便謂勝報極於慈土我觀子心與此無異眞行當知三萬六千種法由人機緣感動修習業行雖云成道遲疾不等亦如寶光童子在世之時從古先生而受滅度八萬大刧勤苦修習不能得道最後之身而遇言龍初會天道大廣始入道位猶在其地下品之上向不遇元皇之眞何由可得昇入無形者乎於是眞行童子及諸大眾聞天尊所說心開意解叩頭作禮各還本座國王王子臣民男女聞說因緣本起之事皆悉慶幸各各奉賫明月寶珠上獻天尊天尊受以安著城内王及大眾歡喜踴躍作禮而去爾時天尊與諸大聖各攝神力昇入無形忽然不見慈悲戒序品第四爾時玉淸天中瓊闕金眞後聖天尊昔生多喜世界姬氏之家年始六𡻕而知玄文深達妙理洞曉幽微乃棄家求道入長明山中精思十年上感西靈虛無天尊而受道要年二十七𡻕而得六通成道以來數過塵刧常以願力而度眾生周游十方如日旋照隨類現形同其音聲方便引接皆爲饒益平等無二齊一子念以元化八年𡻕在庚子七月十五日與諸聖眾三萬六千人俱下游玄天到北極長㝠世界虛空之中俱坐霞光之上眄看六合經百小刧身心不動猶如寶山是諸聖眾亦以百刧身心不動是時世界忽然光明猶如春日和氣通暢風雨調適雲霞靉靆雷音淸徹藥草滋茂百穀冬生地出甘泉微妙香美龍麟踴躍鸞鳳騰舞異類集聚皆相親附人民非人身心變善悉如宿化教學所成於是天尊及諸聖眾端虛寂靜都無言說但以慈力天地萬物悉皆自化亦無光音而可視聽幽明玄會殊神合契無爲之道使之然也吾亦不知其所然道雖不言德化流布眞氣感激妙理精應不由運動其土人民亦無覺知心無別慧各安其居人人守分終其年命而已爾時三月十五日雪山之中有一童子名曰法喜自號仙人與其眷屬千二百五十人俱其名曰金髻童子金粟童子寶頂童子調御童子十住童子海會童子七覺童子通王童子自在童子善財童子如是十一童子而爲大眾唱道之首悉皆各各自號仙人俱乘白象而來下土圍繞讚歎遙禮天尊燒香散花種種供養各陳本願問訉天尊而作是言我等諸人幸承宿慶昔因皇初刧中遇古先生哀愍化度得入道位賜以慧眼遥見天尊下此世界欣喜慶幸故來起居欲有諮請唯願天尊憐愍開示於是天尊以知其意默然不答是時仙人三請不已各各伏地良久俛仰叩頭而作是言唯願天尊垂慈悲力憐愍訓誨示所未聞於是天尊愍其勤勤卽命右侍眞童名曰寶相而告之言汝等諸人欲求何願而來至此於是法喜與諸大眾重復頂禮而作是言我見天尊及諸聖眾威德嚴凝未曾有也令此世界福德成就都無言說萬物自化改易天地流變氣候日月明朗星辰合度風雨施散百穀熟成藥草榮茂甘泉流溢百獸騰舞異類親睦人民豐樂未曾有也不審天尊修何功德造化萬物而得自在祕要之道願垂誨示及重伏地良久不起於是寶相還向天尊具陳其意爾時天尊告諸人言無上大道但以慈力生化萬物覆護眾生無有言說若有言說卽生形迹形迹之教雖會至道未極妙理何以故不可以形迹語言造化天地生成萬物何以故形迹語言理不恒故理若不恒云何造化是故大道法無形迹語言令物自化善男子汝所謂我有所修習而得化者汝今修習亦應得化善男子汝作此見未離煩惱猶處纒縛無上大道久離此見心無結縛無爲無作無起無滅無形無相言語道斷汝所見我有威神功德嚴凝形相造化天地生成萬物是汝邪見妄想分别无上大道以離邪見分别妄想之見善男子汝等所言遇古先生身得化度古先生者是我弟子令其教化邊地說三乘滅度眾生修後世果以彼土難化人無和氣雜畜之種心性不具飮血茹毛强梁自任故作神變廣說譬喻開悟下根如此之法不盡至理權示形迹先生去後攝迹歸本形迹漸滅縱有存在亦多紕繆或自號仙人或自稱梵天或默坐空室或燒身自滅或墮落高巖或供養水火或作天人形像三面千手種種神像屠殺祭祀羣聚行道呌呼求滅或諦觀光相如此之法名曰訛謬雖有經文無有實法邪正混雜不能得道於是法喜及諸大眾聞天尊所說心中開悟始知先所修習未至道要重復頂禮上白天尊而作是言如我國中之所修習具如天尊大慈高鑒無有異也唯恐我等大眾罪垢深重不可濟拔唯願天尊賜我法水以漸澄汰洗除滓穢開方便門示方便力賜我入道初聞威儀齋戒之法以漸修習繩准身心令有依止天尊告曰汝彼國土地氣陰惡所生人民亦復如是何以故此名金方雜類眾生生此邊地不聞正法唯聞三乘譬喻之說不知大道祕密之藏天書雲篆龍章鳳彩頓教成眞生身入妙之法於是法喜合眾聞天尊所說恐其身命不合道眞大眾悲泣叩頭流血重白天尊而作是言彼土眾生腥臊臭處豈圖卽身而得昇度與道結緣冀得身來生中國有道之邦唯願天尊大慈之心賜我等眾齋戒威儀之法天尊於是以大悲力不違其心而告之言汝彼土人性有多種應多受戒約縛身心不如棄賢世界人心淳朴縱欲受戒不過五種第一五戒第二十戒第三一百九十九戒第四觀身三百大戒此名四科又有三萬六千威儀之戒受此諸戒以應三萬六千威神又攝三萬六千種道内有三萬六千生神外有三萬六千戒神内外防護受戒之身上品成眞中品成仙下品延夀此戒是玉匱金科上眞禁戒受竟輕犯身謝冥官九祖受考吾今爲汝略說一科就一科中分爲三品上中下品一品之中又分爲三品合有九品以成陽數此九品科分齋戒相須不但單行專授汝等凡有齋講設會之處及國王王子大臣官長學人男女集齋之日應差一人音聲淸亮者正其威儀北向讀之一過以示大眾大眾人民作禮伏地而聽戒言又復正齋初夜又讀一過以示大眾此論一日之齋法應如此若二日三日七日當應日日讀之一過若初入道之人先授其戒千日之後漸進餘法若有善人行先無犯未度三日之内卽授其戒不須十日而後授法若授戒之後身犯十惡五逆之罪法師應須燒香對三寶御前悔奪戒法若未受戒及受戒之後身犯輕罪非十惡之條若求悔過進請受法師與弟子對齋日六時禮悔誓不更犯然後斟酌量授其法子當愼之子當愼之勿犯吾戒身得逆罪諸天不祐於是法喜與諸大眾各各伏地注筆而聽天尊爲說戒言說戒科品第五第一不得殺婬殺戲殺睹殺歛殺誘殺不得嗜肉愈病藥分俱斷第二不得叛逆父母君主亂敗家國第三不得刧盜怨盜謗盜死罪謗口謗書謗狀謗第四不得祼露三光訶天駡地第五不得姦婬骨肉因生刑害第六不得毁敗善道離人骨肉滅人種親第七不得躭酒毒酒媒酒色酒第八不得陰惡損敗他人身作口作書作第九不得侵尅良善割奪孤貧第十不得盜刧死尸散人骸柩第十一不得戰鬬之所剝脫死屍割取頭髮第十二不得侵欺老病脫其所有心無慈悲第十三不得毁破巢穴傷胎殺鷇第十四不得販賣生命以贍已利第十五不得故觀兵戰鬬及故合兵戰鬬右十惡五逆科犯者見身受報種種苦惱身死之後與九祖同考萬刧不原道言朝禮之法不得高處朝禮低處不得顧盼朝禮不得不淨朝禮不得對御涕唾不得對御高視不得對御邪視不得對御高言不得對御高氣不得對御錯語不得對御邪語不得對御中絕語不得對御餘語不得對御動五體語不得對御摸頭語不得對御戲色語道言入齋戒道場之法先當慈悲第一不陰惡第二不思色第三不思婬第四不思殺第五不思肉第六不思勝第七不思欺然後沐浴五香盪除塵累整其威儀而詣道場道場之外置立香湯浴室二所男女各别又當立二屏處屏處燒香立衣架如法一人屏處應脫淨服挂架一出屏處入浴室盪身手巾豆末事事具足又不得煮殺蟲蛆以絹濾水過作湯及羮飮又不得燒蛀薪以營齋獻又不令乳産穢汚惡瘡膿血淫人十惡五逆之人臨齋厨所如法安施竟師著淨服取淨鑪炭火以燒香朝拜訖依位而坐儼默端直身心思行上戒一慈二悲三善四信善男女等汝今當知我用此四法故得成道此四者是一切善道之門戸是一切善道之本基是大道之機要離此四事自外無道故我用此四階善道保鎭天地生成萬物調和氣序綜統幽明禳灾滅禍濟拔窮厄汝若離此四種不得入道場不得受國王王子羣臣兆民供養之具不得受國王王子一切男女恭敬禮拜不得與自身及一切人請福求願我詔此人爲道法中賊不合共住人鬼所嫉諸天不救善男子入道場中復有三法第一思孝第二思忍第三思辱善男子入道場中復有七法第一見一切男女生父母想第二見法師善人生諸天想第三見經法靈文生難値想第四聞說法音聲生難遭想第五見諸疾病貧窮孤陋之人生已身想第六見衰憊老人生無常想第七見一切有生之類生平等想善男子汝今當知入道場中及出道場中不捨大悲心不分别不分别故諸惡不生若見覺聞知行立坐卧離此戒者而得安樂無有是處善男子汝欲求道見身昇度者離此戒而得道者無有是處善男子汝欲無疾及救拔生死離此戒者得如心願無有是處善男子汝若違戒而爲邪所嫉王法所加身命夭逝諸天不救道言入道場中不得茹葷不得穢汚不得多語不得邪視不得閙眾不得傾聽不得涕唾不得輕衣不得垢衣不得鼾睡不得邪坐不得背坐不得仰視不得大笑大語不得吒食不得藏食不得挾食不得語食不得笑食不得顧食不得仰食不得潄食不得鳴器食不得拈食不得嫌食不得數食不得非時食應正時食慈悲食不得急行不得拖脚鳴行不得曵踵行不得動頭動手行不得顧盼行不得仰視行應平正行若學道人受他惠施慈悲爲受不得數謝數辭數顧應受已如法供養如法施行諸學道男女人不得數入國王王子大臣官長俗人之舍若爲因緣故須應入時正其威儀在門外立正事陳說不入其家不坐其床若諸學人起居父母伯叔姑姨兄弟之時應加恭敬而況諸餘若諸學人無大故不得入軍營㕓肆若學道男女官不得入屠舍婬舍樂舍十惡五逆敗壞人舍若學道男女官不得與非類同舍同牀坐同牀食服飾不得共用若學道男女官不得畜多欲侍者及畜穢文書矣若學道男女官不得與俗人爭利有利應讓俗人及無知小弱若學道男女官不得畜兵器樂器不得燒薰皮毛角骨薰臭等物若學道男女官不得穢汚生草蟲蟻之上若學道人男女官不得向北大小便利不得仰視便利不得汚山泉淨地不得入雜處居卑當風下溼心無愼護若學道男女官及道民應當莊嚴道場治堂靜廬愼密防護洒掃内外恒令淸潔不得早眠晏起朝禮失時大小無法不相尊重不得無故開靜戸不得敞露經法不得入俗歸不盥沐不得道場中舍女人骨肉之親無大故不合諸道民不得借貸常住法物以爲他用諸道場中常住法物香油燈燭財寶應有定用不得迴易餘用諸護淨居域之内不得令進諸雜畜汚穢不得販奴婢六畜取物營靜舍不得用十惡五逆財營靜舍不得於敗地立靜舍違此戒者身受考病所學不成犯物不還三代被考愼之道言諸善男女應當内外持法爲法城壍不得侵毁精舍不得抽剔藩籬不得盜伐果林不得盜師果子不得割師田地不得費耗師穀帛不得壞師法具不得假借師物久沒不還不得私費法財不得私換法財不得私使法師畜僕不得羣聚法場講說非法不得羣聚法場射賭不得羣聚道場歛聚食肉飮酒不得將婦女舍法場中宿道言若道民男女犯此科戒護法善神地官考之連及三代愼之道言若學道男女道民書寫寶經時不得安不淨處不得令不淨人見經不得令不信人聞經不得令敗壞人知經不得令敗壞人見所寫之紙不得不淨財買寫經紙書寫之法應别室安經常當燒香於案上一日之中一過盥五香水盪洗身手大小便利易衣出入常當齋潔寫經之人不得竊用祕言宣泄娼伶犯此戒者考病立至死受風刀之考長不聞法愼之道言諸學道修身之人先當廣尋經文勘校科格求師決斷愼護所受莫自媒衒邀求世利同心結好男子不過三人女子不過四人於密處精思以期㝠契勿令他人知覺見聞毁譽者應密往山林避處人間犯此戒者善神不護眾邪亂考愼之道言若諸善男子欲救疾病者先當廣備道術善知方藥分明謹按齋醮科儀持戒忍辱不違物性無憚苦辛不辭曉夜無論遠近怨親平等不視財色不分别貴賤男女不責意氣酬償忽得酬償應施行功德不得專贍已利不得艱難心無欺等恒行大慈如此救疾功感諸天療疾易差若違科犯戒假造謬妄神人立考死入地獄愼之愼之道言若善男女有心好道或遇時迍否不得遠遊名山應於家持戒修造精舍作重牆複壁使内外音響不得相聞唯令潔淨護治每令精密亦無異於山林之中也功滿行成道來曲室身得道眞若違犯科戒輕泄疎陋薰臭混雜敞露眞文徒勞積絕我道未聞身立傾敗萬邪所殺身不得道魂魄受考愼之道言若學道之人或身受師訓叨佩靈文遇運應時法應助國或身先列職後遭師匠身受至法未遂淸虛助國治民匡贊天
