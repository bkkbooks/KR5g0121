body:
  text: 昭靈品第十五爾時南昌宫中上仙名曰昭靈與其侍從萬五千人俱皆是言龍初會凡身受度修道成聖具慈悲力身得六通能逰無間夀命巳定如錬真金無有變易升自在地智慧廣大不可度量身心無礙猶如虛空以七月十五日上登太霄升入玉清天中朝謁天尊於雲宫之中頓首道前問訊起居而作是言兆以塵濁穢賤濫當開度昔蒙大道慈流非分援擢鍚以壽命叨佩至法自此巳後依戒修行果所希望理應晨夕侍衛天尊常當受事特為下界凡夫形骸腪臭又為天路遙長非凡所登誠違起居每以翹想青雲之上欽慈紫闕之下徒以人微道淺致乖心願欎悒之情歷劫纒懷不任戀慕之誠仰披雲霧上冒威嚴得覩尊顔以申虔拜言畢頓首喜不自勝天尊慜之而告仙人曰生化之道理合自然我亦未曽故有所施亦無情而鼓物焉能生汝善男子如人愛滅道亦無心逆其情而生之汝心好生道亦無心違汝情而滅之若以萬物之情極升沉之願者於際會之間自然而辦道處玄極之際故能順物如流生之與滅道不能違也生而不滅吾道無心而能滅之滅而不生道亦無心而能生之汝今得生由汝願力道無心而生之心有背向各尚其志雖有道力不能先之汝願學道之𥘉元由汝心自因自果不我知也所謂自然之道冥自然之心耳是時諸仙人聞天尊之言不敢辭對天尊又曰天路遙長汝來何為仙人答曰故申對謝欲觀上道微妙至法天尊告曰上道混化塵沙不辨如胚胎之未分似混沌之無元棄賢去智不晦不明溟涬無際焉能有妙與汝觀之無上大道若變化一事若起滅一事若受一事若持一事若居一事若舉一事若顯一事與衆觀之與人疑之無有是處無上大道亦無微妙冥冥空寂自覺覺他無心觀察無心分别此之與彼况能有妙與汝觀之無色無相猶如虛空無有內外善男子汝欲觀者可往雲宫東北方去此方有大地微塵里數太虛之中有三上真在彼空中修無上道今入凝神大定于今已經九億大劫次應入忘形大定八億大劫次應入六虛大定七億大劫次應入無礙大定六億大劫次應入太虛大定五億大劫次應入洞惠百萬大劫次應入生惠十萬大劫當來應下觀三十七天次逰凡境俱號後聖太平天尊將諸侍從億億萬衆説無為法而度衆生此時成道數如塵沙汝欲觀者觀此天尊微妙之法爾時仙人聞天尊教示歡喜拜伏奉辭天尊時諸仙人齊駕慶雲浮空而去倐歘之間巳到太虛遙見三真在於空中窈靄溟漠依俙紫雲之內霏微於明霞之上丹霄結緯黃精為牀三氣凝液二景銜芒太虛為牖虛境為窗胚胎未始混沌𥘉元服氣藏真𡪹寂無言沖虛絶象萬化未根空湛靈軀五花潛敷三宫育真六府凝神三魂不浮七魄不逰神精不動真氣不流恬淡瀅渟無所經求爾時仙人覩此微妙齊下慶雲膝步輊雲泛虛而往空陳所因匍匐飲氣不敢有言虛跪玄中不知劫數注心觀妙不覺有身倏歘之間不見三真霞帳所明不測所之良久之間歘亡空帳唯存光氣朧朧而然又良久之間忽見三真出虛入無或亡或存呼吸風雲乍合乍分良久之間冥然絶影合氣都亡復經良久靈風八震神氣四衝吹噓交扇顯晦不恆又良久之間不動而生不營而成三晨坦察萬化潛萌兆靈根於紫精散靈魄於雲房動空塵於無境流元和於皓蒼噓萬氣於叢生布真精於萬萌垂神足於靈綱閉握固於初嬰出六虛而無辦為衆有而窺窗不沉不浮處空而停不動不寂履化而經無形之形無生之生處幽而孚處昏而明反觀復照妙體無形常住不變焉能所更心冥不動假寓無驚不宰不割不教不令不智不愚不令不行夷然用道無情交競捐機釋垢虛心自鏡塞穴窒隟收視反聽影響雖繁端心無異冥乎太空形無死地爾時仙人覩此神化五情自夫雖經劫數冥然不覺忽見真人入於生惠始悟風雲改變萬物動生是時仙人但於空中頓首霄間行願雖承道力喜懼不敢自寧爾時三真慜諸仙人知其來意乃震希聲而語仙人曰子來何為艱辛雲路吾與子同稟一道外何所觀爾時仙人不敢陳辭但求哀慜賜垂開度是時太平道君告仙人曰子何不任神氣於忽恍之間委自然於有無之際隨會合離縱運推移歘恍浮虛體不常居存於無形銷聲滌慮曠若長虛冥神無處鑑虛映空服氣藏真混紫精之靈根晦凝魄於雲房泯輕塵於太始息元和於昊穹任物自生從真晦明輕少雲崖之端能不動而常行宅中虛而已立恆如嬰兒之未嬰不聽不窺隨之有情不釋不取不滿不空泯而無際是謂玄同爾時仙人虛聞真君之言微聲一諾響未卒聞仰視真人已升虛極追從不及欲啓不聞形入太無氣泯浮雲思心欽戀願欲侍從丹誠僅半歘而告言我絶待無繫云何自滯子未都忘乘雲御氣是時仙人才欲有言以見太真御空而邁速逾奔星迅過電掣爾時仙人思惟良久忽見真君金容在玄應周色象泛泛而然若逰氣之在虛不可視聽知其神化微妙之事爾時仙人與其侍從住於虛中但以思念太平天尊所作神變虛心上玩欲知真要願從天尊逰於下界心心願念志不暫移天尊慜之乃於玄中而告仙人曰無上大道法皆自然神力變化雖能隨心而心未曽勞雖復隨身身亦不作所謂無為而為無作而作無作而作無所不作無為而為無所不為若有為而為為而不周有作而作作而不普不役於心不勞於身心不煩而能靈身不勞而能生生靈合并無種不成所謂不作而成不為自生道常無為無所不為混元根本理盡於斯善男子我亦無心而為此神變推運降合和生氣為諸來生而作法門不得不爾汝今當知無上大道而為諸塵經於心口慈悲之道法應如此亦如汝等昔在塵中而遇大道廣作津濟亭毒含弘濟度枯朽此亦大道而施慈母之恩也懷抱養育飲食覆護種種教招雖不為勞亦經於心天道至大應之甚微亦無感而不動未聞求而有違大道如海衆流所歸大道如天群物所依善男子我不逰之日近無多時數萬劫間瞬速巳至剋此巳前應上大羅之上朝謁元尊次往諸天遍啓群真汝等雖是上仙周遊之法未至極天汝且還南昌宫中十萬劫後我當下過南昌之中自應見汝爾時上仙受大平天尊教敕拜辭而去歸南昌宫中爾時天尊亦以浮生上升大羅朝謁元尊默而無言俱以神交又升大羅之上朝謁虛無天尊亦皆無言太上冥寂道境默然而止不謁不言又入太虛道境都無所見太平天尊亦皆無形久如三劫微以逰氣泛然而下如是三尊升上一萬二千天中冥然無形次入中一萬二千天有形無言次入下一萬二千天始有言説天尊後至玉清天中見雲宫之內大悲天尊言推運日至應勞道化太平天尊答言為此因緣上朝真帝粗得周遍爾時太平天尊三聖法身同坐一座又經十劫與太悲天尊靜默而坐爾時南昌上仙覩天尊真光逺映不比尋常是時玉清之天已下諸後學得道上中下仙億億萬衆各賫供具香花旙蓋作衆伎樂浮空而來朝慶太平天尊并朝大悲真帝燒香散花歌頌讃歎鼓衆伎樂圍繞雲宫七日七夜諸天雨花香煙凝虛瓊林敷花以承甘露金山涌出玉髓流津龍芝起霞隱草擎雲空洞虬吟仙霞翳天白虎嘯歌微風拂塵衆仙四周真宰列莚爾時諸仙各下浮雲齊整威儀一時稽首長跪瞻仰正見天尊各坐三宫通披霞衣神識似嬰瞻仰未周巳入無形三宫紫雲靄空而生良久之間忽見一尊獨坐一宫復良久間忽見二尊列坐俠侍或恍忽存亡或混三為一或散一為三出有入無體不常居爾時仙人頓首良久南昌上宫照靈仙人長跪空中而作是言昔在太虛得覩天尊數億劫中立侍太空忘退之心濫蒙垂慜示以期會非分提㩦自辭以來傾誠如昨下界迍否屢有壞成𥋈勤之心恆如渴𩚑忽覩真光逺映與本不殊如是天尊周旋事畢輒率仙衆塵穢天庭又復再拜天尊告曰我知汝心不煩多辭各且復坐爾時仙人一時再拜應命而坐天尊告曰我本無言亦忘所心空傳響應冥汝虛襟汝知之不仙人答言伏蒙告勑不敢不知天尊然之爾時大衆默坐百劫寂然不動時聞雲宫四方玄中有隂生梵唱四字之章恍忽難詳似清風振於虛絃如玉樹出於瓊音和韻宛轉辭理微妙不可盡解時諸仙人不敢梘聽心中記憶時得半章其文曰靈芝無根衆化之原中凝七魄主結三魂二十四真出入無門杳冥之精恍忽無情隨劫存亡逐氣而生外凝混朴內養七經五神植花三台敷榮紫關素童反形歸嬰騰雲而升騁霧現空中有玉真號曰神公右俠無英右衛白元玄獸遏後丹禽擁前上浮翠蓋下涌金蓮香雲凝空甘露無窮用之無盡尋源不終爾時諸仙聞上方空歌內經不可記憶百劫之後昭靈仙人仰視尊顔見五色香雲從天尊口中而出上騰太虛爾時昭靈仙人合衆俱起作禮請問不審天尊默坐百劫音響無聞今日何故口出香雲欲知天尊所為因緣願為分别開悟未聞天尊告曰我口出香雲以應後聖金關帝君我前下四天之中時巳臨至是時衆聖各應一事當此之時天地又應天應之時三景告瑞五色明霞以為重輪地應之時五嶽呈祥地藏發泄金玉露形若此之應金闕帝君不久下世今未剋日當此之時我亦觀之爾時昭靈仙人又更咨問空歌內章所出因緣太平天尊告仙人曰子不知乎大悲天尊治在此宫虛中真氣演出此音自然天經靈章寶文難可得遇後聖諸仙聞亦不解此音合和生神調理真氣之道凡所不聞我知汝心非分記録汝諸仙人未合受持空歌內經自然之音爾時昭靈仙人答天尊言兆以輕生經當誦念願垂赦宥聽許受持天尊告曰子得聞之是子宿命法應成真慎勿妄宣閉口修之學不負人泄則禍生祕則福臻爾時大衆俱起作禮奉受內經時之間上方雲篆空明虛中字方一丈八角垂芒煥煥光明爾時諸仙重更刻書玉文各寶一通韜之錦囊于時雲篆停空不滅天尊告曰真氣所覆彌久彌久汝等修之亦復如是夀無劫數形隨日新上真所寶不施下仙道數未足况於下凡天尊告昭靈當知上道一事皆不妄泄也况於天經汝當寶之勿將內經下化凡夫之心未能及此爾時昭靈仙人作禮長跪上白天尊下界凡夫雖居葷穢亦有知道修學成真忽有此人可能傳受不天尊答曰如此之人億數無一汝等云何得知合真之人昭靈答言臣南昌宫中亦有真仙之録三元八節下司上聞陳其功過亦無遺失天尊告曰下界凡心亦難分别或詐修吾道匿穢藏姧心有外求志不能堅固察姧糾過考其精神若不爾者清濁難分或意在聲利依倚玄門窺窬下風唯尚多聞汝欲教凡當明此人爾時昭靈仙人不明聖旨重更咨問不審若為考其精神願為開示𥝠心樂聞天尊告曰凡人之身中各有神神鎮在心心欲所為神巳知之身欲造惡神不從之人身隂賊魂不受拘魄不受制三元八節能聞上帝以是因緣可得而知人有隂德三魂不離七魄不散善神扶助天兵衛護以是因緣自然合道善男子無上大道不言而知恐汝未逹深須戒之勿得輕宣善男子汝數億萬劫遇我於太空之中又今值我得聞妙法不久之間自然洞曉一切諸法真偽之心如對目前無不辨了此諸身心通道故能洞達無有障礙爾時諸仙聞天尊慈悲即互相歡喜頓首長跪各命侍從奏樂娛善千音合響法鼓凌霄其時浮霞流轉香煙繞虛飛蓋回空長幡舞風龍吟遙天鳳唱虛庭天地震動二景垂輪神蟾出月以蹈虛靈烏鼓翼以翔空當此之時下界三十七天後學成仙見此祥瑞一時騰空上至玉清如雲之交太平天尊語昭靈曰仙無大小皆能感動天地制御萬靈當知道力不可思議令諸下仙皆得聞知爾時三十七天仙人億億萬衆遍滿雲宫燒香散花各陳本願爾時天尊遍知其意即為諸來大衆而入慈心大定攝受衆心入於靈册之中合自然九變之道化成九天中有九氣結成九府爾時三尊分居九府各坐九龍寶座當此之時號為九府真人太平道君引諸仙人一時而入九府之內爾時天尊為諸仙人説九仙之道上應九天中應九宫玄應九氣下攝九泉能入無問所謂一生三三生九九九八十一主於始生之法輪轉無窮今諸後學之人能生能成常居始生自然成真諸來仙人覩此微妙不敢致辭亦各知其從此得生不知今者天尊開示殷勤委曲內懷慙愧不知何謝是時天尊逆知其意即告之言無上大道都無所須何俟多言我身坐道場神交萬帝我非不凡受于虛言若言得道者下鬼凡夫唯除喑啞人未曽無言不能得道我非謂大道應凡之時都絶無言我今真身汝又非凡以是義故汝於此中為不了逹心請問義自外默聽無上大道法無辭謝是諸仙人受天尊教勑各各頓首心思道恩良久之間南昌宫中昭靈上仙稽首而言昔承天尊推運下世周逰十方時刻未到願得天尊下臨南昌少時影響不敢久留則是萬劫翹誠於此滿願合衆叩頭伏地良久而聽告言天尊告曰我巳上辭大帝遍别諸尊歸至雲宫因緣巳畢汝欲請我不違汝心仙人聞天尊告勑喜躍無量天尊又言汝等諸仙冝且前去雲宫之中由來寂靜不冝久住塵穢雲官大悲天尊昔應世之時暫有言説今還雲宫復歸虛無為我來此天尊大悲俯觀後學汝等諸仙應當知此爾時上仙昭靈又更請問天尊不審天尊何當得來天尊答曰我當不久二萬劫後尋即發來爾時諸仙奉諾訖已一時再拜辭别天尊次别大悲真帝頓首退後仰瞻髙座不見天尊時諸仙人顧瞻三聖亦巳入無唯見雲宫閴然虛靜香風微動爐煙尚氛飛蓋停空幢幡立虛天樂不鳴音響無餘是時諸仙覩上道之威神忽出有而還無良久徘徊冥寞無依齊駕雲車相隨復歸爾時一切仙人皆巳隨從昭靈上仙歸於南昌宫中修行天書隂生寶經一十八年皆成真道二萬劫中虛心佇立爾時天尊在雲宫之中遙見諸仙得成真道乃於雲宫之中出見諸真大慈左手當此之時三十三天其門洞開是諸天人皆見天尊左手猶如白虹貫於太虛五指瓜甲出五色光明照於南昌之宫爾時諸真一時稽首再拜左手各於光中遙見天尊在於雲宫虛無之中有天書左契一字八色光明時諸真踊躍歡喜知是天尊遙來印授道無二言見其左手在雲中宫經一萬劫然後乃收還於雲宫光亦如是萬劫之後隨手而歸二萬劫後時諸真人蹈空立虛遙瞻上方以正月一日晨朝之時見有三色光氣從東方𥘉日之中直下南昌宫中盤縈宛轉遍於虛空香風酷烈不並尋常九萬年中朝朝如此是諸真人晨朝之時正首挹氣九十過經三十年中靈氣洞徹虛凝體中從其項後出上衝天青赤白色永不復滅二萬劫後七月一日晨朝之時忽見太平天尊三聖法身坐在三氣之中爾時天尊各故真光心間出光光𥘉如螢須臾遍體內外洞徹映朗南昌上宫良久之間太平天尊道身如光無有分别合天炯炯譬如盛日但無炎烈瞻視煥目光芒射人不昏不異足經千劫是諸真仙在此光中歡娛怡悅形容反嬰色如稚子足蹈虛空泛若輕雲真光之力乃能如是雖經劫數心無於悒以道自娛都忘其餘千劫之後三聖法身忽見光中真仙無數億萬仰視上方長跪而立不敢有言天尊盡知其意是諸仙人俱得大通皆具神交亦知天尊慜其大衆廣開法門慈悲成就皆得無礙神通道力亦能七變九化逹觀諸法不知天尊千變萬化能大自在能轉他人凡夫之身不經久時而成法身天上地下萬道獨尊神力無等不可思議威魔品第十六爾時復有色欲二界六群邪仙八萬四千人性好論議常於下界較其神力善習幻化心意矜髙自號大師獨行三界心得五通壽八萬大劫聞天尊下降南昌上宫率其部落乘駕獅子經六小劫上至南昌思見天尊欲較神力校試道術天尊巳知其意與諸大衆默然不動坐一龍座去地七仞爾時八萬四千邪仙一時到巳仰視聖衆無心恭敬亦復不識太平天尊真仙階級欲登髙座無能上者爾時邪仙之中有一大仙名曰羅比羅是邪仙衆中第一道首變色而言我是三界大師獨明禍福聞有無上大道而此大衆何者為尊爾時天尊指昭靈真人巳為天尊是時羅比厲聲言曰子有道乎昭靈答言我身無道羅比曰子無道術以何玄法禁此髙座吾欲坐議即當升上昭靈答曰我此髙座名曰大道慈悲之座子將此身窮力上之亦不得升忽強升之亦終不得羅比問曰云何不得升坐昭靈答曰子是下方色欲二界直腳魔邪假託仙號爾時邪仙齊舉其腳悉皆堅直不能得屈求欲坐地亦不能得是時羅比盡其神力亢聲説呪是其徒衆八萬四千空中自撲隨呪緩急爾時羅比又盡神力欲動天地是其徒衆一時倒地轉身翻覆求止不得是時羅比心猶不信更求與昭靈真人較隱形之法爾時昭靈真人大悲聽許羅比曰子先隱身爾時宫中聖衆一時俱隱是八萬四千邪仙連臂空行不能得見還復本處歎未曽有復須吏之間大衆儼然未曽一動昭靈道君即令羅比合衆隱身是時羅比竭其威力變成黑氣昭靈真人一過吹之八萬餘魔一時氣靡猶如死尸冥然無知良久之間道君又微氣噓之一時俱蘇各起悔過信向歸伏爾時道君又以慈力吟拂魔之章令八萬四千邪仙半生半死良久是時邪仙得蘇息巳自覺其身有腐爛氣喘頓首道前而作是言不審天尊修學何法神力如是夀命幾何道君告曰我修無上大道慈悲忍辱之法身無死地神力自在道君以大悲力試而問之子修何法住夀幾何羅比答曰我修欲界四天神呪一名如意足能壽八萬大劫上夀之中不過於此命過之後隨業受生而我法中能勤苦行心得五通雖有神力不脫老死雖逹空理無法長生爾時道君逆知其意而不答之又問羅比知汝法中根本以不答曰不知此事久逺難可詳究道君告曰汝此法者是汝天中崑崙山精自號四天之主或稱四天仙王或稱神王出此法教化色欲二界邉地衆生汝之所師原本如是非是無上大道自然之法汝下二界邉地衆生工一小伎即號仙人因此邪仙更相放效不識大道無上至法羅比又問上道幾法仙有幾品經名何者聞有天尊目未曽覩而此大衆盡名天尊復有餘號盡是上真亦有下仙爾時真人告羅比曰上道法一論其支流三萬六千種法元於一道仙真之品有一百二十級皆宗天尊雲篆成文自然天書故天經太平真君虛無天尊常在玄中以汝凡眼五通小見不能得覩三尊真容我近學道經數億劫位登真人而此大衆皆是上仙羅比又問真人神力尚以無比天尊威神應復若為真人答曰非汝所見非汝所聞數萬大劫之後應下化世以汝危命八萬劫夀不見此時汝莫問此非汝所及汝身腥臊尸臭無常欲至汙我天宫汝當急去不得久停爾時羅比無立足處復歸下界天路遙長憶𥘉上時經六小劫此時年尚少壯猶故遲滯今轉朽邁漸無神力混神迷性進退無據相顧悲泣涕淚交連辭别真人遽還欲界圍繞崑崙起居邪王具説逰行之於上界覩大道真人示其神力語其根本邪王聞之五神振懾絶而復蘇良久醒悟語羅比曰止止勿言諸神聞之出於人間傳説我等道術不行是諸邪仙却居山南約水而住四時八節或附著人歌吟哮吼自號仙王求索禱祠修習幻化遍行下世自出支流改制邪法擅立位號六百餘種金闕天尊應運之時邪仙殄滅無復遺餘爾時昭靈道君白諸真人曰邪仙𥘉來天尊大聖不自對此下界邪俗命我小道示其威神我乘大道大衆之力非我獨能威此外道邪仙塵穢之事實非所宜無上大道逗機之時或應如此不足異也爾時丹霍洞真名曰通玄從坐而起長跪請問昭靈道君曰拂魔之章可記録不願見傳授敢欲修行昭靈道君曰此中雖復天真大會諸有傳受不敢自專先當上聞爾時二真具以因緣上白太平天尊告曰欲威下道妖精先當左叩金鐘三十六下而誦威章三遍其文曰金鈴電火繫烈咆憤九元殺氣流蕩熖粉萬魔滅種千妖絶殞雷父蹈空霹靂回風斬首馘醜推妖殄根逆我者滅順我者存七星裂血金神曜電精刀曜電玉斧含霜威兵前驅何鬼敢當爭氣者滅拒逆者殃上浮紫蓋下坐金寐丹霄羅映日月為光門據靈蟾尸衛金芒五毒藏姧萬魔滅亡七真內養千威外張魂歸紫闕魄入丹房天尊告曰此是太玄內威呪滅凶殺邪後學諸仙道未玄極恐多凶殺誦此神呪依儀鎮衛千邪喪精萬魔滅氣神平體安朗然無畏天尊告曰上道之法無心自成不必須呪誦此威章此是太玄虛靜道場之內威振靈册於邪門左叩金鍾三十六下以召威兵右擊玉磬一十四通以集真靈中建法鼓一十二鳴以聞上帝生神內列威兵外張雙矅入眸口吐靈芒頭建七星足蹈玄綱玉爐揚煙身坐金牀萬精滅氣千妖自亡天尊曰下土凡人單行此法不得真要年二百四十歲鬼不能害是時丹霍洞真伏受要言歡告禮謝奉而行之爾時丹霍洞真與後來三十七天諸真仙等億億萬衆一時蝢首長跪上啓天尊兆以夙承餘慶運遇髙尊賜以慈悲提携淪墜得易凡軀叨兹上首濫階玄極過泰有餘不揆愚微轉當忘退心願停此庇影南昌待慈尊下世之時願陪雲駕晨夕侍衛執蓋參爐惟願天尊大悲恩許辭畢再拜伏聽教言天尊告曰大道無親善善相因子承願力何俟多陳運期非久數萬劫間天堂遐曠任子逰居下世之時亦須汝等助宣正法流化下土我等三聖各化三界此時度人亦乃無數爾時諸真聞天尊垂許侍從深果所願歡喜慶快一時禮謝爾時天尊又告後來諸直汝道猶淺未達至理且作一劫入凝神大定思念都盡次入忘形大定應感皆空次入六虛大定隨方起應次入太虛大定分身萬億次入動惠大定能為萬化之根次入生惠大定能遍生萬物次入大慈大定能長成萬物次入大悲大定能藏養萬物汝能成此八事然後位登上真俱號後聖應為大道差次應運賜汝尊號欲隨我下世教化心不自定不能生化真應有滯不能起感爾時天尊説此語巳即人不動凝神大定如本無異爾時諸真亦隨天尊入凝神大定爾時天尊出此定巳又入忘形大定是時真人亦隨天尊入忘形大定天尊出此定巳又入六虛大定是時真人亦隨天尊入六虛大定出六虛大定巳又入太虛大定是時真人亦隨天尊入太虛大定是時天尊出此定巳又入動惠是時真人亦皆隨天尊而入動惠爾時天尊出動惠巳又入生惠是時真人亦隨天尊而入生惠天尊出生惠巳又入大慈大定是時真人皆隨天尊而入大慈大定天尊出大慈大定巳而入大悲大定是時真人亦皆隨天尊入大悲大定爾時天尊出定惠巳即入自在神力忽而升玄倒景步虛一瞬之間巳周三萬六千天中復歸本處凝然不動懷藏三萬六千日月又於身中開闢三萬六千天門又於身中登現三萬六千天帝一一天帝身中各見三萬六千天門又見三萬六千天帝各有三萬六千侍從一一侍從各坐三萬六千龍座一一龍座各廕飛蓋其蓋髙廣遍覆諸界須臾之間復令三萬六千天地一時震動天雨香花地涌寶山爾時天尊身中又出三萬六千龍輪乘三萬六千日月復歸諸天爾時三界地中所有枯骨變起成人復令衰老一時反嬰素鬢歸玄落齒更生五藏花敷耳目聰明須臾之間復令三萬六千天中一時風雷大動甘雨驟流萬象發生英華動敷天灑甘露玉髓通流真無凝仙梵唱清玄寥亮虛通響徹無邊又令應出星宫空列雲房上凝紫霞下結金剛十絶垂天寶蓋髙張牖開明月户映靈芒白玉為几金精為牀真宰俠侍仙童焚香爾時天尊與諸上真俱為雲房列坐龍座鳳唱虬吟庭舞仙禽神力萬變所作隨心時諸真人歎未曾有爾時天尊告諸真曰上道之法力神萬變未覺經心定惠虛通無心故為心不經而自成惠不為而自明強為不明強作不成甚希甚微難可而名汝大通之日自應如此衆真齊起一時禮謝諾受要言天尊又曰如此神變及以定惠乃是大道階級之事已應運化度世之法亦法如此爾時天尊知諸真人身心無礙智力廣大堪任大事即與衆真升入大羅之上謁請虛無天尊授其上真之任至億劫之後應加尊號而至大羅之上謁虛無天尊天尊告曰子道數已極宜錫上真之任我各侍至真之司玉函青簡刻書已畢命諸真人讀簡看名尊號已定衆真再拜天尊告曰如此冥默衆真奉辭歸於南昌雲房之中列坐大會衆真朝慶七日七夜天雨香花振動三十七天大地之中應時踊出山嶽而應上天天地合響一時稱善當此之時太平三尊與諸上真一時入於冥寂大定天宫間然唯有香官使者騰煙不絶足經一劫一劫之後天尊又出冥寂大定入於動惠須更之頃神霧四氛溫氣八衝微風揚煙甘露柔塵爾時天尊出於動惠遂入生惠倐歘之間萬象空生雲霧上騰雷吟電轉神草含英鳳嘯瓊林蓋動霞生天尊告諸真人曰動生之法以應金闕後聖降世之期非久欲至十方大聖同為告瑞非獨我也爾時天尊説此語已是諸衆聖一時默坐凝然不動金爐香花鬱鬱常然下降之時千變萬化當此之日希有神力盡應見世太上大道玉清經卷之六
