body:
  text: 上元品第九爾時上元大慶正月十四日晨朝之時二景交暉月華收彩星精斂曜圎羅啓旦芒霞疊照大空虛朗香花互啓元氣發生和液入堅地氛輕霧天散浮煙海清不波玄源演津飛蓋彌羅丹旌吐雲靈幡飄飄華猋氛氛空樂長鼓虛籟永吟五精導途𩀱景翼軒爾時上元太真皇極天尊與諸侍從日宫之中雲霞寶座齊下神足安庠而起登於猋輪凝精寶車香雲纏蓋慶霄四冥騰皇整轡金光理御正中之時下觀十天盻看六合後㑹陽寥之宫爾時天尊與諸大聖俱放慈光從心中出明照幽顯無遺纎塵光非千色無有邊際天上地下朗然無滯法輪常轉羣生俱會噓太和以發萌呼柔弱以散剛甲裂盤施舍靈踳馳琳碧敷華瓊根秀枝至十五日日中之時三天仙人無數億衆不可記字心越五通身無死地能調六軍降十大怨在於郊間忍辱之地權立一城髙廣無比有四大門樓峙聳峻出於雲心悉用七寶以為關鍵渠濠深邃洞入淵際其城之端有三萬六千寮孔網以珠緇地以蒼珉墀道周匝平夷廣逺城中宫殿亦悉髙妙隂輝燭夜朗然無翳𤤽玩穀帛盈積府庫是諸仙人大設天儀雷震法鼓秉大丹節舉大丹旌仗大金鉞撝大神劒精器利鋭譬如麟角服大法鎧柔如雲袍善却毒箭五兵不傷是諸仙人手執鈎鑲鋒芒纎礪前驅後殿威如鳳爪晨朝之時俱駕六龍齊引寶車出於郊間陳列威儀鳴鼓吹角未及作令怨敵以伏解甲釋衣雄氣頓靡銷金裂鼓摧旌毀節被髮解帶披心露膽膝行肘步下風而趨匍匐求盟心血自見仙人各擁命魔靈幡導諸投化登太玄之路入洞清之源陟長明之阿升金鳯之壇焚逆風名香誥以左契宴以玄津時諸大怨覩此神妙忍辱之力誠知無比心靈頓改願為仙人作善知識爾時仙人至於食時與諸侍從翻入大城於其城中各捨威儀齎百寶名珍神鄉竒物升入上清供養天尊所謂日月寶珠星精寶珠陽燧寶珠隂諸寶珠曜電寶珠驪龍寶珠忍辱寶珠大悲寶珠大慈寶珠六度寶珠絶塵寶珠和光寶珠無瑕寶珠離欲寶珠含真寶珠英華寶珠堅固寶珠精進寶珠持戒寶珠心海寶珠智慧寶珠方便寶珠雲雷寶珠和風寶珠發生寶珠甘露寶珠如意寶珠是諸寶珠光彩各異圓明一等復有三種無價善寶所謂大慈善寶儉約善寶退讓善寶如此善寶若有衆生懷此寶者所求如意無願不剋若有衆生為諸病苦懷此寶者病自消除若有衆生心多反逆懷此寶者自然慈順若有人王天下不化災殃屢表鄰國鬪爭五兵交戰百穀不熟水旱不調羣臣隂謀懷此寶者天下自化災殃不生鄰國交好金芒喪精百穀四熟水旱調平羣臣盡節隂賊不生是諸仙人復齎四種香飯所謂豐山香飯龍山香飯浮山香飯太和香飯香氣豐布食之無盡是諸仙人復齎七種寶漿日精寶漿月華寶漿星精寶漿甘露寶漿金液寶漿靈光寶漿玉匱寶漿各以諸天寶器盛諸供具復齎無價寶衣所謂自然瓊羅寶衣自然雲錦寶衣自然流霞寶衣復齎無價名香所謂反魂名香反風名香逆風名香七色名香復齎諸天雜果所謂萬歲靈桃空洞靈瓜霜梨玉棗赤子金葩種種珍竒來至㑹所供養天尊大獻珍寶列滿玄中香氣氛氲周流十方百寶光彩映朗無際時諸仙人圍繞天尊百千萬巿齊鼓天樂太和之曲億變萬轉音聲和美清妙𡪹亮神禽鼓翼而騰舞靈獸叩節以齊和龍吟鳳歌衆音合㑹清風吹絳樹之響名香轉徘徊之蓋日月停輪衆星曉明芳煙拂回甘露如傾是諸仙人良久之間輟衆音之繁㑹弭未遇之髙節收疊飛蓋傍息騰皇併却猋輪虛立雲庭一時稽首問訊天尊而作是言不審天尊衆善法身道化殷勤以勞聖慮萬兆無福實貫神心而塵穢蒙籠根業沉濁仰佩玄祐曉夕開懷慺慺之誠𢘆對心目空形任道無以報恩復念生成未能忘本塵衆相率建此微心而三天罄窮敢獻塵露藉以上元大慶慈尊髙㑹天恩無限不間塵臭願為納受所獻丹心言畢稽首伏聽哀㫖爾時天尊凝思逺視神彩冲邈金顔發輝真光四照萬天在眸神力周備塵界非遙令諸仙人心疑豁消是時天尊即命右侍金童焚香百和反風名香又命左真上相千二百人齊鼓雲和之璈又命左直主春上元真宰千二百人齊擊神金天寶之鐘又命東極太仙九千人以扣萬石紫瓊之磬又命西極太仙六千人齊擊神山天寶方金又命和風吹出空洞萬變之音衆樂齊奏良久之間九色雲龍蜿蜲騰舞入霞回空香風轉苑騫鸞翔鳯靈禽仙獸長吟虛庭不緩不急如飛雲之旋天似回波之引流衆音之中演出空洞微辭而告仙人曰上元正氣皆自然主生皇極為衆緣紫房吹動氤氲氣太和流衍散剛堅大道生成法如此故我移居治此天風雷消解諸盤結六氣能驚長夜眠此亦神功自通妙非關吾强使之然衆寶以陳玄理界即是虛心上福田爾時諸仙人聞空中微辭之音自然妙響清通虛豁道德流布理無不存歡喜適內神光發外一切有生皆發英華升沉飛走踊躍騰舞寶樹香草應時花敷諸雜根枝萌牙啓甲是諸仙人登六通果九祖承慶免離憂苦上元之功其德如此三日三夜天事乃畢爾時天尊為受供巳轉設天真靡不周遍以無相施故如道神力果報無窮香飯寶漿湛然不減日月寶珠彌加明盛時諸名香其氣不絶是諸仙人大衆之中有一上仙名曰昌𦝁而作步虛曰整控啓皇極乘運入中天披空獻心寶妙覺朗身田日宫散和氣寥庭騰願煙大道難思議𨺚福慧無邉空身遊道境冥心入太無披玄尋寶際幽契自相符故能明假外噓纍絶羣愚誰知不死道遐因空洞書玄風鼓太無天樂演微音龍章昭鳳彩玉字發虛琴飛猋上雲路散髮寫瓊簪稽首禮皇極焚香陳我襟爾時仙人說步虛已重復稽首請問天尊而作是言上元髙㑹以蒙仰覩沐浴恩化空心荷佩福被幽顯存亡獲濟忘退罪愆願垂赦宥欲從天尊求乞一願願為四天之下一切衆生度脫苦惱免諸厄難欲請天尊下降丹臺神州之中大度天下人及非人於是皇極天尊而告仙人言汝等當知三元髙㑹良辰吉日元乎正氣正氣化生一氣一氣化生平氣如此三氣上應三元天寶宫所謂日宫月宫星宫宫有一尊我處日宫號曰皇極天尊主於上元正月十五日春陽之時發生萬物月宫之真號曰正一天尊主於中元七月十五日以成萬物星宫之真號曰衆妙天尊主於下元十月十五日藏養萬物子但專心於神州之中及四天之下教化衆生令逺邪道宣揚三尊真帝名字晨夕願念至此之日三尊互下降臨洞府分形萬億濟諸天人爾時衆仙謹承明勑以正月十七日日暝之時辭别天尊歸於下界過北斗之中夜候真人朝謁靈童停留七日而下神州㑹於首山之上議定流化三日三夜之後東到扶桑之陽南到炎洲火池之陽西之崦嵫流金之西北越隂谷積雪之北次到貟壟青丘崆峒具茨以次告報新得道者一如上元皇極天尊金口辭也云中元大㑹七月十四日正一天尊下降神洲各令仙人下同具備謡歌唱令真帝名字聞四天下各令此日辦諸天供具盡世所有施安牀座幡花香燭心心繼念是時四天之下同於此日殊心合契中元品第十七月十四日晨朝之時天下仙人及諸國王一切人民仰視上方渴如所待爾時正一天尊與諸大聖六千萬上真之衆各乘月宫而下其中諸人皆見如雲之垂降臨下土為人保證無上福田爾時天尊將二侍者下於丹臺諸餘真衆各赴所感丹臺羣仙侍從天尊至十五日日中之時青丘仙人八十一萬衆俱乘青龍之輿齎諸供具來至會所貟壟仙人六十四萬衆俱乘朱雀之輿齎諸供具來至㑹所崆峒仙人三十六萬衆俱乘白虎之輿齎諸供具來至㑹所具茨仙人二十五萬衆俱乘玄武之輿齎諸供具來至㑹所崆峒天仙二十五億萬衆俱乘黃龍之輿齎諸供具來至㑹所須㬰之頃東九夷南八蠻西六戎北五狄邊逺之方諸仙人等各齎供獻承道威神浮空而至各各陳列供養之具奉獻天尊陳列事畢圍繞天尊步虛歌讚焚香散花作天伎樂衆音合響神風徘徊香光纒虛列位以次俯仰節度左齊右整北面長跪微言寂氣問訊起居而作是言萬兆紛紜多惡少善不期感動降下髙尊而此塵穢之徒竊好真道濫當開度功不補過無能自勉又恐九祖承負釁咎墮在幽扃或生出殊方受形異類幸藉微緣遭遇大聖不動而感髙㑹良辰小兆微生敢求多福唯願天尊誨示未聞開發金口演出靈章中元寶經開度後世爾時天尊髙抗深視良久而言月宫兆魄圓羅孕輝隰壤消煩金風扇威火木藏養炎凉氣交皇華垂津收束氛妖吉辰開宥萬帝來朝六塵外靜三毒內消二世獲安介福所招無所之先朴散為元形名之後妖邪所怨萬物亡本進退乖根良辰不度無思道恩悠悠萬兆痛不能言爾時天尊說此語已俯而彈指數聲天地震動河海騰波神氣不暢悲風不和是時衆仙各起禮謝而作是言不審天尊以何因緣俯而彈指天地震動日月不明神氣不暢悲風不和小兆道淺不逹至理心中疑懼不能自寧唯願天尊大慈憐愍哀所不悟唯垂分别誨以未聞天尊告言我無名之先真道大行言教未施天下德化我見世後人民多智各習異端尚多聞見仁義互興財食親輔棄貧賤弱父子相嫌君臣不忠六親怨爭鄰國相讎四海交兵以是因緣不善增長輪轉相報無解脫時不如今日衆生尚善初來聖衆降四天下一切衆生欲求智慧以離愚道漸漸工僞百競馳起雖地獄空虛不久盈滿以是因緣故我彈指衆仙聞說不覺悲悴爾時崆峒仙人從座而起稽首作禮請問天尊不審羣化之心可回攺不欲請天尊自在神力防遏萬原之端擁未萌於機上使合生復根億兆藏𥘉唯守一道泯絶羣生心無起滅形同太虛天尊告曰善哉善哉善男子汝所言者是大道之第二十之子也何以故大道元乎虛朴虛朴散為元氣元氣自然成形有生從生立名因名有言因言生正教正教生即智慧生智慧生即巧僞工巧僞工即愚智辨愚智辨即是非起是非起即憎愛生憎愛生即攻戰作攻戰作即君臣立君臣立即萌賞罰賞罰萌即利害見利害見即隂賊生隂賊生即罪目結罪目結則冥司立冥司立則有水火之罰輪轉無窮自然如此非道為之汝所言者居乎萬機之下故曰我道雖明背之則暗我道中正反之則邪我道柔弱捨之則剛我道長生輕之則亡大道無親唯與善人我觀羣化非可卒正自有萬分之一生感和氣歸原復根大道為此下流正教以表羣目欲其影從而汝後學即斯人也爾時崆峒仙人請問天尊不審水火之罰其義云何小兆不逹願垂分别天尊告言水火之罰凡有四種隂陽二過冥司謫之經水過火所謂冰炭之罰也衆垢齊積焦沉禍至天屯地否水火交㑹乾極則八海騰煙山嶽灰燼天門祕揵金玉銷爍三景藏精風雷扇炎火翳流熖天地成冶地否之時隂成告瑞移陸溟海中天涌波衆真遷治西北水母形如素旐衆鳥南飛羣聚天際飄風激濤崩騰山嶽金石相觸磨滅泥滓善男子汝今當知此二大災以應天下及以萬民何以故天下無道萬民不化此災者喻如衆生五內反逆蓄泄不調自然成患况於天下失道敗德衆塵齊纍天地愍之不能巳苦應施罰前示其教次告其氣後垂其象愚癡之人不信正教不明氣象凶惡不攺天不得巳示其大威譬如臣子君父寵念承恩驕恣變心失忠不孝君父私懷反逆謀狀以露仁君慈父猶不即滅先當施令如是臣子心猶不悔後付司殺君猶哀之但不得已天帝亦爾時諸仙人聞天尊所說皆悉歎言未曽有也禮謝天尊煩勞金口愍諸小兆宣示未聞荷負恩造流霈之澤禮謝畢巳天尊告勑令復本座至十七日晨朝之時正一天尊𥘉來真衆應緣畢巳從四天下歸入丹臺問訊天尊起居道化得無勞極天尊告言真化無勞道化無極子赴萬兆得無疲猒衆真答言承道威神豈有疲猒天尊又問生死二緣得解脫不衆真答言地獄罪魂以天尊下降丹臺之時登即解脫四天之下一切兆民雖解無脫爾時丹臺諸仙聞上真之言心中不逹爾時昌期仙人即從座起稽首天尊云何地獄罪魂未見天尊而得解脫云何四天之下一切兆民雖解無脫願為分别天尊告言善男子汝今諦聽吾為汝說所謂大道藏用雖濟度萬物而不為尸暗德運載以是因緣能令罪魂而得解脫雖解無脫者所謂天下人民雖解煩惱性空而不免脫何以故凡夫之人雖解法性不習真常但明至理身在合道是故道與理乖譬如有人身坐狹室心遊十方無所障礙或說至理聰辨無滯離合隨心此名心得入理不名身得入道以是義故理雖合道不能令身而得入理喻如夢遊身不隨心是故衆生心得入理身不入道心入理者名之為解身不入道名為無解無極大道身心無礙能令微塵世界一時赴感故曰大道自在解脫能令十方世界如觀掌中前際亦復如是是時天尊說此語巳即放左手五指十種光明遍照虛空令十方世界俱見光中時此大㑹真人仙人靈人悉皆洞覩微塵世界又於光中見其二際身所經業了了分明是諸仙人洞觀希微道窮真常皆得六通自在之力九祖獲慶受生道境天尊中元之緣畢巳七日晨朝之時天尊大衆俱升雲輅玄風鼓樂紫霞虛邁空谷謡歌天吟萬籟爾時衆仙而作步虛曰吉光騰紫氣霄輅逸丹天翻揚香風轉蓋動起浮煙道中還復道玄中巳復玄真光不識際大象竟無形法輪常自轉希音不可聽空間侍三寶虛中聞洞經七變遊魂反萬氣駐頽齡香風飄羽蓋遊氣轉猋車泠泠上雲路窈窈入長虛顧愍埃虛子應運演靈書妙果諧今日冥契自然符爾時仙人上送天尊歌頌讚歎入至雲庭過四十天門是時天尊止諸仙人言天路遙長無勞逺送是諸仙人俯仰躊躇良久之間天尊愍之重告仙曰子後學成道雖得六通數千萬劫猶是人身與我大衆自然之體光氣微妙未可全同天尊即命運氣上真調暢玄風噓出無上萬變靈章雲和清雅太玄之辭三十九篇其時日精上浮月液下流真氣順生金風反和瓊林發蘂玉樹花敷法輪三轉流霞七波天外長謡虛裏空歌令諸仙人明道優劣又告仙人曰上道之希其法甚微神力至妙不可名言略示希有以與汝分别仙人歡喜禮謝天尊唯願大聖時見影響言畢辭别復歸下界下元品第十一爾時衆妙天尊以十月十四日晨朝之時與諸大聖五千萬億真仙之衆俱從丹天之中星宫之內應運下世威儀度物先當引日入左目月入右目左斗升左耳右斗升右耳南斗蓋通天之端北斗在瓊簪之下中斗在神足之間碧霞縈左鬢素霞縈右鬢丹霞映三理之中玄雲浮玉枕之上青龍吟左白虎嘯右金鳯前唱玄武擊節五星吐氣以回繞隂輝停虛以懸照慶霄纏幕仙雲起蓋諷誦靈篇虛吟萬籟地湧寶樹𨼆草萌荑芝蘭脉發積雪冰消寒谷和氣溟泉吐溫神煙逆吹召魄呼魂雲雷揮音洪靈翟精謡歌靈章空洞虛鳴聾瞽聰察攣躄復行河海靜波昏霧廓清真光浮輝寥朗長天五辰合度三景齊明異類親睦百榖豐盈怨敵解圍天下太平正道雄張妖魔滅形爾時天尊俱乘星宫齊整雲庭告羣生之吉祥應衆仙之靈瑞鼓橐浮虛俯臨太無下元吉慶景福羣儲進道修德理契神符紫藏交絡六府花敷神力變於下士真氣流於太空御運垂期玄中優游於是萬變不盡須㬰令冬林以發榮使枯木以花敷復含生以反真攝萬類以藏初收道幽寥寂簡髙居如此神力登應金口爾時丹臺仙人夙承上元皇極天尊金口之勑覩此祥瑞知是天尊下降神州即出丹臺遙見玄中光明赫奕星宫髙妙幡蓋彌天羅列真儀遍滿虛空是諸仙人叩頭上請天尊降於丹臺須㬰之頃天尊即命左真一人通命仙人曰我應運教化主知下元度諸新學證成真仙諸有善功名著青籙晨夕求願香煙熏於帝庭清唱聞於太一者我當示其進修之道命羣魔以侍衛下界凡夫回心真正下元齊戒為其九祖我當拔濟存亡二代未聞令聞未見令見未解脫者令其解脫諸有病苦我當療治怖畏之者令其安隱我今法當降下地中宣道布化中元之時正一天尊以下丹臺為汝說法汝功德圓備以具六通得無閡智但以身非自然後學成道所以爾者未得入登大羅之上諸學成道但至自在長存不死名著左契塵劫如瞬形隨日新汝等諸仙即當其人奈何兆民形命蜉蝣朝生暮死與道相絶汝當知之爾時仙人隨從天尊暫治地中下元施化濟度羣生爾時天尊與諸真仙微塵之衆俱御浮霞明星寶宫以泛其上下至地中列諸星宫去地七仭凝九色慶雲以為大城七變光氣以為樓臺萬變金精以為四門金剛寶光以為關楗太虛真氣以為寮孔忍辱寶光以為却敵智慧寶光以為城塹玄源洞清以為泉池四信寶光以為階道六度寶光以成寶樹戒珠寶光以為花實朱雀寶光以為幢蓋青龍寶光以為神麾白虎寶光以為瑞節玄武寶光以為鐘磬玄風寶光以為仙樂法雷寶光以警衆生法輪寶光以宣道化空洞寶光演出靈文萬氣寶光以召生魂神符寶光以召死魂隂生寶光以起枯骨九轉寶光以除痼疾太和寶光以為天廚甘露寶光以為良井日月寶光以為燈燭香雲寶光以為飛蓋天花寶光以為𥤆地爾時天尊以一慈力流出諸光上極無上下窮無下十方世界皆悉洞徹遙見天尊如在目前此㑹大衆亦覩十方猶如指掌生死二魂皆悉乘光一時雲萃羣妖奉節自喪其精亦皆乘光匍匐而至爾時諸地水神排破堅冰撥開積雪湧出半身飲和至化爾時地中草木遊根伏牙悉皆湧出其𦆵見霜雪盤施甲裂騰雲吐紅須㬰之頃神嶽冰消溟津凍泌地乳瓊漿天垂甘澤天尊凝視良久喜諸羣微心知向道乃開發金顔而啓法口怡然微笑萬變真光流出金吻十方世界皆於光中洞觀真相欣喜踊躍不覺自失人及非人悉皆傾想注念真光入其心目三日三夜停然不動亦無勞極又於真光之中各各見其魂魄圍繞天尊須㬰之頃變成嬰孩入其身中各坐府內湛然不動自覺其身改為童子色美髮黑氣力如雲時諸死魂飲和生氣悉成人形反真復胎靈魔變節道德成心地水之神半身沐光以極其靈胎卯潛胞隨毋獲安皆含正氣開剖之日順性成就飛走輕利無諸夭傷積疾新疴登即痊除羣蟲不螫毒草樹滅天尊告諸有生言此非自然皆因道化一瞬之頃神力周備萬物以具受真正氣至十五日日中之時下土凡夫各獻丹誠并賚供具以慶下元盡世所有供養天尊天尊告諸仙人言凡夫不同或獻丹誠或獻珍寶及以穀帛一香一味一塵一色大道慈悲應為納受為說正法示正威儀長其信根令其歡喜以是因緣逺離邪僻免脫生死長入道流可不善哉可不善哉是時諸仙人及非人天地之間有形無形悉皆同聲一時稱善當此之時香光徘徊流霞四象三景交道互西互東真謡長虛梵歌太空寶蓋浮煙長幡引風龍王負爐以散反魂仙童擊磬居城四門天樂和善響徹無邊能令衆生虛裏披玄寂坐飛龍默誦靈篇植根先劫樹果後來見在無際都忘二邊泯諸煩滓無心默淵自冥光氣柔弱剛堅天尊說此法巳即入大悲大定須㬰之頃寒谷吐風吹諸憧蓋鏗鏗鈴鈴虛響空鳴變為悲聲玄雲不流真光湛然神煙籠象七曜收輝日道南移月路隂歸九壤復堅衆流沍溟水精浮景遊氣濳形溼族淵居甲𠘶盤榮蠢伏藏氣蟻蚑吞聲爾時天尊至十五日禺中之時微動左手抗齊神心彈指三聲爾時羣仙及諸凡夫皆見天尊出大悲大定歡喜稽首而作是言慙愧慈尊道化有勞濟度無窮幽顯解脫歡喜無量聖凡慶快不審天尊衆生未度之前何故金容啓笑化度之後翻入大悲日月不明七曜收輝霜氣吐凝嚴風扇威皇道南移月路隂歸羣物憔悴五內含哀彈指之聲令衆慘悲願為分别釋結除疑天尊告言善男子汝當知我初微笑喜衆回向易得度脫得度之後勿忘大悲若忘大悲雖度非度以是因緣故我為諸衆生入大悲大定彈指當心示其內外和合三轉法輪而為羣生無上大道法應如此諸人聞說衆疑頓決重復稽首天尊謝煩金口中時巳至欲請天尊聖衆慈悲為受衆生微塵供養成就之心願垂愷悌爾時天尊不違其意大衆列坐㑹中而受供養爾時天尊以方便力故臨受食時即命中真左侍飛往上界大羅之中取太虛寶光之器二口各圎十分安著座上玄虛之中一器先盛大羅天中自然天厨日華月液以一空器擬盛下界衆生所獻珍心爾時四天之下一切人民及諸異類持物施者或手或口或心所獻之物一時俱到天尊座前各各心疑寶器狹小天尊知其疑惑即告之曰汝等但施勿嫌器小諸人心疑不敢仰答天尊又曰汝心狐疑不能决定我知汝心嫌此器小是時天尊即命中真捧下寶器小傾其口而向諸人即告之言汝欲施供具之者先令人王次及羣臣兆民異類各持本心入我器中諸人受命俯觀寶器忽見無際不測淺深四天之下一切人民一時持獻而入器中或車或輿或步或騎升沉飛走都無妨礙未入之人見器猶小入中始知器無邊際歎未曽有而作是言我等小智欲以度量天尊太虛寶器不受塵露是我各煩惱覆障不能得知大道法器向若不蒙天尊故命中真欹器示我我心狐疑施亦無福爾時諸人入寶器巳周遍按行莫知其極見有無量世界並在其中仰視上方天天相次日月星辰倍明下界寶器之中盡是天真大聖空間虛白甘露大海百寶山嶽天禽天獸𨼆草瓊樹香雲香風法雷法雨是時大衆復觀所施蓋不足言次周行忽至天尊說法之所從器中出亦不覺知其時圎光停照時不攺中天尊愧其盡心獻諸供具欲以方便示其稀有天廚上味即告大㑹之中國王王子羣臣兆民仙人非人等而作是言我愧汝等為道逺來獻我供養我以為汝受納之訖諸人慙其供具微少默而無答天尊以知其意重告之言下元大慶萬福俱㑹齊時以至恐汝飢虛我此一器之中先盛上界太虛天廚欲施汝等無上法食汝當列坐受我法食是人諸人以次而坐復思前施及入太虛寶器之時各更狐疑互相謂言向者施供及入寶器是為夢中為是覺時寶器極小若是覺時不應得入若是夢時應無施心又復寶器𦆵經一寸一切天地並在其中我等恍惚未能辨了爾時衆中有一人王名曰辦心告諸人言我等大衆未得真道常如夢行法器大小入與不入施與不施一種同夢汝等勿言但當思念中時以至天尊哀愍施我等衆無上法食須㬰之頃天尊即命七童使者駕六龍大車載天寶器以次施食任諸大衆仙人兆人等而取多少食之既飽隨意懷藏器中天廚都不减少諸人食之五藏花敷腸胃盈滿耳目聰察關節調理衆病永滅六識開張思惟道恩得六通慧反照前後九萬大劫所經業緣皆如指掌方悟前心定如夢幻爾時辦心與諸大衆禮拜天尊而作是言不審天廚亦有盡不天尊告言虛空若盡天廚乃盡是故大道有無盡藏而給衆生辦心又問食此天廚果報云何天尊告言食天廚者夀命無盡形同太虛爾時天尊即命中真傾此寶器散於天廚著空虛中所拂草木皆成花實日華月液變成甘露泛空中者化成真光和氣萬劫之後若有道德天子及諸學人飲我甘露餐我和氣凡百人民食我果實隨其根性皆獲利益爾時㑹中覩此殊妙不可思議合衆上啓天尊而作是言無上大道至法微妙神力無比而此大衆巳蒙天尊慈悲之澤不揆塵穢欲從天尊暫陪霄駕遊於上界以申禮願所希便足不審天尊大慈之心願見聽許天尊告言汝等大衆法食之後心中何如時㑹大衆各各答言法食之後萬倍於前天尊又問昔夢之心存亡如何答言法食之後夢想頓忘天尊告言汝等諸人欲見上界各各復思令汝自見是時大衆復思良久天尊告言思何所見答言都無所見又問思何所聞答言思無所聞又問汝心何所起眼無所見汝心何所滅耳無所聞答言心無所起眼無所見心無所滅耳無所聞天尊告言無見之見謂之正見無聞之聞謂之正聞無上大道法無起滅無聞無見無去無來無身無心無光無相形洞太虛天尊說此語巳攝諸大㑹入太虛寶器擲著上方是二寶器同時而上到於太空大羅之中如彈指頃是時諸人各各皆見元氣之尊虛寥獨坐在於玄虛中出空洞自然靈章亦無光相窈冥寥寂是時諸人各申禮願叩頭良久問訊天尊而作是言不審天尊大聖虛寥獨絶與世永隔都泯聲譽使下界凡夫翹誠渴仰欲求多福無處依歸唯願天尊宣揚道化救脫來生又復叩頭良久伏地不起天尊不答須㬰之頃空虛滅無唯見天中泛然遊氣如有如元𦆵聞清天之上微有空洞靈音俯聽則有仰視則無綿綿冥冥諦聽或聞其辭希微不可得解天尊又於㑹中舉大慈手入於有頂接取諸人還著㑹中須㬰之間又環繞擲之周旋十方微塵世界一彈指頃以周七匝還到㑹中諸人各各自知乘道神力得見十方虛空道境又從器中而出了了分明心中無惑始知上界空無所有爾時天尊與諸來衆到十六日夜三更之初攝取太虛天寶及諸光氣一切威儀俱入星宫是時天下仙人神人靈人人王兆衆皆知天尊真化事畢欲還上界恐畏以後無處决疑新入道人及諸來生欲建三元齊請不明科法不如今日上聖化度自在解脫合衆苦請天尊教示後學建福修功必有成剋爾時天尊告諸人曰三元大慶自是道法自然之良辰衆真朝拜太極之吉日也下仙凡人修身拔亡之要機也此時詮簡功過校定吉凶上帝下觀司非糾彈地司上奏水府録簡有功成真過謫罪魂冥司考罰苦不能言汝欲齊請當依正法三日三夜燒香禮悔精思念道吟誦經戒常存十念一念道恩二念經恩三念師恩四念天恩五念父毋恩六念善神恩七念施主恩八念善友恩九念過去恩十念見在恩天尊告言若有善男女等修此十念生十善道一善之中十神扶衛故名百神之身人無十念名為百惡所謂百種善神翻賊其身上士十念身得真仙中士十念身得延夀下士十念身得長年天尊告言三元齊請隨時豐儉要在聖盛潔內外合同當此之日諸天大聖皆悉下觀善神監齊在人左右三日三夜功過上聞子當精進殷勤勿怠道在玄中遙鑒子心三元寶經流通品第十二爾時四天之下諸國天子前進作禮辦心天子而作是言不審天尊演說此經當何名之云何奉持云何流布云何供養云何付囑𩓑為分别開示未聞天尊告言善男子此經名太上大道三元寶經如經奉持廣宣流布四天之下使不斷絶此經所在之處别笈盛貯燒香供養付囑有道國王王子大臣學真道士齊戒之處為人解說開悟未聞時㑹大衆聞天尊所說燒香散花讚歎圍繞奉行教勑是時天尊至五更之初浮空而去是諸仙人徘徊雲路戀慕霄駕而作步虛曰飄飄上雲路黯黯入長霄星官日去逺光隂劫數遙仰聽金顔隱傾想佇神猋𩓑得映霞軫焚香稽首朝玄風轉飛蓋紫氣泛仙車浮空不待駕合景忽升無徘徊哀下界顧盻愍羣諸三元真化畢翛然入大虛萬氣浮空上千光合太微霄間望華蓋虛裏盻霞衣真儀入雲路圎曜逐風飛願得三元㑹金容乘運歸爾時下界仙人及諸大衆作步虛巳翹仰雲路傾盻神光目送霞猋拜辭真帝須㬰之頃天垂紫雲地起輕霧煙霞交合唯聞天樂漸漸髙逺時㑹大衆各還本土依金口宣揚道化流布寶經齊講設㑹四天之下皆蒙玄祐福德無盡太上大道玉清經卷之四
