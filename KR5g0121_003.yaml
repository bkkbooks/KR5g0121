  text: 太上大道玉清經卷之三星三
  hash: sha256:e967675e92e6734096c6f3c304b161a75b1ccb0c14983ba5b10798c1a588ff65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_HFL_003-001a, image: hfl/1022/1022-152.png}
body:
  text: 通濟幽冥品第八爾時諸靈人等身得受度位登道境心生慙愧作是思惟不期一旦遭遇天尊身得生化永離煩惱荷佩道恩誠濟之極私心願念承道威神廣被幽顯立誓度脫一切危難宣揚道化令不斷互相謂言憶我往昔不值良緣沈滯垢穢輪轉生死墮在邪中不聞正道念此苦時當何所依復慜傷痛猶在心目雖蒙濟度未忘悲苦又恐天尊大聖氣係上元下土薄福穢惡充滿真仙虛寂不久住世此一㑹中雖以受度猶有九幽痛爽不覩日月冥冥長夜綿歷劫數無由解脫是時東方青帝靈人前進作禮上白天尊言不審天尊今者化度通同無礙九幽苦趣蒙解脫不弟子蒙昧未能了逹唯願天尊大慈之心願垂分别令得開悟天尊答言善哉善哉靈人等汝今所問不爽大悲我以應身往彼化度諸地獄中受苦之魂非十惡之例以得受生若罪根深重自有限極道所未化何以故十惡之人自招殃對非他與也自貽殃咎而墮地獄或其生世之時不奉師訓不見經教或生邉地不遇善友唯知盜殺作諸非法死入地獄如此之人罪目尚輕若有中國之人雖至愚癡亦曾聞法而身故犯死入地獄如此之人生死之中終不信道任其自性造諸惡業輪轉報對譬如世人為性𠒋頑而不畏死徒以威脅終無所懼當如之何亦如孩童性愛戲弄父母約束或得餉時從以誨示心終不轉或加憷撻亦不能悟十惡之人亦復如是又如蒼蠅而愛腐臭性之所便無由自改十惡之人亦復如是如蛾徇明自取焦滅十惡之人亦復如是靈人當知十惡之人所在之處多諸惡伴善能方便搆成惡事以是因緣誤入墮惡又復教訓眷屬妻子行不正行還習惡業以是因緣連纍幽顯互相承負子孫欲安罪魂危之罪鬼欲出子孫誤之生死業報如循環中不見其際冥冥長夜無由解脫展轉受苦不暫寧息靈人當知大道殷勤常為於此不忍放捨衆生不知反生怨害無上道法而不能行威儀戒律而不依信清虛志尚而不肯為塵濁滓穢無端而入貪樂聲色紛紜馳競叨餮滋味傍邪求食商賈販賣唯入險徑安平大道終不暫進殺生害命心無慙愧唯務飽暖蓄積無厭一旦窮之便懷賊心百種規度以求如意損物益巳不聞思退生無片善日後積惡死入地獄魂魄受對種種苦楚自與殃咎當如之何道雖殷勤無知不從靈人當知譬如春雨是物皆潤獨有枯木而不受洽縱不潤者益其朽爛終不能生枝葉花果十惡之人亦復如是雖聞大道終不能發無上道心爾時靈人白天尊言不審十惡之人從何受生悖戾反善惡根深固不可拔擢天尊答言善惡二種元同一道亦猶行人一者向道二者背道背道之人迷入冥山轉向幽谷又多惡獸荆𣗥毒刺衣糧窮盡為苦所逼百種煩惱故卒而致死魂魄流轉隨業受報向道之人所適通逹設求如意無願不合復多善友處處得舍欲見國王隨意即往以向道故無利不尅如是二種習業不同背向各異非道使然道本無礙行者背向逆順相反十惡之人身自失道非道失之向道之人身自得道非道得之靈人當知我諸聖衆劫劫下化十惡之人雖不信道道終不離於是靈人重啓天尊而作是言恐十惡之人習業堅固生死背道不可化度猶如瓦礫一破之後不可更合天尊答言大道威神譬如大冶錬金一切無不銷者靈人當知十惡之人我未化者且令受苦待其厭惡然後化之我當示其無上威神自在變化仰令歸伏靈人復言不審天尊示其神力為如前法為别有方願為示見解脫網羅人神開泰幽顯普度蕩蕩大化不亦快乎天尊答言且待須㬰令汝得見是時天尊即以無礙大悲化作十萬十惡之人形容長大氣力壯盛利辭辨慧各言犯罪不畏生死地獄因緣在天尊前須㬰之頃又命中仙直使十萬人執持信幡下入九幽之中引出罪鬼十惡之人如一瞬頃皆悉俱到與諸化人俱在一處天尊又化作百萬力士持大鐡棒詰問化人造惡之由化人不伏是時力士以棒打之碎如微塵次詰罪鬼未及尋棒鬼以懸伏求欲歸命從道之化是時天尊又命靈人百萬俱握左契飛行四方追鬼子孫須㬰之頃無數億萬承道威神俱來㑹所亦不歸信心無慙愧自言不應忽來三此於是罪鬼見其子孫悲苦號呌切齒而言汝等五逆惡黨從何而來久欲殺汝未能得便待我自在當滅汝種子孫聞之身毛皆豎立便頭痛寒熱苦毒是時罪鬼形體殘毀不可復識或無手足或被剝皮或被破腹或被火燒湯煮或被割下其肉或挑出兩眼或拔出其舌或刀鋸解骨或遍體錐剌或鈎腸出肚或六畜食噉種種苦惱不可名言其鬼子孫生世間者負其祖父造十惡業遍罹衆罪生受報對或盲聾喑啞手腳攣躄通體惡瘡眉髮秃落徹骨蟲癩疽瘻癰腫面目喎斜膿血不淨貧窮孤露是時人鬼罪狀相似良久顧視相向悲泣不能自勝爾時天尊微聲問言汝等人鬼何為如此生死二種俱不如人我今慜汝不忍捨離故以道力攝汝遠來是時人鬼內懷慙愧瞻仰天尊大聖身紫金色是諸靈人形如冰雪是時十惡衆中內有一人名曰求利前進作禮白天尊言不審天尊大聖所建何功頓得如此身相奇特神力無比辨才無滯與世不同願為我說欲知因緣所從何來天尊答言我此聖衆無餘所修唯以慈悲忍辱精進持戒惠施不殺衆生以是因緣令我如此諸十惡人聞天尊所說心小變善默自悔過伏地不起爾時十惡罪鬼之中而有一鬼名曰反真見其子孫心生悔過亦以作禮白天尊言不審鬼道之中堪聞法不自慜生平造惡鬼神受考報對未了不可免脫天尊答言汝但念道勿行邪曲在在處處心存道法我當救汝是時諸鬼心智歸信瘡疣漸損是諸生人亦皆小愈須㬰之頃忽見司非之鬼將諸獄吏飛空而來白天尊言向奉嚴敕令放群鬼不敢拘留不審天尊以何因緣卒放大恩原除十惡蕩莫大罪諸惡鬼等罪簿尚存報對未了天尊以知其故即以方便問司非言此等諸鬼生平何緣死入地獄復應幾劫於受苦司非答言第一群鬼生平在世淫殺父母伯叔姑姨兄弟姊妹第二群鬼反逆君主誤殺兆民第三群鬼在世之日斷水陸商旅殺取財寶第四群鬼平生之日穢慢道法輕泄經文毀敗善功第五群鬼在世之日販賣父母六親取財以贍己利第六群鬼生平之日好將破掠家國第七群鬼生平之日劫尸破冢散人骸柩第八群鬼生平之日不孝父母獨甘美食第九群鬼生平之日反師背道心無慙愧第十群鬼平生之日凌脅孤貧隂賊兩舌坐此罪故死入地獄萬劫受苦天尊又以方便故為諸十惡之人重問司非言云何名淫殺父母伯叔姑姨兄弟姊妹司非答言十惡男子或淫母殺父十惡女人或淫父殺母伯叔姑姨兄弟姊妹亦復如是是時十惡之人聞司非之言各省已過所犯罪目與其祖父皆悉相似恐其死後還入地獄身毛皆豎心中戰怖不能自持皆悉悔過自撲流血是諸罪鬼闔衆悲號猶如山崩司非復言此諸十惡之輩生死罪簿皆我執之唯以注惡無善可記生死二衆不知悔過云何天尊而欲開度十惡之人都不科罰與其升度後世愚人造罪日增都無忌憚不弱之流求生無處唯願天尊莫度此人天尊答言無上大道怨親平等常以一慈悲一願力悉令普度愛無偏黨司非當知我先令中仙十萬執持信幡下入九幽召出群鬼復令靈人五萬握吾左契飛行四方追鬼子孫以是因緣法當開度大道玄科許其悔過悔過之後若更犯者聽執之我道不救是時司非奉天尊敕不敢更言是時求利與其大衆恐懼因緣病便增長苦從天尊求乞濟度天尊以知其意即告之言汝等諸人習汝祖父十惡之業冥司注記與汝祖父所犯無異汝等云何作畜生行媱犯六親殺害骨肉隂賊良善而無慙愧以汝罪身未堪佩法但當莫犯十種惡業日夜精進自得濟度無上祕道未可得聞爾時諸人各各書取十種條目戒約身心不敢更犯是時求利重白天尊不審此衆祖父罪魂云何濟拔令得離若天尊答言汝等各各還家建立精舍供養道法晨夕禮悔持戒布施辨諸香燈盡世所有營九幽大齊三日三夜傳香行道傾誠倒意前後三過作此大謝又營中元大獻給濟餓鬼汝等當此之時請諸法衆轉讀是經宣示愚人令其殫盡內外殷勤福乃成就汝諸祖父承此法力魂度南宫即得受生有道之國若不爾者無由得度諸人聞說各各禮謝過奉教敕爾時天尊告靈人言我以大慈為此諸鬼令其離苦復欲方便留教後世故令建齊以約其心後世衆生欲拔亡者當依此法以謝宿罪分解考謫又令其禮悔銷其宿罪并繼其心令不放逸惡根斷滅善業增長汝今當知化度之法法應如是爾時天尊即命南昌宫中主生之君領取群鬼速令受生勿使留停於是群鬼禮謝天尊悲喜而去爾時靈人重白天尊言人鬼已度無量慶快猶有畜生道中求乞濟度元其罪目亦從十惡中來輪轉報償一墮畜形失其本心雖不具智皆有道性恩愛生育哺乳時節飲食長大群分類合依附林藪驚怖狂悸各護身命但念水草餘無所知不可思議慜之無智不斷其種繁育滋多更相食噉不忍見此心無恃賴天尊答言善哉善哉靈人汝等今當知而我大道常以殷勤教化衆生并濟地獄窮魂痛爽欲為是等斷畜生道先澄其源則其流易清何以故畜生之道從人中來是故應當先化人道人既得化則衆惡不生衆惡不生則畜坐道斷昔不曾聞我為諸龍王水帝演說法要良為此耳汝今遺忘都不記憶是諸靈人却自尋思方始開悟爾時復有五帝行病鬼王聞天尊下降大度人鬼率其部黨五億萬衆來至㑹所白天尊言我以果報得為鬼王統攝天下色欲二界所有人民生死簿録皆悉貫之行病殺活時無空過被人所禱食有盈餘所贍生命曾無暫闕近數千年福祚都絶人受道氣我法不行以是因緣福祿減少所有部從皆悉饑虛正由天尊道氣所為唯願天尊莫久住世物貴自守不相妨害今日天尊甚成害我天尊以知鬼意即化作殺鬼大將身長百丈前後從騎無數億萬左帶金剛揮神之鈴右秉玉㦸流曜昆吾神劒金鉞雷震霹靂光明熠爚周匝騰沸從西北方乘玄雲之車下天尊前稽首天尊致敬無量前後導從萬種鼓吹是時化人悉皆大震雷音俱唱拂魔靈章是時化人自稱是殺鬼大將侍從天尊爾時大將目出流光猶如奔星是時五帝鬼王及諸徒黨覩此威神悉皆震懾膝步下風不敢仰視爾時大將訶責群鬼魔邪妖魅乃敢爾耶一叱群鬼鬼王皆靡良久乃起狼忙匍匐大將又問鬼曰四天之下人民枉疾非橫夭逝汝所為耶答言是神為之又問汝等諸鬼能行幾毒病苦衆生汝實答我我即免汝汝隱諱我我當誅汝是時青帝鬼王答言我主春行病令人頭痛寒熱身發惡瘡赤帝鬼王答言我主夏行諸熱令人苦毒苦瘦白帝鬼王答言我主秋行病令人轉筋吐痢消渴煩悶黑帝鬼王答言我主冬行病所作隂濕入人支節令人腫痛黃帝鬼王答言我主四季行病令人腹內堅强剌痛是時諸鬼語卒化將各令諸鬼著此毒病又振揮魔之音以滅鬼氣是時諸鬼一時之間千生萬死楚痛號呌如被火燒爾時天尊復令諸鬼苦痛暫止即以語言汝諸鬼等為惡以積今日罪滿故受此苦衆生無辜橫遭夭喪殺生求命益其重罪終無福祐皆由邪魅貪殘恐動於是化將又更瞋目鬼又苦痛求死不得毛孔支節耳目口鼻悉皆迸血爾時群鬼苦痛如此身心戰悼求去不得皆失其足宛轉于地猶如飛鳥止其兩翼都無所能爾時化人重問鬼言衆生命録定由汝不諸鬼恐怖不敢虛妄答言不由又問若不由者云何能令衆生有諸疾苦答言鬼實不能令衆生病何以故是諸邪鬼因衆生病而入病之又問云何因衆生病而入病之答曰人居世間不明逆順喜怒忿諍飲食男女勞逸失度風寒暑濕自成痾疹或不爾者不孝父母返逆師長輕慢天地持戒不完自天罰之身受病疾邪神因此傍行威福得他祭禱以活性命實非鬼邪能殺良善若背道之人與邪相通身無戒行善神不祐若忍辱精進行大慈悲身心合道鬼不能害時諸靈人聞鬼所言以為誣隱上白天尊不審群鬼作此答言其理云何天尊答云此諸鬼等所答之言亦以盡理是諸鬼等覩此化將威神歎未曾有而復禮敬天尊當知大道神力無比降伏衆魔摧諸異學一切諸法並歸大道我等小鬼力不自支皆失本心無復威德唯願天尊救活我命長為天尊而作侍者供給大衆守護學人不敢怠墮是諸鬼等發是願巳身痛得止爾時天尊知諸鬼意即復問言汝等諸鬼何因緣故忽遭病苦痛惱如此復何因緣而得差損諸鬼答言向所苦病緣見殺鬼大將威光嚴厲忽然得病求死無處皆失本心不知何故苦痛如此今得損者是諸鬼等不堪此苦進退無據求生不得心中願念願得天尊救活我命長為天尊而作侍者供給大衆守護學人不敢怠墮作是誓已漸得平復天尊告言汝諸鬼等病一切人心無慙愧今得惡報非為殺鬼大將之所作也此大將者雖名殺鬼身登正忍入慈悲地具足六通心海大度常以智力殺煩惱賊不以身手而害衆命以是因緣名為殺鬼大將者將領六度兵馬破諸魔怨安著衆生致於忍地以是因緣故名大將汝等諸鬼莫作邪見疑此大將是真殺者若作邪見汝諸鬼等長墮邪道衆惡增長所病不差爾時天尊而說頌曰邪正無二道清濁同一源吹噓本出空中分成威恩道為衆福先邪為生死怨邪勝自然正迷極反歸根自然而使然大道不曾言爾時天尊說此頌已復告鬼曰汝諸鬼等應自猒離應自觀察應自慙愧應自尅責應自思惟種何業緣墮此鬼道腥臊臭穢常俟人衰求人禱祝殺害生命心無慙愧連群合黨唯惡是理嫉妬道德破亂善人為諸災怪等恐動衆生汝等邪鬼何能為一切人民作正福田不識大悲唯滅物命汝諸鬼等常為不善贓滿罪定當入地獄火燒湯煮風刀鋸解種種苦惱以謝衆生是時天尊知諸鬼等心未淳信即令諸鬼諦念良久天尊以自在神力攝諸鬼等入炎爐地獄復入鑊湯地獄復過鋸解地獄復過刀山劒樹地獄復過寒冰地獄復過長夜地獄令諸獄吏以棒驅之不得寧息是諸獄卒瞋怒之時七孔出火以燒群鬼驚呌奔走是諸獄門悉皆關閇四出不得是時諸鬼心自念言願得天尊濟活我命須㬰之頃天尊化作善人將領侍從開地獄門引出群鬼令諸獄吏莫相拘執將諸群鬼還到㑹所遙見天尊悲泣流淚具述受苦果如天尊向者所言備受怨對不可堪忍於此苦中思念大道或見善人開地獄門引出還此重見天尊喜懼交集又恐忽更怨對墮地獄苦無身能堪願從天尊乞得受度免離鬼道解脫地獄種種苦對天尊復告鬼言汝諸鬼等受此苦惱由汝昔來橫害物命枉疾良善作諸怪祟恐動衆生今得此報非他與也汝諸鬼等向言欲為大道而作侍者汝罪深重隂賊不除腥臊臭處驚觸大衆諸惡鬼答言願從大道求乞法水沐浴塵垢澡鍊身心若不爾者豈敢無端將此罪身干忤大聖唯願天尊大慈之心不間穢濁賜以法流灑蕩塵臭堪受正氣則是千生慶幸今日是時群鬼說此語已悲號動地叩頭自搏兩眼流血氣絶復蘇是時靈人慜此諸鬼悲苦乃爾即從北面灑淚而言弟子有幸以蒙度脫得入道流侍奉天尊億代深緣不動而感荷佩恩造心所罔極不以自揆煩勞神思曲垂哀宥特見流念干忤聖心濟度下鬼殷勤煩劇念此諸鬼亦如弟子未識道前獨見外壅多疑內積常逰昏冥無因曉悟一覩天日積夜開明遭遇慈尊衆疑頓決得庇騫樹滌蕩玄津塵纍豁消道性昭顯若太陽之泮積雪似夜炬之朗重昏窈靄消亡層冰解散法雨流澍廣潤心田無上道芽隨時增長慈雲普覆枯朽再榮白骨成人獨驗今日唯願天慈濟度群鬼惜昔無二中路乖張今更得同念歸一道下鬼無惠心局見聞頑騃無知誠可哀慜天尊答言我以示其希有神力欲以諸鬼付南昌宫主令生世間以其願念為我侍者我不忍違諸鬼之心爾時天尊即命左真仙童焚反魂之香又命右侍上真秉靈一之符又命始青天中主春道君濳運生氣濟活群鬼爾時諸鬼得濟度巳歡喜慶幸圍繞天尊禮拜讃歎而立誓言天尊所在之處大㑹之中若有微塵我悉舐除不用灑掃㑹中若有新學道士威儀不正我悉正之四天之下一切男女身受道法我悉護之令其成就若有所須我當給使令無乏少是時諸鬼身心變善不違本願修功𥙷過以報道恩天尊問諸鬼曰汝今巳離諸苦為欲受生世間為欲入道正位是時青帝鬼王答天尊言我等諸鬼未識道前流轉生死生出人間年未滿百死時已至魔爽漂浪流轉五道隨業受對無有休息今遇天尊願捨衆苦如吐出口終不更食我今亦爾不願更生凡夫之身若生兄間如反食吐希有願者出生凡間如履湯炭俙不燒灼我今有幸得見慈尊遠離盲道唯願天尊哀慜我等聽為侍者天尊告言大道曠蕩法無圍制除為十惡善無不㑹是時天尊慜念諸鬼心知回向鍚其五部五億萬衆入善爽之位護持道場輔助新學典知淨爐常運香木以給灰火爾時靈人見此諸鬼身得度巳心助歡喜而作頌曰神風鼓玄津忽起大慈波蕩滌無明垢翛然出愛河痛汝未度時勞我深咨嗟慈雲廣流布枯朽反英華何期九幽子歸我長仙家爾時靈人重作歌曰世路紛紜竟不休出沒沉浮恩愛流何不一向無為道强將生死作𡨚讎寂靜空間不肯住葷辛塵濁苦相求那不仰眄英雄士乘雲秉節自遨遊爾時靈人作此歌巳語諸鬼言汝等有幸得覩大道開度汝身汝應日夜勤加精進助道興化護念善人常行慈悲與道合同我與汝等長為天尊而作侍從在在處處不相遠離是時青帝善爽答靈人言無上大道我獨後聞日月雖明盲者不見今得受度悲喜交集不期大道威神頓能無比資生萬善津濟群化為諸幽顯無上福田不可思議不可思量重復悲喜禮謝靈人而作是言善善相㑹正在今日願助憐慜時見教招開示善道令得解悟天尊見諸善爽愧謝靈人知其深信進此二仙證道一階爾時復有雲霧之神四天神王崑崙四方八十天神遙聞天尊大開玄囿將領部從一十四萬乘風而來至於㑹所悉皆見身三十二相八十種好十八神力足指案地震動世界身生水火眉間放光祼形跣足頭面著地胡跪合掌遙禮雲門爾時天尊知是外道即命執蓋小仙見神力身坐空界當門而坐爾時諸邪禮敬畢巳心生狐疑俯仰良久而作偈曰我在幽仭山三界之所尊夙聞無上道乘霧入雲門是謂天中天何期無相仙五情不異世神識未超然雖處雲宫上焉無生死緣爾時仙人承道威神應天魔之偈便即身具衆相神力萬變遍體毛孔皆悉放光天地大動令諸魔衆立不安所爾時諸魔頭頂禮拜仰瞻仙人五體戰栗遍身流汗震懾忘形不能自持身光消滅形如聚墨於是仙人重告魔曰汝來何為三問群魔不能仰答半時之頃乃得發言重復頂禮而答仙人我聞無上大道長存上界神力自在威德無雙耳目不覩足跡不致晨夕欽仰無能自進輒以今日相率而來敢申禮願伏乞哀宥言畢伏地仙人告曰汝在下界為世所尊自稱十號邀世利用果報自足來此何為此名道境非魔所登汝罪自深重不合見道汝在欲界惑亂凡夫自稱調御或名梵天或號能仁求世供養或稱天人大師誤諸良善墮生死河受汝訓化不信大道群數縛著計息邪念復說諸行法皆無常又言其身不可毀壞或說死滅為極樂法令人自殺刓截其身速得轉凡軀成金剛體或說他方世界極樂化生身坐蓮花衣食自然離此肉身永斷生死汝諸魔等以灰滅穢質竊比金剛以無明法虛談六通惑亂世人令捨孝養不敬父母如是邪法出世之時門徒師弟自相媱亂身見諸相自言無見空談無礙不逹至道流動漂浪忘本失正心昧中道𢘆處有餘為受生死不能常住不離名數三十二相以縛著故十八神力以有為故八十種好以作法故足指案地以恐動故供養水火以邪見故以貪食故說有十利以愛膻腥妄說功德汝諸魔等是真外道藏覆惡行息世譏嫌汝說灰滅因緣小事假說天仙而來聽法我是仙人那不曽來聽魔說法汝真外道髠頭拔髮祼形跣足十惡五逆性便誹謗憎惡忠良翻斥大道又復邪道作法之時男女師弟并混屏處不令人見藏護瑕疪畏人知聞粗惡言行虛談虛說無所依承以是因緣不合見道恐動流俗惑亂凡愚僞作邪法教他邪定思想光怪紛紛迷亂多陳詭譎誘𨗳童蒙凶逆謀議招集惡黨髠割無智毀損凡容遍滿欲界造立空冢焚殺凡軀群聚讃歎生入地獄無明增長髠拔毛髮不除惡根以此邪術望去纒纍如負乾草而欲救火又如愚人抱疾避病亦如童稚奔走避影穢惡紛紜盈塞世界以汝罪身不合見道爾時魔衆聞仙人言皆應其心一時悲苦號咷哭泣悔過自責踴身自朴遍體流血拔脫鬢髮如燖穢草兩眼淚流五體戰栗𥘵膞求哀頂禮神足憔悴憂苦不可思議雲宫天尊慜之攺悔即放靈眸紫光遐映仙人仙人知天尊慜之語諸外道而作是言諸求法者不應悲苦若悔過者但改其心不以髠截髮毛殘形滅性而求悔過魔聞道言闔衆乃止爾時魔衆之中有一外道自號𣑽王是諸外道唱𨗳之首祼形胡跪合掌而言不審天尊道濟幽明澤流枯朽凡在有生咸悉開度伏乞憐慜造化群微度以自新弃邪歸正庇影騫樹盥濯法流投足洞清栖神玄路灑掃壇靜出入侍從執蓋御車晨夕受事伏願天尊慈悲聽許言訖歔欷銜淚頓首仙人告曰我非天尊位始登仙在此親侍大悲天尊是時外道聞仙人之言皆悉流汗心自念言我在欲界身登四果今日忙怖不覺自失定知所得非正法也上界仙人神力無比天尊威德當應云何恐我等衆濁惡垢重不堪禮謁無上天尊進退防徨無能自處爾時六十萬外道一時解頸寶珠瓔珞積著雲門遙心奉上供養天尊仙人告曰汝下界珍寶唯有金銀琉璃硨磲碼瑙珊瑚琥珀真珠等寶我上界天中萬種珍竒所謂日月明機星辰寶珠金精萬變矅電流霞大悲天尊法眼不顧詎須瓔絡塵穢雲宫外道答言欲界衆生唯珍纓絡不識上界諸天竒寶以推心施用表丹誠仙人告曰大悲天尊貴人心寶不重瓔珞外道答言欲界肉身心中無寶仙又曰汝身無寶何不施心是諸外道即起求刀欲劈其心仙人知其廽向即與其刀爾時梵王自開其肚出見五藏諸餘外道盡欲見心仙人止之而作是言凡施心者除汝外道邪見小覺小知小聞專志大道名曰施心非以五藏血肉骨髓而為施也外道聞之心始開悟爾時仙人以大慈手案合外道腸胃五藏平復如故是時外道各相顧視心氣調暢皆悉歎言未曽有也既聞妙法又覩神力上白仙人而作是言天人大師真是醫王療治痼疾决斷衆疑皆悉平復無復遺餘欲從天師而請夀命願賜長生不死之道仙人告曰下界所修何法而能駐夀一劫半劫外道答言下界衆生不聞正法修四如意縱能駐夀不過八萬大劫後還退墮翻生欲界我今巳夀七萬餘劫𢘆憂無常生老病死此法有限不出三界不越五通不免生死仙人告曰長生之道非凡所聞汝等外道欲求長生恐汝習氣深重根業結固年又老耄髓腦空竭形神沉濁津液穢滯又復誑惑世人罪目巳結三司剌姧五帝糾過汝欲求度殊成大難我又奉大悲天尊金口之敕假使天尊許度汝者猶應退齊千日思失然後乃度爾時外道聞仙人言闔衆於雲門外遙禮天尊焚香願念七日七夜叩頭拜伏以求報應是諸外道正中之時忽覺神香洞薰鼻根流入其心心中歡喜煩惱消除內無飢渴耳目聰明倍於𥘉來是諸外道彈指相顧互言其身膚容潤澤爾時仙人心知天尊慜諸外道是諸外道心亦自覺內懷歡抃不敢出言但以禮謝遙心想念大悲真帝又復七日七夜拜跪雲門仙人告曰大悲真帝常以一慈度諸異類惑無言說所謂大道行不言之教又如慈母善別嬰兒聞其啼呼知其飢渴及以痛癢隨宜飲食及與方藥汝今巳得道力外道答言實如髙鑒仙人又曰汝有何覺答曰覺有香洞薰鼻根流入心中豁然開悟心中歡泰數倍於前耳目聰明亦復如是仙人曰汝得道力巳續性命當於何憂但以汝身塵濁日久未堪親見大悲天尊未堪禀佩無上道要汝等徒衆且還欲界退齊三劫澄錬身心然後更來親近天尊是時外道答仙人言我身杇邁恐命不固忽然三劫沉滯下界無常奄及失道須㬰魂識漂流隨業受報何當復來得見天尊大師當知欲界邪仙極上夀者不過八萬大劫中夀之者一劫半劫下夀之者與凡不異此衆難保大師云何隨賜小法且駐年命仙人答曰上道大通都無小法僅修一法皆得成真是時外道勤勤不巳各解髻中寶珠以獻仙人仙人知其盡心受其獻巳還著雲門須㬰之頃雲宫之中靈音微響如撫金石以和虛琴音韻流轉清雅𡪹亮匆見七色香光徘徊雲門其光之中有二仙童端虛而坐東西相對齊撫雲璈而告諸魔曰真氣周流布十方重昏巨夜明晨光幽扃苦爽同時曉遊魂逝魄及神香慈悲手執金剛劒調柔忍鎧折邪芒六度威兵齊列陳俱乘定惠騁龍驤髙據雲門銷五苦𢘆秉丹旌定八方掃除戰堞行尸臭灌沐枯骸鎮使芳爾時二仙童撫璈畢巳而自言曰欲界多塵薰臭盈滿甘露不潤氛翳天庭尸氣衝人非常蓬勃歎訝仙人能忍久住仙人答曰非為能忍親奉明敕有辭爾時仙童語外道曰色欲二界人氣干天何為淹留且當退齊三劫之後戒香蕩濁歸正除邪餐和服丸消此魔氣形體清明內外芳潔當更上來大悲天尊巳施玄祐香光薰映消汝惡根加汝夀命亦無傾夭是時群魔重加喜慶二仙童曰汝還下界捨汝邪見勿以嗊嗃自稱十號邀求供養增長惡根勿稱人師招集童蒙令其邪僻勿以毒火燒殺凡愚歡喜讃善此大隂賊方便損傷教化讃死髠截凡夫此罪極大無上大道慈悲好生常疾於此時諸外道諾奉教㫖辭别仙童退還欲界太上大道玉清經卷之三
