front:
  text: 太上大道玉清經卷之一星一
  hash: sha256:c863e28ab156accab7e48ba06998976506ab9eca68e41f82e08a3b024d24c4df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0121_HFL_001-001a, image: hfl/1022/1022-004.png}
body:
  text: 本起品第一道言昔元始天尊與諸賢聖億億萬衆處處周旋最後下觀棄賢世界是時四天下一切人民福德欲盡不久之間大劫攺運人民凋逝天下失止大道不行唯好攻伐刑殺無度處處興兵更相謀害鄰國絶義不相交好以強淩弱割奪孤寡劫盜四起天告災祥日月薄蝕星宿殞墜七曜逆度無雲雷雨或復雨血及諸怪異等水旱不調百穀焦枯大地震動處處坼裂山嶽崩倒金玉銷化惡獸噉人凶神露形而行毒癘地生毛髮六畜出語皆如人聲天下兆民心中不安君臣相猜父子相刑不修善道唯惡是與五百年中轉就加甚求生不得亦有不堪苦惱投淵赴火自縊而死飢餓困苦人民相食大地乾燥泉流不通是時天尊與諸聖衆愍念衆生夀命不幾無所恃賴驚怖馳走悲號忉怛苦痛切巳如被火毒於是天尊大慈力故與諸聖衆俱坐玄虛之中去地百丈是時天地大動七日七夜而不休息虛空告瑞日月重輪光彩暉煥星辰明朗風雨施散雲霞流布氣序調適香煙纒虛梵唱齊和金鐘清朗玉磬鏗鈴雷音遐暢周遍逺聞萬變天樂空中自鳴龍座敷羽蓋髙張靈節影霄長幡垂天仙花薦地雲帳羅空師子仰號神離俯鳴金鳯齊唱虬龍吐音琳琅撫節萬籟沉吟天尊與諸聖衆俱放身光照曜十方無幽不燭其光千種須㬰萬變一一光中皆有真人一一真人各有侍從清音朗徹而說妙法四天之下一切諸國王臣民人及非人各各皆見天尊大聖坐在空中與大造真君巨靈仙人議定劫數擠度萬物重校蒼元大録延續期運金簡尅書五帝真文雲彩霞章以鎮五方又勑五帝河精四海龍王通流泉源天灑甘露潤洽大地又命風伯雨師調和隂陽令寒暑得宜又勑五帝地祇合和百穀生長藥草又勑五帝使者殺伏妖𦍙又命天龍雷神驚肅姦逆駭動隂邪又命收風列仙以調和氣淳熟人行令君臣和睦父慈子孝凶弒變善幽顯交歸毒癘潛藏邪魔匿形芳卉藥草處處萋茂五穀結實冬夏成熟流泉甘水通同盈溢又命五斗仙君周正璇璣分疏日道布置星辰又命四天善神輔佐天子又差仙官次知國政使天下德化萬民安樂鄰國交通怨結解散人弘大義皆行正道各守其分於是太上大道君哀愍萬流蠢蠢危脆故扇玄風以導羣生餐服和氣沐浴道化使反朽歸榮臨敗得成此時大慶更延九百萬歲上元九府刻玉左契以授天子使葉葉相承則天正化不傾下邪推運應化而為帝者皆是金闕之中差次仙官下來理民得三百萬歲轉差星官之中仙官下知天位如是國主皆是諸天真聖應運降下故得延續期運保守天祚有生之類無不恃賴爾時天尊與諸大聖無數億衆各乘天寶瓊臺而下諸國國中天子諸王羣臣一切人民男女大小隨處供養香花𠆸樂歌頌讃歎而為聽法爾時復有南方八蠻道君與諸聖衆六十四億萬俱乘絳雲之軿從南昌宫中而下與北方玄天之中五狄真君二十五萬億仙官各乘玄雲寶軿而下空中校定水火期運劫數爾時復有西方六戎道君與三十六萬億仙真各乘三素流霞寶軿從皓元天中而下爾時復有東方九夷道君與八十一億萬衆各乘碧霞飛輪之軿從始青天中而下與六戎道君校定兵病之災記注善惡功過之録然後起居中央虛皇太玄老君并受左右玉契請說造化妙理幽祕至法正定天元回易運會調和四氣生成萬有之事爾時棄賢世界有一國王名曰德正聰明正直利根辨惠皆是應運降神福德之身為衆生故而為導首遍告國內臣民男女而作是言今得太平天下無事火災消滅兵病不起百穀熟成皆由道恩非自然也何以報道岡極之恩唯當傾心盡意恭敬供養造立宫觀香花燈燭晨夕禮誦齊戒悔過以求福祐今正值天尊校定吉凶期運之際我今自為又應為汝稽首歸命無上正直特乞哀救授我至法今我國內兆民男女壽命延長各得終考又欲奉請無上正真降臨我所申我微心供養之志汝等民人同我願不於是國中有六十萬長者神心長者五通長者文明長者玄㑹長者等而為上首從四逺來起居國王聞王教敕未敢全信復有八十大臣寶明大臣而為上首於是餘臣及諸長者心懷疑二顧相謂言自我出生世界以來祖父相承聞有真道而目不曽覩太虛寥廓豈有徴驗今者太平自由上天何關道力爾時大臣寶明聰辨正直言常有徴天下所信知人狐疑心不純信即於王前髙聲唱言我聞太極天尊造立天地覆載萬物開明日月分布星辰運化真氣長養有生雖處上界而應化下土今之太平劫祚延長皆道之力而含生蠢蠢唯知日用心無慙愧反更忘本而言今者太平自由上天不關道力汝等云何自欺我聞大道生天生地天地尊道故得安靜萬物貴德故能盡生汝不信道是汝深咎亦猶世間愚癡之人心不慈悲反逆父母離棄兄弟兀然猶居謂我自咸不由父母汝等愚癡亦復如是於是寶明出此言時德動天地虛空雨花香雲四瞑又聞上方空中有人言曰道德不自彰真人不恃功窈冥中有信慈惠故能同空中之聲𦆵絶須㬰西北邊上忽然風雷電激雲霧翳天唯天王與寶明身邊光明各方一丈諸人遙視見此祥瑞心生悔過叩頭乞命歸投大王信向冥契須㬰之頃風雷消滅雲霧廓清闔國臣民稽首王前不審大王向所言教欲請天真降臨王所請王教敕所須何者唯願大王哀愍衆生開悟未聞王言道在人心唯當供養恭敬造立宫觀供給所須晨夕禮願悔過請福諸人聞說心中歡喜禮謝受生之恩王又告言汝等諸人且各各還家退齊思失沐浴身心并傍告未聞如我教敕諸人聞已一時辭王各還其家王即敕大臣寶明遍告城邑內外人民嚴整宫殿掃灑城郭處處燒香供養恭敬盡世所有陳列牀座於是退齊日訖國內人民四方雲萃王與內外羣臣眷屬香水灑地安施牀帳成辦以具合國大小遙禮十方七日七夜行道禮願願得無上正真降臨下土微生蠢蠢誠可哀愍於是三月十五日日中之時上方西北邊忽有九色流霞光彩煥爛香風清暢梵唱和雅天樂流亮天灑甘露大地震動雨百寶天花以驚於地雲車羽蓋浮空而至衆真大聖各乘天寶之臺臺中皆有隂輝夜明又有五色神光照朗虛空光逾日月臨於王城七日七夜是時天尊以慈力故成就大悲救護衆生愍念衆生開決聾瞽療治衆病為作導師為作津濟保鎮劫運更生萬物於是國王大臣及諸人民重復作禮苦請天尊開發大化慈造羣生明其耳目令得正道堪受祕要於是天尊命巨靈仙人而告王曰子以為一國之主天下所推位登世極凡閰之貴不先於此但以正法治化不枉人民亦足功感上天何煩祕要祕要之道難可卒聞王及大臣先是福德之身以方便力欲為衆生開張耳目天尊告曰祕要之階不過慈善慈善之法不違科戒我以大慈悲力成就國土諸人聞說皆盡欣喜心願奉戒天尊告曰戒有多種人亦多品上品之人身先無犯身既無犯亦無所持中品之人心有上下覩境即變以戒自制不令放逸如此之人或受十戒五戒以自防護下品之人惡心萬般難可禁制下品之中復有二種上品者身欲奉戒或受一百九十九戒或受觀身三百大戒或受千二百威儀之戒以自防保令無越逸下品下者身同禽獸雖有人形而無人心縱受其戒終無所益今且授第二中戒十種科禁入道𥘉門諸人聞說歡喜過太悉皆伏地而耒戒言天尊告曰第一戒者不得違戾父母師長反逆不孝第二戒者不得殺生屠害割截物命第三戒者不得反逆君主謀害家國此戒最重何以故是諸國王皆是應化推運惣統天下一切人民之所機要一旦無主不得其死以其義故汝等當知第四戒者不得媱亂骨肉姑姨姊妹及他婦女第王戒者不得毀謗道法輕泄經文第六戒者不得汙慢靜壇單衣祼露第七戒者不得欺淩孤貧奪人財物第八戒者不得祼露三光欺淩老病第九戒者不得耽酒任性兩舌惡罵第十戒者不得狼戾自任𡨚枉威刑如是十戒當終身奉持天尊言不孝父母師長者死入地獄萬劫不出縱生人中小小孤露受人淩刺常居卑賤好殺害者五百生中受人割切苦痛萬般反逆君主者死入地獄萬劫受苦出生邊地無主之域常被攻劫晨夕恐怖媱戒最重若有男子女人於父母姑姨伯叔兄弟姊妹六親骨肉一念之頃而生色想者八萬大劫受地獄報鐵釘刺身種種燒煮從地獄出受六畜形又八萬劫從六畜又作溷中蟲又八萬劫善男子汝今當知一念之頃於骨肉之親而生色想受報尚爾况復身於骨肉之親而為惡行罪不可說如此之人不合共行住坐卧同里居住我名此人為十惡之人此人身雖强健魂魄以被惡鬼攝持善神不祐此人之身不合在道應速驅逐令其急出不合教令作其師匠作師匠者與其同類出沒相似九祖被考又名此人為敗壞人善男女等汝今當知媱殺劫盜欺淩孤弱䡖忽貧病誹謗善道破德行人泄慢真文此罪極重不煩一一記示之耳汝等但精心守戒道自降子於是國王大臣善男子等歡喜奉行不敢違犯道君又命臣靈真君授王雲篆天書上中下章總一千條祕法皆以柔玉為簡紫金為字以授與王而誦持之云此寶經是上天寶文勤心誦念使人身得飛行永不復滅六通之道在意所為道君因告王曰汝等當知四天之下慶同今日無有異世大道威神處處隨類方便引接不可思議千日之後任王傳授國內正信賢者之法共匡天下使玄門廣闢道化流通一國男女精心守戒如護明珠王及諸臣以正治國專心誦念遍敕一國令立宮觀唯道自務餘無所求國內人民作禮而去王修誦真文千日之後乃棄位禪祚與其第一太子名曰善修專知國政而習父風九十餘年而復傳位與弟弟名善善以政治國還習父風其王子弟六千餘人葉葉相承經三萬六千歲天下太平父王與善修修守至妙四十餘年而得六通以其夕知國政沉滯常倫道君先以其中仙之位令知國政而未階太極今日之後太上道君以其勳名巨大授其祕要錫王子等太真之任令侍從天真教化諸國隨類現形濟拔厄難說法度人於是太真與諸聖衆互相顯發遞為師資以開光元年七月十五日北越玄谷登閬風之臺禮無上真君請入大羅天中謁元氣之祖髙玄之宗真君曰子雖得六通道數未足何以故子非自然由學成真而元氣之宗真氣混化自然之身元氣之祖萬道獨尊委氣大聖虛無之真難可得見億化如一綿邈遐曠恬淡虛寂𡪹廓冲邃都絶言像十方異道三萬六千種無不祖於虛無之真也又我成道以來不可計劫唯以二過相見耳又天帝推校應運令下化度衆生侍從天尊往四天下教化諸國布散道氣何以故為延此劫火氣之災法行道教以鎮陽九之禍使火精消滅至後劫天地崩壞人民福盡法當不救運數之極自然如此水劫之𥘉吾道大行三十七萬年中人民淳朴以後漸漸大道不行隂氣轉盛人民僥幸造營空冡多起廟舍遍於世界男女邪心修習滅法不依儀格呌呼求死或入火坑或投深淵自割自截羣聚行道歌讃悲泣或入空冡默然而坐或抱死尸或恭敬枯骨或以糞穢為壇或以香尼塗地或以不敬父母種種苦行或噉食穢惡無種不為終不能得正真之道人心偏側父子無義於邪教中徒黨興盛大水劫前有小水劫十年始歇從此之後四千年內於邪教中應有兵革更相謀害或稱國王或得十日百日還復自滅父子無禮以强凌弱同姓骨肉自相媱亂雖有人身而無人心凶險馳競不相信用若此時至邪道漸興隂氣極盛非久之間漂流沉溺人化為魚蛟龍噉人當此之際法應搜選種民置之福鄉子當勤苦晨夕勿懈是謂大道弘之在人我命在我由人攝持心正則道應從邪則禍來好殺還自伐應當行大慈緣對品第二爾時大真與泰清天中新得道者三萬六千人侍從天尊教化極天之境周遊下界蠻夷鳥獸雜類之國隨其所好而為作法種種示現教誨利益方便神變降伏其心決到西方黑水之右有一世界方八千里其中衆生種種雜類悉皆穴處更相食噉地生荆𣗥毒草諸樹水泉黑臭不中灑漱其國西畔有一大河其河正方五千餘里河水滓濁唯多毒龍在此河中風波峻急不可舟濟其河東岸而有平地三千里髙此河際懸五百丈其世界中所有人民一半無眼相牽而行飢則相食渴便飲血有目之人皆遭惡疾眉髮墮落身體瘡膿濁血流出復多𧎔蛇吞噬人民無君臣父子之義多相戰鬪無眼之人聞其刀仗之聲自然驚走或墮河中為此毒龍之所噬齧不墮河者復為羣賊之所食噉呌喚驚駭苦痛懊惱又有溝坑穢惡流溢臭處蓬勃其坑之中多有蟲蛆頭面似人形長一丈又能呌喚無有手足蜿轉腹行復有玃鳥啄而食之狼藉薰臭復有惡鬼其毛如針吐氣噓人皆如火燒於是平地北畔有六大地獄獄門大小俱方一丈深入其中漸漸闊大莫知窮極其地獄中唯聞風雷火車之聲呌喚苦痛刀鋸槌棒之鳴又聞唱求救求活之聲煙熖炮烈火氣衝天正西第一地獄之中又聞風水之鳴其氣嚴冷不可當近又聞暗中咻咻之聲六大地獄所出風氣皆應焦臭腥薰不可思議其獄之門北一里半地又有沸湯湧泉泉方六里其湯之中黃水脂膏爛皮骨肉隨沸騰湧又聞泉中有啾啾之聲湯氣衝人其湯北岸又有刀山劔樹新故骨肉零落山下刀劔之端多掛死尸屠割筋肉骨脉相離覩此若痛不能自視復有生剝皮地獄殺羊之人死後墮此獄中受此苦惱五百年中出生羊中又五百生備償羊身輪轉相償無有窮竟此沸湯之東復有風刀地獄方闊一里毀敗善道及違科犯戒泄慢真文傳非其人販賣道法以贍巳利如此之人死入此獄一劫受苦烈風吹之往反刀刃一日之中千生萬死從地獄出還生人中身縈邪病根性暗鈍常居下流永不聞法地獄罪魂得出之時多生邉地無道之境多被攻劫晝夜恐怖身體矬陋氣息腥臊永不聞法愍此罪人心無時巳於是道君與太真及諸聖衆救脫罪魂及此世界之中聾盲之人令生死開度即於此世界之上空玄之中去地百丈遙禮元氣髙玄無上天尊以道神力入六虛大定分身百億一一身中又放千種光明一一光中皆有真仙坐飛龍之座演說妙法瓊音雷震左鳴金鐘右擊玉磬張九色流霞遍覆此界一一霞中各有聖衆圍繞說法大地震動天灑甘露香泉流溢萬籟駭虛三景齊照地生百穀水變清凉人心淳朴無相惱害惡龍攝毒癘鬼匿形地獄停悲劔樹摧鋒罪魂受生積痾痊除聾瞽聰明殘跛攣躄皆得復形巍巍大化無得而名於是衆中新得道者未階玄極覩此神變莫知所由衆中有一五通童子名曰善積與金髻童子華智童子葆光童子八萬四千俱從座而起長跪又手上白天尊自我成道以來經八萬大劫周旋八方無所不至未曾得覩大道威神自在之力如今日也自我慶會今日遭遇大化唯願正真哀愍未聞開悟下根釋諸疑結於是天尊默然不答是時童子三請不巳天尊於是疑思冲邈神彩澄朗彈指謦咳良久而言善哉善哉子之所問深乎微矣大道寥寂理絶見聞玄默希夷杳冥深信子雖經劫數道德尚存所居之境近迫泰清固絶重玄何由混化散在三萬六千種內而不知元乎大羅髙玄之宗局於見聞明此妙致遊行無閡且得長存必也忘其元氣之主夭傾之禍亦未由得免也於是善積聞天尊所說心開意解與諸童子深自念言我宿福深厚遭遇慶會欣喜未聞今得開悟唯當誓願而升大羅謁先氣之宗髙玄道君咨受祕法進修之道是時善積童子與諸眷屬八萬四千人俱前進作禮太上道君向蒙開示所未聞欲將大衆上登大羅謁髙玄之尊唯願道君慈悲聽許道君答曰子欲去者當捨見聞雖將大衆心間無侣專志願寂雲泥一貫收視反聽道自玄合於是善積與諸眷屬奉行教命先禮上方辭别道君上升太虛大羅天中謁元氣之主髙玄之宗爾時此界人民皆得蘇息欣喜踴躍悉皆舉手向天彈指而作是言我等宿罪生出惡土忘失正念唯惡是與世世相承無能悟者罪垢積習生入地獄循環苦趣不能自知堅固宿業一旦消除不賴道恩誰如之何而欲報道罔知所由唯願天尊降臨下土授我所請𠃔我微心於是道君先知其意化作凡人遊其世界言語交通教其道法或就乞食止宿其所教立屋舍變生為熟或作𨗳師為其說法方便引接或作醫巫為其愈疾或作農夫教其種植或作孝子教其慈義隨類現形同其嗜好為立君臣漸漸改革長幼有序男女有辨種種教誨一十五年和氣流行人漸識法起立觀舍書經造像供修齊會香油燈燭喜捨𤤽財專心奉道孝養仁義君臣禮節異類得生幽冥開泰物各守分不相殺害於是道君託作大師寒棲山林或有徒衆齊戒說法或時單已默坐思念或復講誦為人說法或時吉凶言有徴驗神變恍惚老少不𢘆合境歸化施設供養傾世所有燒香散花各陳心願願得天尊降臨塵穢開悟衆生叩頭仰天流血灑地悲淚鳴咽七日七夜心無休息爾時道君以大慈力故與諸聖衆乘九色流精真光之氣仙童導從散花燒香神風激籟天獸和鳴麟舞鳳唱浮空而來去地五丈而止虛中爾時先所化人名曰空生為諸衆生唱𨗳之首不審天尊導化有勞慈造萬物得無疲極迃延雲駕曲臨下土我等積劫沉滯罪垢縳纍一旦披霧沐浴玄津過太之餘罔知所謝真源遐邈上界虛寥而塵穢之身忽遭大化朝茵之命長覩太陽枯杇載榮生戌今日欲申微願輕觸髙尊唯願大慈賜以蟲蟻忘退之志誠有質疑心所未悟願從天慈得聞宿命此土因緣衆生本起特視玄鑒之恩賜為分別是時合界大小一時上請叩頭流血涕淚交連道君以大慈悲故凝思良久即命左侍仙童四十九人齊鼓玄雲之璈同聲合響奏天鈞大雅合神之曲又命右侍仙童三十六人吹九和之簘以合鳳唱揮玉京八㑹空洞之音又命侍香玉童燌百和返魂之香又命長牙左吏以扣金鐘又命右直事吏以擊玉磬久久之間衆音合㑹慶霄纒虛流霞四張神風八逹天樂停音於是天尊口吐香光大震雷音而告空生曰汝今應知大道慈力生成萬物故奏衆音流變萬化合和生氣以祛煩惱汝與大衆生此土者從煩惱中來造諸惡業輪轉受報墮此邊地不聞善道忘失本心此世界者一名報對世界一名生死地獄此地獄者隨處皆有衆生居中不能得知日夜焦爛坐待消滅又此河者名為生死業報漂浪死津此六大地獄者隨人六根造諸罪過死入此中又此沸湯者名曰沸湯地獄世間有人用湯殺物命死墮此獄億劫不出此刀山劒樹者世間愚人好斫刺畜生死受此苦又生剝皮者世間愚人劫奪人財生割魚肉死後受苦生下其肉又此毒龍蟒蛇者世有惡人破毀功德侵剋善人死受此報又此溷坑中蟲者是世間愚人於父母伯叔姑姨姊妹同姓骨肉而生殺想又於伯叔姑姨姊妹六親骨肉父母師長而生媱想死入地獄萬劫不原今又受雜類之身而生此蟲常在溷中𢘆噉臭穢空生當知世間逆人姧媱骨肉或懷殺想生死之罪萬劫說之亦不能盡如此之人定不得道生神不降生氣不布空生汝今當知如此惡人身心以定不須教化應須逺離莫受其供莫坐其牀莫入其門入者犯戒神邪所嫉三萬六千威儀此戒最重故我殷勤重為汝說今廣流布讀誦此經世有聾盲之人不能讀誦之者但常燒香禮拜供養經卷功德無量若貧乏之人無可書寫經卷應往有經之家行道禮拜空生當知如太真之科諸善男女等好喜放生施惠窮乏醫治疾病孝養父母山林寒栖誦念真經此五種功德無有差別生身受度必得真道空生應當開示未聞念悟心解爾時大衆聞天尊所說身心開悟一時度幸奉受要言作禮而去世界品第三爾時天尊與諸眷屬衆真大聖浮空而越炎洲之陽入光鍊之池以黑帝真文一篇鎮遏火精一時而返以次東遊過扶桑之陽東南方經九億萬里有賢善之國其國正方八萬餘里四據滄海一名極樂世界其國有王名曰花秀有八百大臣又有三萬八千眷屬六十四大城復有六千四百小城其王皆以正法治世不枉人民其國豐樂多饒珍寶節氣溫和風雨調適穀帛殷貯無諸病苦其國西北復有一城城方二千五百四十里城髙七千仞有四大門門髙六千仞俱闊一里樓峙髙妙非常華麗城中復有七千寶臺臺中各有夜光明月之輝照曜晨夕城中皆是仙人道士形如金玉衣食天厨而此國王王臣及諸眷屬皆是應運降神下知國政其城一日之中三過香風吹去微塵天雨甘露以潤土地地多泉池皆潜通玉津石髓流黃飲此水者形如金玉又復一日之中三過鳳鳴萬籟虛吟香雲凝空流遍演暢梵唱和雅微音清朗非為自然積福所應爾時天尊與諸聖衆九百萬億止此城內俱坐百寶飛龍之座座髙萬仭出於城上雲錦瓊羅以為敷具張九色流霞之帳一一帳中皆懸明月神璣其帳四角玄虛之中皆有龍燭光暉靈鳳舞空風琴朗霄香氣氛氲天香飄颻爾時天真髙尊而命左仙侍童扣金神之鐘又命右仙侍童擊靈光之磬又命侍香玉童梵九龍虬爐百和之香真儀以列天鈞又陳於是天尊放身香光遍照世界其光萬變非可目名彈指之聲猶如雷音一國男女聞皆警悟互相謂言今日何緣有此祥瑞香光洞徹風雷調暢升沉飛走跳踉踴躍此當非凡急冝速往看是何緣於是國王王子大臣妃后眷屬又相顧言我此國土福德成就常有大聖降臨此地非是餘緣必定善瑞汝等諸人各各嚴裝所須之具我尅明日與汝等衆俱詣寶城一國男女同時而至遙見城中光色輝燠其光之中皆有真仙歌誦靈章王及國人叩頭禮謝今日有幸得覩天尊降此寶城喜慶交集不可思議各各燒香以陳願念王及人民立城南門叩頭伏地良久不起自思何緣承何福慶遇會今日不敢仰視尊顔唯願髙真大慈之心特見哀愍開悟未聞解釋疑網天尊良久謦咳彈指衆音停奏而告王曰子此世界是福之鄉上界髙尊時時周旋但以劫數遐遠非子所悟昔天地未光混沌未分有天尊上聖下遊此城于今以得九億大劫我昔時與造化道君勘校劫運同時在此今者重來觀此世界亦是因緣法當更來又此城中諸仙晚學業以淳熟大聖雖來無所言說國中男女亦階𥘉地以道因緣而來生此非久之間天真慶㑹道法大度惠及於汝子當專心恭敬寶城持戒布施心不退轉道自降子於是衆中有一童子名曰真行從座而起前進作禮上白天尊而作是言自我承福天庭仰陪霞輦陶染玄化百劫于兹周旋十方靡所不至希覩此城莊嚴華麗人民豐樂仙伍森羅瓊林玉枝虛吟萬籟淳風反朴真氣和生福德巍巍難可度量唯願慈光照朗蒙昧令此大衆豁然開悟天尊告曰子見此城適子懷抱覩此世界歎未曽有此界雖名極樂猶有習氣此中人民仙人道士皆是諸方業道之人功未充足而來生此未至重玄冥寂之境此中時有聖降為其師而不久住真行當知亦如香積童子自言道極來詣我所從我執蓋首末半劫請我為說微妙道法方始悟解我又示其大羅髙玄之名於是童子遂往起居咨問妙致于今未返真行當知汝今所見亦復如是幽祕之理未可䡖說子道數自極當應得見於是真行與賢善國王臣民疑意不了重白天尊不審極樂城中仙人道士國王臣民前世以來修何功業而生此中天尊答言修習之法亦有多途非為一種子當諦聽吾為汝說而化國中有四種人天第一品人孝養父母奉事師長濟度窮厄施為道法持戒誦經晨夕不懈行道禮願悔過請福求見升度功滿行成上感楮天名著左契金簡刻書以記生録身得自在飛行上清隱影萬變道齊真人長生不死白日登仙位應上真侍衛道君暫過此中或經一劫半劫而還天中如此之人名為上品第二品人在世之日聰明髙潔助國理化出言利益施惠廣大興顯正法扶助善道身得尸解如蛇蛻皮來生此中如是等人亦名現身升度第二品中復有一種或遇上帝垂恩開度生死枯骨死尸變錬成人感激真氣自然而仙或有前身與道結緣慶流今身來生此中第三品人在生之時持戒守善不作非法起造宫觀供給香燈齊講設會書經造像晨夕誦念亦得尸解來生此中第四品人或承其祖先福德餘慶身死之後改姓易氏來生此中真行童子與諸大衆疑意不了重白天尊不審第四品人承其祖先福德餘慶之力來生此中者不審此慶修何功德而慶隆後胤唯願天尊重為分别令心啓悟天尊答曰吾言福慶之因者或其祖父前世施財施食放生活命衣食窮寒扶助孤弱給賑老病供養山棲功不成就中道而退身不得度慶及子孫或生豪貴之門聰明利智或求道未足法當滅度來生此中如是之人德隆九世真行當知善惡相似過積者亦殃及九世亦猶世間愚人或承先慶身生豪貴自恃强梁不信宿業恣意凶險殺害物命劫奪人財威刑無度毀敗善道誹謗行人讒嫉勝巳欺淩孤弱鞭撻下賤漁獵殺害燒煮蠢動斫剌衆生不孝父母反逆君長耽酒嗜色媱亂骨肉犯他婦女罵辱尊老祼露三光不敬有道惡居其上輕慢靜壇泄漏經寶破齊犯戒常為亂首伺人衰便更相陷害殺生求生背叛道德如此之人亦殃流九世九品子孫所向傾敗受人驅役常被枷鎖橫羅惡縱死入地獄生受六畜被人燒炙種種苦集輪轉惡趣生無定形沉溺生死漂浪苦難真行當知我觀下界衆生苦樂之事亦無多别何以故汝言極樂世界城臺樓閣非為自然皆役神功所為不如上界應化宫殿不由神功皆自然也亦如香積童子自謂果極不覩太虛大羅道境便謂勝報極於慈土我觀子心與此無異真行當知三萬六千種法由人機緣感動修習業行雖云成道遲疾不等亦如寶光童子在世之時從古先生而受滅度八萬大劫勤苦修習不能得道最後之身而遇言龍𥘉會天道大廣始入道位猶在七地下品之上向不遇元皇之真何由可得升入無形者乎於是真行靈子及諸大衆聞天尊所說心開意解叩頭作禮各還本座國王王子臣民男女聞說因緣本起之事皆悉慶幸各各奉賫明月寶珠上獻天尊天尊受以安著城內王及大衆歡喜踴躍作禮而去爾時天尊與諸大聖各攝神力升入無形忽然不見慈悲戒序品第四爾時玉清天中瓊闕金真後聖天尊昔生多喜世界姬氏之家年始六歲而知玄文深逹妙理洞曉幽微乃棄家求道入長明山中精思十年上感西靈虛無天尊而受道要年二十七歲而得六通成道以來數過塵劫常以願力而度衆生周遊十方如日旋照隨類現形同其音聲方便引接皆為饒益平等無二齊一子念以元化八年歲在庚子七月十五日與諸聖衆三萬六千人俱下遊玄天到北極長冥世界虛空之中俱坐霞光之上眄看六合經百小劫身心不動猶如寶山是諸聖衆亦以百劫身心不動是時世界忽然光明猶如春日和氣通暢風雨調適雲霞靉靆雷音清徹藥草滋茂百穀冬生地出甘泉微妙香美龍麟踴躍鸞鳯騰舞異類集聚皆相親附人民非人身心變善悉如宿化教學所成於是天尊及諸聖衆端虛寂靜都無言說但以慈力天地萬物悉皆自化亦無光音而可視聽幽明玄㑹殊神合契無為之道使之然也吾亦不知其所然道雖不言德化流布真氣感激妙理精應不由運動其土人民亦無覺知心無別慧各安其居人人守分終其年命而已爾時三月十五日雪山之中有一童子名曰法喜自號仙人與其眷屬千二百五十人俱其名曰金髻童子金粟童子寶頂童子調御童子十住童子海惠童子七覺童子通王童子自在童子善財童子如是十一童子而為大衆唱導之首悉皆各各自號仙人俱乘白象而來下土圍繞讃歎遙禮天尊燒香散花種種供養各陳本願問訊天尊而作是言我等諸人幸承宿慶昔因皇𥘉劫中遇古先生哀愍化度得入道位賜以惠眼遙見天尊下此世界欣喜慶幸故來起居欲有咨請唯願天尊憐愍開示於是天尊以知其意默然不答是時仙人三請不巳各各伏地良久俯仰叩頭而作是言唯願天尊垂慈悲力憐愍訓誨示所未聞於是天尊愍其勤勤即命右侍真童名曰寶相而告之言汝等諸人欲求何願而來至此於是法喜與諸大衆重復頂禮而作是言我見天尊及諸聖衆威德嚴凝未曽有也令此世界福德成就都無言說萬物自化改易天地流變氣候日月明朗星辰合度風雨施散百穀熟成藥草榮茂甘泉流溢百獸騰舞異類親睦人民豐樂未曽有也不審天尊修何功德造化萬物而得自在祕要之道願垂誨示及重伏地良久不起於是寶相還向天尊具陳其意爾時天尊告諸人言無上大道但以慈力生化萬物覆護衆生無有言說若有言說即生形迹形迹之教雖會至道未極妙理何以故不可以形迹語言造化天地生成萬物何以故形迹語言理不𢘆故理若不𢘆云何造化是故大道法無形迹語言令物自化善男子汝所謂我有所修習而得化者汝令修習亦應得化善男子汝作此見未離煩惱猶處纒縛無上大道久離此見心無結縛無為無作無起無滅無形無相言語道斷汝所見我有威神功德嚴凝形相造化天地生成萬物是汝邪見妄想分别無上大道以離邪見分别妄想之見善男子汝等所言遇古先生身得化度古先生者是我弟子令其教化邊地說三乘滅度衆生修後世果以彼土難化人無和氣雜畜之種心性不具飲血茹毛强梁自任故作神變廣說譬喻開悟下根如此之法不盡至理權示形迹先生去後攝迹歸本形迹漸滅縱有存在亦多紕繆或自號仙人或自稱梵天或默坐空室或燒身自滅或墮落髙巖或供養水火或作天人形像三面千手種種神像屠殺祭祀羣聚行道呌呼求滅或諦觀光相如此之法名曰訛謬雖有經文無有實法邪正混雜不能得道於是法喜及諸大衆聞天尊所說心中開悟始知先所修習未至道要重復頂禮上白天尊而作是言如我國中之所修習具如天尊大慈髙鑒無有異也唯恐我等大衆罪垢深重不可濟拔唯願天尊賜我法水以漸澄汰洗除滓穢開方便門示方便力賜我入道𥘉聞威儀齊戒之法以漸修習繩准身心令有依止天尊告曰汝彼國土地氣隂惡所生人民亦復如是何以故此名金方雜類衆生生此邊地不聞正法唯聞三乘譬喻之說不知大道祕密之藏天書雲篆龍章鳯彩頓教成真生身入妙之法於是法喜合衆聞天尊所說恐其身命不合道真大衆悲泣叩頭流血重白天尊而作是言彼土衆生腥臊臭處豈圖即身而得升度與道結緣兾得身來生中國有道之邦唯願天尊大慈之心賜我等衆齊戒威儀之法天尊於是以大悲力不違其心而告之言汝彼土人性有多種應多受戒約縛身心不如棄賢世界人心淳朴縱欲受戒不過五種第一五戒第二十戒第三一百九十九戒第四觀身三百大戒此名四科又有三萬六千威儀之戒受此諸戒以應三萬六千威神又攝三萬六千種道內有三萬六千生神外有三萬六千戒神內外防護受戒之身上品成真中品成仙下品延壽此戒是玉匱金科上真禁戒受竟輕犯身謝冥官九祖受考吾今為汝略說一科就一科中分為三品上中下品一品之中又分為三品合有九品以成陽數此九品科法齊戒相須不但單行專授汝等凡有齊講設㑹之處及國王王子大臣官長學人男女集齊之日應差一人音聲清亮者正其威儀北向讀之一過以示大衆大衆人民作禮伏地而聽戒言又復正齊𥘉夜又讀一過以示大衆此論一日之齊法應如此若二日三日七日當應日日讀之一過若初入道之人先授其戒千日之後漸進餘法若有善人行先無犯未度三日之內即授其戒不須千日而後授法若授戒之後身犯十惡五逆之罪法師應須燒香對三寶御前悔奪戒法若未受戒及受戒之後身犯輕罪非十惡之條苦求悔過進請受法師與弟子對齊日六時禮悔誓不更犯然後斟酌量授其法子當慎之子當慎之勿犯吾戒身得逆罪諸天不祐於是法喜與諸大衆各各伏地注筆而聽天尊為說戒言說戒科品第五第一不得殺媱殺戲殺暏殺斂殺誘殺不得嗜肉愈病藥分俱斷第二不得叛逆父母君主亂敗家國第三不得劫盜怨盜謗盜死罪謗口謗書謗狀謗第四不得祼露三光訶天罵地第五不得姦媱骨肉因生刑害第六不得毀敗善道離人骨肉滅人種親第七不得耽酒毒酒媒酒色酒第八不得隂惡損敗他人身作口作書作第九不得侵尅良善割奪孤貧第十不得盜劫死尸散人骸柩第十一不得戰鬪之所剝脫死尸割取頭髮第十二不得侵欺老病脫其所有心無慈悲第十三不得毀破巢冗傷胎殺鷇第十四不得販賣生命以贍已利第十五不得故觀兵戰鬪及故合兵鬪戰右十惡五逆科犯者見身受報種種苦惱身死之後與九祖同考萬劫不原道言朝禮之法不得髙處朝禮低處不得顧盻朝禮不得不淨朝禮不得對御涕唾不得對御髙視不得對御邪視不得對御髙言不得對御髙氣不得對御錯語不得對御邪語不得對御中絶語不得對御餘語不得對御動五體語不得對御摸頭語不得對御戲色語道言入齊戒道場之法先當慈悲第一不隂惡第二不思色第三不思媱第四不思殺第五不思肉第六不思勝第七不思欺然後沐浴五香蕩除塵纍整其威儀而詣道場道場之外置立香湯浴室二所男女各别又當立二屏處屏處燒香立衣架如法一人屏處應脫淨服挂架一出屏處入浴室蕩身手巾豆末事事具足又不得煮殺蟲蛆以絹濾水過作湯及羮飲又不得燒蛀薪以營齊獻又不令乳産穢汚惡瘡膿血淫人十惡五逆之人臨齊厨所如法安施竟師著淨服取淨爐炭火以燒香朝拜訖依位而坐儼默端直身心思行上戒一慈二悲三善四信善男女等汝今當知我用此四法故得成道此四者是一切善道之門戶是一切善道之本基是大道之機要離化四事自外無道故我用此四階善道保鎮天地生成萬物調和氣序綜統幽明禳灾滅禍濟拔窮厄汝若離此四種不得入道場不得受國王王子羣臣兆民供養之具不得受國王王子一切男女恭敬禮拜不得與自身及一切人請福求願我詔此人為道法中賊不合共住人鬼所嫉諸天不救善男子入道場中復有三法第一思孝第二思忍第三思辱善男子入道場中復有七法第一見一切男女生父毋想第二見法師善人生諸天想第三見經法靈文生難值想第四聞說法音聲生難遭想第五見諸疾病貧窮孤陋之人生巳身想第六見衰憊老人生無常想第七見一切有生之類生平等想善男子汝今當知入道場中及出道場中不捨大悲心不分别不分别故諸惡不生若見覺聞知行立坐卧離此戒者而得安樂無有是處善男子汝欲求道見身升度者離此戒而得道者無有是處善男子汝欲無疾及救拔生死離此戒者得如心願無有是處善男子汝若違戒而為邪所嫉王法所加身命夭逝諸天不救道言入道場中不得茹葷不得穢汚不得多語不得邪視不得閙衆不得傾聽不得涕唾不得輕衣不得垢衣不得鼾睡不得邪坐不得背坐不得仰視不得大笑大語不得吒食不得藏食不得挾食不得語食不得笑食不得顧食不得仰食不得漱食不得鳴器食不得拈食不得嫌食不得數食不得非時食應正時食慈悲食不得急行不得拖腳嗚行不得曵踵行不得動頭動手行不得顧盻行不得仰視行應平正行若學道人受他惠施慈悲為受不得數謝數辭數顧應受已如法供養如法施行諸學道男女人不得數入國王王子大臣官長俗人之舍若為因緣故須應入時正其威儀在門外立正事陳說不入其家不坐其牀若諸學人起居父毋伯叔姑姨兄弟之時應加恭敬而况諸餘若諸學人無大故不得入軍營㕓肆若學道男女官不得入屠舍媱舍樂舍十惡五逆敗壞人舍若學道男女官不得與非類同舍同牀坐同牀食服飾不得共用若學道男女官不得畜多欲侍者及畜穢文書矣若學道男女官不得與俗人爭利有利應讓俗人及無知小弱若學道男女官不得畜兵器樂器不得燒薰皮毛角骨薰臭等物若學道男女官不得穢汚生草蟲蟻之上若學道人男女宫不得向北大小便利不得仰視便利不得汚山泉淨地不得入雜處居畢當風下涇心無慎護若學道男女官及道民應當莊嚴道場治堂靜廬慎密防護灑掃內外𢘆令清潔不得早眠晏起朝禮失時大小無法不相尊重不得無故開靜户不得敞露經法不得入俗歸不盥沐不得道場中舍女人骨肉之親無大故不合諸道民不得借貸常住法物以為他用諸道場中常住法物香油燈燭財寶應有定用不得回易餘用諸護淨居域之內不得令進諸雜畜汚穢不得販奴婢六畜取物營靜舍不得用十惡五逆財營靜舍不得於敗地立靜舍違此戒者身受考病所學不成犯物不還三代被考愼之道言諸善男女應當內外持法為法城塹不得侵毀精舍不得抽剔藩籬不得盜伐果林不得盜師果子不得割師田地不得費耗師榖帛不得壞師法具不得假借師物久沒不還不得私費法財不得私換法財不得私使法師畜㒒不得羣聚法場講說非法不得羣聚法場射賭不得羣聚道場斂聚食肉飲酒不得將婦女舍法場中宿道言若道民男女犯此科戒護法善神地官考之連及三代慎之道言若學道男女道民書寫寶經時不得安不淨處不得令不淨人見經不得令不信人聞經不得令敗壞人知經不得令敗壞人見所寫之紙不得不淨財買寫經紙書寫之法應别室安經常當燒香於案上一日之中一過盥五香水蕩洗身手大小便利易衣出入常當齊潔寫經之人不得竊用祕言宣泄唱令犯此戒者考病立至死受風刀之考長不聞法慎之道言諸學道修身之人先當廣尋經文勘校科格求師決斷慎護所受莫自媒衒邀求世利同心結好男子不過三人女子不過四人於密處精思以期冥契勿令他人知覺見聞毀譽者應密往山林避處人間犯此戒者善神不護衆邪亂考慎之道言若諸善男子欲救疾病者先當廣備道術善知方藥分明謹案齊醮科儀持戒忍辱不違物性無憚苦辛不辭曉夜無論遠近怨親平等不視財色不分别貴賤男女不責意氣酬償忽得酬償應施行功德不得專贍巳利不得艱難心無欺詐𢘆行大慈如此救疾功感諸天療疾易差若違科犯戒假造謬妄神人立考死入地獄慎之慎之道言若善男女有心好道或遇時迍否不得遠遊名山應於家持戒修造精舍作重牆復壁使內外音響不得相聞唯令潔淨護治每令精密亦無異於山林之中也功滿行成道來曲室身得道真若違犯科戒輕泄踈陋薰臭混雜敞露真文徒勞積紀我道未聞身立傾敗萬邪所殺身不得道魂𩲸受考慎之道言若學道之人或身受師訓叨佩靈文遇運應時法應助國或身先列職後遭師匠身受至法未遂清虛助國治民匡贊天下應須內持戒行慎密所受不得敞露天文輕犯科禁心無慈孝恣性威刑貪婪財贍剋削兆民令天下萬民心中𡨚酷如此之人徒有匡贊之名而無廉貞之德如此之人被三種考罰第一身中監神回惑其心令萬向傾敗第二治國之神令其犯法受戮第三地官考之殃流七世子當慎之是諸仙人得受戒巳歡喜踴躍深自慶幸各起作禮信受奉行太上大道玉清經卷之一
