body:
  text: 明威真人威邪品第十九玉清天中雲宫北方明霞紫房上真道君受號明威真人以慈忍之道赴感含識大悲成就濟度危難常在凝神九億大劫爲一瞬須俯乘應變下流二界幽明兩途上中下心受真正氣各乘一信而行其身率無不服任其大歸不乖其常自愚至智不出洪冶雖任其性無能廻越獨有大道而超之明威真人哀世不出故悲覆之教以乘服之道漸趣無爲是時十方世界後學聖人及以凡夫畜生之類并諸鬼神一切祇向除得正者傍則大道隨分乘服以趣一道所謂學聖之士乘道妙氣學世事者乘世軌範乘服滅法形骸朽爛遊魂流浪而不能止各駕其氣而適一方固其所知占道專德於是衆生所乘旣異遇感不同乘道妙氣必果正真乘服邪道自至朽爛無上大道哀其夭傷故流生道妙氣而養諸有於是上皇太真普施道化出法對治善决衆病覆載含識演正一之道而化上士盟威之法相裂邪根聚天雲瑞氣成隂生之文以超枯骨置天官上司以主衆生太醫真王變生起死痊除痼疾續絶補闕流通經緯益血足腦開决聾盲使聰察暎朗齒長形幼彌乆彌嬰明威大真神力無礙權實之道等無優劣真應之身遍於塵界道德威神始終不異起感之形隨類應變音聲萬殊嗜好亦爾下世不逹自離其源一身之中忽相睽背妄想生患神邪兆焉不明大治洪範之始中古以下淳澆狼狽勃然興僞颯焉以廢衆於邪道求其至當奔馳擾競不免塗炭甘心愜分良可哀哉爾時明威大真以萬物未始洞曉其終逆制威儀顯示當來上述真正不言邪道令修習之人心有繩准的當指實辨知邪正邪正之道立便試驗試驗之道所謂正行正命而行正法正法醫邪正身不傾正行不動正命不夭不夭之命謂命無窮盡不傾之身謂塵劫反嬰不動之行謂動之行謂行無上道修習大聖真實之法變鍊形神出有入無永斷生死衆累不繼即此之身而成法身不受生老病死之苦謂之永㫁生死習邪道者其狀易露何以知之知邪之修法習不定生習之老而死不能易令人反嬰骨朽皮皺牙凋髪白䘮聰失明須㬰爛壞背道敗德輪轉邪俗不能絶待不能遣累蠶食行世惑亂下愚身命不正強言神變灰滅之後形離識散自謂精靈證無上果此名邪說不可依憑若見此人亦不放捨應以方便爲說生道而濟度之無上大道哀諸邪僻故出明威指歸溺䘮好真之士弘誓修習自宻其身不動流俗當正爾儀當潔爾行掩爾之明蔽爾之聰服諸輕妙內外芳鮮不間貴賤不辨妍醜視酒色財同於腐𦤀𦤀想不懷况更輕犯一接身心真氣遠離况常親近狎之求道邪鬼乗間禍害來任翹足傾敗盡須㬰明威大真逆紀後劫偏邪之道邪起隂氣濁惡之世便即易興淳朴旣䘮澆浮競作下界四天自號神王如此之魔名爲天神濁惡之世遍於下土四天之下山林石精附着生人皆相放俲自號仙王并及六天故氣之鬽共爲羣黨支流散釋隨世立名背道之人供食祈福蛀人精氣食人血脉减人年命人不自知入人身中亦能令人惡生愛死如是諸鬼入汝身中子息繁育精氣强梁交通生人䖝鬽鬼女亦能令人辨諸空義妬𡜍生道若有男女修學生道是諸惡鬼競來侵害欲人死亡取其魂神共作儔侣以是義故憎惡生道後學之人身得成道邪鬽惡黨服事驅使不得自在以是因縁學道之人須應明知外道邪疾預曉明威之法揮割祟保護形神世若有人奉事邪道心堅不捨於是善人方便教招不從不得親近勿受其言何以故𥘉學之人道力尚微未任降伏諸異道是故應當敬而遠之大歸之㑹自有大道下世教化示其威神降伏强梁大歸之際功過邪正分明自判無能廻攺後學之人好樂真道先擇明師幽求博遠能進修者專精上道傍通世典貫錬羣籍俯仰經緯一藝無疑上辨天經明道深義請受必决分别邪正雖處凡地可謂聖師第二之師不便世事又亦不明大道深義但遵一法堪度世者齋潔精至執意不回凝神守戒誓不爲惡如此之師與道合同精氣不散易得感通形固神凝中和内養非久之間刻時昇度骨肉俱飛永果真道雖曰第二不失明師第三之師無的修守但以慈悲忍辱常修不殺領户化民救治疾病了逹明威誠不欺誑不視貧富妍醜貴賤施散財食行平等意視他之親猶如已親視他之身猶如已身見他危難方便濟度令得安穩見人遭苦願與同疾慇懃愍念不相棄捨及至大悲埋尸殯骨减割衣食分乞窮乏終身行孝不作非法不於怨憎而起加執竟信幽𡨋不慢虛室與道𡨋符邪氣自遠不欲求道而道自來道言後世凡夫欲學者逹此諸事而得道者無有是處後世男女欲求道者先當立功之法亦有多種第一之功弘道化物以輔天子孝養父毋第二之功弘道除害傾邪滅僞第三之功孝及一切蝖飛蠕動及諸草木第四之功寒棲苦行事師求法服食專志内外芳潔第五之功立靖建齋率化有縁請師祈福悔諸愆咎供養寒棲學真道士衣資藥食牀敷香燭及諸具度供功德者令無闕少第六之功贖放生命不限貴賤及以大小窮源水族爲引流澍若無决處取送深水令得穌息飛走之𩔗胎𪅏涇化巢穴崩毀子未能行恐其不養方便爲其修緝𥙷綴無令驚恐使其不育如此之人號世法師濟度窮厄與道同德大道友之得免生老病死之苦長存緜緜永絶勞累衆患不繼如此之人謂求道之要得道之機道言諸善男女立功之法復有一種所謂善解明威分别邪正揮裂䖝鬼馘截姧邪願與衆生同得無病行住安穩忍辱之地雖無正修各得守分立功之人平等愍念一切衆生若見偏邪不正之疾慇懃不捨决之令愈一坐道塲利益無量苦惱衆生師先教令邪病之人灌沐塵濁教其願行正信大道勿起邪念敬向道塲視師如父披服鮮盛内外芳潔焚諸名香禮師如法師即爲其陳心所苦上請大道真威生神億億萬衆消邪滅僞師爲衆生備受諸法内以治身外堪救物服道内法所謂三清寳文雲書靈章龍圖鳯篆九氣垂芒精心修行威制天地如是寳經總有三萬六千大藏一一藏内復有三萬六千部經一一部經各有三萬六千柔玉之簡如是真經得一便足不必備受三清寳文但當專修三清一法足得成道生身度脫信之在目立驗須㬰救俗之法不事内經天寳文也但受明威生神之籙九天真符九天兵符九天社令九天神鳯九府神劔揮邪拂魔九府神符驅鬼役精玄手真訣登綱躡紀飛歩七辰束縳强梁威震邪僻翻風止雨收卷昬霧廻晨駐景呼吸神氣變禍爲福此諸法者是九天真氣自然之道大聖慈悲出之救俗九府生神主養含識下應兆民凡百男女有心敬信無上大道威神而衛護之此威神者是正真之氣化成威神遍滿虛空信道之人請福滅禍影響之頃威神立至此威神者雖復氣繼上天神周色象故曰大道授乎遍滿世界大道真氣化成風雲大道妙氣凝成甘露大道慈氣化成膏雨或爲甘泉或爲良井或爲山嶽或爲源流或爲深淵或爲茂林或爲藥草或爲禾稼或爲香樹或爲花果爲世資用饒益廣大下世愚人便爲天地三光風雷雲雨霜露萬象空生自别不由大道若有愚人作如是心當知是人爲邪所惑欲求正道終不能得不愧根本忘恩背義心不慈慎勃戾自任反天逆地縱得暫生不得其死傷殘塗炭困苦狼狽人神不哀鬼鬽同疾輪轉邪道沉溺生死譬如朽敗不可令堅猶如巨石墜千丈坑難可逆上邪俗之人永不欽尚正直之道況求道要心希昇度哀哉流俗永與道隔失真之初行乖絲忽漸漸廣遠瞻望不及都忘先始隔道之𥘉雖䖏洪冶器象區域乖於正真譬如惡人瞬息邪視心尚不端隂血冥沸嗔氣以成損身害命患源斯作疾用醫方倍功療治猶不能愈况於終身淪没邪僻不見明威正真之道焉得生乎道言徃昔火刧之𥘉戎山之精化作人身體備衆相行世教化聚徒八萬教之事火及觀水法一十二年吸人精氣人皆失正邪觀巳成爾時諸人同心受死各入衰草义手跪坐脫衣解纓雇人爇火衰草盛然一時燔傷八萬餘人毛焦皮裂疱汁崩潰手脚攣縮奉屈盤地苦通悔恨不能出聲爾時山精彈指讚歎而作是言有生之類終歸磨滅煩惱之身百毒營室應速遠離求早度脫當滅此身以求法身嫌火毒烈當赴深淵爾時山精說此語已八萬餘人匐匐赴水風浪所漂涇族吞噉河靈執其魂魄水府役其精爽徒謫困苦七千餘年于今未休一旦被邪生死不離爾時戎山之精誘殺凡俗自知有罪上懼大威深藏石中春遇雷神霹而出之驅使從龍日夕辛苦不得自在如此强精欲揮之法可使雷公馘而裂之不煩天官上司威神之力不勞大道真妙之氣不用大道生神之威邪自銷亡爾時復有遼左島夷國中䥫鍾之精化作人身行世教化其法遍流八十一國令人受死生便哭之歌而送終年老之人謂之鬼朴棄之草澤令其速死是諸戎夷行此風化首末已得三千餘年被棄老人餓死空澤困頓狼籍明威真人愍之塗炭因使五億金剛童子銷滅䥫精及諸木魅制以孝道養老之法以救凡俗爾時䥫精復形是諸金剛埋之入地鎮以七寳神符于今在焉後學真師欲揮此精冝請金剛童子億億萬衆殄滅精鬽即自銷亡爾時復有西南金方䥫圍之山精化爲人出世教化其法遍滿荒戎之中百國之内流變五百餘種其名外道奉事衆象天地日月星辰風水金木鑪火城堡道路種種苦行變易衣服及攺形貌立像供養木葉書經殘損形貌披服戎衣受持禁祝入城乞求皆各自言此爲勝果齋祭血味祝號天王或稱梵師專事烹宰奉獻天神望求多福邀世財利各各自言能施我者得福無量如是外道附着人身悲啼呌呼自㧞頭髪踊身自撲受死求㓕或黙坐闇室諦觀光相言覩大聖或見一切罪福之相凡夫聞之競來布施捨諸珍寳妻子奴馬城邑田宅或捨身命頭目髓腦心無所恡是諸外道教其愛死輙見死者歌頌讚歎棄尸荒野名曰生天合衆禮拜歡喜歎言大士髙人厭世求度身充禽獸塊識生天煩惱不繼豈不樂哉是諸外道苦行之法然大火聚而作是言若有善男子善女人能入火聚燔燒其身是名第一大士得離煩惱證無上果獲得長樂無垢之地得登長樂不動之地是諸外道讚言大士勇徤德力無比能爲世間作大利益愚人見之競燒其身當爾之時外道遊精飛空歌讚作衆妓樂令其甘愜一百戎域數十年中過半傷殘被此外道作法誘道後學之士欲滅異道當修正一之法具大威神而降伏之以大道妙氣生神真威而擯落之外道凡形自然歸化外道精靈亦自消滅後學之生欲滅此邪善用火鈴之道邪即須亡此諸外道雖求勝果終不能得滅命之道非得真也此名行尸邪僞之道大道法中亦有此人人心流動身行不正邪神任之亦名外道如此之人不辨真僞清濁不分自來邪鬽心旣偏僻大道不行媚精入心惡聞生道後學之士深宜辨之當以道氣清諸穢濁請天司威兵五部神將各五萬五色兵吏五億萬衆廣施道塲摧裂㐫試而自消亡是時北方五十五國戎狄之中萬嵗老狐化作國王治在崑崙山東媚好諸女生得狐子孫息興盛遍滿諸國鬽殺人民食敢畜産作諸光恠亦有强精合爲羣黨其鬽人之狀化作美人男女之形與人交通亦能化作生人宗族或時髠人頭髪令人失心狂走妄語亦能令人惡生好殺陋其身命心腹剌痛乍消乍脹聰明辨慧晝伏夜遊愛好彩色欲常獨處其變狀也有似木精之狀興於春秋生落之時木精易除但使雷神霹而滅之即自消亡後學之士深辨狐鬽欲揮之法當用西戎賔金鑄作神劔宻藏身上疾用火鈴奔星之道上請大道生神威兵億億萬騎摧折強精擊揮狐魅聞聲震伏萬里逃蹤幻化之道自然擯䘮女娠狐胎堅未潰者上請威兵醫治玉女齎五方之藥針刀火艾入其身中隨病對治速令崩落於是道氣流行元始風布邪胎消潰生道濳備上聖醫之不窮倐忽上人醫之經旬始効如是病人髓濳空虛血脉不注教使安心持奉經誡取令平復解禁自在重病之人令其奉道師授明威辟邪之法晨夕存念供繕香燈受持師法如對御前爾時明威真人以大慈力故出此正法下流凡界是諸强精遥聞敬畏復形濳蹤而不敢動當爾之時不用揮割是諸邪精率心輔正承侍大道慈悲不忍加滅故出明威之法流傳後學防諸精鬽或能犯過干忤正真後學之人當依正法馘而裂之絶滅𩲓魅消殄精祟令正信之人心有指歸一切衆生賴此安橞此經所在則爲有道德人修之𦔳道興化治護衆生不問貴賤不恃其貴他酬報上聖遥鑒善道友之冥司記注其功自全無上大道降下生神而來衛之如此之師所在之處一切人神之所恭敬不得輕觸譏謗罵詈及以捶打竊其財食天神地秖立見考罰如此之師心體堅直與道合同一切人民皆應作禮重心恭敬猶如敬天何以故如此之師雖暫居世德並天真威能制天天猶敬之以是義故一切人民應起恭敬欽尚其德能制天地濟度廣大功侔造化道力無諭一切男女應於此師弘大道心願得一切人民同師修習果無上道明威真人說此法時魔宫振動𩲓魅䘮精和風慶雲周流下界法雷法雨潤動四天藥草樹應時花敷邪道歸正五鬽銷蹤爾時明威真人聲光逺聞十方渴仰四天之下一切男女燒香叩頭仰天弘願𩓑得大道降臨下世爲凡見形以申翹慕是時大秦國王伊耆若提覩於真光一心注念七日忘食而作是言若有大道遥感我者我當屏棄國累從道出家時有日南外道名弗多梨徒衆六千髠頭祼形擎一鑪火來入王國門人白於王王出頂禮謂是真師迎進城中晨夕供養廢治國務王從弗多梨出家求道令王晨夕頂禮此鑪一國男女亦皆事火火精興盛漸入王心王及國内盡皆受死各立誓𩓑燔燒此身以求上道王及臣子期取四月八日聚樵燔身明威真人愍王無知即命北海龍王玄武大將乘大海水徃於南方去地六尺遍覆大秦足滿一月外道與王無復生許一國無火人噉生羊火精之魅自然消滅王心自疑即白外道而作是言汝師我聞西北有師徒奉事水神將非是此來相試耶爾時外道合衆震怖不能自持即答王言大王當知諸異道法五百餘種修之果極超至梵天一種求道亦有何定我今與王廻心事水爾時國内男女大小悉皆傾心向水恭敬又經一月二更之初忽聞水中有人言曰大道雖無形應之如影響虛空本無際覩境猶心想水炭傷爾生魂神滯幽壤雲宫自在嬰飄然乘氣上哀哉習邪道進退迷塵綱悲生老死至朽爛誰𢹂奬何不學長生一瞬周天壞形神忽巳昇精氣長寥朗爾時王及外道聽得正音便即精研正音經一七日心忽開悟行尸之身變爲芳骸聽察真正洞覩上方雖有神水不能障蔽研詠至音寂坐虛室心無邪想專志大道足經千日心香上陳求師觧釋爾時明威真人以慈愍之心見其法身光氣之體爲王注解王及弗多梨并諸臣子九億從衆一時成道見身昇虛不受生死爾時大秦國王成道之後重請真君爲後來生銷滅五方災害之法真人告曰大道之法唯貴長生助國扶命救度兆民背道失生自勞舒𢡖不能扶助衛護有生以是義故无上大道故出生道蕩除死氣精心行之德動天地兼修假習無所能爲五種之災皆可消滅學道之人盡誠助國齋醮禳災志求徴應師爲向所方面齎好雄黄七斤宻器盛之沈以深淵勿令人見金書真文鐫以玉簡鎮國五方神山之中幽巖深洞齋戒請福而爲天子及諸兆庶若有吉應則神香氛列風不動條四極廓清則大福來應國祚延永天下太平當此之時亦令國王豋壇告天卑宫菲食恩流國内惠恤老病仁及蠢動不傷含識如此之君長處天位學道之士應如此經告語天子亦可豐贍資助長齋名山濳行至而爲天子及以兆民此名隂德貴无顯露依附髙貴而行至法恐動俗間能無罪失而得平行也學道之人當與國主而同其德俱爲天下一切兆民德不同者强行吾道天不助之勞而無功道言學道之士當具十德苐一之德分别真僞不浪修習苐二之德精研至法窮諸妙門苐三之徳專志守戒心不放蕩苐四之德通詠聖教心不疑惑苐五之德慈孝忍辱不與物爭第六之德供繕法事心不怠堕第七之德柔弱用道微宻其行第八之德勇能進道履險不顧第九之德威震外魔解脫纒累第十之德救身死厄長存無窮道言學道之士不免死厄不離邪法非得正也雖曰丈夫實無道力不能常住爲物所遷不名道士是名外道與俗无别虛無辨慧强明空義無道心體四大流散不能全生魂識漂浪遇合而倚動億千劫不能得道悲世行尸哀其失生老死爛壞神勞徃返一爲失正二爲罪深三爲不動四爲邪僻五爲强梁六爲重濁七爲馳競八爲不慎九爲怯弱十爲自傲有此十事能敗真道如是十事元於失正流變十惡而無窮已修習正法流變萬化妙隱玄中亦无窮已學道之士立功建德勤修生道遠離死厄行成之日真道見形𢹂其同遊無上大道好生惡殺好生之人能得吾道好殺之人自䘮吾道人自背向非道違之大道無心應於能行不能行道道亦應之應有隂陽生死二道榮枯成敗出入洪冶昇沉有殊哀樂相背𢘆懷引接無柰不從哀哉流俗滅亡不反使其營生如營死者天錫雲車浮空而遊使其好道如愛財色真人爲儔衆靈爲使使其行柔如行剛者塵劫嬰孩未曽有傷學真之士吟詠此經寳愛自戒終身無患必獲昇度道言學道之士未昇之前猶在人世應當哀愍一切衆生爲其消災生活民命其德甚大第一之功師於有災之方建立道塲百千之所盛治方域香水盪穢施立牀座安置經像令衆歸依燒香然燈六時禮𩓑意在丹欵不假浮辭微聲下氣不與衆聞師爲啓陳大道言彼災殃元兆所起次請五方威神其名曰東方青龍將軍九人從官八十一萬衆南方朱雀將軍三人從官六十四萬衆西方白虎將軍七人從官三十六萬衆北方玄武將軍五人從官二十五萬衆中央戊巳黄麟將軍一十二人從官九萬衆羅列天儀下來壇内運動神力滅鬼生人隨其病源神方對治師爲𩓑念哀愍病人猶毋愛子欲其無病約勑壇内毎事整肅忌噉葷辛魚肉之類男女穢氣衣服垢膩講論非法舉動傲慢心不珍重天道不𦔳邪神不滅所疾不差翻招殃咎其道塲内三五日間一過香湯灌灑塲内人不灑沐不得入道塲毎置一壇塲數旬始解任其來者師無責坐困病之人不能行道任他世上不必須要病身自行道或可立瞻對但取効驗不拘常則道言凡瞖邪之法復有三種第一色人志在出家未明科法用意偏僻媚鬼入心應須醫之不醫不愈如此之人所用心信香水而巳貧士之香直心而行第二色人專心在道未佩生籙長齋苦行功德未立忽被㐫試來入道塲事須香燈米木草果三過供養第三色人身雖假道志在邪求身染疾患欲求救療來入道塲者責其心信謹依醮法又責束帛隨其富貴以酬道恩與師營辨法具及師衣師屋敷具等用又將買藥及食供施貧病不自活者贖放生命及買香油治舍都不得俗用犯者罰病十日十日之後善神逺離所學不成病人不專心想散亂及犯穢汚不自舉愆不從師教所醫不差登即受考世醫不救學道之士建功立德未辨隱修在世醫救戒慎戰慄如在名山用心無異爲人所請不得辭勞推注有事或前喚後出或詐言不在斯託疾病嫌凝貧賤无價可貪責望財信以贍私費不救懸急罰病百日善神逺離爲邪所考世醫不敕道言學道之士道有淺深德有優劣若遇明師伏膺膝下或遇真人下遊或九祖流慶或先身業道功德未成暫歷太隂報生王國乗此運㑹盡受寳經王氣周身威神衛體不更生滅尅獲道真未昇之前或遊凡地門徒繁廣未盡澄淳忽染不真應須清蕩如此威神都無所用但爲吟拂魔之靈篇詠上皇之大曆心騰絳氣目騁奔星揮以神金良劔照以圓穹寳鏡或以髙坐虛堂精誠守正内視陳啓無勞口辭三洞生神隱居經緯於是六邪殍殄五毒内消賔主之心不覺勞處任所營爲無復障礙如此之師威力弘大一切神邪皆爲侍衛或有門徒男女業障未消司非糺彈或應受考師以慈悲爲其首謝上爲九祖下及一身專心悔過無不解了道言莫大之愆不過媱殺父毋及其師長此罪極大無能悔咒永沉苦趣無有出期永不見道永不聞法况能得道學道之士及諸俗人應生正信慈悲孝順勿生邪念背道忘義進退受罰不可思議若有世人及諸經紀言殺父毋師長罪可悔者猶固合道此是鬼鬽所說妬𡜍神邪之所教化顛狂之人作如此言大道不聞天地不赦惡鬼所罰湯炭燒煑永失人道一切故殺蠢動含靈天猶不赦况故逆心殺害師父而可首悔學道之士宣吾寳經開凡耳眼遍使知聞功德無比不可稱量道言龍漢𥘉㑹火劫之中寥丘之國在海之中西去霍丘七萬餘里中有道士名曰乹忠其姓聞氏年始十二出家求道修不殺戒治病放生孝順父毋敬事師資身未服佩長生之文但以建功立德心不懈退首末巳得二十七年功感諸天其道塲之内常有真人下降改形同凡又有地水諸神爲其給使供繕法事授其神藥療諸痼疾不覺有勞下手之驗如湯沃雪斬伐邪精都不用力大建功德憐哀貧病雲宫天尊感其殷勤知不退敗正月七日故命明威真人授其長生之道合景昇虛受號真人治在三十四天已得八億大劫形貌反嬰亦能授手過滿世界大道以其德廣却後十年勑五龍王昇其住宅九十七人男女貴賤移居泰清天上俱得不死功德巨大道潤合家凡夫之人一身不度七祖父毋何所恃賴而得免罪受生人間不可思議道言學道之士功德廣大大道慈悲故飛其宅及其家人所有畜業盡得長存免離死厄非是上天之上而無金闕玉房直以方便示見凡夫威神之力欲令一切凡夫遠離邪道超出朽爛老死之法超出惡世無常境界煩惱窟宅獲得常樂不變易法善男子善女人心信之後劫劫之中應有世賢學無上道合其舍宅一時昇虛善男女等應當念此希有之事廻心信向知一切凡夫皆可成道學失真要不能成道修習得真未有一人不成聖也無上大道驗之在即何用殷勤而教誡也太上大道玉清經卷之九
